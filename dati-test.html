<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Void Lab — STRATO A — dati-test</title>
<style>
  :root { --bg:#020604; --fg:#39ff88; --dim:#1c7a48; --warn:#ffcc44; --err:#ff5b5b; --ok:#39ff88; }
  * { box-sizing: border-box; }
  html,body { margin:0; background:var(--bg); color:var(--fg);
    font-family: "Cascadia Code","JetBrains Mono","Consolas",ui-monospace,monospace; }
  body { padding: 22px; line-height: 1.5; }
  h1 { font-size: 18px; letter-spacing: 2px; text-shadow: 0 0 8px #0f6; margin: 0 0 4px; }
  .sub { color: var(--dim); font-size: 12px; margin-bottom: 18px; }
  .panel { border: 1px solid var(--dim); border-radius: 6px; padding: 12px 14px; margin: 12px 0;
    background: rgba(10,40,24,0.25); box-shadow: inset 0 0 24px rgba(0,255,120,0.04); }
  .row { display:flex; justify-content:space-between; gap:12px; padding:3px 0;
    border-bottom: 1px dotted rgba(28,122,72,0.35); }
  .row:last-child { border-bottom: none; }
  .k { color: var(--dim); }
  .v { text-align:right; word-break: break-word; }
  .PASS { color: var(--ok); text-shadow: 0 0 6px #0f6; }
  .FAIL { color: var(--err); text-shadow: 0 0 6px #f33; }
  .WARN { color: var(--warn); }
  pre { white-space: pre-wrap; word-break: break-word; font-size: 12px;
    color: #8fe; background: rgba(0,0,0,0.35); padding: 10px; border-radius: 4px;
    border:1px solid var(--dim); max-height: 320px; overflow:auto; }
  .verdict { font-size: 22px; letter-spacing: 3px; margin: 6px 0 2px; }
  .badge { display:inline-block; padding:1px 8px; border:1px solid var(--dim); border-radius: 10px;
    font-size: 11px; color: var(--dim); }
</style>
</head>
<body>
  <h1>◐ VOID LAB — STRATO A</h1>
  <div class="sub">fondazione dati locale · SQLite (OLTP/OPFS) + DuckDB (OLAP) · 100% offline</div>

  <div class="panel" id="verdictPanel">
    <div class="verdict" id="verdict">esecuzione…</div>
    <div class="sub" id="verdictSub"></div>
  </div>

  <div class="panel" id="statusPanel"><div class="row"><span class="k">stato motori</span><span class="v">boot…</span></div></div>

  <div class="panel">
    <div class="sub">dettaglio checks</div>
    <div id="checks"></div>
  </div>

  <div class="panel">
    <div class="sub">window.__datiTest() → JSON</div>
    <pre id="json">…</pre>
  </div>

<script type="module">
import Dati from './lib/dati.js';

let RESULT = null;   // cache dell'ultimo esito, esposto da window.__datiTest()

const $ = (id) => document.getElementById(id);
const esc = (s) => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

function rowsHTML(pairs) {
  return pairs.map(([k, v, cls]) =>
    `<div class="row"><span class="k">${esc(k)}</span><span class="v ${cls||''}">${esc(v)}</span></div>`
  ).join('');
}

async function runTest() {
  const out = {
    isolated: false, sqlite_ok: false, duck_ok: false,
    persistent: false, runs_count: 0, metric_readback: null,
    sqlite_mode: null, sqlite_version: null, duck_version: null,
    errors: [],
  };

  try {
    // ---- INIT dei due motori ------------------------------------------------
    const status = await Dati.init();
    out.isolated = status.isolated;
    out.persistent = status.persistent;
    out.sqlite_mode = status.sqlite.mode;
    out.sqlite_version = status.sqlite.version;
    out.duck_version = status.duckdb.version;
    if (status.sqlite.warn) out.errors.push('sqlite: ' + status.sqlite.warn);

    // ---- SCRITTURA: un esperimento con qualche run + metriche ---------------
    const exp = 'demo-' + Date.now();
    const idA = await Dati.saveRun({
      experiment: exp, kind: 'sim',
      config: { seed: 42, dt: 0.01 },
      metrics: { energia: 12.5, entropia: 0.87 },
      notes: 'primo run', tags: ['baseline', 'gpu'],
    });
    const idB = await Dati.saveRun({
      experiment: exp, kind: 'sim',
      config: { seed: 7, dt: 0.02 },
      metrics: { energia: 30.0, entropia: 1.42 },
      notes: 'secondo run', tags: ['variante'],
    });
    const idC = await Dati.saveRun({
      experiment: exp, kind: 'bench',
      config: { n: 1000 },
      metrics: { energia: 5.0, entropia: 0.10 },
      notes: 'bench', tags: ['baseline'],
    });

    // ---- LETTURA via SQLite (OLTP) -----------------------------------------
    const runsSql = await Dati.listRuns({ experiment: exp });
    out.runs_count = runsSql.length;
    // Rilettura di una metrica precisa dal run A.
    const mRows = await Dati.sqlite(
      'SELECT value FROM metrics WHERE run_id = ? AND key = ?', [idA, 'energia']);
    out.metric_readback = mRows.length ? mRows[0].value : null;
    // Un filtro per tag, per esercitare il path filtri.
    const baseline = await Dati.listRuns({ experiment: exp, tag: 'baseline' });

    out.sqlite_ok = (out.runs_count === 3)
      && (out.metric_readback === 12.5)
      && (baseline.length === 2)
      && (typeof idA === 'number' && idB > idA && idC > idB);
    if (!out.sqlite_ok) out.errors.push(
      `sqlite check: runs=${out.runs_count} metric=${out.metric_readback} baseline=${baseline.length}`);

    // ---- LETTURA via DuckDB (OLAP) -----------------------------------------
    const loaded = await Dati.loadIntoDuck();
    // Aggregazione tipo-ClickHouse: media energia per esperimento corrente.
    const agg = await Dati.duck(
      `SELECT r.experiment,
              COUNT(*)                AS n_runs,
              AVG(m.value)            AS avg_energia,
              MAX(m.value)            AS max_energia
       FROM runs_olap r
       JOIN metrics_olap m ON m.run_id = r.id
       WHERE m.key = 'energia' AND r.experiment = '${exp}'
       GROUP BY r.experiment`);

    const a = agg[0] || {};
    const avg = Number(a.avg_energia);
    const mx = Number(a.max_energia);
    // (12.5 + 30 + 5) / 3 = 15.8333… ; max = 30
    out.duck_ok = (Number(a.n_runs) === 3)
      && Math.abs(avg - 15.8333333) < 1e-3
      && Math.abs(mx - 30.0) < 1e-9
      && (loaded.runs >= 3);
    out.duck_agg = { n_runs: Number(a.n_runs), avg_energia: avg, max_energia: mx };
    if (!out.duck_ok) out.errors.push('duck check: ' + JSON.stringify(out.duck_agg));

  } catch (err) {
    out.errors.push(String(err && err.stack || err));
  }

  return out;
}

function render(out) {
  RESULT = out;
  const allOk = out.sqlite_ok && out.duck_ok;

  // Verdetto.
  $('verdict').textContent = allOk ? 'PASS' : 'FAIL';
  $('verdict').className = 'verdict ' + (allOk ? 'PASS' : 'FAIL');
  $('verdictSub').textContent = allOk
    ? 'entrambi i motori operativi e coerenti'
    : 'vedi errori sotto';

  // Stato motori.
  $('statusPanel').innerHTML = rowsHTML([
    ['cross-origin isolated', out.isolated ? 'SI' : 'NO', out.isolated ? 'PASS' : 'WARN'],
    ['persistenza (OPFS)', out.persistent ? 'SI (opfs)' : 'NO (memory)', out.persistent ? 'PASS' : 'WARN'],
    ['sqlite mode', out.sqlite_mode || '—', ''],
    ['sqlite version', out.sqlite_version || '—', ''],
    ['duckdb version', out.duck_version || '—', ''],
  ]);

  // Checks.
  $('checks').innerHTML = rowsHTML([
    ['SQLite (OLTP) scrittura+lettura', out.sqlite_ok ? 'PASS' : 'FAIL', out.sqlite_ok ? 'PASS' : 'FAIL'],
    ['DuckDB (OLAP) aggregazione', out.duck_ok ? 'PASS' : 'FAIL', out.duck_ok ? 'PASS' : 'FAIL'],
    ['runs_count', out.runs_count, out.runs_count === 3 ? 'PASS' : 'FAIL'],
    ['metrica riletta (energia run A)', out.metric_readback, out.metric_readback === 12.5 ? 'PASS' : 'FAIL'],
    ['duck avg energia', out.duck_agg ? out.duck_agg.avg_energia.toFixed(4) : '—', out.duck_ok ? 'PASS' : 'FAIL'],
  ]);

  if (!out.isolated) {
    const p = document.createElement('div');
    p.className = 'panel';
    p.innerHTML = '<span class="WARN">⚠ Pagina non isolata.</span> ' +
      '<span class="sub">Apri il lab con <b>avvia-lab.bat</b> / <b>avvia-lab.py</b> ' +
      'per la persistenza OPFS. Ora SQLite gira in-memory.</span>';
    $('verdictPanel').after(p);
  }

  $('json').textContent = JSON.stringify(out, null, 2);
}

// window.__datiTest(): rilancia il test e ritorna il JSON dell'esito.
window.__datiTest = async function () {
  const out = await runTest();
  render(out);
  return out;
};

// Autorun al caricamento.
render(await runTest());
</script>
</body>
</html>
