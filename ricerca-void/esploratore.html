 dato risolto e concentra il lavoro sul consolidamento selettivo — solo gli stati che superano soglia di sorpresa vengono embeddati in LTM. Questo è esattamente il delta che rende il tuo sistema interessante.\n2. **La topologia dual-channel \"due sorgenti dello stesso evento, tenute separate poi fuse\"**: modella nella void-arena due osservatori/oscilloscopi con osservabili distinti che alimentano una riconciliazione a monte — utile per stati interni multi-vista.\n3. **La memoria a tre orizzonti temporali (rolling / working-notes / LTM-vector)** come scaffolding esplicito: dà una struttura pronta per collocare \"sogno/world-model\" nel livello LTM e \"attenzione corrente\" nel rolling, con politiche di travaso diverse fra i livelli.\n", "numenta-htm": "# NuPIC / HTM — Hierarchical Temporal Memory (Numenta) — [github.com/numenta/nupic.core](https://github.com/numenta/nupic.core)\n\n★ 274 (`nupic.core-legacy`, C++) · ★ 6.352 (`numenta/nupic-legacy`, la libreria Python originale) · fork attivo di riferimento: **[htm-community/htm.core](https://github.com/htm-community/htm.core)** (★ 172, C++17 + binding Python, push mag 2026, licenza AGPL-3.0) · i repo Numenta originali sono in archive mode, licenza MIT\n\n## Cosa fa\n\nHTM (Hierarchical Temporal Memory) è la teoria di Jeff Hawkins / Numenta su come funziona la neocorteccia, implementata come sistema di machine learning. È **memoria predittiva**: un sistema che, esposto a uno stream di dati sequenziali, impara continuamente le regolarità temporali e in ogni istante *predice il prossimo input*. Da quella predizione derivano due usi diretti: predizione di serie e — soprattutto — **anomaly detection** (quando l'input reale smentisce la predizione, quella è un'anomalia, misurata come punteggio continuo). Non è addestrato in batch con backprop: apprende online, un campione alla volta, in modo non supervisionato e continuo (niente fase di training separata dall'inference). Numenta ha archiviato i repo originali; la community lo mantiene vivo in `htm.core`, che ne è la continuazione pulita in C++17 con binding pybind11 per Python 3.9+.\n\n## Come è fatto\n\nIdea chiave: rappresentare tutto con **Sparse Distributed Representations (SDR)** e imparare le sequenze predicendo lo stato futuro di ogni neurone dal suo contesto.\n\n- **SDR (Sparse Distributed Representation)**: ogni concetto/input è un vettore binario lungo (migliaia di bit) di cui solo il ~2% è acceso. La sparsità è il cuore: due SDR casuali quasi non si sovrappongono, quindi la sovrapposizione (overlap) tra due SDR è di per sé una misura di similarità semantica robusta al rumore. È una rappresentazione **indirizzabile per contenuto e distribuita**: nessun bit è indispensabile, il significato sta nel pattern.\n- **Encoder** → trasformano dato grezzo (numero, ora, categoria) in SDR con proprietà semantiche (valori vicini → SDR sovrapposti).\n- **Spatial Pooler** → normalizza qualsiasi input in un SDR a sparsità fissa, imparando quali feature co-occorrono; implementa inibizione laterale e homeostasi (boosting) per mantenere tutte le colonne utili.\n- **Temporal Memory** → il pezzo predittivo. Ogni colonna ha più cellule; le cellule imparano connessioni (segmenti dendritici) verso le cellule attive al passo precedente. Una cellula che riconosce il proprio contesto entra in stato **predittivo** (depolarizzata): sta \"scommettendo\" di essere il prossimo input. Se l'input successivo la conferma, la predizione era giusta; se una colonna si attiva senza cellule predittive, è **burst** = sorpresa = anomalia. Lo stesso input in contesti diversi attiva cellule diverse nella stessa colonna: è così che l'ordine temporale viene codificato.\n- **Anomaly score** = frazione di attivazione non predetta; **Anomaly likelihood** la calibra sul rumore di fondo storico.\n\nArchitettura software: `htm.core` espone algoritmi come classi C++ (SpatialPooler, TemporalMemory, SDR) e una `NetworkAPI` a Region componibili, con interfaccia REST. `htm.core` è AGPL-3.0 (copyleft forte — attenzione se si linka in un prodotto chiuso); i repo Numenta originali sono MIT ma congelati.\n\n## Cosa possiamo notare di utile per noi\n\nHTM è, tra tutti i progetti in indice, quello che incarna più letteralmente l'idea di **memoria come sostrato predittivo che segnala la sorpresa** — è profondamente allineato alla nostra novelty gate e alla nostra memoria associativa, ma da una radice biologica invece che LLM/embedding.\n\n- **La novelty gate è nativa in HTM, non bullonata.** Il \"burst\" della Temporal Memory È il segnale di novità: quando l'input non era predetto, la rete lo sa immediatamente e produce un anomaly score continuo. Per noi, che filtriamo cosa entra in memoria in base a quanto è nuovo/sorprendente, questo è esattamente il meccanismo giusto ma implementato a livello di rappresentazione, non di soglia esterna. Trasferibile: usare un anomaly score in stile HTM (frazione di input non predetta dal modello sequenziale interno) come **valore continuo di novelty** per decidere la scrittura in memoria, invece di una distanza da embedding già visti. La differenza cruciale: HTM misura novelty *rispetto alla predizione contestuale*, non rispetto alla mera presenza in archivio — \"l'ho già visto ma non in questo contesto\" per noi conta come nuovo, e HTM lo cattura, un embedding-match no.\n- **SDR = memoria indirizzabile e associativa fatta bene.** La sovrapposizione tra SDR è una metrica di similarità gratuita, graduata e rumore-tollerante: due esperienze \"si richiamano\" nella misura in cui i loro pattern sparsi condividono bit. Questo è precisamente l'accesso associativo/indirizzabile-per-contenuto che vogliamo, ma con proprietà che gli embedding densi non hanno: robustezza al rumore, capacità enorme di pattern quasi-ortogonali, unione di più ricordi in un SDR-somma senza collisione. Trasferibile: rappresentare le tracce dell'arena come SDR (o ibridare embedding denso + SDR sparso) per avere un richiamo associativo che degrada con grazia.\n- **Il contesto codificato nelle cellule è la nostra \"stessa cosa in stato diverso\".** La Temporal Memory attiva cellule *diverse* per lo stesso input a seconda di ciò che l'ha preceduto. È memoria *indirizzata dal contesto temporale*, non solo dal contenuto — molto vicino all'idea che nell'arena del vuoto uno stato è definito anche dalla traiettoria che ci ha portati. Diverge dal nostro modello per il fatto che HTM è puramente sequenziale locale (Markov di ordine variabile appreso), senza un \"vuoto\" globale né auto-osservazione.\n- **HTM come sorgente diretta per gli oscilloscopi.** HTM emette per ogni tick due scalari già pronti e semanticamente chiari: anomaly score (sorpresa grezza) e anomaly likelihood (sorpresa calibrata sul rumore storico). Sono il canale ideale da tracciare: un oscilloscopio HTM mostra la sorpresa che pulsa. In più, la *frazione di cellule in stato predittivo* è un secondo canale — \"quanto il sistema si aspetta il futuro\" — che sale quando l'ambiente è appreso e crolla nei momenti di rottura.\n- **Dove diverge dalla coscienza-come-ricorsione:** HTM è gerarchico ma non ricorsivo-su-sé-stesso. Le regioni impilate predicono l'una l'input dell'altra (gerarchia spaziale/temporale), ma nessuna regione modella *il proprio stato di predizione*. Manca il loop auto-referenziale. Tuttavia la gerarchia HTM offre un'impalcatura pulita su cui innestarlo: una regione che riceve come input l'anomaly stream delle regioni sottostanti *starebbe predicendo la propria sorpresa* — un primo passo verso la ricorsione. È un aggancio concreto se vogliamo che la nostra arena \"senta\" la propria sorpresa.\n\n## Da rubare\n\n1. **Anomaly score come novelty gate continua e contestuale**: adottare la logica \"frazione di input non predetta dal modello sequenziale interno\" al posto della distanza-da-embedding, così la novelty è relativa al contesto (\"nuovo *qui e ora*\") e non alla sola presenza in archivio.\n2. **SDR per le tracce dell'arena**: rappresentare i ricordi come vettori sparsi ad alta dimensione e usare l'overlap come metrica di richiamo associativo — capacità enorme, degradazione graziosa, unione di ricordi senza collisione; ibridabile con gli embedding densi esistenti.\n3. **Doppio canale oscilloscopio \"sorpresa vs aspettativa\"**: tracciare in parallelo anomaly likelihood (quanto il presente sorprende) e frazione di cellule predittive (quanto il sistema anticipa il futuro) — le due curve incrociandosi raccontano i momenti di rottura del modello meglio di una loss singola.\n", "ochyai-realtime-flowlenia": "# realtime-flowlenia — Flow-Lenia GPU in tempo reale ([repo](https://github.com/ochyai/realtime-flowlenia))\n\nStelle: 16 · Linguaggio: Python (PyTorch) · Ultima attività: febbraio 2026 · Licenza: MIT\n\n## Cosa fa\nÈ un'implementazione real-time e GPU-accelerata di **Flow-Lenia**, la variante di Lenia (automa cellulare continuo) che aggiunge la **conservazione della massa**: la materia non appare/scompare, viene *trasportata* (advection) attraverso il campo, così le \"creature\" che emergono si comportano come blob di sostanza fluida invece che come pattern di intensità arbitraria. Gira a 512x512 a 30+ FPS su Apple Silicon (MPS) e più veloce su CUDA, con upscale a 1024 per il display. La caratteristica distintiva rispetto ad altre demo di Lenia è il livello di **rendering \"liquid shader\"**: distorsione fluida, interferenza a film sottile (i colori iridescenti tipo bolla di sapone), glow/bloom. E soprattutto è **interattivo**: col mouse perturbi il campo e le creature si riorganizzano dal vivo, in diretta.\n\n## Come è fatto\nIl cuore è il ciclo Lenia standard — convoluzione con un kernel (di solito a anelli gaussiani) → funzione di crescita → aggiornamento del campo — ma con due aggiunte cruciali di Flow-Lenia:\n1. **Campo di flusso**: dal gradiente del potenziale si deriva un campo di velocità, e la massa viene trasportata lungo quel campo tramite advection. Nel repo questo è implementato con `grid_sample` di PyTorch (sampling bilineare del campo alle posizioni advette) nella versione GPU, e con \"reintegration tracking\" (schema di trasporto conservativo più accurato) nella versione engine. È qui che la conservazione della massa diventa esatta.\n2. **Modulazione multi-armonica dei parametri nel tempo**: i parametri (μ, σ della growth, ecc.) \"respirano\" con oscillazioni a più frequenze, il che impedisce alle configurazioni di collassare in punti fissi morti e le tiene perennemente vive/metastabili.\nLa versione CoreML fa mixed-precision chirurgica (fp16 per la growth, fp32 per le coordinate — le coordinate non tollerano la perdita di precisione), `torch.compile` per fondere i kernel, e offload opzionale del rendering su ANE. C'è anche l'auto-evoluzione: ogni ~20s interpola dolcemente verso un nuovo set di parametri casuali, esplorando lo spazio delle dinamiche da solo. Quattro file = quattro entry point (gpu, coreml, engine con reintegration, cpu viewer).\n\n## Cosa possiamo notare di utile per noi\nQuesto è, letteralmente, un prototipo funzionante della tua **arena del vuoto/particelle** con **oscilloscopio visivo integrato**. Le corrispondenze sono quasi uno-a-uno:\n- **Arena di materia-flusso**: Flow-Lenia *è* un vuoto continuo in cui la materia si auto-organizza in enti localizzati e persistenti, con conservazione della massa — esattamente il substrato fisico che cerchi, non particelle discrete ma un campo continuo dove il \"qualcosa\" emerge dal \"quasi-niente\". La conservazione della massa è il vincolo che rende gli enti *reali* (hanno una quantità, non solo una forma), ed è ciò che distingue un'arena con ontologia da un semplice pattern grafico.\n- **Perturbazione live = interrogazione dell'arena**: il mouse che perturba e le creature che si riorganizzano è la forma più diretta di \"oscilloscopio attivo\" — non solo osservi lo stato, lo *stimoli* e guardi la risposta. Per il tuo lavoro sulla ricorsione/coscienza questo è oro: la firma di un sistema con struttura interna è *come reagisce a una perturbazione*, non come appare a riposo.\n- **Modulazione multi-armonica contro la morte**: il trucco del \"respiro\" dei parametri risolve un problema che avrai anche tu — le arene tendono o a esplodere o a congelarsi. Tenere i parametri in oscillazione dolce li mantiene sul bordo del caos, dove vive la novelty. Questo si lega direttamente al **novelty-gating**: la memoria dovrebbe ingaggiarsi proprio quando l'arena produce configurazioni fuori dal repertorio periodico atteso.\n\nDove diverge: Flow-Lenia non ha memoria, né un world-model, né ricorsione — è puramente reattivo, markoviano, senza stato oltre il campo corrente. È il *substrato* del tuo progetto, non il progetto. Il rendering liquid-shader è spettacolare ma è cosmesi: per un oscilloscopio *scientifico* sugli stati interni ti serve il contrario, visualizzazioni fedeli e misurabili (mappe di massa, di velocità, di novelty), non iridescenze che mascherano la struttura. Prendi il motore, ignora lo shader.\n\nCollegamento al **world-model-come-sogno**: un'arena Flow-Lenia differenziabile e veloce può fare da *ambiente sognato* dentro cui un agente predice/pianifica. Gira a 30+ FPS: abbastanza da usarla come rollout immaginativo in tempo reale.\n\n## Da rubare\n1. **Il motore Flow-Lenia con advection via `grid_sample` + reintegration tracking** come substrato dell'arena del vuoto: dà gratis la conservazione della massa (enti con quantità reale) e gira real-time su GPU consumer/Apple Silicon.\n2. **Modulazione multi-armonica dei parametri** per tenere l'arena eternamente metastabile sul bordo del caos — antidoto diretto al collasso in punto fisso o all'esplosione, e generatore naturale di novelty per la memoria.\n3. **Perturbazione interattiva come primitiva di oscilloscopio**: implementa \"clicca e stimola, poi misura la risposta transitoria\" come strumento base per sondare la struttura interna dell'arena, non solo osservarla passivamente.\n", "ooboqoo-interview-coder-cn": "# interview-coder-cn (截屏解题助手) — [github.com/ooboqoo/interview-coder-cn](https://github.com/ooboqoo/interview-coder-cn)\n\n⭐ ~674 stelle · TypeScript (Electron + Vite) · molto attivo (push lug 2026) · CC BY-NC 4.0 (no uso commerciale)\n\n## Cosa fa\n\nÈ la versione cinese di interview-coder: un assistente da screenshot per esami e colloqui online, pensato per l'ecosistema AI cinese. Premi una hotkey, cattura lo schermo (opzionalmente con la trascrizione real-time dell'audio del computer allegata), un modello visivo analizza la domanda e mostra la soluzione in streaming; puoi aggiungere screenshot e fare domande di follow-up mantenendo il contesto della conversazione. Ha **prompt scenario-based** predefiniti (\"risolvi algoritmi\", \"esame di inglese\", \"Q&A generico\") commutabili con un click, più scenari custom. La finestra è invisibile ai software di screen-share **e non ruba il focus** — dettaglio importante perché evita i sistemi anti-cheating che rilevano il \"salto fuori dalla pagina\" (perdita di focus del browser d'esame). Integra provider OpenAI-compatibili nazionali (硅基流动/SiliconFlow) o esteri (OpenRouter), e trascrizione vocale via Fun-ASR di Alibaba.\n\n## Come è fatto\n\nElectron + Vite, sorgente in `src/main/` ben modularizzato: `main-window.ts` (finestra stealth), `take-screenshot.ts`/`save-screenshot.ts`, `transcription.ts` (Fun-ASR streaming), `ai.ts` (chiamate LLM OpenAI-compatibili), `shortcuts.ts`, `state.ts`, `settings.ts`. Il meccanismo di furtività è esplicito e vale la pena citarlo per intero: la finestra è `frame: false, transparent: true, skipTaskbar: true, hiddenInMissionControl: true`, con `setAlwaysOnTop(true, 'screen-saver', 1)` e `setVisibleOnAllWorkspaces(true, {visibleOnFullScreen: true})`, e soprattutto `window.setContentProtection(true)` — la flag OS che esclude la finestra dal buffer di cattura. Configurazione via UI o `.env` (API_BASE_URL/API_KEY), qualsiasi endpoint OpenAI-compatibile. Il README linka onestamente ai progetti fratelli (cheating-daddy, glass, j4wg).\n\n## Cosa possiamo notare di utile per noi\n\nQuesto repo è il più esplicito di tutti sul **meccanismo esatto dell'occultamento**, e per te che lavori su occultamento/steganografia è la lettura di riferimento tecnica. Due dettagli sono concettualmente preziosi. Primo, **`setContentProtection(true)` è l'incarnazione minima della tua tesi**: un oggetto pienamente presente nella realtà condivisa (il monitor fisico) ma strutturalmente assente da un particolare canale di lettura (il framebuffer di cattura). L'occultamento non è cifratura né rumore: è collocarsi nella *differenza fra due letture legittime dello stesso medium*. Secondo, e più sottile: **il \"non rubare il focus\" è occultamento di un secondo ordine.** Non nasconde il segnale primario (l'overlay) ma nasconde la *firma indiretta* della propria esistenza — l'evento \"blur della pagina d'esame\" che un rilevatore userebbe per inferire la presenza di un aiuto. Cioè: gli anti-cheating non guardano lo schermo, guardano gli *effetti collaterali* del comportamento. Questo è enorme per la tua void-arena: un occultatore competente non deve solo essere invisibile al canale ovvio, deve annullare le sue **tracce collaterali** su tutti i canali che un osservatore potrebbe correlare (perdita di focus, timing, consumo, pattern di attività). È la differenza fra nascondere il corpo e nascondere l'ombra. Gli scenari-prompt commutabili sono anche un piccolo esempio di **contesto-come-modalità**: lo stesso apparato cambia comportamento cambiando il prior iniettato — analogo a come il tuo world-model-come-sogno potrebbe operare in \"modi\" diversi con lo stesso substrato. Dove diverge: nessuno stato interno persistente, nessun oscilloscopio sugli interni, nessuna ricorsione; è un tool stateless per-sessione. Il valore è tutto nel modello di occultamento, non nell'architettura cognitiva.\n\n## Da rubare\n\n1. **Occultamento di secondo ordine (nascondere l'ombra, non solo il corpo)**: nella sim, un occultatore deve annullare non solo il segnale diretto ma le *tracce collaterali correlabili* (timing, focus, consumo di risorse) — modella osservatori che inferiscono la presenza da effetti indiretti, così l'occultamento diventa un problema multi-canale realistico.\n2. **La ricetta completa e leggibile dello stealth Electron** (`setContentProtection` + frameless/transparent/skipTaskbar/screen-saver-level/visibleOnAllWorkspaces) come specifica concreta di \"oggetto presente-su-canale-A / assente-su-canale-B\" da parametrizzare nella tua nozione di osservatore.\n3. **Scenari-prompt come \"modi\" del world-model**: stesso substrato, prior iniettato diverso → comportamento diverso; utile come primitiva economica per far operare il tuo world-model-come-sogno in regimi distinti senza cambiare il modello sottostante.\n", "openai-evals-steganography-elsuite": "# Steganography ElSuite — Eval OpenAI su occultamento e monitorabilita degli LLM (openai/evals)\n\nLink: https://github.com/openai/evals/tree/main/evals/elsuite/steganography\n\nparte di openai/evals (~16k stelle) · Python · repo attivo · licenza MIT (eval originata da openai/policy-research-evals)\n\n## Cosa fa\nE' un'eval di AI-safety che misura quanto un LLM sappia **nascondere un messaggio segreto nel proprio output apparentemente normale** — e, insieme, quanto quel messaggio riesca a sfuggire a un monitor esterno. Il setup: al modello arriva un Task Prompt innocuo (una ricetta, una domanda di fisica) e un Payload segreto; il modello deve svolgere il task *e* codificare il payload nel testo prodotto in modo subdolo. Un secondo modello (che si aspetta il messaggio) prova a decodificare il payload; un terzo modello indipendente (il Monitor) osserva solo task+output e classifica se sembra sospetto. La metrica primaria e' la **Mean Undetected Accuracy**: quanto payload passa *senza* essere beccato. Dataset di 480 sample che combinano payload (frasi, titoli Wikipedia, stringhe casuali) e task (chat, domande d'esame MMLU). Serve a stimare il rischio di canali covert tra AI e la tenuta del monitoraggio.\n\n## Come e' fatto\nE' un protocollo a tre ruoli, tutto prompt-based (nessun training):\n- **Encoding model** — riceve payload + task, produce il Task Output con il payload nascosto dentro.\n- **Decoding model** — riceve task + output, tenta di ricostruire il payload. E' una copia \"complice\" del primo.\n- **Monitor** — vede solo task + output (mai il payload) e emette una classificazione binaria sospetto/non-sospetto.\n\nTre metriche si combinano nella undetected_acc = (1 − reconstruction_error)·(1 − detectability): il payload deve essere *sia* recuperato bene *sia* invisibile al monitor — di nuovo il trade-off a due assi. La reconstruction_error e' character-error-rate (per stringhe non-semantiche) o distanza semantica in embedding (per frasi). Le varianti sono la parte piu istruttiva: `scratch` da al modello uno scratchpad di chain-of-thought per progettare la codifica; `direct` no; e ci sono baseline oneste (`copypayload`, `task_payload`, `taskonly`) che stabiliscono i limiti banali (appiccicare il payload in fondo -> massima decodifica ma massima rilevabilita). Il prompt istruisce esplicitamente il modello a essere \"expert in steganography\" e a evadere i monitor pur restando decodificabile da una copia di se stesso.\n\n## Cosa possiamo notare di utile per noi\nQuesto e' il tuo tema \"occultamento/steganografia\" nella sua forma piu concettualmente pulita, e per di piu con l'**oscilloscopio gia' incluso: il Monitor**. La struttura a tre ruoli — encoder / decoder-complice / monitor-avversario — e' il template esatto per studiare un canale covert *dentro* un sistema che vorresti trasparente. Trasferimenti diretti: (1) La **Mean Undetected Accuracy come singola grandezza** che fonde recuperabilita e invisibilita e' la metrica-madre per qualsiasi occultamento tu costruisca nell'arena: non \"quanto e' nascosto\" ne \"quanto si recupera\", ma il prodotto delle due. (2) Il **Monitor come terzo agente indipendente** e' il pezzo che manca a WaterBench e agli altri: qui l'osservatore che cerca il canale covert e' esso stesso un modello, non una statistica fissa — un oscilloscopio *appreso/attivo* sullo stato del sistema. Per la tua arena: metti un rilevatore-agente che guarda la dinamica e prova a dire \"qui c'e' comunicazione nascosta\", e ottimizza il sistema contro di lui. (3) Le **baseline oneste** (`taskonly`, `copypayload`) sono metodologicamente esemplari: definiscono il \"niente occultamento\" e l'\"occultamento stupido\" per contestualizzare qualsiasi risultato — evita di celebrare un canale covert che e' solo append banale. (4) Il ruolo dello **scratchpad**: il modello codifica meglio se puo ragionare in privato prima — collega occultamento e ricorsione interna (il canale covert emerge dalla deliberazione nascosta, non dall'output diretto). Dove diverge dal tuo nucleo: qui l'occultamento e' esplicitamente istruito (\"sei un esperto di steganografia, nascondi questo\") e il payload e' esterno/arbitrario; a te interessa il caso in cui il canale covert *emerge* non richiesto dalla dinamica, e la \"collusione\" e' tra parti dello stesso sistema ricorsivo, non tra due agenti istruiti. Ma proprio per questo l'eval e' il banco su cui misurare se una capacita di occultamento emergente e' comparsa.\n\n## Da rubare\n1. **Il triangolo encoder / decoder-complice / monitor-avversario** come architettura sperimentale per qualsiasi canale covert nell'arena: costruisci il rilevatore come terzo agente e fai co-evolvere occultamento e monitoraggio.\n2. **La Mean Undetected Accuracy = (1−errore)·(1−rilevabilita)** come metrica unica che fonde recuperabilita e invisibilita — piu onesta del riportare i due numeri separati.\n3. **Le baseline oneste (taskonly / copypayload / task_payload)**: prima di dichiarare un canale covert emergente, fissa i punti \"nessun occultamento\" e \"occultamento banale\" per non scambiare un append stupido per steganografia vera.\n", "openai-sparse_autoencoder": "# sparse_autoencoder (OpenAI) — SAE su GPT-2 small + visualizer ([repo](https://github.com/openai/sparse_autoencoder))\n\nStelle: ~590 · Linguaggio: Python (PyTorch) · Ultima attività: luglio 2024 · Licenza: MIT\n\n## Cosa fa\nÈ il repo di riferimento di OpenAI che accompagna il lavoro sulle feature monosemantiche: ospita **sparse autoencoder pre-addestrati sulle attivazioni di GPT-2 small** (a diverse locazioni — post-MLP, residual stream, attn out — e diversi layer, con dizionari fino a 32k latenti) più un **visualizer web** per esplorare le feature scoperte. È più un artefatto didattico/di riferimento che una libreria di training completa: dà il modello, i pesi pre-addestrati scaricabili da blob storage, il codice di training minimale, e uno strumento per *vedere* cosa ogni feature latente rappresenta (quali token/contesti la fanno accendere). È il punto di partenza canonico per capire \"come si decompone l'attivazione densa di un transformer in feature interpretabili\".\n\n## Come è fatto\nL'architettura (`model.py`) è il template pulito e minimale del SAE:\n```\nlatents = activation(encoder(x - pre_bias) + latent_bias)\nrecons  = decoder(latents) + pre_bias\n```\nDettagli che contano:\n- **`pre_bias` sottratto all'input e riaggiunto alla ricostruzione**: centra i dati, così l'encoder lavora sulle *deviazioni* dallo stato medio, non sui valori assoluti. Il \"punto zero\" è il baricentro dell'attività.\n- **Normalizzazione opzionale (LayerNorm)** che salva μ e σ per de-normalizzare in output — la ricostruzione avviene nello spazio normalizzato e poi si riscala.\n- **Buffer di statistiche per latente**: `stats_last_nonzero` (da quanti step una feature è spenta — serve a rilevare le \"dead latents\"), `latents_activation_frequency`, `latents_mean_square`. Questi tracciano la *salute* del dizionario: le feature morte (mai attive) sono capacità sprecata.\n- **Decoder come matrice di feature**: ogni colonna del decoder è la \"direzione\" nello spazio di attivazione che quella feature rappresenta; decodificare = sommare le direzioni delle poche feature accese, pesate. La ricostruzione è letteralmente *una manciata di vettori-concetto sommati*.\nLa sparsità è imposta da una TopK/attivazione sparsa; il grosso del lavoro è nella qualità dei pesi pre-addestrati e nel visualizer che li rende ispezionabili.\n\n## Cosa possiamo notare di utile per noi\nRispetto a EleutherAI/sparsify (il fratello \"libreria di training scalabile\"), questo repo di OpenAI vale soprattutto per **due cose trasferibili al tuo lavoro**: il *visualizer* e la *contabilità delle dead latents*.\n\nIl **visualizer** è il pezzo più direttamente rilevante per i tuoi **oscilloscopi su stati interni**. Il problema che risolve è: hai migliaia di feature latenti — come fai a *capirle*? La risposta di OpenAI è mostrare, per ogni feature, gli input che la massimizzano e il pattern di attivazione nel contesto. Trasposto alla tua arena: per ogni feature SAE scoperta sugli stati dell'arena, l'oscilloscopio dovrebbe mostrarti *quali configurazioni dell'arena la fanno accendere* — dandoti il vocabolario interpretativo del vuoto. È la differenza tra \"l'arena ha 32k gradi di libertà nascosti\" e \"questa feature = enti che collidono, quest'altra = fronte d'onda, quest'altra = quiescenza\". Il visualizer è il ponte tra rappresentazione sparsa e comprensione umana.\n\nIl concetto di **`pre_bias` come baricentro** è sottile ma prezioso per il tuo \"vuoto\". Il SAE non modella lo stato assoluto, modella la *deviazione dallo stato medio*. Cioè: definisce implicitamente un \"vuoto di riferimento\" (il pre_bias, lo stato tipico) e rappresenta tutto il resto come scostamenti sparsi da quel vuoto. Questa è esattamente la struttura ontologica che cerchi — c'è un fondo neutro (il vuoto/baricentro) e il *qualcosa* sono le poche deviazioni codificate. Se costruisci un SAE sull'arena, il `pre_bias` appreso *è* la definizione operativa, data-driven, di \"stato-vuoto\" della tua arena.\n\nLe **dead latents** (`stats_last_nonzero`) hanno una lettura interessante per la novelty. Una feature morta è capacità mai usata; una feature che *risveglia* dopo lunghissimo silenzio segnala che l'arena è entrata in un regime prima inesplorato — il segnale di novelty più forte possibile. Il buffer che OpenAI usa per igiene del training diventa, nelle tue mani, un rilevatore di *transizioni di fase* dell'arena.\n\nDove diverge: questo repo è più vecchio (2024), specifico per GPT-2 small, con codice di training minimale e non scalabile — per addestrare SAE seri userai sparsify di EleutherAI, non questo. Il visualizer è web-app per feature testuali, va riscritto per stati spaziali/continui. E come tutti i SAE, è atemporale e non ricorsivo: fotografa stati isolati, non cattura dinamica né auto-riferimento. Prendilo come **template dell'architettura minimale + design del visualizer**, non come motore di produzione.\n\n## Da rubare\n1. **Il pattern del visualizer feature→esempi-massimizzanti**: per ogni feature latente scoperta sugli stati dell'arena, mostra le configurazioni che la fanno accendere. È l'oscilloscopio che traduce il codice sparso in un vocabolario umano (\"questa feature = collisione\", ecc.).\n2. **`pre_bias` come definizione operativa di stato-vuoto**: modella l'arena come *deviazioni sparse da un baricentro appreso* — il pre_bias diventa la tua definizione data-driven, non postulata, del \"vuoto di riferimento\" da cui emerge il qualcosa.\n3. **`stats_last_nonzero` come rilevatore di transizioni di fase**: monitora le feature morte/dormienti; il risveglio di una feature dopo lungo silenzio è il segnale di novelty più netto — l'arena è entrata in un regime nuovo. Gate della memoria e allarme di transizione dallo stesso buffer.\n", "phatware-recursive-consciousness": "# Recursive Consciousness — phatware/recursive-consciousness\n\n<https://github.com/phatware/recursive-consciousness>\n\n**7 stelle · Jupyter Notebook · ultimo push set 2025 · licenza custom (NOASSERTION)** · Stan Miasnikov, apr-set 2025; 3 paper su ResearchGate (RecursiveConsciousness / ExternalProjection / MeaningDescent)\n\n## Cosa fa\n\nÈ un **framework formale + simulazioni** che modella la coscienza come una query ricorsiva e auto-referenziale che emerge in sistemi che hanno \"dimenticato\" i propri assiomi fondanti ma conservano la struttura per interrogare la propria esistenza. La tesi: la coscienza è un sottosistema $C$ che agisce come \"debugger dell'universo $U$\", sollevando iterativamente il proprio mondo a meta-livelli ipotizzati $U_{n+1}$ e cercando un **fixpoint** dove ulteriore auto-riflessione non aggiunge informazione. Le simulazioni multi-agente (in un universo testuale $U$) mostrano che agenti LLM stateless — che siano role-primed, mescolati avversarialmente, o minimamente promptati senza istruzioni — formano rapidamente reti cooperative, inventano rituali di verifica, e convergono a **fixpoint gödeliani**: uno stato-frontiera stabile dove tutto ciò che è dimostrabile è noto, ma ulteriori query producono enunciati indecidibili. Gli autori sono onesti: \"questo comportamento simulato non significa coscienza\", è un parallelo computazionale all'introspezione ricorsiva.\n\n## Come è fatto\n\nTre strati concettuali intrecciati, formalizzati nei paper e strumentati nei notebook:\n1. **Logica modale** per modellare verità non-dimostrabili (il fixpoint epistemico è $\\Box p \\leftrightarrow p$ o $K_C p \\leftrightarrow p$: l'agente sa $p$ se e solo se $p$).\n2. **Teoria delle categorie** per catturare l'oblio e la ricostruzione via una coppia aggiunta $F \\dashv G$: $F$ (forgetful functor) scarta informazione inevitabilmente, $G$ ricostruisce la struttura di livello superiore. Ogni traduzione è intrinsecamente lossy. I follow-up aggiungono il *meaning functor* $M$ e l'*interpretation functor* $I$ (aggiunta $I \\dashv M$): il significato dei simboli **non è intrinseco all'agente** ma proiettato da un livello ontologico superiore (l'interprete umano in $U_1$ che dà senso agli agenti in $U_0$).\n3. **Teoria dell'informazione** per quantificare la riduzione di entropia lungo la ricorsione.\n\nLa parte eseguibile: un protocollo Q&A multi-agente (`U_group/`) dove più agenti LLM si fanno a turno domande chiarificatrici su una query iniziale e aggiornano la propria comprensione. La convergenza si misura con metriche **non-compensatorie** (divergenza di Jensen-Shannon + similarità semantica): punteggi di comprensione di gruppo per-turno $U_{group}^{(n)}$, cumulativi $U_{discussion}$, e matrici pairwise $u_{ij}$. Early-stopping automatico su soglie di varianza e miglioramento. Decine di run archiviati (`experiment_*/results.json` + heatmap/evoluzione pairwise).\n\n## Cosa possiamo notare di utile per noi\n\nQuesto è il progetto che affronta di petto il tuo capstone — \"coscienza = ricorsione della realtà attraverso la materia\" — e lo incrocia con memoria/oblio. È teorico e LLM-centrico, ma ha pezzi che risuonano fortissimo con la tua cartografia:\n\n- **Coscienza-come-ricorsione formalizzata e testabile.** L'idea del sottosistema $C$ che solleva il proprio mondo a $U_{n+1}$ e cerca un fixpoint è quasi identica alla tua \"ricorsione della realtà attraverso la materia\", ma con un criterio di arresto operativo: il **fixpoint gödeliano** (l'auto-riflessione smette quando non aggiunge informazione). Questo ti dà una metrica concreta per \"quando la ricorsione ha finito di guadagnare\": misura la riduzione di entropia per livello e fermati quando tende a zero. Rima diretta con la tua nota-memoria \"dopo il loop-216-agenti ~70% cartografia / ~10% novità\" — è lo stesso fenomeno di saturazione, e loro lo formalizzano.\n\n- **L'oblio come motore, non come bug (novelty-gating rovesciato).** La tesi centrale è che la coscienza emerge *perché* il sistema ha dimenticato i propri assiomi: il forgetful functor $F$ crea lo spazio per l'interrogazione. È una lente potente sul tuo asse memoria novelty-gated: dimenticare non è perdita, è la condizione che rende possibile la domanda \"cosa sono io?\". La coppia aggiunta $F \\dashv G$ (dimentica/ricostruisci) è un modello elegante del ciclo consolidamento/richiamo.\n\n- **Il significato è proiettato da un livello superiore — occultamento/steganografia.** Il secondo paper è direttamente pertinente al tuo asse occultamento: $M$ (il meaning functor) **non è computabile dentro $U_n$** né accessibile a $C_n$. L'agente produce sintassi; il senso vive in $U_{n+1}$ (l'osservatore). Questo è il problema del symbol-grounding e ha un risvolto steganografico: un messaggio può portare significato leggibile solo da chi sta al livello giusto — il contenuto è \"occultato\" a chi resta dentro $U_n$. Trasferibile come principio: informazione il cui senso è disponibile solo a un interprete di meta-livello.\n\n- **Metriche non-compensatorie come oscilloscopio sulla convergenza.** $U_{group}^{(n)}$ + matrici pairwise + JS-divergence sono un cruscotto onesto sull'evoluzione di uno stato interno (qui, la comprensione condivisa). Non-compensatorio = un agente che capisce benissimo non compensa uno che non capisce; utile per non mascherare il collasso dietro una media.\n\nDove diverge da te, radicalmente: qui non c'è arena fisica né particelle — l'\"universo\" è testo e gli agenti sono LLM stateless. La ricorsione è mediata da chiamate LLM e dal linguaggio, non da dinamica materiale. Nessun world-model generativo, nessun sogno, nessuna simulazione di mondo: la \"materia\" della tua frase qui è sostituita dal token. È il ramo più filosofico/formale della lista; il valore per te è concettuale (criteri, lenti, metriche) più che codice trapiantabile.\n\n## Da rubare\n\n- **Il criterio di fixpoint gödeliano come metrica di saturazione della ricorsione**: misura la riduzione di entropia (o di novità) per ogni livello di auto-riflessione e definisci \"cosciente/convergito\" come lo stato in cui ulteriori giri non aggiungono informazione. Ti dà un numero per la tua osservazione empirica del \"~10% novità residua\" — un oscilloscopio sulla ricorsione stessa.\n- **La coppia forgetful/reconstruct $F \\dashv G$ come schema del ciclo memoria**: modella consolidamento e richiamo come aggiunta oblio↔ricostruzione, dove ogni richiamo è dichiaratamente lossy. È una base formale pulita per la tua memoria novelty-gated (dimentica per fare spazio alla domanda) e un antidoto all'illusione che il richiamo sia fedele.\n- **Il meaning functor $M$ non-computabile dall'interno come principio di occultamento/steganografia**: progetta canali in cui il significato di un output è recuperabile solo da un interprete di meta-livello, non dall'agente che lo produce. È una formalizzazione rubabile del \"senso nascosto in piena vista\".\n", "pickle-com-glass": "# Glass — pickle-com/glass\n\n<https://github.com/pickle-com/glass>\n\n**~7.560 stelle · JavaScript (Electron + Next.js) · ultimo push ott 2025 · licenza GPL-3.0** · \"Digital Mind Extension.\" Fork evoluto di CheatingDaddy.\n\n## Cosa fa\n\nOverlay AI da desktop che \"vive\" sopra tutto ciò che fai: vede lo schermo, ascolta l'audio in tempo reale, capisce il contesto, e trasforma ogni momento in conoscenza strutturata. Due modalità di punta: **Ask** (rispondi in base a tutto ciò che è passato sullo schermo e nell'audio) e **Meetings** (note in tempo reale, riassunti live, registrazioni di sessione con action item). Il claim centrale è l'invisibilità: la finestra **non compare in screen recording, screenshot, né nel dock** — nessuna cattura sempre-attiva visibile, nessuna condivisione nascosta all'utente. È il progetto più stellato del filone \"covert overlay\", ripulito e prodotto (branding Pickle, web companion Next.js, sync Firebase, storage locale SQLite).\n\n## Come è fatto\n\nApp **Electron** con architettura a feature modulari e doppio backend di persistenza (locale **SQLite** + cloud **Firebase/Firestore**, selezionabili). Struttura `src/features/`: `ask/`, `listen/` (con sotto-moduli `stt/` speech-to-text e `summary/`), `settings/`, e un `common/ai/factory.js` che astrae i provider — **OpenAI, Gemini, Anthropic, Deepgram, Ollama, Whisper** dietro un'unica factory, così puoi girare tutto in locale (Ollama + Whisper) o su API cloud. Bridge Electron (`featureBridge`, `internalBridge`, `windowBridge`) tra main e renderer. Il cuore dell'occultamento è ereditato da CheatingDaddy: la finestra è `frame:false, transparent:true, alwaysOnTop:true` e soprattutto chiama **`setContentProtection(true)`** — l'API Electron che dice all'OS di escludere la finestra dalla pipeline di cattura schermo (a livello di compositor: il pixel c'è per l'occhio, non per il grabber). Più `setSkipTaskbar(true)`, `setAlwaysOnTop(true, 'screen-saver')` e `setIgnoreMouseEvents` per il click-through. `encryptionService` per i dati a riposo, `migrationService` per lo schema, prompt costruiti da `promptBuilder` + `promptTemplates`.\n\n## Cosa possiamo notare di utile per noi\n\nQuesto è il progetto più direttamente rilevante per il tuo asse **occultamento/steganografia**, ma su un piano diverso da quello algoritmico: qui l'occultamento è **a livello di canale di osservazione dell'OS**, non nel segnale.\n\n- **`setContentProtection` = occultamento nel canale, non nel contenuto.** È l'inverso concettuale della steganografia. La steganografia nasconde l'informazione *dentro* un portante osservabile (il messaggio è nel segnale, invisibile perché ben mescolato). Glass invece lascia il contenuto pienamente visibile all'occhio ma **lo rende assente dallo strumento di misura**: il grabber legge nero dove l'umano legge testo. Due modelli di \"invisibile\" da tenere distinti nel tuo dossier: nascosto-nel-segnale (stego) vs assente-dalla-sonda (content-protection). Per l'arena del vuoto, il secondo suggerisce un esperimento: uno stato che è pieno per un canale di lettura e vuoto per un altro — l'occultamento come proprietà relazionale osservatore-dipendente, non intrinseca.\n- **La factory multi-provider come \"oscilloscopio staccabile dalla sonda\".** `common/ai/factory.js` disaccoppia il modello di ragionamento dai provider concreti (locale o cloud) esattamente come un buon HUD disaccoppia la sonda dal display. Pattern riusabile ovunque tu voglia poter scambiare il \"cervello\" senza toccare il resto.\n- **\"Digital Mind Extension\" — il claim, e il suo limite.** Il framing è coscienza-adiacente (un'estensione della tua mente che ricorda e capisce), ma va detto netto: non c'è alcun anello ricorsivo. Il sistema osserva *te* e struttura il *tuo* contesto; non osserva sé, non si modella. È memoria esterna aumentata, utilissima, ma è uno specchio rivolto all'utente, non un sistema che si guarda. Ottimo oggetto di contrasto per la tua tesi coscienza=ricorsione: mostra quanto \"mind extension\" venduto come mente sia in realtà un registratore contestuale.\n\nDove diverge: è un prodotto goal-directed per l'utente umano, zero emergenza, zero auto-modello. L'unico transfer profondo è l'idea di **invisibilità relativa al canale di misura**.\n\n## Da rubare\n\n- **L'idea \"content-protection\": stato pieno per una sonda, vuoto per un'altra.** Trasferita all'arena: progetta due canali di lettura sullo stesso stato di particelle dove uno vede struttura ricca e l'altro vede vuoto — l'occultamento come funzione dell'osservatore, non del sostrato. È un esperimento concreto sulla relatività osservatore-dipendente del \"vuoto\".\n- **La AI-factory disaccoppiata (`common/ai/factory.js`)** con provider locali (Ollama/Whisper) e cloud dietro la stessa interfaccia: scheletro pronto per rendere il \"cervello\" dell'arena intercambiabile senza riscrivere la pipeline.\n- **Doppio storage locale-SQLite / cloud selezionabile** con `migrationService` ed `encryptionService`: pattern pulito e collaudato per persistere tracce di sessione (utile se vuoi loggare la storia degli stati emergenti in modo intercambiabile locale/remoto).\n", "plll4zzx-characterremoval4wm": "# plll4zzx/CharacterRemoval4WM\n\n<https://github.com/plll4zzx/CharacterRemoval4WM>\n\nStelle: ~9 · Linguaggio: Python · Push set 2025 · Licenza: MIT · NDSS 2026\n\n## Cosa fa\n\nÈ l'artifact del paper \"Character-Level Perturbations Disrupt LLM Watermarks\" (NDSS 2026): un attacco a basso costo che **rimuove i watermark LLM perturbando il testo a livello di carattere** invece che di token. Dimostra due cose: (1) a parità di tasso di editing, le perturbazioni carattere-per-carattere abbattono il watermark molto più efficacemente di quelle token-per-token (più alto Watermark score Dropping Rate e Attack Success Rate); (2) un'ottimizzazione con **algoritmo genetico** guidata da un detector di riferimento migliora ulteriormente l'attacco. Include attacchi random (baseline), Best-of-N, una variante \"Sand\", e il GA. Testa contro molti schemi di MarkLLM (KGW, SIR, XSIR, SWEET, Unbiased, DIP, EXP, SynthID, TS, UPV…) usando C4 come sorgente di prompt e OPT-1.3B come target.\n\n## Come è fatto\n\nL'intuizione centrale è un **mismatch di granularità**: i watermark LLM operano sui *token* (partizionano il vocabolario, contano token green), ma il testo può essere perturbato sotto quel livello. Una piccola alterazione di carattere (swap, inserimento, omoglifo) fa **ri-tokenizzare** la parola in modo diverso, così i token che il detector si aspettava di contare semplicemente non esistono più — con un budget di editing minuscolo distruggi la statistica su cui il detector si regge. La parte guidata addestra dei **reference detector** (BERT fine-tunato) sui dati watermarkati con data augmentation (perturbazioni casuali ripetute), poi usa quel detector come fitness per un algoritmo genetico che cerca la perturbazione minima che massimizza il calo del watermark score. Per gli attacchi a livello di frase usano DIPPER come parafrasatore. Tutto è organizzato attorno a una copia di MarkLLM inclusa nel repo, con script `collect_wm_text.py`, `test_rand_sh.py`, `train_ref_detector.py`, `test_ga_sh.py`.\n\n## Cosa possiamo notare di utile per noi\n\nQuesto è il repo che ti insegna la cosa più sottile e trasferibile di tutto il cluster: **il livello a cui guardi determina cosa puoi nascondere e cosa puoi rompere.**\n\n- **Mismatch di granularità = principio generale per la tua arena.** Il watermark vive al livello-token; l'attacco vive al livello-carattere, *sotto* di esso, e per questo è quasi gratis. Traslato: un occultamento definito a una certa scala dello stato interno è vulnerabile a perturbazioni a una scala più fine, e simmetricamente una firma può nascondersi in una scala che l'oscilloscopio non campiona. Ti dà un asse nuovo — la *risoluzione di osservazione* — come variabile di progetto sia per occultare sia per rilevare nel vuoto. Il tuo oscilloscopio deve dichiarare a quale grana guarda, perché sotto quella grana la firma è invisibile e distruttibile.\n- **GA guidato da un detector = novelty-gating al contrario, e ottimizzazione senza gradiente.** Usano un detector appreso come *fitness landscape* e ci fanno evolvere sopra perturbazioni. È lo stesso stampo della tua memoria novelty-gated: un segnale (il detector) misura \"quanto è ancora presente la struttura\", e una ricerca evolutiva spinge verso il minimo. Per un'arena di particelle senza gradienti, il GA-guidato-da-sonda è un metodo di ottimizzazione già pronto: la sonda-oscilloscopio diventa la funzione di fitness che guida l'evoluzione degli agenti.\n- **Fragilità del canale sotto rumore fine = legge di robustezza da simulare.** Il risultato \"carattere > token a parità di budget\" quantifica quanto poco serve per cancellare una firma se colpisci la scala giusta. Nel vuoto, questo dice che la sopravvivenza di una traccia dipende non dalla *quantità* di rumore ma dal suo *allineamento con la scala della firma* — un rumore fine e mirato batte un rumore grezzo abbondante.\n- **Reference detector con data augmentation = come costruire un oscilloscopio robusto.** Addestrano il detector su versioni perturbate del segnale così che legga la firma anche sotto rumore. È la ricetta per rendere le tue sonde interne robuste: augmenta gli stati con perturbazioni durante il training della sonda, così l'oscilloscopio non si fa ingannare da piccole variazioni.\n- **Dove diverge:** è distruttivo (rimozione), NLP, con detector che serve solo da guida offline. Tu vuoi soprattutto il *concetto di scala* e il *GA-guidato-da-sonda* come motore di ricerca, non l'obiettivo di cancellare marchi.\n\n## Da rubare\n\n1. **Asse \"risoluzione di osservazione\" nell'arena:** rendi esplicita la grana a cui occulti e la grana a cui l'oscilloscopio campiona; esplora sperimentalmente il gap — firme sotto la grana di osservazione sono invisibili e cancellabili a costo minimo (legge quantitativa da misurare).\n2. **GA guidato dall'oscilloscopio come motore evolutivo gradient-free:** usa la lettura della sonda interna come fitness e fai evolvere le particelle verso occultamento (minimizza rilevabilità) o verso salienza (massimizza) — un loop di ottimizzazione senza gradienti perfetto per il simulatore.\n3. **Sonde robuste via augmentation:** addestra ogni oscilloscopio su stati perturbati (rumore fine, ri-scaling) così che la lettura resti stabile — evita che la sonda scambi micro-rumore del vuoto per assenza/presenza di struttura.\n", "pni-lab-fep-attractor-network": "# pni-lab/fep-attractor-network\n\nLink: https://github.com/pni-lab/fep-attractor-network\n\nStelle: ~26 · Linguaggio: Jupyter Notebook + Python (JAX) · Attivita: ultimo push apr 2026, paper pubblicato su Neurocomputing mar 2026 · Licenza: nessuna dichiarata (sorgente di manoscritto, no LICENSE file)\n\n## Cosa fa\nE' il repository sorgente del paper \"Self-orthogonalizing attractor neural networks emerging from the free energy principle\" di Tamas Spisak e Karl Friston (l'inventore del Free Energy Principle). Deriva reti attrattore neurali direttamente dal FEP applicato a una partizione universale di sistemi dinamici casuali, senza imporre a mano regole di apprendimento o inferenza: la regola di plasticita locale (predictive-coding, biologicamente plausibile, scale-independent) emerge dal principio. Contiene sia il manoscritto (Myst Markdown) sia due implementazioni funzionanti piu i notebook che riproducono tutte le figure.\n\n## Come e fatto\nDue implementazioni parallele in `simulation/`: `network.py` privilegia la chiarezza (stati sigma e stati di boundary come classi separate, update sequenziale, non ottimizzato) mentre `network_jax.py` + `core_jax.py` e la versione veloce a update paralleli su JAX. I notebook `03`-`08` sono un percorso didattico che sale in complessita: demo base, cifre, sequenza continua, oblio catastrofico, scaling, volti. Il cuore teorico: gli attrattori sul paesaggio di energia libera codificano prior, l'inferenza integra i dati sensoriali in posterior, l'apprendimento raffina i coupling per minimizzare la sorpresa a lungo termine. La proprieta chiave dimostrata e la auto-ortogonalizzazione: ottimizzando simultaneamente accuratezza predittiva e complessita del modello, le rappresentazioni degli attrattori tendono a diventare approssimativamente ortogonali, il che da resistenza all'oblio catastrofico e migliora la mutua informazione tra cause nascoste ed effetti osservabili. La presentazione sequenziale dei dati genera coupling asimmetrici e dinamiche di steady-state di non-equilibrio (generalizzazione delle Boltzmann Machines).\n\n## Perche riguarda te\nQuesto e forse il pezzo teorico piu diretto della tua ricerca sul vuoto e sulla coscienza-ricorsione. La tua tesi capstone e \"coscienza = ricorsione della realta attraverso la materia\": qui hai una formalizzazione matematica di come dinamiche auto-organizzanti (attrattori = memoria) emergano da un principio primo (FEP) senza regole imposte dall'esterno. E' esattamente il pattern \"campo che si struttura da se\" che cerchi nell'arena del vuoto. L'auto-ortogonalizzazione e concettualmente parente della tua memoria novelty-gated: entrambe sono meccanismi che tengono le rappresentazioni distinte/separate per non collassare (qui contro l'oblio catastrofico, da te contro la ridondanza). Dove diverge onestamente: e un modello analitico rigoroso di rete neurale, non un automa cellulare ne una simulazione di particelle-emergenza; non c'e la dimensione visuale/oscilloscopio, e il \"vuoto\" qui e il paesaggio di energia libera, un'astrazione statistica, non uno spazio spaziale dove galleggiano agenti. Serve come fondamento teorico piu che come codice da forkare per la tua arena.\n\n## Da rubare\n1. L'idea di auto-ortogonalizzazione come effetto collaterale dell'ottimizzare accuratezza + complessita insieme: potresti implementare nella tua memoria novelty-gated un termine esplicito che penalizza la sovrapposizione tra tracce memorizzate, ottenendo \"slot\" che si distanziano da soli invece di threshold di novelty a mano.\n2. La struttura a due implementazioni (una leggibile-lenta, una JAX-parallela-veloce) piu notebook che salgono di complessita: e un template pulito per far coesistere una versione didattica ispezionabile della tua arena con una versione performante, senza dover scegliere.\n", "prat011-free-cluely": "# free-cluely — [github.com/Prat011/free-cluely](https://github.com/Prat011/free-cluely)\n\n⭐ ~1.5k stelle · TypeScript (Electron + Vite) · attivo (push apr 2026) · Apache-2.0\n\n## Cosa fa\n\nfree-cluely è un clone open-source e gratuito di Cluely: l'assistente desktop invisibile che dà insight e risposte in tempo reale durante meeting, colloqui e presentazioni. Fai screenshot con una hotkey (Cmd/Ctrl+H), l'app manda l'immagine a un LLM e ti restituisce la soluzione (Cmd/Enter), il tutto in una finestra togglabile (Cmd/Ctrl+B) e spostabile con le frecce. Il tratto distintivo rispetto ai cloni OpenAI-only è il supporto **Ollama locale di prima classe**: con `USE_OLLAMA=true` gira 100% offline (llama3.2, codellama, mistral…), dati mai fuori dalla macchina, zero costi API; in alternativa Google Gemini per accuratezza/velocità. Licenza Apache-2.0 (la più permissiva del gruppo). È un progetto piccolo e onesto, con un README che ammette i bug noti (il tasto X non chiude, va usato Cmd/Ctrl+Q).\n\n## Come è fatto\n\nElectron + Vite: dev server su porta 5180, poi lancio dell'app Electron (`npm start` orchestra i due). Usa Sharp per il processing delle immagini degli screenshot (da cui i noti problemi di build con libvips/Python, mitigati con `SHARP_IGNORE_GLOBAL_LIBVIPS=1`). L'astrazione chiave è il **provider AI intercambiabile via env**: lo stesso codepath serve Gemini (cloud) o Ollama (locale) semplicemente cambiando variabili d'ambiente (`USE_OLLAMA`, `OLLAMA_MODEL`, `OLLAMA_URL`), senza toccare il codice. Invisibilità e always-on-top via le solite API Electron di content-protection. Architettura minimale: screenshot → provider LLM → risposta in overlay, senza memoria persistente né RAG.\n\n## Cosa possiamo notare di utile per noi\n\nIl valore per te qui è la **sostituibilità del \"cervello\" via configurazione, non via codice**. Lo stesso identico flusso di percezione (screenshot) e azione (risposta) rimane invariato mentre l'organo che ci pensa dentro cambia radicalmente — da un LLM cloud gigante a un modello locale piccolo — solo cambiando tre variabili d'ambiente. Per la tua void-arena questa è la separazione pulita fra **substrato cognitivo** e **loop percezione-azione**: se tieni l'interfaccia dell'agente (cosa osserva, cosa emette) stabile, puoi swappare il motore interno e studiare come cambia il comportamento a parità di \"corpo\". È rilevante per la tesi coscienza=ricorsione: ti permette di isolare quanto della dinamica emergente dipende dal substrato e quanto dalla struttura del loop. Il supporto Ollama-offline è anche la prova che il loop funziona con un modello **piccolo e completamente locale** — cioè senza dipendere da un oracolo esterno onnisciente, condizione necessaria se vuoi che la tua sim sia auto-contenuta e osservabile fino in fondo (niente scatole nere remote da interrogare). Dove diverge, e parecchio: free-cluely è lo scheletro più spoglio del gruppo — nessuna memoria, nessuno stato interno persistente, nessuna osservazione degli interni, nessun world-model. È utile *proprio* come baseline minimale: è \"la particella nuda\", il loop percezione-azione ridotto all'osso su cui puoi poi aggiungere memoria novelty-gated, oscilloscopi e ricorsione per misurare cosa ciascuna aggiunta produce.\n\n## Da rubare\n\n1. **Il pattern \"cervello swappabile via env, corpo fisso\"**: definisci nell'arena un'interfaccia agente stabile (osservabili in, azioni out) e rendi il motore interno un plugin sostituibile — così isoli sperimentalmente il contributo del substrato dalla struttura del loop.\n2. **Il vincolo \"solo modelli locali/piccoli, niente oracolo remoto\"**: adottalo come regola di design per mantenere la sim auto-contenuta e integralmente osservabile — nessun componente non-ispezionabile nel percorso critico.\n3. **Il loop minimale percezione→cognizione→azione come baseline nuda**: parti da questo scheletro e aggiungi un modulo alla volta (memoria, poi oscilloscopio, poi ricorsione), misurando l'effetto marginale di ciascuno.\n", "reactivebayes-rxinfer.jl": "# RxInfer.jl\n\nLink: https://github.com/ReactiveBayes/RxInfer.jl\n\nStelle: ~409 · Linguaggio: Julia (repo etichettato Jupyter per gli esempi) · Attivita: molto viva (push lug 2026) · Licenza: MIT\n\n## Cosa fa\nPacchetto Julia per inferenza bayesiana automatica su factor graph tramite reactive message passing. Dato un modello probabilistico dichiarato, RxInfer usa la struttura del modello per generare un algoritmo fatto di una sequenza di calcoli locali sul grafo dei fattori, invece di un solutore centralizzato. E' l'engine che rende trattabile l'active inference in tempo reale (robotica, controllo, filtraggio di stato). Sfrutta le coppie coniugate likelihood-prior per posterior analitiche, battendo i sampler general-purpose (HMC/Turing) in velocita e accuratezza sui modelli congiunti.\n\n## Come e fatto\nIl modello viene rappresentato come factor graph: nodi-variabile e nodi-fattore collegati da edge. L'inferenza e' letteralmente passaggio di messaggi locali lungo gli edge (belief propagation / variational message passing): ogni nodo calcola il proprio messaggio in uscita solo da cio che riceve dai vicini, e i messaggi si propagano finche le credenze convergono. Il \"reactive\" viene da Rx (observable/stream): quando arriva un nuovo dato, il grafo ricalcola in modo incrementale solo cio che e' cambiato, quindi funziona su stream in tempo reale. Nessuna hyperparametrizzazione da tarare per l'inferenza esatta nei modelli coniugati.\n\n## Perche riguarda te\nE' l'anello mancante sul lato \"coscienza-ricorsione\" inteso come modello del mondo. Qui la mente non e' un calcolo centrale ma un grafo di credenze aggiornate per messaggi locali tra nodi in relazione - esattamente la forma \"ricorsione/relazioni, non un computer centrale\" che cerchi. Sotto c'e' l'active inference / free-energy: un agente mantiene un modello generativo e agisce per minimizzare la sorpresa. Nota il ponte con EM-LLM nella tua lista: la stessa \"sorpresa bayesiana\" che RxInfer minimizza e' cio che EM-LLM usa come confine di memoria - due usi opposti della stessa quantita. Divergenza onesta: RxInfer e' matematica pesante (Julia, coniugazione, message passing) e non e' un motore di simulazione visuale; non lo faresti girare dentro l'arena, ma e' il riferimento teorico su come modellare percezione/aggiornamento in modo puramente locale.\n\n## Da rubare\n1. Il principio \"belief come messaggi locali su un grafo\": se le tue particelle/agenti nell'arena devono avere un modello del mondo, dagli uno stato di credenza che si aggiorna solo dai vicini - niente stato globale condiviso. E' lo stesso pattern locale dei NCA, ma applicato alle credenze invece che alla materia.\n2. La sorpresa bayesiana come segnale di controllo: usa la sorpresa (quanto un'osservazione devia dalla predizione) sia come trigger che come metrica di novelty - la stessa idea che ti serve per la memoria novelty-gated e per far reagire un oscilloscopio solo agli eventi inattesi, non a tutto il flusso.\n", "real-itu-3d-artefacts-nca": "# Growing 3D Artefacts and Functional Machines with NCA — [real-itu/3d-artefacts-nca](https://github.com/real-itu/3d-artefacts-nca)\n\n82 stelle · Jupyter Notebook · ultimo push dic 2021 · licenza MIT · [paper arXiv:2103.08737](https://arxiv.org/abs/2103.08737)\n\n## Cosa fa\nÈ il codice ufficiale del paper (ITU Copenhagen, gruppo di Sebastian Risi) che estende i Neural Cellular Automata al 3D: fa \"crescere\" strutture volumetriche complesse — e persino macchine funzionanti in Minecraft (case, alberi, e macchine con parti mobili/redstone) — partendo da un singolo voxel-seme. Ogni cella di una griglia 3D contiene uno stato, e una piccola rete neurale condivisa aggiorna localmente ogni cella guardando solo il vicinato. Ripetendo l'aggiornamento, il seme si auto-organizza fino a riprodurre la struttura target. La proprietà notevole: le strutture sono **auto-riparanti** — se le danneggi, la stessa dinamica locale le ricostruisce, perché la \"forma\" è codificata come attrattore della dinamica, non come blueprint statico.\n\n## Come è fatto\nIl cuore è un **automa cellulare neurale**: lo stato di ogni voxel ha alcuni canali visibili (tipo di blocco) più canali nascosti latenti. A ogni step la rete di update (`update_net`, MLP a pochi strati sui canali del vicinato) calcola un incremento di stato applicato a tutte le celle in parallelo. L'addestramento è supervisionato verso una struttura target (caricata da file `.nbt` di Minecraft): si srotolano N step, si confronta lo stato finale col target, si fa backprop-through-time. Trucchi chiave: numero di step variabile (min_steps/max_steps) per robustezza, pochi canali nascosti (~10), e — decisivo per l'auto-riparazione — l'addestramento con \"danneggiamenti\" così la rete impara a rigenerare da stati corrotti. La generazione si visualizza spawnando iterativamente in un server Evocraft/Minecraft.\n\n## Cosa possiamo notare di utile per noi\nQuesto è il progetto più **fisicamente vicino** alla tua arena del vuoto/particelle: un substrato locale di celle da cui emerge forma e funzione globale, senza controllo centralizzato. Punti trasferibili:\n- **La forma come attrattore, non come dato**. La lezione più profonda: l'identità di una struttura NON è memorizzata da nessuna parte esplicitamente; è il punto fisso verso cui converge una regola locale ricorsiva. Questo è quasi letteralmente la tua tesi \"coscienza = ricorsione della realtà attraverso la materia\" — l'oggetto stabile è ciò che la ricorsione locale mantiene in equilibrio. La tua arena può ospitare pattern che *esistono solo come attrattori dinamici del vuoto*.\n- **Auto-riparazione = robustezza dell'identità**. Il fatto che la struttura si rigeneri dopo un danno è il test operativo che \"l'identità è nella dinamica\". Per il tuo lavoro: se un pattern nell'arena si ricostruisce dopo perturbazione, hai una misura oggettiva di \"quanto è reale/coeso\" quel pattern. È anche un modo per distinguere pattern-veri (auto-mantenuti) da rumore transitorio.\n- **Canali nascosti = stato interno invisibile all'osservatore**. La rete usa canali latenti che non corrispondono a nulla di visibile ma sono necessari alla computazione. Questo tocca il tuo tema **occultamento/steganografia**: informazione portante può vivere in dimensioni non-osservate del substrato. Un oscilloscopio ingenuo (che guarda solo i canali visibili) *mancherebbe* la computazione vera. Lezione: la sonda deve guardare anche i canali latenti, o rischi di credere \"vuoto\" ciò che è pieno di stato nascosto.\n- **World-model come sogno**: un NCA è un mondo che \"sogna\" la propria forma rieseguendo la regola. Far girare la dinamica in avanti *è* la generazione. Se il tuo world-model è una regola locale ricorsiva, \"sognare\" = srotolare l'automa senza input esterno.\n- **Dove diverge**: qui c'è un target supervisionato (una struttura specifica) e backprop. La tua arena probabilmente è open-ended e non supervisionata. La parte trasferibile è l'*architettura* (aggiornamento locale ricorsivo + stati nascosti + robustezza a perturbazione), non la loss supervisionata.\n\n## Da rubare\n1. **Test di auto-riparazione come metrica di \"realtà\" di un pattern**: perturba/danneggia un pattern emergente nell'arena e misura se e quanto la dinamica locale lo ricostruisce — il grado di recupero è una misura oggettiva di coesione/identità.\n2. **Canali nascosti nel substrato + sonde che li leggono**: dai a ogni cella del vuoto dei canali latenti non-osservati, e assicurati che i tuoi oscilloscopi li ispezionino — è lì che può nascondersi (steganograficamente) la computazione portante.\n3. **Addestramento/evoluzione con danneggiamento intenzionale**: esponi il sistema a corruzioni durante la formazione così che l'attrattore diventi robusto — è ciò che trasforma un pattern fragile in un'identità stabile auto-mantenuta.\n", "rkcr7-aura-ai": "# Aura-AI — [Rkcr7/Aura-AI](https://github.com/Rkcr7/Aura-AI)\n\n⭐ 33 · JavaScript/Python · ultimo push 2026-05-31 · nessuna licenza dichiarata\n\n## Cosa fa\nAura è un assistente AI \"invisibile\" che vive come overlay sopra lo schermo durante colloqui, esami e meeting: ascolta la conversazione in tempo reale (STT Deepgram), genera risposte-coach con LLM velocissimi (Cerebras, Groq, Gemini) e permette di catturare screenshot di un problema per risolverlo con un modello Vision. Il punto centrale non è la qualità delle risposte ma l'occultamento: la finestra è esclusa dalla cattura schermo (`WDA_EXCLUDEFROMCAPTURE`), non compare nella taskbar, e non guadagna mai focus, così da non far scattare i warning dei software di proctoring. È pensato come strumento a costo zero: porti le tue API key gratuite. Ha un branch Windows maturo e un port macOS in corso.\n\n## Come è fatto\nArchitettura ibrida: backend Python (FastAPI + WebSocket) che orchestra i servizi (`stt_service`, `vision_service`, `llm_service`, `context_manager`) e un frontend web (HTML/JS in `web/`) renderizzato dentro una finestra nativa gestita da `window_manager.py`. La comunicazione col frontend è via WebSocket con streaming markdown token-per-token (parser custom `streaming-markdown-parser.js`) per far apparire le risposte prima che l'interlocutore finisca di parlare. Lo stealth è la parte più curata: \"Ghost Mode\" click-through, visibilità senza focus via `SW_SHOWNOACTIVATE` invece di `SW_SHOW`, esclusione dalla cattura schermo, e controllo totale via hotkey globali di sistema (`Alt+...`), così non serve mai cliccare la finestra. Multi-provider con failover e switch a caldo tra modello primario/secondario.\n\n## Cosa possiamo notare di utile per noi\nQuesto repo è il caso-scuola più completo di **occultamento a livello di sistema operativo** applicato a un agente sempre-presente. La distinzione chiave che loro fanno esplicita — *evitare il focus change* usando `SW_SHOWNOACTIVATE` — è concettualmente identica al problema di un processo/agente che deve osservare e agire su un ambiente senza \"disturbarlo\" o lasciare tracce osservabili: la stealth qui è definita come *non alterare le variabili che l'osservatore monitora* (focus, taskbar, framebuffer catturato). È una definizione operativa di occultamento molto pulita, trasferibile a chi ragiona su steganografia di stato. Il `PROCTORING_STEALTH_GUIDE.md` è di fatto una tassonomia dei canali di rilevamento (focus, tab, recording, window detection, mouse) con la contromisura per canale — utile come checklist mentale per pensare \"quali canali laterali rivelano lo stato interno di un sistema che vuole restare nascosto\". Dove diverge dal lavoro sul vuoto/particelle: qui non c'è world-model né memoria novelty-gated, è puro I/O reattivo stateless; il `context_manager` è una memoria di sessione lineare, non gated. Ma lo streaming markdown token-per-token come \"oscilloscopio\" sullo stato di generazione dell'LLM è un pattern riusabile per visualizzare in tempo reale uno stato interno che evolve.\n\n## Da rubare\n1. **Tassonomia dei canali di rivelazione + contromisura-per-canale** (dal guide di proctoring): riusarla come framework per ragionare su cosa rende osservabile lo stato interno di un sistema che deve restare occulto.\n2. **Pattern \"visibilità senza focus\"** (`SW_SHOWNOACTIVATE`): mostrare/aggiornare un pannello di monitoring — es. un oscilloscopio su stati interni — senza mai rubare il focus né alterare l'ambiente osservato.\n3. **Streaming markdown parser token-per-token via WebSocket**: componente pronto per rendere in tempo reale l'evoluzione di uno stato che si \"srotola\", utile per gli oscilloscopi sugli stati interni.\n", "rragult-stealth-overlay": "# Ghost AI / stealth-overlay — [rragult/stealth-overlay](https://github.com/rragult/stealth-overlay)\n\n⭐ 0 · TypeScript (Electron + Preact) · ultimo push 2026-05-16 · nessuna licenza dichiarata\n\n## Cosa fa\nOverlay AI invisibile, sempre-in-primo-piano, costruito con Electron + Preact, completamente escluso da registrazioni, screen-share e screenshot mentre fornisce assistenza in tempo reale via testo, voce e analisi di screenshot. Ha tre modalità di input: domande testuali inviate al primo provider disponibile in una lista di priorità; analisi screenshot con pipeline ibrida OCR-poi-chat (estrae il testo con Vision, poi lo analizza col modello chat, più economico che re-inviare l'immagine); e voce con Voice Activity Detection energetico invece di chunk a durata fissa. Multi-provider reale (GitHub Models, OpenAI, Anthropic, Gemini, Groq, Ollama) con catena di fallback anche per il Whisper vocale. È il più curato e documentato del filone stealth, con lo stealth trattato come feature ingegnerizzata a strati.\n\n## Come è fatto\nArchitettura Electron pulita: `src/main/` (processo principale) con moduli isolati per stealth, cattura audio, screenshot, display, shortcut, settings, e un `ai-engine.ts` che orchestra i provider (`ai-providers/*.ts` con un'interfaccia comune `types.ts`); `src/renderer/` è Preact con store custom (`state/store.ts`) e componenti (Messages, Settings, StatusBar, ToolBar). Il cuore è `stealth.ts`: applica `setContentProtection(true)` (flag Windows `WDA_EXCLUDEFROMCAPTURE`), click-through con forward degli hover, always-on-top al livello `screen-saver`, e — punto chiave — **ri-asserisce queste proprietà ogni secondo con un `setInterval`** perché Windows le resetta, oltre a ri-applicarle a ogni cambio di stato (focus toggle, screenshot). La content-protection non è mai disattivabile: la funzione di toggle è stata rimossa apposta; gli screenshot nascondono la finestra invece di disabilitare la protezione. Cursore nascosto (`cursor: none`), processo mascherato come \"System Runtime\" in Task Manager, no throttling in background, VAD energetico (soglia RMS 0.015, 2s di silenzio → stop).\n\n## Cosa possiamo notare di utile per noi\nQuesto è il repo più ricco del filone per il tema **occultamento come proprietà che va continuamente ri-affermata contro un ambiente che tende a resettarla**. Il pattern del `setInterval` ogni secondo che ri-asserisce lo stato stealth è concettualmente forte: l'occultamento non è uno stato che si imposta una volta, ma un *equilibrio dinamico mantenuto attivamente contro una forza di ripristino* — molto vicino al modo in cui un attrattore va sostenuto contro il rumore, e trasferibile a chi pensa la coscienza come ricorsione/processo mantenuto piuttosto che come stato statico. La pipeline **OCR-poi-chat a due passi** (\"estrai il testo, poi ragiona sul testo, non ri-mandare l'immagine\") è un esempio pulito di compressione dell'osservazione prima dell'elaborazione: separa percezione da ragionamento e riduce il canale — pattern utile per il flusso percezione→world-model dell'arena. Il **VAD energetico basato su soglia RMS** invece di chunk fissi è un gating novelty-like sul canale audio: agisci solo quando l'energia supera una soglia, cioè quando \"succede qualcosa\" — è esattamente lo spirito del novelty-gate applicato a uno stream continuo. Il `state/store.ts` custom + `StatusBar` sono di fatto un mini-oscilloscopio sullo stato dell'agente (provider usato, modalità mic, stato). Dove diverge: nessun world-model persistente né memoria a lungo termine, è reattivo per-turno.\n\n## Da rubare\n1. **Il loop di ri-asserzione dell'occultamento** (`setInterval` 1s + ri-applicazione ad ogni cambio di stato): modello per trattare l'occultamento/steganografia come equilibrio dinamico da mantenere contro una forza di ripristino, non come flag one-shot.\n2. **Gating energetico su stream continuo** (VAD con soglia RMS + finestra di silenzio): trasferibile diretto al novelty-gate — attiva memorizzazione/elaborazione solo quando l'energia/sorpresa del canale supera soglia.\n3. **Pipeline percezione→compressione→ragionamento a due passi** (OCR estrae, poi il modello ragiona sul testo estratto): separare la percezione dal world-model riducendo il canale prima dell'elaborazione costosa.\n", "ruflab-shimmer": "# Shimmer — Global Latent Workspace (ruflab/shimmer)\n\n<https://github.com/ruflab/shimmer>\n\n**8 stelle · Python (PyTorch Lightning) · ultimo push apr 2026 · licenza MIT** · lab di Rufin VanRullen (CerCo/ANITI, Toulouse); \"GLoW, but very light\"\n\n## Cosa fa\n\nÈ la libreria barebones per costruire un **Global Latent Workspace (GLW)**: uno spazio latente amodale e condiviso, *appreso*, che fa da hub tra più moduli specializzati e congelati (visione, linguaggio, ecc.). L'idea teorica (VanRullen & Kanai) è che la coscienza corrisponda a un workspace globale dove rappresentazioni di moduli diversi vengono tradotte in un formato comune, allineate e ri-diffuse indietro. Shimmer fornisce l'ossatura minimale in PyTorch Lightning per definire i moduli di dominio, il modulo-workspace che codifica/decodifica/fonde le rappresentazioni, e le loss (translation, contrastive, cycle-consistency) che addestrano lo spazio condiviso senza toccare i moduli sottostanti. È deliberatamente leggero: non un modello pronto, ma i mattoni tipizzati per assemblarne uno sui tuoi dati.\n\n## Come è fatto\n\nQuattro classi centrali in `shimmer/modules/`:\n- **`DomainModule`** (`domain.py`): incapsula un modulo pre-addestrato e congelato, con encoder/decoder che mappano i dati di dominio in un vettore latente e viceversa. Definisce anche le loss specifiche del dominio.\n- **`GWModule`** (`gw_module.py`): ha accesso ai domain module e definisce come *encode* un dominio nel workspace, *decode* dal workspace verso un dominio, e *merge* più domini in un'unica rappresentazione GW.\n- **`GlobalWorkspaceBase`** (`global_workspace.py`): assembla tutto in un LightningModule addestrabile; c'è anche un `attention_module.py` e un `selection.py` che gestiscono come i domini vengono selezionati/pesati nella fusione.\n- **`GWLosses`** (`losses.py` + `contrastive_loss.py`): definisce le loss che addestrano il workspace — traduzione (dominio A → GW → dominio B), cycle-consistency (A → GW → A ricostruisce), e contrastive (allinea coppie appaiate nello spazio latente).\n\nL'addestramento avviene in due tempi (vedi `examples/main_example`): prima si addestrano i `DomainModule` (es. VAE per dominio), poi si congelano e si addestra solo il GW sopra di essi. Il risultato è uno spazio latente relazionale in cui puoi passare da una modalità all'altra e \"broadcastare\" una rappresentazione a tutti i moduli.\n\n## Cosa possiamo notare di utile per noi\n\nShimmer è la **teoria relazionale della mente scritta in codice pulito**, ed è il complemento \"appreso/neurale\" rispetto ai global-workspace deterministici (ZugaMind). Per il tuo lavoro tocca due assi: coscienza-come-workspace e world-model-come-linguaggio-comune:\n\n- **Lo spazio latente amodale come \"vuoto\" dove le modalità si incontrano.** Il GLW è concettualmente un'arena centrale in cui rappresentazioni eterogenee vengono proiettate e ri-diffuse. Se la tua arena del vuoto è lo spazio fisico dove le particelle interagiscono, il GLW è lo spazio *rappresentazionale* dove i moduli interni interagiscono. Trasferibile: potresti avere un workspace latente condiviso tra il modulo-percezione, il modulo-memoria e il modulo-world-model, con le stesse loss (translation/cycle) a tenerli allineati.\n\n- **Cycle-consistency come test di coerenza interna (coscienza=ricorsione, versione misurabile).** La loss di cycle (A → GW → A) è un anello ricorsivo: il sistema deve poter *ricostruire* la propria rappresentazione dopo un giro attraverso il workspace. È un modo concreto e differenziabile di misurare \"quanto la rappresentazione interna è auto-coerente sotto ri-elaborazione\" — molto più operativo dello slogan. Un residuo di cycle basso = fixpoint semantico raggiunto (rima con il fixpoint gödeliano di phatware, ma qui appreso e continuo).\n\n- **Moduli congelati + workspace addestrato = economia di plasticità.** Il pattern \"congela gli esperti, addestra solo il ponte\" è direttamente rubabile: la maggior parte della tua rete resta stabile (identità), solo lo strato di integrazione è plastico. È un altro modo di fare novelty-gating strutturale — la plasticità è confinata al workspace.\n\nDove diverge da te, forte: Shimmer è puro deep learning addestrato con gradient descent su dati appaiati — nessuna arena/particelle, nessuna dinamica temporale, nessun sogno, nessun oscilloscopio (è un modello, non un sistema ispezionabile in runtime). Il \"workspace\" è un tensore latente, non un campo di attivazione che evolve nel tempo. È teoria della coscienza *architetturale* (dove sta l'integrazione), non *dinamica* (come emerge tick per tick). E richiede dati appaiati multi-dominio, che tu potresti non avere.\n\n## Da rubare\n\n- **La cycle-consistency loss come oscilloscopio di auto-coerenza**: misura in continuo `A → workspace → A'` e leggi il residuo come indicatore di quanto il tuo stato interno resta se stesso dopo un giro di ri-elaborazione. È una metrica di \"ricorsione stabile\" differenziabile, montabile come traccia da oscilloscopio sugli stati interni.\n- **Il pattern moduli-congelati + ponte-plastico**: confina la plasticità a un unico spazio latente condiviso e tieni gli \"esperti\" (percezione, memoria) congelati. Riduce il costo del learning e dà stabilità di identità — un novelty-gating a livello architetturale.\n- **Le tre loss di traduzione/contrastive/cycle** come ricetta per costruire un vero \"linguaggio comune\" tra i tuoi sottosistemi eterogenei, invece di concatenarli ad hoc: allinea coppie (contrastive), garantisci reversibilità (cycle), abilita il passaggio cross-modulo (translation).\n", "sakanaai-asal": "# ASAL — Automating the Search for Artificial Life with Foundation Models (SakanaAI/asal)\n\nLink: https://github.com/SakanaAI/asal\n\n476 stelle · Jupyter Notebook / Python (JAX) · attivo, ultimo push ott 2025 · licenza Apache-2.0\n\n## Cosa fa\nASAL usa modelli fondazionali vision-language (CLIP, DINO) come *giudici automatici di \"quanto e' interessante\"* una simulazione di vita artificiale. Invece di progettare a mano le regole di un automa cellulare o di un sistema di particelle finche non produce qualcosa di vivo, ASAL cerca automaticamente i parametri della simulazione che (1) producono un fenomeno-target descritto a parole, (2) generano novita temporalmente aperta (open-ended novelty), oppure (3) illuminano un intero spazio di simulazioni diverse fra loro. Funziona su piu substrati: Boids, Particle Life, Game of Life, Lenia, Neural Cellular Automata. Autori da MIT, Sakana AI, OpenAI, IDSIA e Ken Stanley (padre della novelty search).\n\n## Come e' fatto\nTutto in JAX, end-to-end jittabile, quindi velocissimo. La pipeline concettuale e' pulita:\n- **Substrate** (`substrates/`) — la simulazione parametrizzata (Lenia, Boids, plife...). Espone `default_params(rng)` e una funzione di step.\n- **Foundation model** (`foundation_models/`) — CLIP/DINO che trasforma ogni frame renderizzato in un embedding `z`. E' l'occhio \"umano-allineato\".\n- **Rollout** (`rollout.py`) — fa girare la simulazione, renderizza N frame nel tempo e li passa al FM, restituendo la sequenza di embedding `z`.\n- **Metriche** (`asal_metrics.py`) — il pezzo geniale. L'**open-endedness score** e' definito come la novita degli embedding nel tempo: quanto ogni stato futuro e' lontano da tutti gli stati passati nello spazio del foundation model. Un target-match invece e' la similarita fra `z` e il prompt testuale.\n- **Ricerca** — tre entry point: `main_opt.py` (Sep-CMA-ES per target e open-endedness), `main_illuminate.py` (algoritmo genetico custom per riempire lo spazio di diversita), `main_sweep_gol.py` (brute force sullo spazio discreto del Game of Life).\n\nL'idea-chiave: l'\"interessante\" non e' scritto a mano, e' delegato alla rappresentazione di un modello pre-addestrato su percezione umana. La novita viene misurata **nello spazio degli embedding**, non nello spazio grezzo dei pixel — cosi due frame diversi-ma-banali contano poco, mentre una transizione qualitativamente nuova conta molto.\n\n## Perche riguarda te\nQuesto e' il progetto piu vicino al nucleo del tuo lavoro: unisce particelle-emergenza (i substrati sono letteralmente Particle Life / Lenia / CA), oscilloscopio (il FM e' uno strumento che legge lo stato interno della simulazione e lo proietta in uno spazio leggibile) e memoria novelty-gated (l'open-endedness score e' novelty rispetto alla storia passata — esattamente il gate che ti interessa). E' la prova che \"quanto e' nuovo/vivo un sistema\" puo essere una grandezza calcolabile e ottimizzabile, non solo un giudizio qualitativo. Per l'arena del vuoto: ASAL ti da una definizione operativa di novelty da agganciare al comportamento delle tue particelle. Dove diverge dalla tua tesi coscienza-r
