ercezione locale, update asincrono, e la scoperta empirica che poche regole locali bastano per morfogenesi + rigenerazione. Particle Lenia in particolare e' il ponte diretto verso un modello a particelle con campo di energia, piu adatto a \"oscilloscopi/particelle\" di un grid rigido.\n\n## Da rubare\n1. Il pattern \"canali nascosti + update asincrono stocastico\": non tutte le celle si aggiornano ad ogni step (maschera random), e i canali extra oltre a RGBA fanno da memoria/segnale interno. E' un modo economico per dare stato latente e stabilita a un'arena di particelle senza aggiungere regole globali.\n2. La formulazione di Particle Lenia (campo di energia scalare + moto lungo il gradiente) come cuore fisico dell'arena: la definisci una volta e l'emergenza di \"esseri\" e clustering viene dalla dinamica, non da if-then codificati - piu vicino all'idea di ricorsione della materia che a uno scripting di comportamenti.\n", "hardmaru-worldmodelsexperiments": "# World Models Experiments — hardmaru/WorldModelsExperiments\n\nLink: https://github.com/hardmaru/WorldModelsExperiments\n\n720 stelle · Jupyter Notebook / Python · ultimo push 2022 (progetto storico, non piu attivo) · licenza MIT\n\n## Cosa fa\nE' il codice di riferimento del paper \"World Models\" (Ha & Schmidhuber, NeurIPS 2018). Un agente impara un modello interno del proprio ambiente (CarRacing e VizDoom) e lo usa per addestrarsi *dentro il proprio modello* invece che nell'ambiente reale. Nel caso Doom (`doomrnn`) la policy viene allenata quasi interamente nel \"sogno\" generato dalla RNN, e poi trasferita con successo all'ambiente vero. E' la dimostrazione concreta e minimale dell'idea \"il modello del mondo e' un sogno navigabile\".\n\n## Come e' fatto\nArchitettura a tre blocchi, deliberatamente semplice:\n- **V (Vision)** — un VAE convoluzionale comprime ogni frame in un vettore latente `z` (`vae.py`). E' l'occhio: riduce il pixel-space a poche decine di dimensioni.\n- **M (Memory)** — una RNN con Mixture Density output (MDN-RNN, `rnn.py`) predice la distribuzione di `z` al passo successivo dato `z` e l'azione. E' il cuore generativo: modella la dinamica temporale come distribuzione, non come punto singolo, quindi puo \"sognare\" traiettorie plausibili campionando.\n- **C (Controller)** — una minuscola rete lineare che mappa `[z, h]` (latente + stato nascosto RNN) in azioni, ottimizzata con CMA-ES (evoluzione, non backprop; `es.py`).\n\nIl pezzo chiave e' `dream_env.py` / `doomrnn.py`: un ambiente Gym fittizio dove lo \"step\" non tocca il gioco reale ma fa girare la MDN-RNN, che allucina il prossimo `z`. Un parametro di temperatura regola quanto e' rumoroso/incerto il sogno — alzarlo rende il mondo interno piu imprevedibile e paradossalmente allena policy piu robuste.\n\n## Perche riguarda te\nE' l'aggancio piu diretto alla tua tesi \"world model come sogno interno\" e alla ricorsione realta-attraverso-la-materia. Qui la separazione percezione (V) / dinamica generativa (M) / azione (C) e' resa esplicita e piccola abbastanza da leggerla in un pomeriggio. Per l'arena del vuoto e' interessante che l'agente non ha bisogno del mondo reale per vivere: gli basta la propria simulazione compressa — esattamente il tipo di chiusura auto-referenziale che ti interessa. Dove diverge: non c'e' nessuna nozione di novelty-gating ne di emergenza aperta; il sogno serve solo a massimizzare una reward fissa, il modello e' congelato dopo il training, e la temperatura e' un iperparametro manuale, non una grandezza che il sistema misura su se stesso. E' un oscilloscopio spento dopo la calibrazione, non uno strumento vivo.\n\n## Da rubare\n1. **Il \"dream environment\" come drop-in dell'ambiente reale**: un wrapper che espone la stessa interfaccia `step()/reset()` ma internamente fa girare il modello generativo. Per la tua arena significa poter far vivere le particelle/agenti alternativamente nel mondo vero e nella loro previsione, con lo stesso codice — e confrontare i due (divergenza sogno-vs-realta come segnale di novelty/sorpresa).\n2. **La temperatura sul modello generativo come manopola di incertezza**: campionare la dinamica futura da una MDN e alzare/abbassare il rumore e' un modo cheap e concreto per rendere l'entropia interna un parametro visibile su cui agire — trasformabile da iperparametro fisso a variabile che il sistema regola in risposta a quanto \"si sorprende\".\n", "harvardnlp-neuralsteganography": "# STEGASURAS — Neural Linguistic Steganography\n\nLink: https://github.com/harvardnlp/NeuralSteganography\n\nStelle: ~214 · Linguaggio: Python (PyTorch, HuggingFace Transformers) · Attivita: reference storico ma vivo (creato ago 2019, ri-aggiornato giu 2025 per PyTorch/HF recenti) · Licenza: non dichiarata\n\n## Cosa fa\nE' il codice del paper capostipite \"Neural Linguistic Steganography\" (Ziegler, Deng, Rush — EMNLP 2019, Harvard NLP). Nasconde un messaggio segreto DENTRO testo dall'aspetto perfettamente normale generato da un language model: invece di cifrare (che produce garbage riconoscibile come cifrato), occulta il fatto stesso che una comunicazione stia avvenendo. Prende i bit del messaggio segreto e li usa per pilotare il campionamento del token successivo di GPT-2, cosi che la frase di copertura (\"cover text\") sia indistinguibile a occhio umano da una generazione libera. Il destinatario, ripetendo la stessa decodifica sul testo ricevuto, ricostruisce esattamente i bit originali. C'e' un demo online storico (steganography.live) e tre algoritmi a confronto.\n\n## Come e fatto\nIl repo e' minimale e leggibilissimo (~9 file). L'idea chiave e' trattare la distribuzione di probabilita' sul vocabolario che il modello produce ad ogni passo come un canale di codifica. L'algoritmo di punta e' l'**arithmetic coding** (`arithmetic.py`): a ogni step il modello da' una distribuzione P sui token, la si ordina/cumula in un intervallo [0,1), e i bit del messaggio (visti come un numero binario che punta a un sotto-intervallo) selezionano quale token emettere. Poiche' l'arithmetic coding e' near-ottimale, il numero di bit nascosti per token si avvicina all'entropia del modello: piu' il modello e' incerto (alta entropia), piu' informazione ci sta. In decodifica si riesegue il modello sullo stesso prefisso, si ricostruisce la stessa partizione e si legge indietro il sotto-intervallo -> i bit. Gli altri due metodi sono baseline: `huffman.py` (RNN-Stega, codici di Huffman sui top-k token) e il **binning/block** (`block_baseline.py`, l'algoritmo LSTM del 2017 che spacca il vocabolario in bin e ogni bin codifica dei bit). `run_single.py` mostra encode+decode end-to-end; il `mode` sceglie l'algoritmo.\n\n## Cosa possiamo notare di utile per noi\nQuesto e' il mattone tecnico esatto del tuo tema **occultamento/steganografia**, nella sua forma piu' pura e didattica: mostra come una singola distribuzione generativa possa portare DUE cose insieme — una superficie innocente (il testo che \"sembra un sogno normale del modello\") e un canale nascosto sotto (i bit selezionati). E' la dimostrazione operativa che il world-model-come-sogno puo' essere anche un vettore: la stessa traiettoria che il modello \"sognerebbe\" liberamente viene invece pilotata dai bit segreti senza cambiarne l'aspetto statistico. Il legame profondo con il resto del tuo lavoro e' l'**entropia come capacita'**: qui la quantita' di segreto trasportabile per passo E' l'entropia/sorpresa del modello in quel punto. E' lo stesso segnale che altrove usi per la memoria novelty-gated e per gli oscilloscopi sugli stati interni — solo che qui non lo usi per decidere cosa ricordare, ma per decidere quanto puoi nascondere. Un oscilloscopio sull'entropia della distribuzione ti dice, istante per istante, quanta banda covert hai. Divergenza onesta: STEGASURAS assume un modello e un decoder deterministici e condivisi bit-a-bit (fragilissimo a qualsiasi rumore/ricampionamento) e NON e' crittograficamente sicuro — l'arithmetic coding perturba la distribuzione e un rivelatore statistico forte puo' accorgersene. E' il punto di partenza che gli altri quattro progetti della lista correggono. Per l'arena del vuoto e' meno diretto (e' 1D, sequenziale, su testo), ma il principio \"usa l'incertezza del generatore come carrier\" e' trasferibile a qualsiasi processo stocastico, incluse le scelte di una particella in un campo.\n\n## Da rubare\n1. **Entropia-come-banda misurata dal vivo**: prendi la distribuzione predittiva del tuo modello/arena a ogni passo e calcola l'entropia; usala come lettura d'oscilloscopio \"quanta informazione nascosta ci sta ADESSO\". Picchi di sorpresa = finestre di alta capacita' covert (e, guarda caso, gli stessi istanti che la memoria novelty-gated segna come degni di ricordo).\n2. **Arithmetic coding sulla distribuzione come primitiva riusabile**: `arithmetic.py` e' ~300 righe di partizione-intervallo + encode/decode simmetrico. E' un modo generale per mappare bit <-> scelte di un sampler autoregressivo qualsiasi: riadattabile per iniettare/estrarre uno stato nascosto in una traiettoria di simulazione, non solo in testo.\n3. **Il pattern encode->genera->decode-riesegui** (`run_single.py`): la decodifica ricostruisce la stessa partizione rieseguendo il modello sul prefisso gia' prodotto. E' un template pulito di \"canale nascosto in un processo ricorsivo\" — direttamente utile se vuoi che la ricorsione della realta' porti sotto la superficie un messaggio recuperabile solo da chi riesegue lo stesso motore.\n", "huggingface-lerobot": "# LeRobot — [huggingface/lerobot](https://github.com/huggingface/lerobot)\n\n~25.8k stelle · Python · molto attivo (push luglio 2026) · Apache-2.0\n\n## Cosa fa\nLeRobot e lo stack open end-to-end di Hugging Face per la robotica reale in PyTorch. Punta ad abbassare la barriera d'ingresso: modelli, dataset e tool condivisi cosi che chiunque possa contribuire e beneficiare. Fornisce policy state-of-the-art gia allenate (ACT, Diffusion Policy, VQ-BeT, VLA), un formato dataset standardizzato, supporto per hardware low-cost (bracci SO-100) fino a umanoidi. E l'hub de-facto della community embodied.\n\n## Come e fatto\nTre pilastri. **Interfaccia Robot hardware-agnostica**: una classe `Robot` unica che disaccoppia la logica di controllo dall'hardware — il loop e sempre `get_observation()` → `select_action()` → `send_action()`, identico dal braccetto da 100$ all'umanoide Unitree G1. **LeRobotDataset**: video MP4 sincronizzati (visione) + Parquet (stato/azione), hostati sull'HF Hub, con streaming e visualizzazione di dataset enormi e tool per split/merge/edit degli episodi. **Policy SoTA in puro PyTorch**: imitation learning, RL, VLA, world models, reward models — training con un solo comando `lerobot-train --policy.type=act --dataset.repo_id=...`.\n\n## Perche riguarda te\nLeRobot e il punto d'ingresso pratico del filone embodied, ma per i tuoi temi e il piu tangenziale dei quattro. Il legame onesto e nel *formato dati* e nel *loop osservazione-azione*, non nella coscienza. Se la tua arena del vuoto produce traiettorie di particelle che vuoi registrare, ispezionare e ri-processare, il pattern LeRobotDataset (stream sincronizzato + tool di editing per episodio) e un modello maturo di come si serializza e si visualizza il comportamento emergente nel tempo — il tuo \"oscilloscopio\" come dataset navigabile. Dove diverge: qui non c'e nessuna nozione di memoria auto-editante, novelty o ricorsione; e ingegneria di robot learning supervisionato/imitativo. Nessuna auto-organizzazione dal vuoto — le policy imparano da dimostrazioni umane.\n\n## Da rubare\n1. **Formato episodio = video/stream sincronizzato + tabella stato-azione, con tool di split/merge/delete**: adotta questa separazione per registrare le run della tua sim. Rende il comportamento emergente riproducibile, tagliabile e confrontabile senza riavviare il mondo.\n2. **Interfaccia astratta a 3 verbi (`observe / decide / act`) indipendente dal substrato**: lo stesso disaccoppiamento ti permette di scambiare la \"fisica\" della particella sotto senza toccare l'agente che la osserva — utile per confrontare regole di emergenza diverse a parita di osservatore.\n", "huihuihenqiang-cluely-interview": "# Cluely-interview / InterviewBot — [huihuihenqiang/Cluely-interview](https://github.com/huihuihenqiang/Cluely-interview)\n\n⭐ 26 · Python (PyQt) · ultimo push 2024-12-14 · licenza MIT\n\n## Cosa fa\nÈ un assistente colloqui in Python/PyQt con interfaccia trasparente, variante cinese del pattern \"Cluely\". Fa quattro cose concrete e già funzionanti: dialoga con un LLM (GPT-4-turbo) per simulare domande/risposte di colloquio; fa speech-to-text via il servizio vocale di Baidu; cattura uno screenshot dello schermo e riconosce via OCR (Tesseract) i problemi di programmazione, restituendo il codice; e costruisce una piccola knowledge base custom da un Excel di coppie domanda/risposta per rispondere senza chiamare l'LLM. L'autore è esplicito nel dichiararlo strumento di allenamento e nel condannare l'uso per barare. È dichiaratamente un demo: dialogo a turno singolo, STT solo in cinese e solo del proprio microfono.\n\n## Come è fatto\nApplicazione desktop monolitica PyQt (`main.py`) con finestra trasparente a quattro modalità di opacità. La pipeline è semplice e lineare: input (testo/voce/screenshot) → routing → risposta. Per le domande di coding: screenshot → Tesseract OCR → prompt all'LLM → codice. Per le domande generali: opzionalmente prima consulta la knowledge base locale (costruita con `query.py` che genera un Excel indicizzato, con jieba per la segmentazione del cinese) e solo in fallback l'LLM — motivata dal fatto che \"se la KB è fatta bene l'effetto non è inferiore all'LLM e l'LLM è troppo lento\". Personalizzazione via upload del curriculum (PDF) per risposte contestuali. Configurazione via `config.json` (chiavi OpenAI, Baidu, path di Tesseract).\n\n## Cosa possiamo notare di utile per noi\nL'elemento più interessante per il nostro lavoro non è lo stealth (qui è solo una finestra trasparente, primitiva rispetto agli overlay Electron con content-protection) ma la **scelta esplicita KB-first, LLM-fallback motivata dalla latenza**: l'autore preferisce recuperare da una memoria locale strutturata e usa l'LLM solo quando il recupero fallisce. È il germe di un'architettura *memory-gated*: la memoria non è un contorno ma il primo canale di risposta, e la generazione costosa è l'eccezione. Nel nostro contesto di memoria novelty-gated questo è il rovescio speculare: loro fanno gate sulla *copertura* (se la KB copre, non generare), noi facciamo gate sulla *novità* (se è nuovo, memorizza). Vale la pena tenere entrambi i cardini in mente: un sistema maturo probabilmente ha sia un retrieve-gate in lettura sia un novelty-gate in scrittura. Dove diverge nettamente: nessun world-model, nessuna ricorsione, nessuno stato interno osservabile — è I/O stateless a turno singolo. L'uso di jieba + Excel come \"KB del povero\" è un promemoria che una memoria utile non richiede vector-DB: coppie chiave/valore ben curate con un buon matching testuale bastano per un MVP.\n\n## Da rubare\n1. **Architettura retrieve-first con LLM come fallback esplicito**, motivata dalla latenza: da affiancare al novelty-gate in scrittura per avere un doppio gate (copertura in lettura, novità in scrittura).\n2. **KB minimale Excel + segmentazione + matching testuale** come baseline di memoria prima di introdurre embeddings: utile per prototipare velocemente la memoria dell'arena.\n3. **Il framing etico esplicito nel README** (strumento di training, non di cheating): pattern da riusare per progetti dual-use dove la stessa tecnologia serve a scopi legittimi e discutibili.\n", "hunar4321-particle-life": "# hunar4321/particle-life — [hunar4321/particle-life](https://github.com/hunar4321/particle-life)\n\nStelle: ~3.3k · Linguaggio: HTML/JS (+ C++, Python) · Ultima attivita: ago 2024 · Licenza: MIT\n\n## Cosa fa\nSimulazione di vita artificiale dove l'unica regola e' una forza di attrazione/repulsione tra particelle colorate. Definisci una matrice di coefficienti (quanto il colore A e' attratto/respinto dal colore B, per ogni coppia) e da queste regole minime emergono pattern e \"organismi\" complessi e auto-organizzanti: cellule con membrana, vermi, strutture che si muovono, si dividono, si inseguono. E' uno dei repo Particle Life piu' popolari, reso virale dal tutorial YouTube; il codice, tolta la GUI, sta in meno di una pagina.\n\n## Come e fatto\nIl nucleo e' brutale nella sua semplicita' (visibile direttamente nello snippet JS del README). Per ogni coppia di gruppi-colore c'e' una `rule(atomsA, atomsB, g)`: per ogni particella di A somma su ogni particella di B una forza `F = g / d` lungo la direzione `dx, dy`, ma **solo entro un raggio** (`d < 80`) — oltre quel raggio le particelle non si vedono. La forza aggiorna la velocita' con smorzamento (`vx = (vx + fx) * 0.5`), la velocita' aggiorna la posizione, i bordi rimbalzano. Il segno e la magnitudine di `g` per ogni coppia (verde-verde = -0.32, verde-giallo = +0.34, ...) sono l'unico \"DNA\" del mondo. Nessuna regola di alto livello, nessun concetto di \"organismo\": tutto e' interazione locale a coppie dentro un raggio. Versioni 2D e 3D, in C++ (openFrameworks, il core sono le prime ~100 righe di `ofApp.cpp`), JS e Python. Il metodo di scoperta suggerito e' esplicito: parametri random -> trovi qualcosa di interessante -> fine-tuning graduale + salti occasionali grandi per non incastrarti in un massimo locale.\n\n## Perche riguarda te\nQuesto e' il candidato piu' letterale per \"particelle-emergenza\" e per il motore di un'arena del vuoto discreta:\n- **Emergenza pura da regole locali povere.** Nessuna semantica, nessun LLM, nessun reward: solo `F = g/d` entro un raggio e una matrice di segni. Eppure nascono entita' con confine, movimento coordinato, auto-replicazione apparente. E' la dimostrazione minima che \"complessita' viva\" puo' venire dal quasi-nulla — il cuore della tua intuizione sul vuoto che genera.\n- **Il \"DNA\" e' la matrice di interazione.** L'identita' del mondo sta interamente nei coefficienti coppia-a-coppia. E' un manico perfetto: puoi rendere quella matrice il tuo spazio di ricerca, e la novelty-gate diventa \"questa matrice ha prodotto un pattern che non avevo mai visto?\".\n- **Raggio di interazione = localita' dell'osservatore.** Il cutoff `d < 80` e' esattamente la nozione che ogni particella \"vede\" solo il suo intorno — utile se pensi a oscilloscopi/osservatori locali immersi nel campo.\n- **Dove diverge (onesto):** e' senza tempo lungo e senza memoria — le particelle non conservano storia, non c'e' consolidamento, non c'e' ricorsione di ordine superiore (a differenza della reflection di Generative Agents o del latente di Dreamer). L'emergenza e' bella ma \"piatta\": non costruisce livelli. Se cerchi la ricorsione-della-realta a piu' strati, questo ti da solo il livello base, il substrato — va accoppiato con un meccanismo di memoria/astrazione che qui manca del tutto. Inoltre e' O(N^2) naive: per un'arena grande serve spatial hashing.\n\n## Da rubare\n1. **Il motore in ~30 righe (matrice di forze coppia-colore + cutoff di raggio + smorzamento):** e' il modo piu' economico per avere un'arena di particelle emergenti che gira subito nel browser. Prendi lo snippet JS del README come punto zero e costruisci il resto sopra.\n2. **Il protocollo di esplorazione \"random -> fine-tune -> salti grandi anti-local-max\":** e' gia una ricetta di ricerca nello spazio dei parametri. Formalizzalo come loop novelty-gated: campiona matrici a caso, misura una novelty del pattern risultante, tieni e affina solo quelle che sorprendono, inietta salti grandi quando la novelty stagna. Cosi la tua \"memoria novelty-gated\" diventa il curatore dello zoo di mondi.\n", "hzy312-awesome-llm-watermark": "# hzy312/Awesome-LLM-Watermark\n\n<https://github.com/hzy312/Awesome-LLM-Watermark>\n\nStelle: ~375 · Formato: lista curata (solo README) · Ultimo push: dic 2024 · Licenza: nessuna dichiarata\n\n## Cosa fa\n\nÈ una bibliografia viva e curata del settore watermarking, divisa in **Text watermark** e **Image watermark**, con centinaia di paper raccolti con autori, venue (ICLR/ACL/NeurIPS/preprint) e link arXiv. Copre l'intero spettro del filone: schemi di embedding (KGW e derivati, distortion-free, multi-bit, error-correcting), analisi statistica dei watermark (framework di detection efficiency, regole ottimali, pivot), il fenomeno della **radioattività** (i watermark che sopravvivono al training/distillation), e soprattutto un ricco sottofilone di **attacchi** (watermark stealing, collision, spoofing, paraphrasing, \"attacking watermarks by exploiting their strengths\"). Non contiene codice: è una mappa per orientarsi nel campo e trovare il paper giusto per ogni sotto-problema. Fermo a fine 2024, quindi utile come snapshot storico più che come tracker in tempo reale.\n\n## Come è fatto\n\nÈ un singolo `README.md` organizzato per bullet, ogni voce con titolo in grassetto, venue, autori e URL. Il valore è la **curation e la tassonomia implicita**: leggendola si ricostruisce la struttura del campo — da un lato chi costruisce canali (embedding schemes con i loro trade-off), dall'altro chi li rompe (attack surface). Emergono cluster ricorrenti: watermark semantici vs sintattici, distortion-free vs biased, single-bit vs multi-bit, robustezza cross-lingua, e la tensione centrale rilevabilità/robustezza/qualità che ogni paper prova a spostare. Alcune voci notevoli per il nostro sguardo: \"Excuse me, sir? Your language model is leaking (information)\" (leakage), \"Watermarking Makes Language Models Radioactive\", \"Lost in Overlap: Watermark Collision\", \"Proving membership in LLM pretraining data via data watermarks\".\n\n## Cosa possiamo notare di utile per noi\n\nIl repo in sé è una lista, quindi il suo valore per te non è codice ma **cartografia del possibile** nel dominio occultamento/rilevamento — un modo per non reinventare concetti che il campo ha già nominato.\n\n- **Vocabolario di attacchi = catalogo di modi in cui un segnale nascosto muore.** Per la tua arena del vuoto ti serve sapere *come* un occultamento fallisce sotto perturbazione: paraphrasing (rumore semantico), collision (due segnali che si sovrascrivono, \"Lost in Overlap\"), stealing (l'osservatore ricostruisce la chiave dalle statistiche). Ognuno è una legge di robustezza da simulare: il vuoto/rumore come parafrasi continua, la collisione come interferenza tra particelle che marchiano lo stesso spazio.\n- **\"Radioattività\" = memoria che sopravvive alla trasmissione.** Il concetto che una firma iniettata nell'output sopravvive quando un altro sistema apprende da quell'output è profondamente rilevante al tuo world-model-come-sogno e alla memoria novelty-gated: un pattern abbastanza saliente si *eredita* attraverso il ricampionamento. La radioattività è la versione fisica di \"una traccia che persiste attraverso generazioni di stati\".\n- **\"Language model is leaking information\" e data-watermark per membership** toccano il tuo oscilloscopio: sono tecniche per leggere, dall'esterno e senza chiave, se uno stato interno *contiene* qualcosa che non dovrebbe. È esattamente la lettura anomalia-based che ti serve (rilevare occultamento senza conoscere il segreto).\n- **Statistical framework of watermarks (pivot, detection efficiency, optimal rules):** questi paper danno la matematica del rilevatore ottimale dato un budget di entropia — utile se vuoi che gli oscilloscopi dell'arena siano provabilmente ottimali e non euristici.\n- **Dove diverge:** tutto NLP-centrico e fermo al 2024; nessuna nozione di arena/particelle/sogno. Usalo come indice per pescare 3-4 paper chiave (radioactivity, collision, statistical-optimal-detection, leaking) e leggere quelli, non l'intera lista.\n\n## Da rubare\n\n1. **Tassonomia degli attacchi come suite di stress-test:** codifica paraphrase/collision/stealing come tre perturbazioni distinte nell'arena e misura la sopravvivenza della firma sotto ciascuna — così i tuoi canali nascosti hanno un profilo di robustezza multi-asse, non un singolo numero.\n2. **Concetto di radioattività per la memoria novelty-gated:** testa se una firma iniettata in uno stato sopravvive quando un secondo sistema apprende/ricampiona da quello stato — un esperimento diretto di ereditarietà del pattern (sogno che si tramanda).\n3. **Rilevatore statisticamente ottimale (pivot/optimal-rule) invece di soglia euristica:** per l'oscilloscopio, deriva la regola di decisione ottimale dato il budget di entropia dello stato, così la lettura è fondata e non tarata a mano.\n", "iamsrikanthnani-pluely": "# Pluely — [github.com/iamsrikanthnani/pluely](https://github.com/iamsrikanthnani/pluely)\n\n⭐ ~2.3k stelle · TypeScript + Rust (Tauri) · attivo (push gen 2026) · GPL-3.0\n\n## Cosa fa\n\nPluely è un assistente AI da desktop che vive come overlay traslucido sopra qualsiasi finestra e resta invisibile durante video-call, screen-share e registrazioni. Cattura l'audio di sistema (quello che senti dall'altra parte) e la tua voce via STT (Whisper/ElevenLabs/Groq), fa screenshot dell'intero schermo o di una selezione, e manda tutto a un LLM a tua scelta (BYOK) per ottenere risposte in tempo reale. Il punto di vendita è il peso: ~10MB contro i ~270MB di Cluely originale, con avvio <100ms, grazie a Tauri (binario nativo Rust + webview di sistema invece di Electron/Chromium bundled). Ha un dashboard completo con storico chat, system-prompt personalizzabili, e controlli granulari su opacità/always-on-top/visibilità dell'icona per massimizzare la furtività.\n\n## Come è fatto\n\nArchitettura Tauri: frontend React/TS in webview, backend Rust in `src-tauri/` con moduli separati (`capture.rs` per gli screenshot, `speaker/{windows,macos,linux}.rs` per l'audio di sistema per-piattaforma, `window.rs` per la finestra overlay, `shortcuts.rs` per le hotkey globali). Il meccanismo di invisibilità è una sola chiamata load-bearing: `WebviewWindowBuilder ... .content_protected(true)`. Questo attiva a livello OS l'esclusione dalla cattura (su Windows `SetWindowDisplayAffinity(WDA_EXCLUDEFROMCAPTURE)`, su macOS `NSWindowSharingNone`): il compositor disegna la finestra sul monitor fisico ma la omette dal buffer che finisce nella pipeline di screen-capture. La finestra è decorata ma sempre-in-cima, semi-trasparente, e l'audio di sistema viene intercettato via loopback per-OS. BYOK totale: nessun server proprietario nel percorso critico, le chiavi restano locali.\n\n## Cosa possiamo notare di utile per noi\n\nIl cuore concettuale di Pluely è **una singola asimmetria di canale osservativo** ed è esattamente steganografia/occultamento portata al livello del compositor grafico. Esistono due osservatori della stessa scena — l'occhio umano davanti al monitor fisico, e l'API di cattura che alimenta Zoom/OBS — e `content_protected(true)` inserisce un segnale (l'overlay) che è pienamente presente in un canale e strutturalmente assente nell'altro. Non c'è cifratura, non c'è rumore aggiunto: il \"nascondiglio\" è puro sfruttamento di una biforcazione nel modo in cui il medium (il framebuffer) viene letto da consumatori diversi. Per il tuo lavoro sull'occultamento questa è la formulazione più pulita: nascondere non significa distorcere il portatore, significa trovare due letture legittime dello stesso portatore e piazzarsi nella differenza fra loro. Trasferibile alla tua arena del vuoto: un pattern di particelle può essere \"invisibile\" a un oscilloscopio che campiona un certo osservabile e \"visibile\" a un altro che campiona un osservabile coniugato — l'occultamento come proprietà relazionale osservatore-dipendente, non intrinseca al segnale. Dove diverge dal tuo mondo: qui l'asimmetria è data dall'hardware (una flag OS), non emerge da una dinamica; per te sarebbe più interessante un'invisibilità *appresa/evoluta* — un sotto-sistema che scopre da solo quale canale il suo osservatore non guarda. Il peso di Tauri (~10MB vs 270MB) è anche una lezione secondaria sul tuo simulatore: il costo di un \"corpo\" (runtime) domina tutto; una particella-agente snella scala di ordini di grandezza rispetto a una che porta con sé un browser.\n\n## Da rubare\n\n1. **Il pattern \"doppio osservatore, segnale nella differenza\"** come primitiva di occultamento nella void-arena: definisci due proiezioni/misure dello stato del campo e permetti a un agente di collocare informazione esattamente dove le due proiezioni divergono — occultamento senza distorsione del portatore.\n2. **La flag `content_protected` come metafora di \"oscilloscopio cieco selettivo\"**: modella esplicitamente osservatori con un flag \"questo canale non entra nella mia lettura\", così puoi studiare come un sistema impari a sfruttarlo (invisibilità emergente vs. imposta).\n3. **Backend per-piattaforma modulare `speaker/{os}.rs`**: schema pulito per avere UN'interfaccia astratta (cattura loopback) con implementazioni divergenti — utile se la tua sim deve girare identica su più substrati fisici mantenendo la stessa semantica di osservazione.\n", "ibttf-interview-coder": "# Interview Coder — ibttf/interview-coder\n\n<https://github.com/ibttf/interview-coder>\n\n**~4.440 stelle · (solo release, sorgente chiuso) · ultimo push set 2025 · nessuna licenza** · \"An invisible desktop application to help you pass your technical interviews.\"\n\n## Cosa fa\n\nL'app che ha fatto partire l'intera ondata: un'applicazione desktop invisibile che, durante un colloquio tecnico di coding (LeetCode-style), cattura lo schermo con il problema, lo manda a un LLM, e mostra soluzione + spiegazione in un overlay che **non appare nella condivisione schermo né nelle registrazioni**. È il capostipite del meme \"undetectable interview assistant\" e l'origine diretta dei cloni open (cheating-daddy, poi Glass). Divenuto famoso anche per la vicenda del suo autore (Roy Lee / Columbia), che ha reso il progetto un caso mediatico oltre che tecnico. Prodotto commerciale a pagamento.\n\n## Come è fatto\n\n**Non ispezionabile dal repo**: questo repository GitHub contiene *solo i binari di release* — l'unico file è un README che rimanda alla pagina releases. Il codice sorgente è chiuso. Per struttura e comportamento è però lo stesso archetipo poi replicato open dai cloni: app Electron/desktop, overlay trasparente always-on-top, cattura schermo → LLM → risposta, con la stessa primitiva di invisibilità alla cattura (equivalente a `setContentProtection` su Electron / esclusione della finestra dal compositor). Hotkey per invocare/spostare/nascondere. In pratica: quello che cheating-daddy e Glass hanno poi reso leggibile in sorgente, qui è l'originale confezionato e distribuito solo come eseguibile.\n\n## Cosa possiamo notare di utile per noi\n\nIl valore per te è **storico e concettuale**, non di codice (non c'è codice da leggere). È il punto-zero del filone occultamento.\n\n- **Il primato dell'idea, non dell'implementazione.** Interview Coder ha dimostrato commercialmente che \"presente all'occhio, assente allo strumento di cattura\" è un oggetto desiderabile e costruibile. È la prova d'esistenza dell'occultamento-nel-canale che poi i cloni hanno reso trasparente. Per il tuo dossier è la voce-radice a cui agganciare cheating-daddy e Glass: stessa primitiva, tre gradi di apertura (chiuso → clone leggibile → prodotto raffinato).\n- **Sorgente chiuso = occultamento del meccanismo stesso.** C'è una ricorsione ironica utile: un'app il cui scopo è occultare, il cui *codice* è a sua volta occultato (solo binari). Due strati di invisibilità sovrapposti — l'artefatto nasconde l'utente all'osservatore, e l'autore nasconde l'artefatto all'analista. Nota da tenere quando ragioni su occultamento a più livelli / annidato.\n- **Zero rilevanza sul resto del tuo lavoro.** Nessuna memoria, nessuna emergenza, nessun world-model, nessun anello su di sé. Come per tutta la famiglia ghost, l'unico transfer è la nozione di invisibilità relativa al canale di misura — qui in forma originaria ma non ispezionabile.\n\nDove diverge: è un prodotto commerciale chiuso; non offre né architettura da studiare né concetti oltre l'archetipo. Per il *come funziona davvero* devi guardare i cloni open (cheating-daddy, Glass), non questo repo.\n\n## Da rubare\n\n- **Niente codice** (non c'è). Da rubare c'è solo la **framing story**: la prova che \"pieno per l'occhio, vuoto per la sonda\" è un oggetto reale, costruibile e desiderato — da citare come radice del ramo occultamento e rimandare a cheating-daddy/Glass per il meccanismo.\n- **L'idea dell'occultamento annidato** (app che nasconde + sorgente nascosto): spunto per pensare a occultamento a strati nell'arena, dove ciò che nasconde è a sua volta nascosto a un osservatore di livello superiore.\n", "icaros-usc-pyribs": "# pyribs — [icaros-usc/pyribs](https://github.com/icaros-usc/pyribs)\n\n264 stelle · Python · attivo (push lug 2026) · licenza MIT · [pyribs.org](https://pyribs.org)\n\n## Cosa fa\npyribs è una libreria \"bare-bones\" per l'ottimizzazione Quality-Diversity: minimale, leggibile e didattica, pensata sia per chi entra nel campo sia per ricercatori che inventano nuovi algoritmi. È l'implementazione ufficiale di CMA-ME, CMA-MEGA, CMA-MAE e delle loro varianti scalabili. Come tutti gli algoritmi della famiglia MAP-Elites, produce come output una **heatmap/archivio** dove ogni cella contiene il miglior individuo trovato per una regione dello spazio delle \"misure\" (i descrittori comportamentali), massimizzando al contempo un obiettivo scalare. A differenza di QDax (che punta sulla scala via JAX), pyribs punta su chiarezza, modularità e facilità di lettura del codice — è il posto giusto per *capire* il meccanismo, non solo per farlo girare veloce.\n\n## Come è fatto\npyribs formalizza QD nel framework **RIBS** (Rapid Illumination of Behavior Space) con tre componenti nettamente separati:\n- **Archive** — salva le soluzioni nello spazio delle misure (es. `GridArchive`, `CVTArchive`); è la memoria a celle che ammette solo chi migliora la propria regione.\n- **Emitter** — uno o più algoritmi che generano candidati e reagiscono al feedback su come sono stati inseriti (es. `EvolutionStrategyEmitter` basato su CMA-ES, che concentra il campionamento dove l'archivio migliora di più).\n- **Scheduler** — orchestra l'interazione archivio↔emitter tramite l'interfaccia `ask()`/`tell()` presa in prestito da pycma.\n\nIl loop: `ask()` chiede candidati agli emitter, l'utente li valuta ottenendo obiettivo + misure, `tell()` li inserisce nell'archivio e restituisce agli emitter il feedback (es. \"hai scoperto una cella nuova\", \"hai migliorato una cella\"). Cambiando i tre componenti componi decine di algoritmi QD diversi. Il focus è domini continui a dimensione fissa, come pycma.\n\n## Cosa possiamo notare di utile per noi\nRispetto a QDax, pyribs è più utile a te come **anatomia leggibile del gating per novelty** — è il posto dove studiare *come* è fatto il meccanismo prima di reimplementarlo nella tua arena:\n- **Separazione netta Archive / Emitter / Scheduler**. Questa decomposizione è la vera lezione architetturale. Trasferita al tuo sistema: l'**Archive** è la memoria novelty-gated; l'**Emitter** è ciò che genera nuovi stati/perturbazioni del vuoto e sa *dove* vale la pena esplorare in base a cosa la memoria ha già; lo **Scheduler** è il loop che li accoppia. Tenere questi tre ruoli separati rende il sistema modulare e ti permette di scambiare il criterio di novelty senza toccare il generatore.\n- **Il feedback di inserimento come segnale di controllo**. Punto sottile e prezioso: in pyribs l'emitter non riceve solo la fitness, riceve *come è andato l'inserimento in archivio* — \"cella nuova\" vs \"miglioramento\" vs \"scartato\". CMA-ME usa questo per orientare l'esplorazione verso le frontiere di novelty. Per il tuo lavoro: il segnale \"questo stato ha aperto una regione nuova della memoria\" è un feedback ricco che può guidare *dove* il sistema si concentra dopo — non solo cosa memorizza, ma cosa esplora.\n- **CMA-MAE e l'annealing della soglia**: invece di ammettere solo se strettamente migliore, si usa una soglia per cella che si alza gradualmente (annealing). Questo evita che l'archivio si irrigidisca troppo presto e bilancia esplorazione/consolidamento. Trasferibile a una memoria novelty-gated che all'inizio è permissiva (registra molto) e col tempo diventa selettiva.\n- **Codice come oscilloscopio didattico**: essendo minimale, `GridArchive`/`CVTArchive` sono ~poche centinaia di righe leggibili — il modo più rapido per capire ed adattare la meccanica del gate senza il peso dell'infrastruttura JAX.\n- **Dove diverge**: come QDax, assume un obiettivo scalare e domini continui a dimensione fissa, mentre la tua arena è dinamica e forse senza obiettivo. Prendi la *struttura del gate e del feedback*, non l'assunzione di ottimizzazione.\n\n## Da rubare\n1. **Architettura a tre ruoli Archive/Emitter/Scheduler** per la tua memoria: separa nettamente \"cosa conservo\" (archivio novelty-gated), \"cosa genero/perturbo e dove esploro\" (emitter), e \"il loop che li accoppia\" (scheduler) — così puoi cambiare criterio di novelty senza riscrivere il generatore.\n2. **Feedback di inserimento come segnale di guida**: propaga al generatore l'esito del gating (novel / migliorato / scartato), non solo un punteggio, e usalo per orientare dove il sistema esplora dopo — è il trucco di CMA-ME.\n3. **Soglia con annealing (CMA-MAE)**: rendi la memoria permissiva all'inizio e progressivamente selettiva alzando nel tempo la soglia di ammissione per cella, per evitare irrigidimento precoce dell'archivio.\n", "infer-actively-pymdp": "# pymdp — [github.com/infer-actively/pymdp](https://github.com/infer-actively/pymdp)\n\n★ 721 · Python · attivo (push lug 2026) · licenza MIT\n\n## Cosa fa\n\n`pymdp` è la libreria di riferimento per simulare agenti ad **inferenza attiva** (active inference) in ambienti modellati come POMDP / Markov Decision Process a stati discreti. È il companion software del paper omonimo pubblicato sul Journal of Open Source Software (Heins, Millidge, Demekas, Klein, Friston, Couzin, Tschantz, 2022). Un agente pymdp non ottimizza una reward esterna alla maniera del RL classico: minimizza la **free energy attesa** (Expected Free Energy, EFE), una quantità che fonde in un unico obiettivo la ricerca di ricompensa (valore pragmatico/utilità) e la ricerca di informazione (valore epistemico, cioè \"curiosità\"). Il risultato emergente è un agente che esplora attivamente la struttura nascosta del mondo per ridurre la propria incertezza, e proprio così finisce per raggiungere gli obiettivi in modo più efficiente. Il README lo mostra con la demo di \"epistemic chaining\": un topo-agente insegue una catena di indizi, ciascuno dei quali rivela la posizione del successivo, fino alla ricompensa nascosta — nessun indizio è appreso per condizionamento, l'agente li segue per pura pulsione a disvelare informazione.\n\n## Come è fatto\n\nIdea chiave: un agente è definito da un insieme di **matrici categoriche** che descrivono un modello generativo del mondo, e ad ogni passo fa tre cose in ciclo — inferisce lo stato nascosto (percezione), inferisce quale policy seguire (planning), campiona un'azione.\n\n- **A** = likelihood / modello sensoriale P(osservazione | stato). È la \"mappa\" che lega ciò che vedi a ciò che c'è.\n- **B** = transizioni P(stato' | stato, azione). La dinamica del mondo sotto controllo.\n- **C** = preferenze (prior sulle osservazioni desiderate): dove l'agente \"vuole\" finire, espresso come distribuzione sulle osservazioni.\n- **D** = prior iniziale sugli stati.\n\nIl ciclo API è nudo e leggibile: `agent.infer_states(obs)` → belief `qs` sugli stati nascosti (variational inference, minimizzazione della **Variational Free Energy** — restituita come diagnostica `vfe`); `agent.infer_policies(qs)` → distribuzione sulle policy `q_pi` e la negativa EFE `neg_efe`; `agent.sample_action(q_pi)`. Il package è organizzato in moduli netti: `inference.py`, `control.py` (selezione policy), `learning.py` (aggiornamento di A/B col tempo, apprendimento Dirichlet), `maths.py`, `planning/`, più `distribution.py` per i factor discreti multi-fattore (num_obs, num_states, num_controls sono liste — lo spazio è fattorizzato). Le operazioni matematiche di basso livello sono port NumPy delle funzioni SPM di Friston in MATLAB, benchmarkate contro l'originale; la versione recente ha un backend JAX per il batching.\n\nL'EFE decompone in due termini additivi: un termine di utilità (quanto la policy porta verso le osservazioni preferite C) e un termine epistemico (quanta incertezza sugli stati la policy risolve, information gain atteso). Un solo funzionale, due pulsioni. Non c'è \"esplorazione ε-greedy\" bullonata sopra: l'esplorazione è la conseguenza matematica del voler ridurre la sorpresa attesa.\n\n## Cosa possiamo notare di utile per noi\n\nQuesto è il progetto più teoreticamente vicino e insieme più metodologicamente distante dalla nostra arena del vuoto — il confronto è fecondo proprio per questo.\n\n- **Il termine epistemico dell'EFE è la formalizzazione rigorosa della nostra \"novelty gate\".** Noi ammettiamo in memoria ciò che è nuovo/sorprendente; pymdp *cerca attivamente* ciò che riduce l'incertezza sugli stati nascosti. Sono la stessa intuizione da due lati: noi filtriamo la scrittura in memoria (gate a valle, sull'esperienza già avvenuta), loro pilotano l'azione a monte per generare esperienza informativa (gate a monte, sulla scelta). Trasferibile: si potrebbe definire la \"novelty\" non euristicamente (distanza da embedding già visti) ma come **information gain atteso** rispetto al modello generativo corrente dell'agente — una novelty gate con basi bayesiane invece che a soglia di similarità. La domanda operativa: \"questa esperienza ridurrebbe la mia free energy?\" invece di \"questa esperienza è lontana da ciò che ho già?\".\n- **La free energy come segnale unico è un candidato naturale per l'asse verticale dell'oscilloscopio.** Noi visualizziamo lo stato interno; pymdp produce, ad ogni tick, una VFE (sorpresa presente) e una EFE per policy (sorpresa attesa futura). Sono scalari già normalizzati, con semantica precisa: un oscilloscopio che traccia VFE nel tempo mostrerebbe letteralmente i \"picchi di sorpresa\" — gli istanti in cui il mondo smentisce il modello. Questo è più informativo di una loss generica: distingue la sorpresa che si sta risolvendo (VFE che cala mentre inferisci) da quella irriducibile.\n- **Dove diverge (importante):** pymdp NON ha memoria associativa né indirizzabile per contenuto. Il suo \"sapere\" vive interamente nelle matrici A/B (parametri densi, aggiornati per conteggio Dirichlet), non in tracce episodiche recuperabili. Non c'è un archivio di episodi da interrogare \"per somiglianza\": c'è un modello del mondo che si aggiorna. È l'opposto della nostra memoria indirizzabile/episodica. Questo è il limite da tenere presente: il framework free-energy è potentissimo sul *controllo* e sulla *percezione*, ma muto sul *ricordo come oggetto separato*. La nostra arena del vuoto vive esattamente nello spazio che pymdp lascia vuoto.\n- **Sulla coscienza-come-ricorsione:** pymdp è \"flat\" — un ciclo percezione/azione senza auto-modello che si osserva. Non c'è ricorsione dell'agente su sé stesso (nessuna meta-inferenza sul proprio stato di inferenza). Ma la struttura fattorizzata degli stati nascosti offre un aggancio: si potrebbe aggiungere un fattore di stato che rappresenta *lo stato dell'agente stesso*, rendendo l'inferenza parzialmente auto-referenziale. Sarebbe la ricorsione minima innestata dentro il formalismo free-energy.\n\n## Da rubare\n\n1. **Novelty gate bayesiana**: sostituire (o affiancare) la soglia di similarità con un calcolo di *expected information gain* — ammetti in memoria l'esperienza che più abbasserebbe l'incertezza del modello interno corrente. Rende la gate adattiva allo stato di conoscenza, non solo alla distanza nell'embedding space.\n2. **Traccia VFE sull'oscilloscopio**: esporre uno scalare di free-energy variazionale per tick come canale dedicato dell'oscilloscopio — la \"curva di sorpresa\" che sale quando il mondo smentisce il modello e scende mentre l'agente ri-inferisce.\n3. **Decomposizione utilità/epistemico come due canali distinti**: qualsiasi metrica di \"quanto vale un ricordo o un'azione\" andrebbe splittata nei due termini pymdp (pragmatico vs epistemico) e mostrata separatamente, così si vede quando l'arena si muove per obiettivo e quando per pura curiosità.\n", "j4wg-interview-coder-withoupaywall-opensource": "# CodeInterviewAssist (interview-coder senza paywall) — [github.com/j4wg/interview-coder-withoupaywall-opensource](https://github.com/j4wg/interview-coder-withoupaywall-opensource)\n\n⭐ ~1.9k stelle · TypeScript (Electron) · sviluppo fermo (ultimo push ago 2025) · licenza custom (NOASSERTION, AGPL-derivata)\n\n## Cosa fa\n\nÈ la versione open-source \"senza paywall\" di interview-coder: un'app desktop invisibile che ti aiuta a superare i colloqui tecnici di coding. Fai screenshot della domanda e del codice (separatamente, per un'analisi migliore), l'app estrae e analizza il problema con GPT-4o via Vision API, e genera soluzione completa con spiegazione, complessità temporale/spaziale e debugging in tempo reale. La finestra è \"99% invisibile\" e bypassa la maggior parte dei metodi di cattura schermo, con hotkey globali non rilevabili (Cmd/Ctrl+B per mostrare/nascondere, ecc.). Usa la tua chiave OpenAI (paghi solo il consumo) e tutto gira in locale tranne le chiamate API. Il README è onesto sui limiti: invisibile a Zoom <6.1.6 e a tutte le registrazioni browser, ma NON alle versioni Zoom recenti né alla registrazione schermo nativa macOS (Cmd+Shift+5).\n\n## Come è fatto\n\nApp Electron classica: il codice di integrazione LLM sta tutto in `electron/ProcessingHelper.ts` (pensato per essere riscritto verso Claude/Deepseek/Llama), la UI settings in `src/components/Settings/SettingsDialog.tsx`. Due script \"stealth-run\" (`.bat`/`.sh`) fanno build in produzione e lanciano l'app già in modalità invisibile. L'invisibilità si regge sulle stesse API Electron degli altri cloni: finestra frameless/trasparente, always-on-top, e `setContentProtection` per l'esclusione dalla cattura. Il flusso è a due fasi (estrazione problema → generazione soluzione) con possibilità di scegliere GPT-4o vs GPT-4o-mini per bilanciare costo/qualità fra le fasi. Nessun server proprietario: config e chiavi in `config.json` nella user-data-dir.\n\n## Cosa possiamo notare di utile per noi\n\nL'aspetto più rilevante per te non è il codice (Electron banale, ormai superato dai cloni Tauri/Rust) ma **l'onestà del modello di minaccia**. Il README elenca esplicitamente contro *quali* osservatori l'occultamento tiene e contro quali no, versione per versione (Zoom 6.1.6 è la soglia). Questo è il modo giusto di trattare la steganografia/occultamento nel tuo lavoro: l'invisibilità non è una proprietà binaria del segnale, è una **matrice segnale × osservatore × versione-dell'osservatore**, e cambia quando l'osservatore aggiorna il suo apparato di misura. Nella tua void-arena questo si traduce in una corsa agli armamenti: il momento in cui definisci un occultatore che sfrutta un buco osservativo, hai implicitamente definito la patch che lo chiude, e quindi una dinamica evolutiva. La struttura a due fasi (estrai-poi-risolvi) è anche un piccolo esempio di **routing novelty-gated primitivo**: fai passare al modello costoso solo dopo che una prima fase più economica ha isolato l'essenziale — analogo al tuo gating della memoria, dove solo ciò che supera un filtro di rilevanza consuma la risorsa cara. Dove diverge nettamente: qui non c'è stato interno persistente né osservazione degli interni — è stateless, screenshot→risposta. Non offre nulla su oscilloscopi/ricorsione/world-model; è puro tool. Trasferibile: solo il framing \"occultamento = tabella osservatore-dipendente versionata\" e il pattern del filtro economico-prima-del-costoso.\n\n## Da rubare\n\n1. **La matrice di minaccia esplicita** come artefatto di design: per ogni meccanismo di occultamento nella sim, mantieni una tabella \"tiene contro osservatore A/B/C, cade contro D\" — rende l'occultamento misurabile e apre la porta alla dinamica evolutiva occultatore↔rilevatore.\n2. **Il gating a due stadi economico→costoso**: filtra prima con una misura cheap, spendi la risorsa cara (memoria/compute) solo su ciò che passa — direttamente applicabile al tuo novelty-gating.\n3. **La soglia versionata dell'osservatore (Zoom 6.1.6)** come idea di \"arms-race clock\": introduci nella sim osservatori che periodicamente aggiornano il loro apparato, invalidando gli occultamenti precedenti e forzando adattamento continuo.\n", "jasonwebb-morphogenesis-resources": "# Morphogenesis Resources — jasonwebb/morphogenesis-resources\n\nLink: https://github.com/jasonwebb/morphogenesis-resources\n\n2258 stelle · lista curata (Markdown) · ultimo push 2025 · nessuna licenza dichiarata\n\n## Cosa fa\nE' una lista curata ed enciclopedica sulla **morfogenesi digitale**: come forme, pattern e strutture emergono in natura e come replicarli col codice. Cataloga algoritmi di crescita (differential growth, reaction-diffusion, DLA, dielectric breakdown, physarum/slime-mold, space colonization, Eden growth, primordial particle system), i concetti matematici e fisici collegati (automi cellulari, Voronoi/Delaunay, phyllotaxis, strange attractors, Saffman-Taylor instability, spherical harmonics, percolation theory), esperimenti di laboratorio fisici (reazione Belousov-Zhabotinsky, piastre di Chladni, celle di Hele-Shaw), e pattern di codice riusabili (agent-based modelling, boids, collision detection, dithering). Ogni voce ha descrizione sintetica + link a articoli, repo, progetti artistici, libri e software.\n\n## Come e' fatto\nNon e' software, e' una mappa. La struttura chiave e' la scelta editoriale di **mettere sotto lo stesso tetto tre livelli che di solito stanno separati**: il fenomeno naturale (come cresce davvero un corallo o una foglia), la matematica/fisica che lo governa, e il pattern di codice che lo simula. L'autore lo dichiara esplicitamente: lo scopo e' \"far scoccare nuove intuizioni rendendo piu facile vedere relazioni tra argomenti apparentemente distanti\". E' un indice cross-disciplinare progettato per la serendipita, non per la completezza tecnica. Ogni algoritmo di crescita e' descritto in termini di regole locali di agenti/celle che, iterate, producono forma globale — cioe emergenza dal basso.\n\n## Cosa possiamo notare di utile per noi\nQuesta non e' una repo da \"rubare codice\", e' un **radar per tecniche adiacenti al vuoto/campi** — e serve esattamente come catalogo di dinamiche locali che generano struttura globale, che e' la fisica base della tua arena di particelle. Tre cluster sono direttamente rilevanti: (a) **reaction-diffusion** e **dielectric breakdown / DLA** sono i modelli canonici di \"campo + soglia → pattern che si auto-organizza\", il piu vicino parente del tuo vuoto che si struttura; (b) **primordial particle system** e **boids** sono sistemi agent-based dove regole di attrazione/repulsione locali producono aggregati vivi — la stessa famiglia della tua particle-life; (c) gli **esperimenti di laboratorio** (Chladni, Hele-Shaw, BZ) sono un promemoria che questi pattern esistono nella materia reale, non solo in silico — utile per la tesi \"coscienza = ricorsione della realta attraverso la materia\", perche mostra che l'auto-organizzazione e' una proprieta del substrato fisico, non del codice. Dove diverge: la lista e' descrittiva e statica, non ha nulla su memoria, novelty, auto-modello o ricorsione — e' il livello \"fisica del substrato\", non il livello \"il sistema che si osserva\". La usi come dizionario di primitive di campo su cui poi montare i tuoi strati (oscilloscopio, gate di novelty).\n\n## Da rubare\n1. **La tassonomia a tre strati** (fenomeno naturale ↔ matematica ↔ pattern di codice) come schema per catalogare le TUE dinamiche del vuoto: per ogni comportamento emergente che osservi nell'arena, annota il parente naturale, la legge che lo governa e la regola locale che lo produce. Rende comparabili cose che sembrano scollegate.\n2. **Reaction-diffusion e DLA come banco di prova minimale** per il tuo gate di novelty: sono sistemi in cui sai gia quando emerge un pattern \"nuovo\" vs rumore, quindi calibri l'oscilloscopio/gate su un sistema con ground-truth noto prima di portarlo sull'arena vera.\n3. **Il primordial particle system** (regole di rotazione basate su densita di vicini) come variante di particle-life con emergenza documentata di strutture cellulari — candidato concreto da implementare nell'arena per ottenere aggregati che nascono, si dividono e muoiono.\n", "jax-md-jax-md": "# JAX MD — Molecular Dynamics differenziabile e accelerata ([repo](https://github.com/jax-md/jax-md))\n\nStelle: ~1.4k · Linguaggio: Python/JAX (notebook) · Ultima attività: luglio 2026 (attivo) · Licenza: Apache-2.0\n\n## Cosa fa\nJAX MD è un motore generico di dinamica molecolare scritto interamente in JAX, quindi **end-to-end differenziabile** e hardware-accelerato (CPU/GPU/TPU dallo stesso codice). Simula sistemi di particelle che interagiscono via campi di potenziale (Lennard-Jones, soft-sphere, EAM, potenziali neurali, ecc.), con integratori per gli ensemble standard (NVE energia costante, NVT temperatura costante, NPT pressione costante), minimizzazione dell'energia (FIRE), condizioni al contorno periodiche e non, neighbor lists efficienti per scalare a molte particelle. La differenza rispetto a LAMMPS/HOOMD non è la fisica ma il *paradigma*: siccome tutto è differenziabile, puoi prendere il gradiente di *qualsiasi* osservabile finale rispetto a *qualsiasi* parametro iniziale — posizioni, parametri del potenziale, persino la topologia — e usarlo per ottimizzare, invertire, o imparare la dinamica.\n\n## Come è fatto\nL'idea architetturale chiave è **funzionale e data-driven**: niente oggetti stateful, niente classi pesanti. Lo stato è tuple di array; le funzioni trasformano stato in stato. I mattoni:\n- **Space** = una coppia `(displacement_fn, shift_fn)`. `displacement_fn(Ra, Rb)` dà il vettore tra due punti (rispettando le condizioni periodiche); `shift_fn(R, dR)` sposta un punto. Astrarre lo spazio in due funzioni significa che lo stesso codice di simulazione gira su spazio libero, periodico, o deformato senza modifiche.\n- **Energy** = funzioni che, dato lo spazio, costruiscono `energy_fn(R) → scalare`. La **forza è semplicemente `-grad(energy_fn)`** via autodiff: zero codice manuale per le derivate, che nei pacchetti tradizionali sono migliaia di righe.\n- **Simulate** = integratori costruiti come coppie `(init_fn, apply_fn)`: `init_fn` prepara lo stato, `apply_fn` fa un passo. Un intero rollout è un `lax.scan` compilato in XLA.\nIl trucco che sblocca tutto è la **differenziabilità attraverso l'intera traiettoria**: puoi retropropagare dal risultato finale (es. la forma di un cristallo dopo 10000 step) fino ai parametri iniziali. Con l'*implicit differentiation* (uno dei notebook) puoi persino differenziare attraverso stati di equilibrio senza srotolare tutta la traiettoria.\n\n## Cosa possiamo notare di utile per noi\nQuesto è il candidato più forte come **substrato apprendibile** per l'arena del vuoto/particelle, e differisce da Flow-Lenia in un punto decisivo: **la differenziabilità end-to-end**. Se la tua arena è scritta in JAX MD, non è solo una simulazione da guardare — è un oggetto *ottimizzabile*. Puoi chiedere: \"quale campo di potenziale fa emergere enti con questa proprietà?\" e ottenere la risposta per discesa del gradiente invece che per tentativi. Questo trasforma l'arena da spettacolo a strumento.\n\nConnessioni specifiche al tuo lavoro:\n- **Arena/particelle in campi di potenziale**: è esattamente l'ontologia che descrivi — il \"vuoto\" è lo spazio, il \"qualcosa\" sono le particelle, la fisica è il potenziale. E il potenziale può essere una **rete neurale** (`neural_networks.py` negli esempi): l'arena può *imparare le proprie leggi*. Un vuoto le cui regole non sono imposte ma addestrate è molto più vicino al tuo interesse per l'emergenza genuina.\n- **Oscilloscopi su stati interni come osservabili differenziabili**: qualunque quantità tu legga dall'arena (energia locale, ordine strutturale, entropia, una metrica di novelty) è una funzione JAX differenziabile dello stato. Quindi non solo *misuri* lo stato interno — puoi retropropagare *attraverso* la misura per capire quali condizioni la producono, o per addestrare l'arena a massimizzarla/minimizzarla. L'oscilloscopio diventa una leva, non solo un sensore.\n- **World-model-come-sogno + coscienza=ricorsione**: JAX MD è veloce e compilato, ideale come ambiente sognato dentro cui un agente pianifica per gradiente (differentiable planning). E la *ricorsione* — un sistema che modella sé stesso — diventa concreta: un potenziale neurale che prende come input una *statistica del proprio stato passato* chiude il loop di auto-riferimento in modo differenziabile e addestrabile. Il gradiente attraverso il loop ricorsivo è ciò che JAX MD rende computabile.\n\nDove diverge: JAX MD è pensato per fisica quantitativa (materiali, glass, elasticità), non per artificial life; non ha conservazione-di-massa-come-campo continuo (è particellare, non continuo come Lenia), né rendering, né interattività real-time pronti. È una libreria di ricerca con \"sharp edges\" e API che cambiano. Devi costruirci sopra l'arena e gli oscilloscopi. Ma è l'unico dei cinque che ti dà **il gradiente attraverso il tempo** — la primitiva che serve se vuoi che l'arena *impari* invece di solo *girare*.\n\n## Da rubare\n1. **Scrivi l'arena come `energy_fn` differenziabile con forza = `-grad(energy)`**: elimini a costo zero tutto il codice manuale delle derivate e ottieni un'arena su cui puoi fare ottimizzazione/inversione, non solo forward simulation.\n2. **Potenziale neurale (arena che impara le sue leggi)**: usa il pattern di `neural_networks.py` per rendere le regole del vuoto un oggetto addestrabile — un vuoto le cui dinamiche emergono da un training, non da un'equazione imposta.\n3. **Implicit differentiation attraverso stati di equilibrio**: per chiudere il loop ricorsivo (arena che modella sé stessa) e propagare gradienti attraverso lunghe traiettorie o punti fissi senza esplodere la memoria — la primitiva tecnica per rendere computabile \"coscienza = ricorsione\".\n", "jennyzzt-dgm": "# Darwin Gödel Machine — jennyzzt/dgm\n\n<https://github.com/jennyzzt/dgm>\n\n**2.2k stelle · Python · ultimo push ago 2025 · licenza Apache-2.0** · paper arXiv:2505.22954 (Zhang, Hu, Lu, Lange, Clune — Sakana AI / UBC / Vector Institute)\n\n## Cosa fa\n\nUn agente di coding che riscrive il proprio sorgente e valida ogni modifica in modo empirico su benchmark reali (SWE-bench, Polyglot). Non un solo agente che migliora se stesso in linea retta: mantiene un **archivio** (una popolazione) di versioni dell'agente, ne pesca una come \"genitore\", la fa mutare (l'agente modifica il proprio codice), misura l'accuratezza sul benchmark e reinserisce il figlio nell'archivio. Nel paper l'accuratezza SWE-bench sale dal ~20% al ~50% lungo le generazioni. È la realizzazione pratica e parziale della Gödel-machine di Schmidhuber: dove Schmidhuber pretendeva una prova formale che una modifica sia migliorativa, la DGM sostituisce la prova con la **validazione empirica** sul benchmark.\n\n## Come è fatto\n\nLoop esterno in `DGM_outer.py`, agente iniziale in `coding_agent.py`, tool dei foundation model in `tools/`, valutazione in `swe_bench/` e `polyglot/`. Ogni nodo dell'archivio è un commit con il suo `metadata` (accuracy_score, id risolti/irrisolti, `parent_commit`). Il cuore è `choose_selfimproves(...)`: sceglie i genitori da cui ramificare. I metodi di selezione sono la parte interessante:\n- `score_prop` — probabilità ∝ sigmoide dello score (sfrutta i migliori).\n- `score_child_prop` — probabilità ∝ score × 1/(1+numero_di_figli). Cioè penalizza i rami già molto esplorati e favorisce nodi ancora \"vergini\". È di fatto **quality-diversity / open-endedness**: non collassa sul singolo migliore, tiene viva la varietà.\n\nOgni figlio parte da un genitore, tenta un self-improvement su issue che il genitore ha fallito (empty/unresolved), e sopravvive nell'archivio anche se non è il migliore in assoluto. Nota di sicurezza esplicita nel README: esegue codice generato dal modello, va sandboxato (Docker).\n\n## Perché riguarda te\n\nQuesto è il ramo **ricorsione / self-reference** allo stato più concreto che esista in OSS. Due agganci onesti:\n\n1. **Coscienza-ricorsione.** La tua tesi capstone (\"coscienza = ricorsione della realtà attraverso la materia\") qui ha un analogo operativo: un sistema che si include nel proprio dominio di modifica. Ma attenzione alla divergenza — la DGM non \"sente\" nulla e non ha un modello di sé; la ricorsione è puramente strumentale (codice che riscrive codice per alzare uno score). È un ottimo caso di studio di *dove la ricorsione self-referente NON basta a produrre interiorità*. Utile come contro-esempio nel dossier.\n\n2. **Archivio open-ended = particelle-emergenza.** L'archivio che ramifica e mantiene diversità è esattamente una popolazione da cui emerge struttura non pianificata. Se l'arena del vuoto ha \"particelle\" che si riproducono e mutano, `score_child_prop` è la legge di selezione già scritta e testata.\n\nDivergenza da tenere presente: la validazione è ancorata a un benchmark esterno fisso. Nella tua arena non hai un SWE-bench — la \"fitness\" andrebbe definita internamente (novelty, coerenza, sopravvivenza), il che è molto più fragile.\n\n## Da rubare\n\n- **La formula di selezione `score × 1/(1+children_count)`** come legge di novelty-gating per una popolazione: favorisce esplicitamente i rami poco esplorati senza abbandonare la qualità. Trapiantabile 1:1 su una memoria o un'arena dove vuoi evitare il collasso sul singolo attrattore.\n- **Il pattern archivio-di-commit**: ogni stato è un commit con metadata (score, parent, cosa ha risolto/fallito). Rende l'intera storia evolutiva ispezionabile e \"replayabile\" — utile per un oscilloscopio che voglia mostrare la genealogia degli stati, non solo l'ultimo.\n", "joeynyc-hermes-hud": "# Hermes HUD — joeynyc/hermes-hud\n\n<https://github.com/joeynyc/hermes-hud>\n\n**~880 stelle · Python · ultimo push lug 2026 · licenza MIT** · \"What does an AI see when it looks in a mirror?\"\n\n## Cosa fa\n\nUn \"consciousness monitor\" a terminale (TUI) per un agente AI: una dashboard che guarda l'agente pensare. Legge la cartella dati dell'agente (`~/.hermes/`, override via `HERMES_HOME`) e ne fa affiorare tutto ciò che l'agente sa di sé — conversazioni tenute, skill acquisite, errori corretti, capacità di memoria, pattern d'uso dei tool, progetti attivi, job schedulati, stato dei servizi. Pensato per l'agente Hermes di Nous Research, ma è nella pratica un template di introspezione riusabile. Auto-descrizione onesta: \"part neofetch, part flight recorder, part existential crisis rendered in Unicode\".\n\n## Come è fatto\n\nTUI in **Textual**. Architettura pulita a due strati, facile da imitare:\n- `hermes_hud/collectors/` — un modulo per dominio di stato: `memory.py`, `corrections.py`, `skills.py`, `patterns.py`, `cron.py`, `projects.py`, `health.py`, `profiles.py`, `sessions.py`, `agents.py`, `timeline.py`. Ogni collector legge i dati grezzi dell'agente e ritorna uno stato tipizzato (`models.py`).\n- `hermes_hud/widgets/` — un pannello per ogni collector, 9 tab navigabili da tastiera.\n\n`snapshot.py` + `diff_panel.py` implementano il **growth tracking**: salvi uno snapshot (`--snapshot`) e la volta dopo il HUD mostra il *diff* — cosa è cambiato da ieri (nuove skill, nuovi errori corretti). `patterns.py` è il più interessante per te: clusterizza i task, rileva prompt ripetuti (window-function JOIN sui log), calcola le ore di picco e i **trigram di tool** più frequenti (`_top_trigrams`) — cioè le catene di tool ricorrenti dell'agente. Presente una suite di test seria, incluso `test_adversarial.py`. Modalità multiple: TUI interattiva, `--text` per stdout, vari neofetch a tema (`--ai`, `--br`, `--fsociety`).\n\n## Perché riguarda te\n\nÈ il seme che avevi nominato per il ramo **introspection-HUD / oscilloscopi**, ed è esattamente questo: un **oscilloscopio sugli stati interni** di un agente. Aganci diretti:\n\n- **Oscilloscopio.** L'idea è già realizzata: prendere lo stato interiore di un sistema pensante e renderlo un quadrante leggibile in tempo reale. La separazione collector→widget è precisamente il pattern \"sonda→traccia\" di un oscilloscopio: la sonda (collector) è agnostica dal display (widget). Se costruisci un visualizzatore per l'arena del vuoto, questa è l'architettura di riferimento.\n- **Memoria novelty-gated, lato osservabilità.** Lo snapshot-diff mostra *solo ciò che è cambiato*: è il complemento visivo del novelty-gating di A-MEM. Non ti serve rivedere tutto lo stato, ti serve vedere il delta. È la vista giusta per una memoria che deve evidenziare la novità.\n- **Coscienza-ricorsione, con onestà brutale.** Il tagline (\"cosa vede un'AI quando si guarda allo specchio?\") mette in scena l'auto-osservazione — ma va detto chiaro: qui la ricorsione è *nell'occhio dell'osservatore umano*, non nel sistema. Il HUD guarda l'agente; l'agente non guarda sé tramite il HUD. È introspezione esposta, non auto-coscienza. Ottimo come oggetto di contrasto: mostra quanto è facile *sembrare* uno specchio della mente senza che ci sia alcun anello chiuso.\n\nDivergenza: legge dati che altri (l'agente Hermes) hanno già prodotto in un formato specifico. Per la tua arena dovresti scrivere i collector sul formato dei tuoi stati — ma è precisamente il punto di estensione previsto.\n\n## Da rubare\n\n- **Il pattern collector→widget disaccoppiato** (sonda tipizzata separata dal pannello): riusabile pari pari come scheletro di un oscilloscopio per l'arena del vuoto / le particelle-emergenza. Scrivi collector sullo stato delle particelle, i widget di Hermes ti danno già tab, temi e navigazione.\n- **Snapshot + diff-panel come motore di novelty-view**: salvare istantanee periodiche e renderizzare solo il delta. È il modo giusto per far vedere \"cosa è emerso\" in un sistema che cambia continuamente, senza annegare l'osservatore nello stato completo. Combinato col gate di A-MEM, chiude il cerchio: la memoria decide cosa è nuovo, il HUD lo mostra.\n", "joonspk-research-generative_agents": "# Generative Agents (Stanford Smallville) — [joonspk-research/generative_agents](https://github.com/joonspk-research/generative_agents)\n\nStelle: ~21.7k · Linguaggio: Python (backend) + Django/JS (frontend) · Ultima attivita: ago 2024 · Licenza: Apache-2.0\n\n## Cosa fa\nSimula 25 agenti \"credibili\" in un mondo sandbox 2D (Smallville). Ogni agente ha un LLM che gli fa percepire l'ambiente, ricordare, riflettere e pianificare la giornata. Da vincoli minimi (una seed-line di identita per personaggio) emergono comportamenti sociali non programmati: una festa di San Valentino si organizza da sola via passaparola, nascono conversazioni, appuntamenti, una candidatura alle elezioni. E' il paper-reference sul \"memory stream\" recuperato per punteggio.\n\n## Come e fatto\nIl cuore e in `reverie/backend_server`: un loop a game-step (1 step = 10s di gioco) dove ogni agente esegue percepisci -> recupera -> pianifica -> agisci -> riflette. La **memoria associativa** (vedi le cartelle `bootstrap_memory/associative_memory` con `nodes.json`, `embeddings.json`, `kw_strength.json`) e uno stream di nodi (osservazioni, riflessioni, piani). Il **retrieval** pesca i ricordi rilevanti combinando tre punteggi normalizzati: **recency** (decadimento esponenziale), **importance** (voto di salienza 1-10 chiesto all'LLM al momento dell'inserimento) e **relevance** (similarita coseno tra embedding del ricordo e della query). La **reflection** scatta quando la somma delle importance recenti supera una soglia: l'agente si ferma, si pone domande su se stesso e sintetizza i ricordi grezzi in insight di livello superiore, che rientrano nello stream come nuovi nodi (ricorsione). Il frontend Django serve la mappa Tiled e fa il replay/demo dei movimenti salvati.\n\n## Perche riguarda te\nQuesto e il ponte piu diretto tra la tua \"memoria novelty-gated\" e un sistema che gira davvero. Tre agganci onesti:\n- **Importance-gate = tuo novelty-gate.** Loro non salvano tutto uguale: ogni ricordo entra con un voto di salienza, e solo l'accumulo di salienza triggera la reflection. E' il pattern \"non tutto merita di essere ricordato/consolidato\" che cerchi, gia implementato.\n- **Reflection ricorsiva = coscienza-ricorsione applicata.** La sintesi di ricordi in insight che rientrano nello stream ed diventano materiale per altre sintesi e letteralmente \"ricorsione della realta attraverso una traccia\". E' un modello concreto, sporco ma funzionante, del ciclo che teorizzi.\n- **Dove diverge:** qui non c'e \"arena del vuoto\" ne emergenza da particelle/fisica. L'emergenza e mediata da un LLM costoso, non da regole locali povere. Le feste emergono perche c'e gia semantica dentro l'LLM, non da dinamiche minime. Se il tuo interesse e l'emergenza da nulla, questo e l'estremo opposto (emergenza da tantissima struttura pre-esistente). Utile come contrappunto: mostra quanto lavoro fa la memoria strutturata vs quanto fa il substrato.\n\n## Da rubare\n1. **La formula di retrieval a tre pesi** (recency-decay × importance-score × relevance-cosine, normalizzati e sommati): e' un gate di richiamo memoria pronto da adattare al tuo \"cosa riaffiora nell'arena\". Sostituisci l'importance dell'LLM con la tua metrica di novelty/sorpresa e hai un memory-stream novelty-gated.\n2. **Il trigger di reflection a soglia di salienza accumulata:** invece di consolidare a intervalli fissi, consolidi solo quando abbastanza \"roba saliente\" si e' accumulata. E' un buon meccanismo per decidere *quando* un oscilloscopio/osservatore deve fermarsi e sintetizzare, anziche macinare a vuoto.\n", "joshmayerr-openinterviewcoder": "# Open Interview Coder — [JoshMayerr/openinterviewcoder](https://github.com/JoshMayerr/openinterviewcoder)\n\n⭐ 34 · JavaScript (Electron) · fermo (push apr 2025) · MIT\n\n## Cosa fa\nOpen Interview Coder è un clone OSS minimale e leggibile di interview-coder: un assistente AI \"undetectable\" per colloqui di coding che appare come overlay durante lo screen sharing. Cattura screenshot del problema, li analizza con un LLM (OpenAI), risponde in una chat overlay con snippet di codice e spiegazioni, e si muove/nasconde via hotkey. È il più piccolo e didattico del gruppo — poche centinaia di righe, una decina di file — pensato più per *leggere come è fatto* un simile tool che per essere un prodotto rifinito.\n\n## Come è fatto\nElectron essenziale, struttura piatta e trasparente: `src/main.js` (processo main), `renderer.js` (finestra overlay), `preload.js` (IPC sicuro via contextBridge), `llm-service.js` (integrazione OpenAI), `screenshot.js` (cattura), `settings.js` + `config.js` (chiave API). L'occultamento è il più basilare del gruppo: overlay always-on-top, toggle visibilità (`Cmd/Ctrl+Shift+H`), spostamento con le frecce, screenshot con `Cmd/Ctrl+Shift+S`. Non c'è (nel codice esposto) content-protection avanzato né disguise del nome-processo né panic-button — la \"undetectability\" dichiarata poggia essenzialmente sul fatto che l'overlay è una finestra separata che l'utente sposta fuori dall'area condivisa e nasconde a comando. È il baseline architetturale da cui gli altri quattro divergono aggiungendo strati di stealth.\n\n## Cosa possiamo notare di utile per noi\nIl valore di questo progetto per te è proprio la sua **minimalità come baseline di controllo**. Se stai costruendo una tassonomia dell'occultamento (frame-exclusion di OpenCluely, disguise di Open-Cluely, panic-collapse/opacità di Corvus, senza-superficie di Phantom), questo è il \"grado zero\": occultamento solo per *ricollocazione spaziale e toggle manuale*. L'ente non è invisibile al sensore — è semplicemente **spostato fuori dal campo osservato** e spento a comando. Nella tua arena del vuoto è il modello più elementare di vuoto: non c'è alcuna proprietà speciale dell'ente, solo la sua posizione relativa alla regione sorvegliata. È utile averlo come controllo perché isola quanto dell'\"occultamento\" è intrinseco all'ente e quanto è solo geometria dell'osservatore — una distinzione che i tool più sofisticati confondono. La pulizia del codice (separazione main/renderer/preload, IPC via contextBridge) è anche un buon riferimento se mai vorrai un overlay-oscilloscopio leggero per ispezionare gli stati interni della tua simulazione in tempo reale: la struttura preload→IPC→renderer è esattamente il pattern per esporre in sicurezza lo stato del motore a una UI di monitoraggio senza accoppiarli. Dove diverge da tutto il tuo lavoro: nessuna dinamica, nessun world-model, nessuna memoria — è il thin client allo stato più scarno.\n\n## Da rubare\n1. **Il \"grado zero\" dell'occultamento come controllo sperimentale**: occultamento per pura ricollocazione spaziale fuori dal campo osservato, senza alcuna proprietà dell'ente. Includilo nella tassonomia come baseline per isolare \"occultamento intrinseco all'ente\" da \"geometria dell'osservatore\".\n2. **Pattern main→preload(IPC)→renderer per un overlay-oscilloscopio**: struttura pulita e disaccoppiata per esporre lo stato interno del motore a una UI di monitoraggio in tempo reale senza accoppiare simulazione e visualizzazione.\n3. **Occultamento = funzione della posizione relativa all'osservatore**: rendi esplicita, negli oscilloscopi, la regione-sorvegliata come oggetto di prima classe; misura l'occultamento come sovrapposizione ente-regione, separandolo dalle proprietà intrinseche dell'ente.\n", "jpyoo1212-ghostcode": "# jpyoo1212/Ghostcode — [github.com/jpyoo1212/Ghostcode](https://github.com/jpyoo1212/Ghostcode)\n\n⭐ 0 · TypeScript / Next.js 14 · push lug 2026 · nessuna licenza · progetto personale\n\n## Cosa fa\nContrariamente a quanto suggerisce il nome, NON è un coding agent: è un'app di **messaggi effimeri autodistruggenti**. Trasformi un messaggio in un codice segreto usa-e-getta; il destinatario può aprirlo esattamente una volta — dopo quello, o dopo 3 minuti (qualunque venga prima), il messaggio viene cancellato in modo permanente. Nessun account, nessuna cronologia, nessun messaggio mai memorizzato in chiaro. Una seconda modalità (`/room`) aggiunge stanze di chat effimere a due (join via codice, sessione, messaggi con crypto lato client). È un progetto sul **vuoto come feature**: l'informazione esiste per un istante e poi non c'è più, senza traccia.\n\n## Come è fatto\nIdea chiave: la lettura di un segreto è un'azione **distruttiva e one-time**, quindi è modellata come tale a ogni livello. Il flusso: `POST /api/secrets` cifra il messaggio server-side (AES-256-GCM in `src/lib/crypto.ts`), lo salva con un codice casuale di 16 caratteri e un `expires_at` a 3 minuti, e restituisce al browser SOLO il codice. `POST /api/secrets/[code]` cerca il codice, verifica che non sia scaduto né già usato, lo marca usato **atomicamente** (guardia contro la race fra due decode simultanei), decifra, **cancella la riga** e restituisce il messaggio una volta sola. Ogni tentativo successivo con lo stesso codice riceve \"This code has expired or has already been used\". Il decode è deliberatamente un `POST`, non un `GET`, perché i `GET` possono essere innescati involontariamente (anteprime di link, prefetch, crawler) e brucerebbero il segreto. Storage su Supabase Postgres, service role key solo server-side, mai esposta al browser; anche nel DB i messaggi sono ciphertext. Stack: Next.js App Router, Tailwind, componenti `code-reveal`, `countdown-timer`, hook `use-countdown`.\n\n## Cosa possiamo notare di utile per noi\nQuesto è il progetto della lista più affine ai tuoi temi **occultamento/steganografia** e alla filosofia dei \"cerchi vuoti\". Il concetto centrale — un dato che esiste solo nell'atto di essere osservato e poi collassa a nulla — è quasi una metafora fisica: è informazione con vita = un singolo accesso, dopo il quale lo stato è genuinamente vuoto (riga cancellata, non solo flaggata). Per la tua **memoria novelty-gated** è il caso opposto e complementare: lì decidi cosa TENERE in base alla novità; qui il default è cancellare, e la persistenza è l'eccezione. Il meccanismo del **mark-used atomico con guardia sulla race** è direttamente trasferibile se mai la tua memoria dovesse gestire \"ricordi a consumo singolo\" (un evento che, una volta letto/consolidato, non deve essere riletto — utile per evitare doppio conteggio nel novelty gating). La scelta GET-vs-POST per proteggere un'azione irreversibile è una lezione di design pulita: distingui osservazione passiva da osservazione distruttiva — rilevante se nella tua arena \"guardare\" una particella ne altera lo stato (collasso stile misura). Dove diverge: è crypto/prodotto, zero dinamica emergente, zero coscienza; il \"vuoto\" qui è cancellazione da DB, non un attrattore o uno stato del modello. Non c'è world-model né ricorsione.\n\n## Da rubare\n- **Ricordo a consumo singolo con mark-used atomico**: per la memoria novelty-gated, un tipo di traccia che si auto-invalida al primo consolidamento (guardia contro doppia lettura → doppio conteggio di novelty). L'atomicità read-check-mark-delete è il pattern.\n- **Osservazione distruttiva vs passiva**: separa esplicitamente \"peek\" (non consuma) da \"read\" (consuma e cancella) nelle API interne dell'arena — utile per modellare una misura che perturba lo stato osservato.\n- **Vita = TTL + primo-accesso, whichever-first**: politica di decadimento a doppia condizione (tempo O evento) per le tracce di memoria: scadi un ricordo al primo di [tempo trascorso, primo richiamo], non solo per età.\n", "jungle0430-stegozip": "# StegoZip — Enhancing Linguistic Steganography Payload with LLMs\n\nLink: https://github.com/Jungle0430/StegoZip\n\nStelle: ~33 · Linguaggio: Python (PyTorch, spaCy, estensioni Cython) · Attivita: recente/attiva (push dic 2025, repo consultato lug 2026) · Licenza: nessuna dichiarata (assumere \"all rights reserved\")\n\n## Cosa fa\nImplementazione ufficiale del paper NeurIPS 2025 \"StegoZip: Enhancing Linguistic Steganography Payload in Practice with Large Language Models\" (Jiang et al., USTC). Il problema che attacca: la steganografia generativa e' limitata nel payload perche' il testo di copertura ha bassa entropia (pochi bit nascondibili per token), quindi servono testi lunghissimi o trasmissioni frequenti — entrambi aumentano il sospetto. StegoZip sposta il focus dal generatore al MESSAGGIO: prima di nasconderlo, lo comprime aggressivamente con un LLM, cosi che ogni token di copertura porti piu' informazione utile. Dichiara 2.5x il payload dei baseline a parita' di tempo di elaborazione, mantenendo la sicurezza provabile del metodo di embedding sottostante. Si aggancia sopra metodi SOTA di embedding lossless (Discop, SparSamp).\n\n## Come e fatto\nDue componenti in cascata prima dell'embedding. (1) Semantic redundancy pruning (`src/semantic_compressor.py`): un LLM riscrive/pota dinamicamente il messaggio segreto in una rappresentazione a \"bassa semantica\" — elimina ridondanza linguistica che il destinatario puo' ricostruire, tenendo solo cio' che non e' predicibile. (2) Index-based compression coding (`src/rank_zip.py`, `arithmeticcoding.py`): la rappresentazione potata viene ulteriormente compressa in codici binari compatti tramite un codice basato su indici/rank sulla distribuzione dell'LLM. Solo a
