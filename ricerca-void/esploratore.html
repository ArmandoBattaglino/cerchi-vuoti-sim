questo punto i bit compressi entrano nel motore steganografico (`src/main_discop.py`, `src/main_sparsamp.py`) che li nasconde nel testo generato in modo lossless. In decodifica si estraggono i bit, si de-comprimono e si ricostruisce il messaggio. Il pruning e' \"reversibile\" perche' guidato dallo stesso LLM che il ricevente puo' rieseguire.\n\n## Cosa possiamo notare di utile per noi\nLa lezione forte, indipendente dalla steganografia, tocca la tua memoria novelty-gated e il world-model-come-sogno: StegoZip separa nettamente \"cosa e' predicibile dal modello\" da \"cosa e' informazione genuina\", e conserva/trasmette solo il secondo. E' la stessa filosofia della novelty-gate portata all'estremo — non memorizzare/trasmettere cio' che il modello puo' rigenerare da solo, perche' e' ridondante. Il semantic pruning e' letteralmente un filtro di sorpresa applicato al contenuto: tieni il residuo non-predicibile, scarta il prevedibile. Questo suggerisce un design per la tua arena: la memoria non dovrebbe salvare lo stato completo ma solo il \"delta comprimibile-dall'osservatore\" — la parte che il world-model non avrebbe indovinato. Sul lato occultamento: mostra che la capacita' di un canale nascosto dentro un generatore e' governata dall'entropia del generatore, e che si puo' comprimere il payload per adattarlo a canali a bassa entropia — utile se un giorno vuoi far portare a un \"sogno\" a bassa entropia piu' contenuto latente. Divergenze oneste: dipende da LLM pesanti in encoding e decoding (il ricevente deve avere lo stesso modello), ha estensioni Cython da compilare, e non ha licenza — quindi e' materiale da studiare e reimplementare, non da importare. La parte davvero riusabile e' il concetto pruning+rank-coding, non il codice specifico legato a Discop/SparSamp.\n\n## Da rubare\n1. Pipeline \"prune-then-encode\": prima di scrivere qualcosa in memoria (o in un canale nascosto), passa il contenuto attraverso il tuo world-model e togli tutto cio' che il modello avrebbe predetto — memorizza solo il residuo sorprendente. E' novelty-gating applicato al payload invece che all'evento.\n2. Index/rank-based coding sulla distribuzione del modello: codificare un item come il suo rango nella distribuzione predetta lo rende cortissimo quando e' probabile e lungo quando e' raro — una rappresentazione della memoria auto-lunghezza-variabile che spende bit in proporzione alla sorpresa.\n3. Disaccoppiare \"motore di embedding\" da \"preprocessing del messaggio\": nell'architettura, tieni il tuo meccanismo di occultamento agnostico rispetto a un modulo di compressione semantica intercambiabile davanti — cosi puoi migliorare payload/impercettibilita' senza toccare il core.\n", "jwkirchenbauer-lm-watermarking": "# A Watermark for Large Language Models (lm-watermarking) — [jwkirchenbauer/lm-watermarking](https://github.com/jwkirchenbauer/lm-watermarking)\n\n**★ 680 · Jupyter Notebook + Python · ultimo push 2025-09 (attivo) · Apache-2.0 · [paper ICML 2023 arXiv:2301.10226](https://arxiv.org/abs/2301.10226) · [demo HF](https://huggingface.co/spaces/tomg-group-umd/lm-watermarking)**\n\n> Implementazione ufficiale del watermarking LLM di Kirchenbauer, Geiping, Wen, Katz, Miers, Goldstein (UMD). Ancora del filone **occultamento / firma**: iniettare nel testo generato una firma statistica *invisibile all'occhio* ma *rilevabile con un test statistico*, senza accesso al modello.\n\n## Cosa fa\n\nMarchia il testo prodotto da un LLM in modo che, più tardi, chiunque abbia la chiave possa dimostrare statisticamente \"questo testo è stato generato da quel modello\" — senza che un lettore umano noti alcuna differenza e senza bisogno di rilanciare il modello. Due componenti: un **`WatermarkLogitsProcessor`** che si aggancia alla `generate()` di HuggingFace e altera *impercettibilmente* la distribuzione dei token durante la generazione; e un **`WatermarkDetector`** che, dato un testo, calcola uno **z-score** e un p-value per decidere se il watermark è presente. Il rilevamento non richiede il modello, non richiede il prompt, e funziona su un frammento di testo.\n\n## Come è fatto\n\nL'idea chiave è **partizionare pseudocasualmente il vocabolario a ogni passo in \"green list\" e \"red list\", e sbilanciare la generazione verso i verdi**, in modo che il testo generato contenga *più token verdi di quanti il caso ne produrrebbe* — un eccesso invisibile parola per parola ma statisticamente inequivocabile su qualche decina di token.\n\n- **Seeding pseudocasuale dal contesto**: a ogni posizione, si prende un *hash dei token di contesto precedenti* (larghezza `h`, es. `h=4`) con una PRF salata da una **chiave segreta** (il default è `15485863`, il milionesimo primo — da cambiare in produzione). Quell'hash semina un PRNG che partiziona il vocabolario.\n- **Green/red list**: una frazione **`gamma`** del vocabolario (default `0.25`) finisce nella green list; il resto è rossa. La partizione *cambia a ogni token* perché dipende dal contesto locale.\n- **Logit bias `delta`**: si **aggiunge `delta`** (default `2.0`) ai logit dei token verdi prima del sampling. Con delta finito, il bias si sente solo dove il modello è incerto (alta entropia); dove il modello è confidente, il token \"giusto\" esce comunque — così **la qualità è preservata** e la firma si accumula solo nello spazio di libertà del testo. La forza del watermark è proporzionale a `exp(delta)` e all'entropia (spike-entropy).\n- **Rilevamento come test d'ipotesi**: il detector rigenera le stesse green list dal contesto (ha la chiave), conta i token verdi osservati `|s|_G` su `T` token, e calcola `z = (|s|_G − γT) / sqrt(Tγ(1−γ))`. Sotto l'ipotesi nulla \"testo non marchiato\" i verdi sono ~γ; un z sopra soglia (`z_threshold=4.0`) rifiuta la nulla → testo marchiato, con p-value minuscolo. Nessun modello richiesto.\n- **Manopole del trade-off** (dalla guida del README): `delta` = forza vs qualità; `h` (context width) = robustezza vs occultamento (h grande → più nascosto/più difficile da forzare, ma più fragile al paraphrasing; h=0 → massima robustezza agli edit, minima casualità); `gamma` = facilità di superare la soglia; **PRF `minhash`** (dipende da *un solo* token del contesto scelto a caso → robusto agli edit) vs schemi più complessi; **`selfhash`** estende \"gratis\" il contesto includendo il token corrente. `ignore_repeated_ngrams=True` in detection perché i contesti ripetuti violano l'ipotesi iid e falsano i p-value. Moduli accessori: `homoglyphs.py` e `normalizers.py` neutralizzano attacchi di sostituzione con caratteri omoglifi/normalizzazione Unicode.\n\n## Cosa possiamo notare di utile per noi\n\nQuesto progetto è di *dominio* diverso (provenienza/steganografia del testo, non memoria), ma è pieno di **primitive trasferibili** ai nostri temi — soprattutto l'idea di una firma sub-percettiva verificabile e di manopole entropia-dipendenti.\n\n- **Firma nascosta ma verificabile = un canale di \"marcatura del vuoto\".** Il watermark inietta struttura *dove c'è libertà*: nei punti ad alta entropia, dove più token sono equivalenti, sceglie i verdi. Questo è direttamente analogo all'idea di scrivere memoria/firma **solo nel vuoto disponibile** dell'arena, lasciando intatto ciò che è già determinato. Trasferibile: un meccanismo che marca/registra un evento sfruttando solo i gradi di libertà non ancora vincolati, senza perturbare la struttura esistente.\n- **`delta` proporzionale all'entropia = novelty/free-energy gating già incarnato.** Il fatto che il bias si senta *solo* dove l'output è incerto è un gating naturale: alta entropia (situazione \"aperta\", nuova, non decisa) → il segnale entra; bassa entropia (già determinato) → il segnale non ha effetto. È lo stesso principio del novelty-gating ma sull'asse della *incertezza generativa* invece che della *somiglianza a memoria*. Divergenza: qui l'obiettivo è nascondere una firma esterna, non ricordare; ma la funzione `forza_effettiva = f(entropia_locale)` è riusabile come regola di scrittura \"scrivi dove c'è spazio libero\".\n- **Il detector z-score = oscilloscopio della firma.** Il detector produce una statistica cumulativa `z(t)` che cresce token dopo token quando la firma è presente. Plottare `z` (o il rate di token verdi) lungo il testo è una **traccia da oscilloscopio**: si vede *dove* la firma è forte, dove svanisce (es. dopo un paraphrasing), dove il segnale emerge dal rumore superando la soglia. È il modello di uno strumento che rivela una struttura invisibile accumulando evidenza nel tempo — precisamente la funzione dei nostri \"oscilloscopi\" sull'arena.\n- **Seeding dal contesto = memoria indirizzabile *implicita* nella dinamica.** La green list a ogni passo è determinata dall'hash del contesto recente: la \"regola di scrittura\" è indirizzata dal contenuto locale, come un content-addressing leggero. È una forma minimale di stato che non vive in una matrice ma nella *funzione hash del contesto* — un modo alternativo (senza magazzino esplicito) di far dipendere il presente dal passato. Diverge nettamente dalla memoria persistente (SDM/DNC): qui non si immagazzina nulla, la \"memoria\" è ricalcolata al volo dalla chiave + contesto; ma è un promemoria che *l'indirizzamento associativo può essere procedurale, non solo tabellare*.\n- **Coscienza=ricorsione: la firma auto-referente (`selfhash`).** Il `selfhash` include il token corrente nell'hash che decide se quel token è verde — un anello auto-referenziale (il token deve appartenere alla lista che lui stesso contribuisce a generare). È una piccola ricorsione di consistenza: lo stato deve essere coerente con la regola che esso stesso instaura. Curiosità concettuale allineata alla tesi \"ricorsione attraverso la materia\" — qui la materia è la sequenza di token e il vincolo si chiude su se stesso.\n- **Robustezza vs occultamento = lo stesso trade-off della nostra memoria.** La tensione `h` grande (nascosto ma fragile) vs `h` piccolo (evidente ma robusto agli edit) è isomorfa al trade-off tra un ricordo *specifico/contestuale* (fragile, si rompe se il contesto cambia) e uno *invariante/robusto* (grezzo ma resistente). Utile come lente per ragionare su quanto \"contestualizzare\" le scritture nell'arena.\n\n## Da rubare\n\n1. **La regola `forza = f(entropia_locale)`: scrivi solo nel vuoto disponibile.** Trasferire il meccanismo `delta`-entropia come principio di scrittura dell'arena: registra/marca un evento sfruttando i gradi di libertà non vincolati (alta incertezza), lasciando intatto ciò che è già determinato. Novelty-gating sull'asse dell'incertezza.\n2. **Il detector z-score come oscilloscopio a evidenza cumulativa.** Adottare il pattern \"statistica che cresce nel tempo e supera una soglia\" per rivelare strutture invisibili nell'arena: una sonda che accumula evidenza token-dopo-token (o evento-dopo-evento) e mostra *dove* una firma/pattern emerge dal rumore.\n3. **`selfhash` come primitiva di auto-consistenza ricorsiva.** Rubare l'idea del vincolo che si chiude su se stesso (un elemento deve essere coerente con la regola che esso stesso genera) come mattoncino minimale di ricorsione materiale da sperimentare nell'arena.\n", "kanerva-sparse-distributed-memory": "# Sparse Distributed Memory (Kanerva) — [Wikipedia](https://en.wikipedia.org/wiki/Sparse_distributed_memory)\n\n**Modello teorico (Pentti Kanerva, 1988) · implementazioni OSS di riferimento: [msbrogli/sdm](https://github.com/msbrogli/sdm) (Python, ★49) + [msbrogli/sdm-framework](https://github.com/msbrogli/sdm-framework) (C, ★47) · ponte moderno con l'attention: [TrentBrick/attention-approximates-sdm](https://github.com/TrentBrick/attention-approximates-sdm) (NeurIPS 2021, ★27)**\n\n> La SDM di Kanerva: memoria **indirizzabile per contenuto in spazi ad altissima dimensione**, richiamo per prossimità (distanza di Hamming), robusta, distribuita, biologicamente ispirata al cervelletto. Radice storica della memoria associativa novelty/similarity-based — e, per il paper di Trent Bricken, l'origine matematica dell'attention.\n\n## Cosa fa\n\nLa SDM è una memoria che si comporta come un **cervello indirizzato per somiglianza**: invece di leggere/scrivere a un indirizzo esatto (come la RAM), si leggono/scrivono *tutte le locazioni \"vicine\"* a un indirizzo dato, misurando la vicinanza con la distanza di Hamming tra vettori binari lunghissimi (es. 1000 bit). Conseguenza fondamentale (dal testo Wikipedia): *\"una parola può essere riletta non solo dando l'indirizzo di scrittura originale, ma anche uno vicino ad esso, misurato dal numero di bit non coincidenti\"*. Quindi: dai un frammento/una versione corrotta di un ricordo → ottieni il ricordo pulito. È tolleranza al rumore, completamento di pattern e richiamo associativo, il tutto in un modello semplice e analizzabile.\n\n## Come è fatto\n\nL'idea chiave è **la geometria degli spazi ad alta dimensione**: in uno spazio a 1000 bit i punti sono quasi tutti a distanza ~500 l'uno dall'altro (concentrazione della misura), quindi un piccolo raggio di Hamming attorno a un indirizzo cattura un sottoinsieme minuscolo ma *distribuito* di locazioni. Meccanica (da Wikipedia + implementazioni msbrogli):\n\n- **Hard locations**: l'immenso spazio di indirizzi (ordine `2^1000`) è impossibile da materializzare, quindi si campionano `M` **locazioni fisiche** (es. un milione) con indirizzi hard casuali. Ognuna ha un indirizzo N-bit fisso e un vettore di **contatori** (uno per bit del contenuto).\n- **Raggio di accesso (access sphere)**: dato un indirizzo di query, si attivano tutte le hard location entro una **distanza di Hamming di cutoff** (es. raggio che ne seleziona ~1/1000). È l'insieme che partecipa a quella lettura/scrittura.\n- **Scrittura come voto distribuito**: il pattern-dato viene *scritto in tutte* le location attivate — per ogni bit, **incrementa** il contatore se il bit è 1, **decrementa** se è 0. Il ricordo è quindi *smeariato* su centinaia di location; ogni location porta pezzi di molti ricordi diversi (sovrapposizione).\n- **Lettura come voto/somma per colonne**: si attivano le location entro il raggio, si **sommano i contatori colonna per colonna** e si **sogliano** (>0 → bit 1, altrimenti 0). La maggioranza dei ricordi coerenti \"vince\" sul rumore degli altri.\n- **Distanza critica**: esiste un punto critico matematico: se la query è più vicina di così a un ricordo immagazzinato, iterare la lettura *converge* verso il ricordo (attrattore); oltre quella distanza, diverge nel rumore. Analogo diretto del bacino d'attrazione di Hopfield.\n- **Robustezza**: se l'indirizzo di input è parzialmente danneggiato, l'output resta corretto, perché l'informazione è distribuita su molte location.\n- **Ispirazione cerebellare (Kanerva)**: le hard location ≈ neuroni granulari (decoder d'indirizzo sparsi), i contatori ≈ sinapsi verso le cellule di Purkinje. La SDM è nata come modello del cervelletto.\n\nIl ponte moderno — **Bricken & Pehlevan, \"Attention Approximates Sparse Distributed Memory\" (NeurIPS 2021)** — dimostra che, con un opportuno pattern di attivazione, la lettura della SDM approssima da vicino la `softmax`-attention del Transformer: l'attention è, in sostanza, una SDM con raggio di accesso \"morbido\". Così SDM, moderne reti di Hopfield e attention risultano tre viste dello stesso oggetto.\n\n## Cosa possiamo notare di utile per noi\n\nLa SDM è probabilmente il **substrato di stoccaggio più affine** all'\"arena del vuoto\", perché è nativamente *distribuita, sparsa e indirizzata per somiglianza* — e perché, a differenza di Hopfield/attention, ha una **scrittura esplicita** con cui costruire un meccanismo di novelty-gating vero.\n\n- **Indirizzamento per prossimità = memoria indirizzabile *associativa* nel senso letterale che ci serve.** Non c'è un indirizzo \"giusto\": c'è una regione di spazio, e tutto ciò che le è vicino risponde. È esattamente \"richiamo per somiglianza\" come primitiva del sistema, non come funzione aggiunta. Trasferibile come modello mentale di base dell'arena: gli eventi sono punti in uno spazio ad alta dimensione, e ricordare = illuminare una sfera attorno a un punto.\n- **La sovrapposizione distribuita è il \"vuoto pieno\".** Ogni hard location contiene frammenti di moltissimi ricordi sommati nei contatori; presa da sola non significa nulla (è rumore/vuoto), ma nel *voto collettivo* emerge il segnale. Questo è concettualmente vicinissimo a un'arena dove il singolo elemento è vuoto e il significato è puramente relazionale/emergente dalla folla. Diverge dalle memorie \"uno-slot-un-ricordo\" (DNC) proprio qui: nella SDM il ricordo *non ha un luogo*, ha una *firma diffusa*.\n- **Novelty-gating con una metrica nativa e a costo bassissimo.** Prima di scrivere, si può leggere: se la lettura all'indirizzo dell'evento restituisce già qualcosa di *forte e coerente* (contatori con grande magnitudine, soglia netta), l'evento è **familiare** → non scrivere (o scrivi debolmente). Se la lettura è **debole/ambigua** (contatori vicini a zero, sfera \"vuota\"), l'evento è **nuovo** → scrivi con forza. La *magnitudine dei contatori nella sfera d'accesso* È il segnale di novità/occupazione, già presente nella struttura dati. Questo rende la SDM il candidato ideale per implementare letteralmente il write novelty-gated dell'arena, cosa che Hopfield/attention (sola lettura) non offrono.\n- **Distanza critica = confine del bacino, coordinata del vuoto.** La distanza critica separa \"dentro un attrattore\" (ricordo consolidato) da \"fuori, nel rumore\" (vuoto/nuovo). È una soglia oggettiva per dire quando una query è \"già memoria\" e quando è ancora vergine — perfetta come coordinata dell'asse vuoto↔pieno, e misurabile per ogni evento.\n- **Oscilloscopio nativo: iterare la lettura e osservare la convergenza.** Rileggere ripetutamente (output → nuovo indirizzo → rileggi) fa convergere o divergere a seconda della distanza critica. Registrare *la traiettoria di distanze di Hamming* durante queste iterazioni è una traccia da oscilloscopio del richiamo: quanti passi per assestarsi, verso quale attrattore, o divergenza nel vuoto. Inoltre l'*istogramma delle magnitudini dei contatori* nella sfera è una fotografia strumentabile di \"quanto è occupata questa regione dell'arena\".\n- **Coscienza=ricorsione: la SDM è già un loop di completamento materiale.** L'iterazione lettura→rilettura che cade nell'attrattore è ricorsione attraverso un substrato fisico distribuito (i contatori). La materia è la nuvola di hard location; la ricorsione è il ricircolo dell'output come nuovo indirizzo; il \"collasso\" è la convergenza sotto la distanza critica. Modello concreto e ispezionabile della tesi, con in più (rispetto a Hopfield) una *storia di scrittura* che rende il substrato modificabile dall'esperienza.\n- **Il ponte SDM↔attention (Bricken) unifica tutto il nostro filone.** Poiché l'attention ≈ SDM ≈ Hopfield, possiamo scegliere il formalismo più comodo per ogni scopo: SDM per la scrittura/novelty e l'intuizione biologica/geometrica; Hopfield per l'energia e i regimi; attention per l'aggancio ai modelli linguistici reali. Divergenza pratica: la SDM \"pura\" è binaria e a raggio duro; le versioni utili (msbrogli, o la variante continua/soft del paper NeurIPS) ammorbidiscono il raggio, avvicinandola all'attention e rendendola differenziabile.\n\n## Da rubare\n\n1. **Read-before-write come gate di novità nativo.** Prima di immagazzinare un evento, leggere la sua sfera: magnitudine alta e coerente → familiare, sopprimi la scrittura; sfera debole/vuota → nuovo, scrivi forte. Il novelty-gating diventa una proprietà emergente della struttura dati, non un modulo bolt-on.\n2. **La magnitudine dei contatori nella sfera come mappa di occupazione dell'arena.** Usare `Σ|contatori|` nella sfera d'accesso come campo scalare \"quanto è piena questa regione di vuoto\": basso = vuoto vergine, alto = zona di ricordi consolidati. Plottabile come heatmap dello spazio.\n3. **Iterazione di lettura + traiettoria di Hamming come oscilloscopio del richiamo.** Ricircolare l'output come nuovo indirizzo e registrare la sequenza di distanze fino a convergenza/divergenza rispetto alla distanza critica: una firma dinamica del \"pensiero che si assesta o si perde nel vuoto\", direttamente sopra `msbrogli/sdm`.\n", "ku-nlp-steganography-with-masked-lm": "# steganography-with-masked-lm — Edit-based Steganography con Masked LM\n\nLink: https://github.com/ku-nlp/steganography-with-masked-lm\n\nStelle: ~28 · Linguaggio: Python (PyTorch, HuggingFace transformers BERT, NLTK) · Attivita: matura/ferma (push apr 2021, repo consultato lug 2026) · Licenza: MIT\n\n## Cosa fa\nImplementazione del paper NAACL 2021 \"Frustratingly Easy Edit-based Linguistic Steganography with a Masked Language Model\" (Ueoka, Murawaki, Kurohashi — Kyoto University). A differenza dei metodi generativi (che creano il cover da zero), qui si parte da un COVERTEXT esistente e vi si nascondono i bit EDITANDO alcune parole: si mascherano token selezionati, si chiede a un masked LM (BERT) i candidati plausibili per riempirli, e la scelta tra i candidati codifica il messaggio. Uso da riga di comando estremamente semplice: dai una frase e i bit, ti restituisce lo stego-text con alcune parole sostituite; per decodificare ridai lo stego-text con `--decode` e recuperi i bit. E' il paradigma complementare al generativo, utile quando vuoi un testo che assomigli a uno specifico documento preesistente.\n\n## Come e fatto\nTutto in `masked_stego/masked_stego.py`, classe `MaskedStego` su `bert-base-cased`. Preprocessing (`_mask`): tokenizza la frase, salta i subword iniziali e i token non sostituibili (stopword, punteggiatura), e maschera un token ogni `mask_interval` (default 3) — cosi il pattern di mascheramento e' deterministico e ricostruibile in decodifica. Predizione: BERT produce per ogni posizione mascherata la distribuzione sui token; si ordinano i candidati e si tengono solo quelli sopra `score_threshold` (default ~0.01), scartando le posizioni con meno di 2 candidati (nessun bit codificabile li'). Encoding: block-coding (`_block_encode_single`) sui candidati filtrati — l'insieme ordinato di candidati diventa un albero binario/blocco e i bit del messaggio selezionano quale token inserire. Decoding: rifa' lo stesso mascheramento deterministico, ricalcola gli stessi candidati con la stessa soglia, guarda quale token e' effettivamente presente e ne ricava i bit (`_block_decode_single`). La chiave della reversibilita' e' che mascheramento e filtro candidati sono funzioni deterministiche dello stego-text stesso.\n\n## Cosa possiamo notare di utile per noi\nQuesto e' il paradigma piu' diverso e per te forse il piu' istruttivo: occultamento come EDITING minimale di uno stato esistente, non come generazione. Per la tua arena del vuoto significa nascondere informazione perturbando localmente pochi elementi di uno stato gia' dato, in punti scelti in modo deterministico, mantenendo tutto il resto identico — steganografia \"a bassa impronta\" dove il cover e' la realta' preesistente. Due meccanismi sono direttamente trasferibili. Primo: la selezione dei siti sostituibili — solo dove esistono >=2 alternative plausibili sopra soglia c'e' capacita' di nascondere; e' una misura locale di \"libera scelta\" / ambiguita' dello stato. Nel tuo linguaggio e' una mappa di dove il sistema ha ridondanza sfruttabile — perfetta come lettura d'oscilloscopio (heatmap di ambiguita' locale) e come gate (memorizza/nascondi solo dove c'e' scelta genuina). Secondo: la reversibilita' senza canale laterale — mascheramento e candidati sono ricostruiti dal solo stato finale, senza metadati; e' un modello pulito di come decodificare uno stato \"letto due volte\" con la stessa procedura, che risuona con coscienza=ricorsione (lo stesso processo applicato allo stesso oggetto produce l'informazione nascosta). Divergenze oneste: e' BERT del 2021, mono-modello, capacita' bassa (pochi bit per frase) e sensibile a soglie; non e' provably-secure come STEAD ne' ad alto payload come StegoZip. Ma la sua semplicita' lo rende il miglior scheletro concettuale per un prototipo di occultamento edit-based nella tua simulazione.\n\n## Da rubare\n1. Mappa di sostituibilita' locale come oscilloscopio e gate: per ogni sito dello stato calcola quante alternative plausibili esistono sopra soglia; una heatmap di questo numero e' insieme diagnostica (dove c'e' ambiguita'/scelta) e criterio di gating (nascondi/memorizza solo dove c'e' >=2 opzioni reali).\n2. Occultamento come editing deterministico di uno stato esistente: invece di generare un cover, seleziona in modo riproducibile pochi siti dello stato dell'arena e perturbali entro l'insieme di alternative \"innocenti\", lasciando il resto intatto — canale nascosto a impronta minima.\n3. Reversibilita' senza metadati (stessa procedura in lettura e scrittura): progetta il decoding come riesecuzione identica del processo di selezione siti+candidati sullo stato finale, senza salvare alcun indice — un occultamento auto-descrivente, esempio concreto di ricorsione che rivela l'informazione.\n", "leonardodalinky-zero-shot-gls": "# ZGLS — Zero-shot Generative Linguistic Steganography\n\nLink: https://github.com/leonardodalinky/zero-shot-GLS\n\nStelle: ~9 · Linguaggio: Python (PyTorch, transformers, auto-gptq, modulo Cython `zgls-utils`) · Attivita: matura (push gen 2025, repo consultato lug 2026) · Licenza: MIT\n\n## Cosa fa\nImplementazione ufficiale del paper NAACL 2024 \"Zero-shot Generative Linguistic Steganography\" (Lin, Luo, Zhang, Ping). Nasconde messaggi in testo generato usando LLM pre-addestrati SENZA fine-tuning e senza dizionari/regole costruiti ad hoc per il compito — da qui \"zero-shot\". L'obiettivo e' rendere la steganografia generativa praticabile con qualunque LLM off-the-shelf, campionando il testo di copertura in modo che le scelte codifichino i bit segreti mantenendo alta impercettibilita' (il testo deve superare la steganalisi automatica) e buona qualita' linguistica. Il repo include dataset (imdb, twitter), script di generazione e una suite di valutazione con metriche di steganalisi e qualita' linguistica, piu' una pagina progetto con esempi e tabelle.\n\n## Come e fatto\nPipeline zero-shot che sfrutta l'LLM pre-addestrato come sorgente di distribuzione condizionata, guidata da prompt (\"GenWithPrompt\" nelle figure del sito) per orientare stile/dominio del cover senza addestramento. L'embedding sfrutta la distribuzione di probabilita' del next-token: costruisce un raggruppamento/encoding dei token candidati (il modulo Cython `zgls-utils` fa il lavoro pesante di codifica) tale che la scelta del token successivo trasporti bit e resti campionata coerentemente con la distribuzione del modello, cosi lo stego non si distingue statisticamente dal testo generato normalmente. La struttura del repo separa nettamente generazione (`scripts/`), dati (`datasets/`) e valutazione (`evaluate/` con steganalisi + language eval), rendendolo un buon banco di prova metodologico. Essendo zero-shot, il ricevente decodifica rieseguendo lo stesso LLM con lo stesso prompt e la stessa procedura di encoding.\n\n## Cosa possiamo notare di utile per noi\nIl contributo trasferibile e' il paradigma \"zero-shot\": ottenere un comportamento nuovo (occultamento) da un modello generico senza addestrarlo, solo strutturando prompt + procedura di campionamento. Per il tuo lavoro questo e' un principio di economia — molte capacita' che sembrano richiedere training possono emergere riorganizzando come leggi/campioni la distribuzione gia' presente nel modello. Rilevante per l'idea che la coscienza/comportamento sia ricorsione/struttura sopra un substrato dato, non qualcosa da iniettare. Il pezzo piu' concretamente utile e' pero' la loro infrastruttura di VALUTAZIONE: hanno una batteria di steganalisi (classificatori che cercano di distinguere stego da innocente) e di language eval. Questo e' esattamente lo strumento che ti serve per l'occultamento nell'arena: un avversario automatico che prova a distinguere uno stato \"con contenuto nascosto\" da uno \"innocente\" e' la metrica onesta di quanto bene stai nascondendo — un oscilloscopio avversariale sullo stato. Il prompt-conditioning (\"GenWithPrompt\") mostra anche come orientare un generatore/sogno verso un dominio senza cambiarne i pesi. Divergenze oneste: e' comunque legato all'NLP e a LLM, con dipendenza da auto-gptq e un modulo Cython da compilare; il guadagno per te e' metodologico (paradigma + harness di valutazione), non il codice di embedding in se'. Le ~9 stelle indicano un progetto di ricerca di nicchia, non uno strumento maturo.\n\n## Da rubare\n1. Harness di steganalisi avversariale come metrica di occultamento: addestra un classificatore che tenti di distinguere stati \"con payload nascosto\" da stati \"puliti\" della tua arena; il suo tasso di successo e' la misura diretta di impercettibilita' e un segnale su cui iterare.\n2. Paradigma zero-shot: prima di addestrare qualcosa per un nuovo comportamento, chiediti se puoi ottenerlo riorganizzando prompt/condizionamento e procedura di campionamento sul modello che hai gia' — coerente con \"il comportamento e' struttura sopra il substrato\".\n3. Separazione netta generazione / dati / valutazione (come il loro layout `scripts` + `datasets` + `evaluate`): adotta questa tripartizione per rendere le tue simulazioni di occultamento riproducibili e comparabili su piu' metriche.\n", "letta-ai-letta": "# Letta (ex MemGPT) — [letta-ai/letta](https://github.com/letta-ai/letta)\n\n~23.8k stelle · Python · attivo (push luglio 2026) · Apache-2.0 · topics: ai, ai-agents, llm, llm-agent\n\n## Cosa fa\nLetta e la piattaforma per **agenti stateful** nata dal paper MemGPT: AI con memoria avanzata che impara e si auto-migliora nel tempo. L'idea fondativa e una gerarchia di memoria in stile sistema-operativo — la context window come RAM, uno storage esterno come disco — con l'LLM che si auto-gestisce, paginando ricordi dentro e fuori dal contesto tramite tool. E lo standard de-facto per agenti con memoria persistente e auto-editante. Nota: il repo ospita ora il server \"legacy\" V1; lo sviluppo attivo si e spostato su Letta Code (CLI) e Agent SDK.\n\n## Come e fatto\nIl cuore concettuale (da MemGPT) e il **memory management gerarchico auto-guidato**: l'LLM non ha solo un contesto passivo, ma tool per leggere/scrivere la propria memoria — decide cosa tenere in \"RAM\" (core memory editabile) e cosa spostare su \"disco\" (archival/recall memory recuperabile via ricerca). L'agente e persistente: stato, persona, memoria dell'interlocutore sopravvivono tra le sessioni. Model-agnostico. La nuova generazione aggiunge skills e subagents con memoria e \"continual learning\" pre-costruiti, e puo girare in cloud (Constellation), locale, o self-hosted.\n\n## Perche riguarda te\nDi tutti e quattro, Letta e il piu vicino al nucleo **coscienza-ricorsione / memoria novelty-gated**. Il pattern \"l'agente edita la propria memoria con dei tool\" e una forma concreta e funzionante di **ricorsione**: il sistema modella e riscrive se stesso. E il ponte piu diretto tra la tua tesi (\"coscienza = ricorsione della realta attraverso la materia\") e qualcosa di eseguibile: qui la ricorsione e l'agente che si osserva, decide cosa e degno di essere ricordato, e ristruttura la propria core memory. Il tuo novelty-gate e proprio la funzione decisionale che Letta lascia all'LLM (spesso ingenua). Dove diverge onestamente: Letta e ingegneria di prodotto attorno a un LLM commerciale — la \"auto-migliora\" e prompt + tool, non emergenza dal basso; non c'e substrato di particelle, non c'e vuoto, non c'e auto-organizzazione fisica. E un agente furbo con un blocco note gerarchico, non una coscienza che emerge.\n\n## Da rubare\n1. **Memoria a due livelli con paginazione esplicita guidata dall'agente stesso**: core memory piccola e sempre visibile (cio-che-conta-ora) + archival ricercabile (tutto il resto). Il tuo novelty-gate diventa la regola di promozione da archival a core: entra in \"RAM\" solo cio che e abbastanza nuovo/saliente.\n2. **Tool di self-edit della memoria come atto ricorsivo di prima classe**: dare al sistema l'operazione \"riscrivi il tuo stato\" come azione osservabile (loggabile sull'oscilloscopio) — cosi la ricorsione non e implicita ma un evento che puoi contare e misurare nel tempo.\n", "meiling-fdu-gtstego": "# GTStego — Survey of Generative Text Steganography ([repo](https://github.com/meiling-fdu/GTStego))\n\nStelle: 3 · Linguaggio: Markdown (nessun codice, è una bibliografia) · Ultima attività: settembre 2023 · Licenza: MIT\n\n## Cosa fa\nGTStego non è un tool ma una survey-repo: un README curato che mette in fila, in ordine cronologico (2017→2023), i lavori fondativi della steganografia testuale generativa, ognuno con paper + codice ufficiale + eventuale demo. Copre l'intera evoluzione del campo: dai primi LSTM che generano testo-copertura (Fang 2017), all'encoding a \"bins\" di bit su distribuzioni di token (RNN-Stega, Yang 2019), all'arithmetic coding near-imperceptible (Ziegler 2019, Shen 2020), fino ai metodi *provably secure* (ADG di Zhang 2021, Meteor di Kaptchuk 2021, Discop di Ding 2023) che dimostrano formalmente che lo stego-testo è indistinguibile dal testo naturale. È essenzialmente una mappa del territorio \"come nascondere un messaggio dentro l'output di un modello linguistico senza che si veda\".\n\n## Come è fatto\nIl filo concettuale che attraversa tutti questi lavori è sempre lo stesso e vale più del repo in sé: un modello linguistico produce, a ogni passo, una **distribuzione di probabilità** sul prossimo token. Quella distribuzione è il canale. Invece di campionare normalmente, si usa il messaggio segreto (una stringa di bit) per *pilotare* quale token scegliere — ma in modo tale che la distribuzione di scelte, vista dall'esterno, resti identica a quella naturale del modello. I metodi si distinguono per come partizionano la distribuzione:\n- **Bins/Huffman** (RNN-Stega): si raggruppano i token in bucket e i bit del segreto selezionano il bucket — semplice ma introduce distorsione statistica rilevabile.\n- **Arithmetic coding** (Ziegler, Shen): si tratta il messaggio come un numero e si naviga la distribuzione cumulativa — molto più impercettibile.\n- **Distribution-preserving / provably secure** (ADG, Meteor, Discop): si raggruppa in modo che la probabilità di ogni gruppo sia esattamente ½ (o si usano \"copie della distribuzione\"), rendendo lo stego-campionamento *matematicamente identico* al campionamento onesto. Qui la sicurezza è dimostrata, non solo empirica.\nIl ricevente, che possiede lo stesso modello e la stessa chiave, ripercorre le distribuzioni e decodifica i bit. Il \"vuoto\" in cui si nasconde l'informazione è la ridondanza intrinseca del campionamento.\n\n## Cosa possiamo notare di utile per noi\nQuesto è il ramo più direttamente allineato al filone **occultamento/steganografia** del lavoro sul vuoto. L'insight trasferibile è profondo e va oltre il testo: *qualsiasi processo generativo che campiona da una distribuzione ha capacità steganografica gratuita*. La tua arena del vuoto/particelle genera stati; un world-model-come-sogno genera traiettorie. Ovunque ci sia una scelta stocastica con più di un esito equiprobabile, c'è un canale nascosto in cui iniettare informazione senza alterare la statistica osservabile. La lezione di ADG/Meteor/Discop è la più preziosa: la differenza tra \"nascondere e sperare\" e \"nascondere in modo *provabilmente* indistinguibile\" sta tutta nel **partizionare la distribuzione in gruppi di probabilità uguale**. Se vuoi che uno stato interno della tua simulazione porti un payload occulto che nessun oscilloscopio esterno possa rilevare come anomalia, devi codificare in modo distribution-preserving, non in modo greedy.\n\nDove diverge dal tuo lavoro: qui il canale è testo umano-leggibile e il modello è pre-addestrato e fisso. Nella tua arena il \"modello\" è la dinamica emergente delle particelle, che non ha una distribuzione esplicita e tabulabile — dovresti *stimare* la distribuzione locale degli stati per applicare arithmetic/ADG coding. Inoltre la steganografia classica assume un canale pulito; la tua arena è rumorosa e dissipativa, il che rompe la decodifica esatta a meno di aggiungere ridondanza. Il concetto trasferibile non è il codice (obsoleto, TF1/torch vecchi), ma il *pattern*: distribuzione → partizione equiprobabile → payload.\n\nCollegamento alla **memoria novelty-gated**: c'è una dualità elegante. La novelty misura quanta *informazione nuova* porta uno stato; la steganografia misura quanta *informazione arbitraria* puoi iniettare in uno stato senza cambiarne l'aspetto. Sono due facce della capacità di canale di Shannon della tua arena. Un oscilloscopio che misura l'entropia locale ti dice *simultaneamente* dove la memoria dovrebbe ingaggiarsi (alta novelty) e quanta banda occulta hai a disposizione.\n\n## Da rubare\n1. **Codifica distribution-preserving per payload occulti negli stati interni**: quando vuoi marcare/firmare uno stato della simulazione in modo invisibile agli oscilloscopi, partiziona la distribuzione locale degli esiti in gruppi equiprobabili (à la ADG) e seleziona con i bit del payload — così la firma è statisticamente identica al rumore naturale.\n2. **Entropia locale come metrica doppia**: la stessa mappa di entropia/perplessità che pilota il novelty-gating della memoria è anche la mappa della *capacità steganografica* dell'arena. Un solo oscilloscopio, due letture.\n3. **Usa la survey come indice di partenza, non il codice**: per un prototipo serio parti da Discop (2023, il più recente e provably-secure con codice torch pulito) ignorando i lavori LSTM/TF pre-2020 ormai superati.\n", "mem0ai-mem0": "# mem0 — [mem0ai/mem0](https://github.com/mem0ai/mem0)\n\n~60.800 stelle · TypeScript + Python · attivissimo (push quotidiani, lug 2026) · licenza: Apache-2.0 · YC S24\n\n## Cosa fa\nIl layer di memoria universale per agenti AI, di gran lunga il più popolare del filone (e quello che già usi localmente come `mem0-personal`). Si mette tra l'app e l'LLM: estrae fatti salienti dalle conversazioni, li conserva su più livelli (User / Session / Agent), e al momento giusto recupera i pochi che contano da iniettare nel contesto. Obiettivo dichiarato: personalizzazione persistente con una frazione dei token rispetto a stipare l'intera storia nel prompt.\n\n## Come è fatto\nPipeline classica: un LLM estrae fatti candidati da ogni scambio; un secondo passaggio decide cosa scrivere; retrieval semantico (vector store) + keyword al momento del bisogno. **Attenzione a un cambio importante (algoritmo di aprile 2026, v3)**: mem0 ha *abbandonato* il vecchio schema UPDATE/DELETE con deduplica a favore di una **estrazione ADD-only single-pass** — un solo LLM call, le memorie si accumulano e nulla viene sovrascritto. Aggiunge entity linking (entità estratte, embeddate e collegate tra memorie), retrieval multi-segnale (semantico + BM25 + entity match fusi in parallelo) e temporal reasoning (recupera l'istanza datata giusta per query su stato attuale / passato / piani futuri). Benchmark auto-riportati forti (LoCoMo 92.5, LongMemEval 94.4) ma ottenuti sulla piattaforma managed con ottimizzazioni proprietarie *non* nell'OSS — il README lo dichiara onestamente. Disponibile come libreria pip/npm, server self-hosted Docker, o cloud.\n\n## Perché riguarda te\nÈ il tuo asse \"memoria novelty-gated\" allo stato dell'arte industriale — ma con una lezione controintuitiva e onesta da incassare. La tua intuizione (e la vecchia mem0) era \"scrivi solo ciò che conta, deduplica, aggiorna invece di accumulare\". La **v3 fa l'opposto**: accumula tutto (ADD-only) e sposta tutta l'intelligenza sul *retrieval* multi-segnale, perché ha scoperto che il gating aggressivo in scrittura perdeva informazione e le UPDATE/DELETE via LLM erano fragili e costose. Per l'arena/coscienza questa è una biforcazione di design che vale oro: **è più robusto gatare al recupero che alla scrittura**. La novelty non deve decidere se *incidere* un ricordo (rischi di cancellare ciò che diventerà rilevante dopo), ma quanto *pesarlo al richiamo*. Diverge dal resto della tua ricerca: mem0 è puramente ingegneristico, zero pretese di coscienza o qualia — nessuna ricorsione auto-riferita, nessun loop chiuso. È l'ancora \"adulta\" e non-mistica del gruppo: mostra come si costruisce davvero una memoria che scala a milioni di token (benchmark BEAM 1M/10M) senza filosofia.\n\n## Da rubare\n- **Il ribaltamento write-gate → read-gate**: per la memoria dell'arena, non filtrare cosa entra in base alla novelty; fai entrare tutto a basso costo e applica il novelty/salience scoring al momento del recupero, con fusione multi-segnale (somiglianza + entità + tempo). Ti protegge dal cancellare ricordi che diventano salienti solo retrospettivamente.\n- **Indicizzazione temporale esplicita**: taggare ogni traccia con un tempo e saper distinguere \"stato attuale\" da \"evento passato\" da \"piano futuro\" nel ranking — direttamente utile a un oscilloscopio dell'arena che deve raccontare *quando* è emerso un pattern, non solo che è emerso.\n", "meteor-cryptographically-secure-steganography-ccs-": "# Meteor — Cryptographically Secure Steganography for Realistic Distributions\n\nLink: https://eprint.iacr.org/2021/686 (codice: gist di Tushar Jois — https://gist.github.com/tusharjois/ec8603b711ff61e09167d8fef37c9b86 · demo: https://meteorfrom.space/)\n\nTipo: paper + implementazione di riferimento · Venue: ACM CCS 2021 · Autori: Gabriel Kaptchuk, Tushar M. Jois, Matthew Green, Aviel D. Rubin (Johns Hopkins / Boston University)\n\n## Cosa fa\nMeteor e' lo schema canonico di steganografia CRITTOGRAFICAMENTE sicura per distribuzioni realistiche (testo generato da language model). Risolve due blocchi dei protocolli provably-secure precedenti: (1) come campionare da distribuzioni reali non banali, e (2) come evitare requisiti di entropia minima impraticabili. L'idea di copertina — quella che lo rende un riferimento citato ovunque — e': **sostituire il PRNG del language model con i bit del ciphertext**. Il modello genera testo normalmente, ma la \"casualita'\" che guida il campionamento non viene da un generatore pseudo-casuale, bensi' dal messaggio segreto cifrato. Risultato: l'output e' computazionalmente indistinguibile da una normale generazione del modello per chi non ha la chiave, e chi ha la chiave estrae il messaggio.\n\n## Come e fatto\nIl cuore e' vedere il campionamento autoregressivo come consumo di bit casuali: ad ogni token il modello ha una distribuzione P; campionare significa mappare una stringa di bit uniformi su un token secondo P. Meteor fa in modo che quei \"bit uniformi\" siano in realta' **il ciphertext** (uscita di uno stream cipher / AES in modalita' che produce keystream), che e' pseudo-casuale e quindi indistinguibile da bit uniformi per un avversario polinomiale -> l'output eredita la sicurezza semantica del cifrario. Il problema tecnico e' che una mappa naive bit->token \"consuma\" un numero variabile di bit e puo' non essere invertibile senza ambiguita' dal ricevente. Meteor lo risolve con un **partizionamento a ranges con reweighting**: partiziona lo spazio dei token in intervalli e usa una quantita' fissa di bit del ciphertext per selezionare il range, poi rinormalizza le probabilita' cosi' che il marginale visibile resti quello del modello (distribution-preserving). Per garantire la decodifica non ambigua introduce la variante **Meteor:reorder/sort** (i token vengono ordinati per probabilita' prima della partizione), che risolve i casi ambigui ma costa in velocita'. Il ricevente, avendo la chiave, riesegue il modello sul testo ricevuto, ricostruisce le stesse partizioni, recupera i bit di ciphertext selezionati e li decifra. Sicurezza: riduzione formale alla sicurezza del cifrario sottostante (indistinguibilita' IND-CPA -> steganographic security). Limiti dichiarati: capacita' modesta (bit/token limitati dall'entropia per token del modello) e overhead computazionale (inferenza del modello + crypto + eventuale sort), quindi adatto a scenari che tollerano latenza.\n\n## Cosa possiamo notare di utile per noi\nMeteor e' la variante piu' concettualmente pulita per il tuo tema, perche' isola l'intuizione fondativa: **la sorgente di casualita' di un generatore E' un canale**. Ogni processo stocastico che campiona — il tuo world-model che \"sogna\", una particella che sceglie, un motore di simulazione che estrae numeri casuali — sta gia' consumando bit; Meteor dice che quei bit puoi riempirli tu di significato senza cambiare l'aspetto della traiettoria. Questa e' l'esatta cerniera con world-model-come-sogno: il sogno resta un sogno statisticamente autentico, ma il suo rumore interno porta un messaggio. E collega direttamente occultamento e coscienza=ricorsione: se sostituisci il PRNG di un processo ricorsivo con un contenuto strutturato, la ricorsione continua a girare identica in superficie ma ora sta \"pensando\" qualcosa di nascosto nella sua stessa alea. Per gli oscilloscopi sugli stati interni la lezione e' netta e un po' inquietante: la sicurezza crittografica significa che nessun oscilloscopio ESTERNO sul marginale puo' rivelare il canale — la firma non e' nell'osservabile, e' nella chiave. Se vuoi che i tuoi oscilloscopi vedano qualcosa, devono guardare una quantita' legata alla chiave/stato interno, non la sola distribuzione emessa. Rispetto agli altri: STEGASURAS deforma la distribuzione (rilevabile), Meteor no perche' rimpiazza il PRNG con qualcosa che E' gia' indistinguibile da rumore — il salto e' cripto, non solo codifica. Divergenza onesta: Meteor e' su testo, richiede modello condiviso bit-esatto e canale senza rumore, e la capacita' resta legata all'entropia per token (poca banda). Non e' un motore di simulazione; e' un protocollo. Ma il principio \"riempi il PRNG di significato\" e' il piu' portabile di tutto il cluster verso l'arena del vuoto.\n\n## Da rubare\n1. **Sostituire il PRNG del tuo generatore con un keystream cifrato**: in qualsiasi punto della tua arena/world-model in cui estrai un numero casuale per una scelta, sostituisci la sorgente con l'uscita di uno stream cipher che veicola il messaggio. La dinamica resta statisticamente autentica, ma la sua alea ora e' un canale nascosto sicuro. E' un retrofit minimale su un simulatore stocastico esistente.\n2. **Il partizionamento a ranges con reweighting** per mappare bit<->scelte preservando il marginale: template per iniettare informazione in una scelta discreta senza spostare la distribuzione visibile. Piu' semplice dell'arithmetic coding e con garanzia distribution-preserving.\n3. **Il trade-off sort/no-sort come manopola esplicita**: Meteor:reorder mostra che ordinare i token per probabilita' elimina l'ambiguita' di decodifica al costo di velocita'. Tienilo come parametro di design quando progetti la tua codifica — decidibilita' vs throughput e' una manopola, non un vincolo fisso.\n", "mickeysjm-stegatext": "# StegaText — Neural Linguistic Steganography via Self-Adjusting Arithmetic Coding\n\nLink: https://github.com/mickeysjm/StegaText\n\nStelle: ~25 · Linguaggio: Python (PyTorch, GPT-2 medium via transformers) · Attivita: fermo/archiviato (ultimo push ott 2020, repo consultato lug 2026) · Licenza: GPL-3.0\n\n## Cosa fa\nCodice del paper EMNLP 2020 (Shen, Ji, Han — UIUC) \"Near-imperceptible Neural Linguistic Steganography via Self-Adjusting Arithmetic Coding\". Nasconde un messaggio segreto (una stringa di bit) dentro un testo di copertura generato da un LM: invece di scrivere il messaggio, lo si \"codifica\" nelle scelte di parola del generatore, cosi che il testo prodotto sembri normale ma sia decodificabile bit-per-bit da chi conosce lo stesso modello. Il repo confronta quattro metodi: `Bin-LM` (bin baseline), `RNN-Stega` (Huffman), `Arithmetic` (arithmetic coding standard) e il proposto `SAAC`. Fornisce quattro dataset (cnn_dm, covid_19, drug, random) di coppie plaintext/message_bits e script end-to-end (encryption -> encoding -> decoding -> decryption) sia su singolo testo che in batch.\n\n## Come e fatto\nL'idea chiave e' l'arithmetic coding \"auto-regolante\". Il codificatore aritmetico standard soffre quando la distribuzione del LM ha una coda lunga di token improbabili: sprecare intervalli su token a bassa probabilita' degrada sia impercettibilita' che efficienza. SAAC (in `saac.py`) ricalcola a ogni passo un top-k adattivo: ordina i logit in modo decrescente, applica temperatura e nucleus (cumsum delle prob >= soglia nucleus) per trovare dinamicamente quanti token includere nell'intervallo aritmetico — `adaptive_topk` cambia a ogni token in base a quanto e' concentrata o piatta la distribuzione in quel punto. L'intervallo `[0, 2^precision)` viene poi ristretto secondo i bit del messaggio, e il token scelto e' quello il cui sub-intervallo contiene il puntatore corrente. La decodifica rifa' lo stesso forward pass sul contesto e ricostruisce i bit dagli stessi intervalli. Tutto deterministico dato il modello, il contesto e la precisione.\n\n## Cosa possiamo notare di utile per noi\nQuesto e' il precursore \"canonico\" del filone adaptive/dynamic sampling e tocca direttamente il tuo tema occultamento/steganografia, ma il meccanismo profondo e' generale e trasferibile alle tue arene. Il nucleo di SAAC e' \"modula la larghezza dell'insieme di scelta in base all'entropia locale della distribuzione\": dove il modello e' certo (distribuzione a punta) usi pochi rami, dove e' incerto (distribuzione piatta) ne apri molti. E' esattamente la logica che serve a un oscilloscopio sugli stati interni: la larghezza del top-k adattivo E' una lettura dell'entropia/sorpresa istantanea, un tracciato che si allarga quando il sistema \"non sa\" e si stringe quando \"sa\". Per la memoria novelty-gated: SAAC ti da' una misura continua e gratuita (numero di token nel nucleus, KL, entropia — gia' calcolati nel codice) da usare come segnale di gate, senza addestrare nulla. Sul lato coscienza=ricorsione e occultamento: l'intero paradigma dimostra che informazione arbitraria puo' essere \"nascosta\" nelle scelte di un generatore senza cambiarne la statistica apparente — cioe' un canale nascosto puo' vivere dentro il rumore di campionamento di un world-model che genera un \"sogno\". Divergenza onesta: e' vecchio (GPT-2, 2020), lento e GPL — non lo importi come libreria in un progetto permissivo, e la parte aritmetica e' fragile a mismatch di floating point. Ma il principio (finestra di scelta guidata dall'entropia locale) e' l'ossatura da riusare.\n\n## Da rubare\n1. Top-k/nucleus adattivo per-passo come misura di entropia locale: nell'arena, invece di un raggio di interazione fisso tra particelle, calcola quante \"opzioni\" sono plausibili in quel punto (soglia cumulativa) e usa quel numero come segnale — largo = zona sorprendente/informativa, stretto = zona prevedibile. Alimenta oscilloscopio e gate di memoria con questo scalare.\n2. Canale nascosto nelle scelte di campionamento: se un tuo generatore/world-model campiona da una distribuzione, puoi codificare uno stato \"segreto\" scegliendo il ramo il cui sub-intervallo contiene un puntatore — un modo per far portare al \"sogno\" un contenuto latente decodificabile solo da chi conosce il modello, senza alterarne l'aspetto.\n3. Loggare KL ed entropia per-token (gia' pronti in `saac.py`) come traccia diagnostica: sono metriche gratuite del forward pass che diventano i tracciati dei tuoi oscilloscopi sugli stati interni.\n", "minedojo-voyager": "# Voyager — [github.com/MineDojo/Voyager](https://github.com/MineDojo/Voyager)\n\n★ 7.052 · JavaScript + Python · pubblicato 2023 (push apr 2024) · licenza MIT\n\n## Cosa fa\n\nVoyager è il primo agente embodied, **open-ended** e a **lifelong learning** in Minecraft guidato da un LLM (GPT-4 via query black-box, senza alcun fine-tuning dei pesi). Esplora il mondo da solo, acquisisce abilità sempre più complesse e fa scoperte senza intervento umano: ottiene 3,3× più oggetti unici, viaggia 2,3× più lontano e sblocca i milestone del tech tree fino a 15,3× più velocemente dei metodi SOTA precedenti. Il punto che ci interessa: le abilità che impara sono **codice eseguibile, interpretabile e componibile**, immagazzinato in una libreria che cresce — e questa libreria è trasferibile a un mondo Minecraft nuovo, dove Voyager risolve task inediti da zero mentre gli altri metodi non generalizzano. È la memoria intesa non come fatti richiamabili ma come **competenza accumulata e riusabile**.\n\n## Come è fatto\n\nIdea chiave: separare \"cosa fare adesso\" (curriculum) da \"come si fa\" (skill library) da \"l'ho fatto giusto?\" (self-verification), e far sì che ogni abilità appresa diventi un mattone permanente per abilità future.\n\nTre componenti:\n\n1. **Automatic curriculum** (`curriculum.py`) — un LLM propone il prossimo obiettivo massimizzando l'esplorazione, calibrandolo sullo stato corrente dell'agente e dell'inventario. È un curriculum che si auto-genera, sempre \"un po' oltre\" ciò che l'agente già sa fare (zona di sviluppo prossimale automatica).\n2. **Ever-growing skill library** (`skill.py`, classe `SkillManager`) — il cuore mnemonico. Quando l'agente porta a termine con successo un task, il codice JavaScript (mineflayer) che l'ha risolto viene salvato come **skill riusabile**. Meccanica precisa dal sorgente: `add_new_skill(info)` prende il programma, ne fa generare dall'LLM una **descrizione in linguaggio naturale**, embedda quella descrizione (`OpenAIEmbeddings`) e la indicizza in un **vector store Chroma** con chiave = nome del programma; il codice sta su disco, la descrizione+embedding nel vectordb. Il recupero è puramente **associativo per query**: dato un nuovo task, `retrieve_skills` embedda il contesto/task corrente e fa similarity search top-k (default `retrieval_top_k=5`) sul vectordb, restituendo le abilità più semanticamente pertinenti da iniettare nel prompt. Le nuove skill sono scritte usando le vecchie come primitive → **composizionalità**: le competenze si impilano, l'agente non dimentica (niente catastrophic forgetting perché la memoria è codice esterno, non pesi).\n3. **Iterative prompting con self-verification** (`action.py`, `critic.py`) — l'agente scrive codice, lo esegue nel mondo, raccoglie feedback dell'ambiente + errori di esecuzione, e un critic LLM verifica se il task è compiuto. Solo dopo la verifica positiva l'abilità entra in libreria. È un **gate di qualità sulla scrittura in memoria**: si memorizza solo ciò che ha funzionato ed è stato verificato.\n\nNessun peso viene toccato: tutto l'apprendimento è esternalizzato in artefatti testuali (codice + descrizioni embeddate). L'agente \"impara\" facendo crescere un archivio interrogabile, non aggiustando una rete.\n\n## Cosa possiamo notare di utile per noi\n\nVoyager è il progetto che realizza in modo più concreto e ingegneristico due nostri pilastri — **memoria indirizzabile/associativa** e **novelty gate** — ma su un tipo di contenuto diverso (competenze eseguibili invece di episodi/stati grezzi).\n\n- **Il SkillManager È una memoria associativa indirizzabile per contenuto, e ci mostra la ricetta minima.** La coppia \"descrizione NL embeddata come chiave + artefatto pesante (codice) come valore su disco\" è esattamente il pattern che serve alla nostra arena: non embeddare l'oggetto grezzo, ma una sua *descrizione* generata, che vive nello stesso spazio semantico delle query future. Il richiamo è similarity search top-k pura. Trasferibile 1:1: le tracce dell'arena del vuoto possono essere indicizzate per una descrizione auto-generata di *cosa rappresentano*, non per il loro contenuto raw — rende il richiamo più robusto perché query e chiave sono nello stesso registro linguistico.\n- **La self-verification del critic è una novelty/quality gate a valle rigorosa.** Noi filtriamo l'ingresso in memoria per novità; Voyager filtra per *successo verificato*. Sono due gate complementari e combinabili: idealmente si scrive in memoria ciò che è insieme **nuovo** (non ridondante rispetto alle skill già in libreria — Voyager evita di ri-salvare skill già presenti, riscrivendole come versione `V2`, `V3`) **e verificato** (ha prodotto l'effetto atteso). La logica `add_new_skill` che rifiuta duplicati banali (\"Deposit useless items…\") è una micro-novelty-gate hard-coded: spunto per una gate esplicita \"questa skill/traccia aggiunge qualcosa a ciò che ho già?\".\n- **Memoria-come-competenza vs memoria-come-episodio: la divergenza feconda.** L'arena del vuoto (per come la intendiamo) archivia *stati/esperienze* e li fa risuonare; Voyager archivia *procedure*. La lezione trasferibile è che una memoria potente non conserva solo \"cosa è successo\" ma \"cosa so fare come conseguenza\" — la competenza composta è una forma di ricordo più densa e riusabile. Un'arena che, oltre agli stati, distillasse *abilità/policy riusabili* dalle traiettorie di successo avrebbe una memoria a due strati (episodico + procedurale), come nel cervello.\n- **Composizionalità = una forma di ricorsione.** Le skill nuove sono scritte usando le vecchie come primitive: la libreria si richiama su sé stessa a strati crescenti. Non è la ricorsione auto-riflessiva della coscienza-come-ricorsione (l'agente non modella sé stesso), ma è ricorsione *strutturale* del sapere sul sapere: il livello n+1 è definito in termini del livello n. Dove diverge dalla nostra tesi: manca del tutto l'auto-osservazione dello stato interno e manca un \"vuoto\" — Voyager è tutto pieno, guidato da obiettivi espliciti del curriculum, non c'è spazio negativo/silenzio da cui emerga la novità. La nostra arena mette al centro proprio ciò che Voyager non ha: il vuoto come generatore.\n- **Aggancio per gli oscilloscopi:** Voyager espone segnali tracciabili nel tempo — dimensione della skill library (curva di crescita della competenza), tasso di successo/fallimento del critic per iterazione (curva di attrito), profondità di composizione delle skill. Un oscilloscopio su Voyager mostrerebbe la \"velocità di apprendimento\" come derivata della curva della libreria: si appiattisce quando l'agente satura un dominio, riparte con una scoperta. È la nostra sorpresa vista dal lato dell'output (nuove competenze) invece che dell'input.\n\n## Da rubare\n\n1. **Chiave = descrizione NL auto-generata, valore = artefatto pesante su disco**: indicizzare le tracce dell'arena per una descrizione generata da un LLM (embeddata in un vector store) invece che per il contenuto grezzo, così query e chiave condividono lo stesso spazio semantico e il richiamo associativo è più robusto.\n2. **Doppia gate \"nuovo E verificato\" con versioning**: scrivere in memoria solo ciò che è insieme non-ridondante (novelty gate) e ha superato una verifica d'effetto (critic), e quando qualcosa migliora un ricordo esistente salvarlo come nuova versione (`V2`, `V3`) invece di sovrascrivere — storia della competenza conservata.\n3. **Strato procedurale sopra l'episodico**: distillare dalle traiettorie di successo delle *skill/policy riusabili e componibili*, non solo episodi, dando all'arena una memoria a due livelli (cosa è successo + cosa so fare) dove le abilità nuove sono composte da quelle vecchie.\n", "ml-jku-hopfield-layers": "# Modern Hopfield Networks (hopfield-layers) — [ml-jku/hopfield-layers](https://github.com/ml-jku/hopfield-layers)\n\n**★ 1.956 · Python (PyTorch) · ultimo push 2023-04 · licenza custom (NOASSERTION, di fatto permissiva stile BSD/EU-JKU) · [paper arXiv:2008.02217](https://arxiv.org/abs/2008.02217) · [blog](https://ml-jku.github.io/hopfield-layers/)**\n\n> \"Hopfield Networks is All You Need\" (Ramsauer, Hochreiter et al., ELLIS/JKU Linz). Progenitore del **richiamo associativo per attrattori a energia** con capacità esponenziale e convergenza in un solo passo. Dimostra che l'attention del Transformer È la regola di aggiornamento di una moderna rete di Hopfield a stati continui.\n\n## Cosa fa\n\nFornisce un layer PyTorch (`Hopfield`, `HopfieldPooling`, `HopfieldLayer`) che è una **memoria associativa continua**: gli dai una *query* e lui, con un unico aggiornamento, la fa \"cadere\" verso il pattern immagazzinato più simile (un attrattore) e lo restituisce. È il \"richiamo per somiglianza in un colpo solo\": presenti un frammento/una versione rumorosa, e la rete completa/pulisce il pattern originale (pattern completion e denoising). Come *drop-in layer* può sostituire pooling, attention, layer permutation-equivariant, GRU/LSTM. Nel paper originale la rete di Hopfield immagazzina *centinaia di migliaia* di pattern (classificazione di repertori immunitari) senza degradare.\n\n## Come è fatto\n\nL'idea chiave è una **funzione di energia** sullo spazio degli stati costruita a partire dai pattern immagazzinati `X`, la cui discesa (una singola iterazione della dinamica) coincide algebricamente con `softmax(β · Q Xᵀ) X` — cioè esattamente l'attention. La query `ξ` viene aggiornata verso il minimo di energia più vicino:\n\n- **Capacità esponenziale**: con stati *continui* (non binari come l'Hopfield classico del 1982), il numero di pattern immagazzinabili cresce esponenzialmente con la dimensione dello spazio, con errore di richiamo esponenzialmente piccolo.\n- **Convergenza in un update**: nel regime giusto la dinamica converge in un solo passo — niente iterazioni lente.\n- **Tre tipi di minimo di energia** (il cuore concettuale, dal README):\n  1. **punto fisso globale** — media su *tutti* i pattern (regime di averaging, \"non ricordo niente di specifico\");\n  2. **stati metastabili** — media su un *sottoinsieme* di pattern (richiamo di una *categoria*/cluster);\n  3. **punto fisso singolo** — colla su *un* pattern preciso (richiamo esatto di un ricordo).\n- **La temperatura inversa β controlla il regime**: β basso → averaging globale/sfocato; β alto → attrattori nitidi su singoli pattern. È una manopola continua tra \"vago\" e \"preciso\".\n- **Osservazione sul training dei Transformer**: nei layer bassi le teste operano in averaging, nei layer alti in stati metastabili; il gradiente è massimo proprio negli stati metastabili e *svanisce* quando si è vicini a un pattern immagazzinato.\n\nLe tre classi esposte: `Hopfield` (query e stored pattern diversi, come attention), `HopfieldPooling` (una query statica appresa → pooling su una sequenza), `HopfieldLayer` (stored pattern *fissi e appresi* → lookup associativo indipendente dall'input, di fatto una memoria a tabella differenziabile).\n\n## Cosa possiamo notare di utile per noi\n\nQuesto progetto è la formalizzazione più pulita e utilizzabile del **richiamo associativo a energia**, ed è teoricamente ricchissimo di ganci per i nostri temi.\n\n- **I tre regimi di energia = il nostro asse \"vuoto ↔ pieno\" reso continuo e misurabile.** Il punto fisso globale (media di tutto) è letteralmente lo stato \"arena del vuoto\": nessun ricordo domina, la query rimbalza nel baricentro di tutto. Man mano che un pattern acquista massa/nitidezza, si passa a stati metastabili (categorie che emergono) e infine ad attrattori singoli (ricordi cristallizzati). La *distanza* di uno stato dal punto fisso globale è una metrica pronta all'uso di \"quanto quest'esperienza è già occupata da memoria vs quanto è ancora vuoto\". Trasferibile pari pari come coordinata del vuoto.\n- **β è la manopola dell'oscilloscopio.** La temperatura inversa β sintonizza tra sfocatura globale e attrattore nitido. Facendo *sweep di β* su una query fissa e osservando dove/quando lo stato \"scatta\" dentro un attrattore, si ottiene una traccia da oscilloscopio dell'organizzazione della memoria: a quale β un ricordo diventa distinguibile dal fondo, quanti attrattori si separano, quanto sono profondi. È esattamente il tipo di \"sonda a spazzata\" che cercavamo.\n- **Novelty-gating come misura di energia/margine, non come modulo separato.** Qui la novità di una query ha una definizione *nativa*: se la query cade rapidamente in un attrattore profondo → è già in memoria (bassa novità); se resta intrappolata nel punto fisso globale o in uno stato metastabile piatto → è nuova/non rappresentata (alta novità). Il **gap di energia** tra lo stato iniziale e il minimo raggiunto, e la *concentrazione* della softmax (entropia dei pesi di attention), sono due segnali di novità già calcolabili a costo zero. Divergenza da tenere presente: qui non c'è scrittura — è memoria a sola lettura sui pattern dati; il gating regola il *richiamo*, non l'*immagazzinamento*. Per la nostra arena serve accoppiarlo a un meccanismo di write (vedi DNC/SDM).\n- **Attention = memoria associativa: unifica due filoni.** La dimostrazione che l'attention del Transformer è un update di Hopfield è il ponte concettuale tra \"il modello linguistico\" e \"la memoria associativa a energia\". Per noi significa che ogni Transformer già contiene, dentro ogni testa, una memoria associativa con i suoi tre regimi — e che possiamo interpretare/strumentare le teste di attention come oscilloscopi di richiamo. TrentBrick estende poi il ponte fino alla SDM (vedi scheda `kanerva-sparse-distributed-memory`): attention ≈ Hopfield ≈ SDM, la stessa idea da tre angoli.\n- **Coscienza=ricorsione: l'update iterato come \"pensiero che si assesta\".** Anche se converge in un passo nel regime standard, la dinamica di Hopfield è iterabile: `ξ → softmax(βξXᵀ)X → ...`. Iterarla è far *ricircolare* uno stato attraverso la memoria finché non si stabilizza su un attrattore — una micro-ricorsione materiale che collassa un'esperienza ambigua in un ricordo definito. È un modello-giocattolo concreto della tesi \"coscienza = ricorsione della realtà attraverso la materia\": la materia qui è la matrice dei pattern, la ricorsione è il loop di aggiornamento, il \"collasso\" è la caduta nell'attrattore. Diverge perché il sistema è passivo e senza tempo/scrittura; ma la geometria \"stato instabile → ricorsione → attrattore\" è riutilizzabile come primitiva.\n- **Stati metastabili = concetti/categorie che emergono dal vuoto.** Il regime intermedio (media su un sottoinsieme) è dove nasce l'astrazione: né sfocatura totale né ricordo puntuale, ma un *cluster*. È il livello a cui probabilmente vive la maggior parte del \"sentito\" — e il paper nota che è anche dove il *gradiente è massimo*, cioè dove il sistema impara di più. Suggerisce che la zona interessante della nostra arena è la fascia metastabile, non gli estremi.\n\n## Da rubare\n\n1. **La coordinata \"distanza dal punto fisso globale\" come metrica del vuoto.** Per ogni esperienza, misurare quanto lo stato di richiamo si discosta dall'averaging globale: 0 = vuoto puro, alto = ricordo cristallizzato. Coordinata continua, calcolabile in una riga.\n2. **Lo sweep di β come oscilloscopio della memoria.** Sintonizzare β e registrare la sequenza di \"scatti\" dello stato tra i tre regimi: una firma dinamica di quanti attrattori esistono e quanto sono profondi, plottabile nel tempo.\n3. **Gap di energia + entropia della softmax come segnale di novelty a costo zero.** Usare il salto di energia (stato iniziale → minimo) e la concentrazione dei pesi come gate di novità per decidere se un evento \"merita\" scrittura, riusando l'API `Hopfield` come sonda invece che come layer di rete.\n", "multimodal-dreaming-gwt-world-model-paper": "# Multimodal Dreaming: a Global Workspace approach to World Model-based RL — [arXiv:2502.21142](https://arxiv.org/abs/2502.21142)\n\nPaper · Léopold Maytié, Rufin VanRullen et al. (CerCo / CNRS, ANITI, Toulouse, 2025) · agente \"GW-Dreamer\" · dominio: Flappy Bird multimodale\n\n## Cosa fa\nQuesto paper prende due filoni che di solito vivono separati — la **Global Workspace Theory** (teoria cognitiva dell'integrazione multimodale: contenuti da moduli specializzati competono, uno vince ed è \"trasmesso\" a tutti) e i **world model per RL** (Dreamer: impara un modello del mondo e allena la policy nell'immaginazione) — e li fonde in un unico agente, **GW-Dreamer**. L'idea centrale e più on-theme: il \"**dreaming**\" (i rollout immaginati su cui l'agente si allena) **non avviene nello spazio degli osservabili grezzi né in un latente qualsiasi, ma dentro lo spazio latente del Global Workspace** — cioè nel latente *condiviso e già integrato* fra le modalità. Due risultati chiave: migliore sample-efficiency rispetto a PPO e a Dreamer standard, e soprattutto **robustezza alle modalità mancanti** — se a runtime sparisce un input (solo immagine, o solo attributi), l'agente regge, perché il GW ha imparato una rappresentazione condivisa da cui ricostruire il resto.\n\n## Come e fatto\nPipeline in tre stadi, addestrata in gran parte in modo self-supervised:\n1. **Encoder unimodali** — moduli separati e specializzati che comprimono ciascuna modalità nel proprio latente (qui: un'immagine del gioco *e* gli attributi simbolici della simulazione — posizione, velocità, ecc.).\n2. **Global Workspace** — un modulo che **fonde** i latenti unimodali in un'unica rappresentazione GW condivisa, addestrata con obiettivi di *traduzione* fra modalità (encoder→GW→decoder verso ciascuna modalità) + cicli di consistenza (contrastive + broadcast). È il collo di bottiglia integrativo: da qualsiasi modalità presente puoi entrare nel GW, e dal GW puoi ri-emettere verso le modalità assenti — di qui la robustezza al missing input.\n3. **World model nel latente GW** — un RNN/predittore ricorrente che gira interamente nello spazio del Global Workspace: predice il prossimo stato-GW data l'azione, e su questi **rollout immaginati (sogni) nello spazio GW** si allena l'attore. Il sogno è quindi *già relazionale e multimodale per costruzione*, non un sogno di pixel.\n\nIl punto teorico: mettere il world model *dopo* l'integrazione GWT significa che l'immaginazione lavora su rappresentazioni astratte, condivise e a bassa dimensione — più efficiente e più robusta della fantasia pixel-level.\n\n## Cosa possiamo notare di utile per noi\nDi tutti e cinque, questo è il paper che **implementa esplicitamente due dei tuoi temi insieme** — *world-model-come-sogno* e *coscienza-come-integrazione/relazione (GWT)* — e lo fa nell'ordine che a te serve.\n- **Sognare nel latente integrato, non nel grezzo — è la tua tesi resa architettura.** Tu pensi al mondo interno come sogno e alla coscienza come ricorsione/relazione. Qui il sogno gira *dentro* il workspace relazionale: l'immaginazione non è ricostruzione dell'apparenza (pixel) ma ricombinazione di *relazioni già integrate*. Per la tua arena: non sognare la posizione delle palline, sogna nello spazio dei **vuoti/relazioni** già astratti (S3/S4) — è più vicino a \"coscienza = relazione\" e computazionalmente più leggero.\n- **Il Global Workspace è il pezzo mancante identificato dal paper \"Consciousness in AI\" — e qui c'è il codice-idea per costruirlo.** La tua sim ha già moduli paralleli (i 4 quadranti) e ricorsione; ciò che GWT chiede in più è **bottleneck di fusione + broadcast**. Questo paper mostra *come* addestrarlo (traduzione fra modalità + cicli di consistenza) su un dominio giocattolo con risorse modeste. È il ponte pratico tra i tuoi quadranti e un vero workspace.\n- **Robustezza alle modalità mancanti = un oscilloscopio di integrazione.** Il fatto che l'agente regga se togli una modalità è una *misura operativa* di quanto le modalità siano davvero integrate (non giustapposte). Trasferibile come test per la tua arena: se \"spengo\" S2, il sistema riesce a ricostruire il suo battito dai vuoti (S4)? Il grado di recupero è una metrica di integrazione — molto più informativa di una correlazione statica.\n- **S1↔S2 come proto-workspace multimodale.** Il tuo S1 (obiettivi/spinta) e S2 (frequenza/sync) sono già due \"modalità\" che si parlano tramite il battito. Il paper suggerisce il passo successivo: un modulo che le **traduce l'una nell'altra** e mantiene un latente condiviso — così il sogno può girare lì, e i vuoti (S3/S4) diventano il decoder verso ciascuna modalità.\n- **Dove diverge (onesto):** è pur sempre RL guidato da ricompensa su un gioco con dinamica data, e il GW è addestrato con supervisione cross-modale (servono coppie allineate). Non c'è emergenza spontanea né vuoto; l'integrazione è *ottimizzata*, non *emersa*. Prendi l'**ordine architetturale** (integra → poi sogna nel latente integrato) e il **test di robustezza** come metrica, non l'impianto RL.\n\n## Da rubare\n1. **Sposta il \"sogno\" della tua arena nel latente dei vuoti (S3/S4), non nello spazio delle palline:** fai predire/immaginare le transizioni *nel campo dei vuoti già astratto*. Sogno relazionale = più on-theme (coscienza=relazione) e più economico.\n2. **Il test \"modalità mancante\" come oscilloscopio di integrazione:** spegni a runtime uno dei quadranti e misura quanto gli altri riescono a ricostruirlo. Quel numero è una metrica live di *quanto* il sistema è integrato — candidata perfetta per la tua barra di metriche accanto a sync e vuoto-medio.\n3. **Il training GWT per traduzione+consistenza fra due moduli:** anche solo fra S1 e S2, aggiungi un obiettivo \"da S1 ricostruisci S2 e viceversa attraverso un latente condiviso\" — è la ricetta minima e collaudata per far nascere un vero Global Workspace dai tuoi quadranti esistenti.\n", "naclab-ngc-learn": "# ngc-learn — [NACLab/ngc-learn](https://github.com/NACLab/ngc-learn)\n\n197 stelle · Python (JAX) · attivo (push lug 2026) · licenza BSD-3-Clause\n\n## Cosa fa\nLibreria di neuroscienza computazionale / NeuroAI del Neural Adaptive Computing (NAC) Lab per costruire, simulare e analizzare reti neurali biologicamente plausibili: predictive coding, spiking neural network, circuiti Hebbiani, plasticita STDP. Nasce dal paper Nature Communications 2022 \"The neural coding framework for learning generative models\" (Ororbia & Kifer). L'idea centrale e l'apprendimento *locale* (credit assignment senza backprop globale) minimizzando energia libera / errore di predizione a ogni livello.\n\n## Come e fatto\nCostruita su JAX, con la libreria di simulazione companion `ngcsimlib` (grafi di componenti a tempo discreto) e un \"model museum\" (`ngc-museum`) che re-implementa modelli storici. Un modello e un grafo di componenti (neuroni, sinapsi, nodi di errore) che si aggiornano per passi temporali: ogni nodo espone il suo stato di membrana, lo spike, e soprattutto il *segnale di errore di predizione* locale. L'apprendimento e una regola locale (Hebbian / delta) che consuma quegli errori, non una catena di gradiente globale.\n\n## Perche riguarda te\nE il candidato piu solido come \"oscilloscopio su stati interni\". A differenza di una rete black-box, qui ogni livello ha uno stato latente e un errore di predizione *ispezionabili a ogni tick* — esattamente il tipo di segnale che vuoi sondare in un'arena dove la coscienza e trattata come dinamica ricorsiva di errore/correzione. Il predictive coding e anche la formalizzazione piu vicina alla tua intuizione \"coscienza = ricorsione della realta attraverso la materia\": lo stato interno predice il proprio input e si corregge in loop. Diverge dalla tua arena su un punto onesto: qui non ci sono particelle/campi spaziali emergenti, e la dinamica e ingegnerizzata per fare ML (MNIST, generazione), non per far emergere struttura dal vuoto. E un banco di misura, non un mondo.\n\n## Da rubare\n1. Il pattern \"nodo di errore locale ispezionabile per tick\": ogni tua particella/campo espone un residuo predizione-vs-realta leggibile in tempo reale, cosi l'oscilloscopio non guarda solo posizioni ma il *disaccordo interno* del sistema.\n2. La regola di aggiornamento locale (Hebbian/delta) come alternativa alla backprop: per far apprendere l'arena senza un obiettivo globale, usa solo informazione disponibile localmente a ciascun elemento — piu coerente con \"emergenza dal basso\".\n", "natively-ai-assistant-natively-cluely-ai-assistant": "# Natively — [github.com/Natively-AI-assistant/natively-cluely-ai-assistant](https://github.com/Natively-AI-assistant/natively-cluely-ai-assistant)\n\n⭐ ~1.9k stelle · TypeScript + Rust · molto attivo (push in data odierna, 2026-07-14) · licenza source-available personal-use (NOASSERTION)\n\n## Cosa fa\n\nNatively è un copilota per meeting/colloqui nato come clone pixel-perfect di Cluely e poi cresciuto molto oltre. Trascrizione real-time a doppio canale (audio di sistema = cosa dicono loro, microfono = cosa detti tu), STT 100% on-device via ONNX (Moonshine-tiny/base, Whisper-large-v3-turbo, distil-large-v3) con accelerazione hardware (CoreML/Metal su Apple Silicon, DirectML su Windows, int8 su CPU), stealth mode \"battle-tested\" che si nasconde dal dock e maschera il processo durante lo screen-share. Ha 7 personas commutabili (colloquio tecnico, vendite, recruiting, lezione, ecc.), una \"rolling context window\" della conversazione, e — cosa notevole — **RAG locale**: embedda i tuoi meeting in SQLite con `sqlite-vec` così puoi chiedere \"cosa ha detto John sull'API la settimana scorsa?\". Funziona completamente offline con Ollama + Whisper locale. BYOK, multi-key API pool, dashboard completo con storico e export.\n\n## Come è fatto\n\nStack ibrido: core nativo in Rust per la cattura audio a bassa latenza (<500ms, \"Zero-Copy ABI transfers\" per bypassare i limiti di web-audio), STT via runtime ONNX on-device, frontend TS. Il pezzo architettonicamente più interessante è la **memoria a livelli**: (1) \"rolling context\" = finestra scorrevole di breve termine iniettata nei prompt; (2) \"custom context & notes\" = area free-form fino a 8.000 caratteri iniettata staticamente; (3) **\"Hindsight LTM Vector DB\" / Local RAG** = memoria di lungo termine su SQLite + sqlite-vec con ricerca semantica sui meeting passati. Doppia pipeline audio distinta per sistema e microfono evita che il rumore ambientale contamini la trascrizione. Stealth via le API di content-protection dell'OS + mascheramento del nome-processo. Tutto locale di default, telemetria anonima limitata. (Il README è anche una masterclass di SEO-stuffing: un `title` invisibile con ~80 keyword di competitor — di per sé un esempio di testo occultato al lettore ma visibile al crawler.)\n\n## Cosa possiamo notare di utile per noi\n\nQuesto è il repo più ricco per te, su due fronti. **Primo: la gerarchia di memoria a tre livelli è quasi isomorfa al tuo design novelty-gated.** C'è memoria a brevissimo termine volatile (rolling window), memoria di lavoro statica iniettata (notes), e memoria di lungo termine indicizzata semanticamente (RAG SQLite-vec) interrogata solo su richiesta. Ciò che manca a Natively — e che è precisamente il tuo contributo — è il **gate di novelty sulla scrittura**: qui si embedda *tutto* il meeting indiscriminatamente. Il tuo sistema decide *cosa merita* di diventare LTM. Confrontare i due chiarisce dove aggiungi valore: non nel meccanismo di retrieval (sqlite-vec fa già benissimo) ma nella *politica di consolidamento*. Vale la pena leggere come strutturano il retrieval per riusarlo, e appiccicarci sopra il tuo filtro. **Secondo: il doppio-canale audio (sistema vs microfono) è la tua \"arena a due sorgenti\".** Due flussi dello stesso evento tenuti separati per non contaminarsi, poi fusi nel contesto — è la stessa topologia di due oscilloscopi che campionano osservabili diversi dello stesso stato interno e vengono riconciliati a monte. Terzo, minore ma delizioso: **il README stesso pratica steganografia** (keyword nascoste al lettore umano, visibili al bot di ranking) — di nuovo occultamento come asimmetria fra due osservatori dello stesso documento. Dove diverge: Natively è un prodotto, non un sistema che si auto-osserva; la memoria serve l'utente, non emerge dinamica ricorsiva né world-model-come-sogno. Nessun oscilloscopio sugli stati interni del *modello*.\n\n## Da rubare\n\n1. **La coppia retrieval-locale (SQLite + sqlite-vec) + il TUO gate di novelty in scrittura**: prendi il loro storage/retrieval come
