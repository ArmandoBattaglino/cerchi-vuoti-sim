 quella sorpresa con un momentum che decade, e cancella il vecchio con un forget-gate adattivo dipendente dal flusso. Sono tre scalari per-step, implementabili anche nella tua sim JS.\n2. **Sorpresa-come-gradiente come segnale d'oscilloscopio:** plottare ‖∇ℓ‖ nel tempo ti dà un oscilloscopio della *novità percepita dall'arena* — un tracciato che si accende esattamente quando succede qualcosa di non-predetto nel campo dei vuoti. Metrica live gratuita e molto on-theme.\n3. **Forget-gate adattivo (weight decay dipendente-dai-dati):** invece del tuo attrito globale costante, un \"attrito della memoria\" che si adatta — congela poco quando il sistema *churna* di novità, congela molto quando è banale. È il ponte tra il tuo slider \"attrito\" e una gestione principled della saturazione.\n", "transcenduality-primordis": "# Primordis — [Transcenduality/primordis](https://github.com/Transcenduality/primordis)\n\nStelle: 43 · Linguaggio: Python (moderngl/GLSL compute) · Attività: attivo (ultimo push giugno 2026) · Licenza: MIT\n\n## Cosa fa\n\nPrimordis è un simulatore di \"particle life\" GPU-accelerato in cui comportamenti life-like — nuotatori, bruchi e soprattutto **strutture multicellulari** — emergono da nulla se non interazione locale tra particelle, forze e memoria genetica. Non ci sono cellule hardcoded né logica genetica esplicita: ci sono 16.000 particelle, ognuna con un **genoma vettoriale a 6 dimensioni** (unit vector), che interagiscono via forze attrattive/repulsive modulate dalla *compatibilità genetica* (prodotto scalare tra genomi). L'autore ha calibrato i parametri per massimizzare complessità ed emergenza di organismi persistenti, documentati in una cartella `Atlas/` con screenshot nominati (amoeba, bacteria, caterpillar, cyclops, eggcarriercell, fastswimmer, glider, halocell, macroorganism, multicell, swimmer, worm…). La novità dichiarata della versione recente è l'**evoluzione genetica**: i genomi non sono più fissi ma derivano nel tempo per selezione/divergenza.\n\n## Com'è fatto\n\nTutto il cuore è in un singolo file `Primordis.py` (~16 KB) che è essenzialmente un orchestratore Python attorno a tre compute shader GLSL (`#version 430`). Il ciclo per frame: (1) `clear_counts` azzera i bin; (2) `binning_shader` assegna ogni particella a una cella di una griglia spaziale 64px con `atomicAdd` (spatial hashing per ridurre l'interazione a O(vicini) invece di O(N²), max 256 particelle/bin); (3) `interaction_shader` calcola, per ogni particella, la forza dai vicini nel raggio 128px con wrapping toroidale del mondo. La regola di forza è il punto chiave: sotto una distanza di \"personal space\" (derivata dal 4° gene) c'è repulsione forte; sopra, attrazione proporzionale alla `compatibility = dot(my_genome, other_genome)`. La rendering usa point sprite con colore = `genome.xyz * 0.5 + 0.5` (i primi 3 geni diventano RGB), così organismi geneticamente coerenti hanno lo stesso colore. Il meccanismo evolutivo più notevole è **contro-intuitivo: divergenza genetica invece di omogeneizzazione**. Quando due particelle sono *troppo* simili (`similarity > 0.5`), il codice spinge il genoma *lontano* da quello del vicino (`genetic_repulsion[g] += (my_genome[g] - other_genome[g]) * force`) e poi ri-normalizza il genoma su sfera unitaria. Questo impedisce il collasso in un'unica specie e mantiene attivamente la diversità. Due slider runtime (ratio repulsione/attrazione, drift/friction) permettono di esplorare i regimi a mano.\n\n## Cosa possiamo notare di utile per noi\n\nQuesto è quasi letteralmente la tua **arena del vuoto/particelle**, scritta bene e ottimizzata su GPU. È la reference tecnica più diretta di tutto il corpus per la parte di substrato. Punti da assorbire:\n\n- **Genoma come vettore continuo su sfera unitaria + interazione per prodotto scalare.** Invece dei \"tipi\" discreti del particle-life classico (Hunar4321 usa una matrice tipo×tipo), qui l'identità di ogni particella è un punto su S⁵ e la forza è `dot(gi, gj)`. Questo dà uno spazio di specie *continuo e differenziabile*, molto più adatto a una nozione fluida di \"identità\" e di novità. Per il tuo lavoro: l'identità di una particella nel vuoto può essere una direzione in uno spazio latente, non un'etichetta.\n- **Divergenza genetica = novelty-gate implementato nel substrato.** Questa è la connessione più forte con la tua **memoria novelty-gated**: qui la spinta a divergere dai vicini troppo simili è esattamente un gate anti-ridondanza, ma operante sulla *dinamica delle particelle* invece che sulla scrittura in memoria. Loro divergono per soglia fissa (0.5) con forza fissa (0.1); tu potresti rendere quella soglia funzione di una vera metrica di sorpresa/densità locale, chiudendo il cerchio tra \"novelty-gate della memoria\" e \"novelty-gate del substrato\". È il pezzo trasferibile più prezioso.\n- **Emergenza multicellulare senza codice per la multicellularità.** L'Atlas dimostra che organismi persistenti nascono da sole 3 forze locali + genoma + tempo. Questo valida empiricamente la tua tesi di fondo (coscienza/vita = ricorsione della realtà attraverso la materia, non design esplicito): nessuna riga di codice dice \"fai un bruco\", eppure il bruco emerge, si muove e persiste. È la miglior prova a costo quasi-zero che l'emergenza regge.\n- **Dove diverge / cosa manca (opportunità per te).** Primordis non ha memoria di lungo termine, non ha oscilloscopi sugli stati interni (solo 2 slider e il colore), non ha alcuna nozione di world-model/sogno né di occultamento. È substrato puro senza introspezione. Qui è dove il *tuo* valore aggiunto vive: prendere questo substrato e appenderci sopra gli strumenti (oscilloscopi sui campi di forza/genoma, log di novità per cella, fasi di \"consolidamento\" offline). Loro hanno il corpo; a te interessa dargli l'auto-osservazione.\n\n## Da rubare\n\n1. **La regola di divergenza genetica** (righe dell'`interaction_shader`: sopra `similarity > threshold`, spingi il genoma via dal vicino e ri-normalizza). Riproducila nella tua arena come *novelty-gate del substrato*, ma con `threshold` e `force` guidati da una metrica di sorpresa locale invece che costanti — così la novità del substrato e la novità della memoria diventano lo stesso meccanismo.\n2. **Genoma vettoriale continuo → colore diretto** (`genome.xyz*0.5+0.5` come RGB): un oscilloscopio gratis dell'identità. Mappa direttamente lo stato latente di ogni particella sul canale visivo, così l'occhio legge la diversità/coerenza senza strumenti extra.\n3. **Spatial binning con atomicAdd su compute shader** come scheletro di performance: 16k particelle a 60fps con vicinato toroidale in ~200 righe di GLSL. È la base pronta all'uso per scalare la tua arena su GPU senza reinventare l'ottimizzazione O(N²)→O(vicini).\n", "transformerlensorg-transformerlens": "# TransformerLens — [TransformerLensOrg/TransformerLens](https://github.com/TransformerLensOrg/TransformerLens)\n\n3.671 stelle · Python · attivo (push lug 2026) · licenza MIT\n\n## Cosa fa\nTransformerLens è la libreria di riferimento per l'interpretabilità meccanicistica dei modelli GPT-style: prende un modello addestrato e ti dà accesso completo alle sue attivazioni interne durante il forward pass. Carica 9.000+ modelli open source su 50+ famiglie architetturali e ti permette di fare cache di qualsiasi attivazione interna (residual stream, output di ogni testa di attenzione, MLP, ecc.). Non solo leggere: puoi inserire funzioni (\"hook\") che *modificano, rimuovono o sostituiscono* le attivazioni mentre il modello gira. È lo strumento con cui si fanno activation patching, ablation, direct logit attribution, ricerca di circuiti e induction heads.\n\n## Come è fatto\nL'idea chiave è il sistema di **hook points**. Ogni tensore interessante nel forward pass è avvolto in un `HookPoint` identificato da un nome canonico (es. `blocks.3.attn.hook_z`). Con `run_with_cache` catturi tutte queste attivazioni in un dizionario; con `run_with_hooks` registri callback che ricevono il tensore e il contesto e possono restituirne una versione modificata. Questo trasforma il modello da scatola nera in un banco strumenti dove ogni segnale interno è un connettore accessibile. La v3 introduce `TransformerBridge`, un adattatore che mappa i pesi grezzi di HuggingFace preservando la numerica esatta (con una modalità di compatibilità che ripristina il folding di LayerNorm e il centering dei pesi del vecchio `HookedTransformer`). La convenzione dei nomi degli hook è ciò che rende gli esperimenti riproducibili e condivisibili.\n\n## Cosa possiamo notare di utile per noi\nQuesto è il **banco-oscilloscopio di riferimento**, e la lezione più forte per il tuo lavoro non è il transformer in sé ma l'**architettura degli hook**:\n- **Ogni segnale interno deve avere un nome canonico e un punto di aggancio**. Se vuoi costruire oscilloscopi sull'arena del vuoto / sulle particelle / sugli stati del world-model, la mossa vincente è instrumentare la simulazione con `HookPoint` nominati in modo sistematico (`arena.step.field`, `particle.42.state`, `worldmodel.latent`). Una volta che ogni stato ha un nome stabile, sonde, logging, visualizzazione e *interventi* diventano gratis e componibili — non devi cablare a mano ogni osservazione.\n- **Read + Write dallo stesso punto**: la vera potenza di TransformerLens è che l'hook non solo legge ma *scrive*. Per la tua ricerca questo abilita gli **esperimenti causali**: non \"guardo lo stato del vuoto\", ma \"sostituisco lo stato del vuoto con quello di un'altra run e vedo cosa cambia\" (activation patching). È il modo per passare da correlazione a causalità sui tuoi fenomeni emergenti — es. iniettare uno stato \"novel\" e vedere se il sistema lo propaga o lo assorbe.\n- **Ablation come test di necessità**: azzerare una componente e misurare il degrado dell'output è il modo canonico per scoprire \"quale parte del substrato è portante\". Applicabile a \"quale particella / quale regione del vuoto è necessaria perché emerga il pattern\".\n- **Ricorsione e circuiti**: il campo cerca \"circuiti\" — sottografi che implementano un algoritmo. La tua tesi coscienza=ricorsione può essere resa operativa cercando cicli di feedback nel tuo sistema con gli stessi strumenti (patching + ablation) usati per gli induction heads.\n- **Dove diverge**: TransformerLens opera su una rete a strati con forward pass fisso e differenziabile; la tua arena è un sistema dinamico/temporale, potenzialmente non differenziabile. L'analogia dei layer diventa l'analogia dei *timestep*: fai cache e patching lungo l'asse tempo, non l'asse profondità.\n\n## Da rubare\n1. **Sistema di HookPoint nominati per la simulazione**: avvolgi ogni stato interno della tua arena/particelle/world-model in un punto di aggancio con nome canonico stabile, così logging, sonde e interventi diventano componibili e condivisibili come esperimenti.\n2. **`run_with_cache` come primitiva di osservazione**: una singola chiamata che gira la simulazione e restituisce un dizionario completo di tutti gli stati interni di quel run — la base per ogni oscilloscopio successivo.\n3. **Activation patching temporale per la causalità**: sostituisci lo stato interno da una run in un'altra (o iniettane uno \"novel\") e misura la divergenza dell'evoluzione — il test causale per capire cosa il vuoto propaga, assorbe o dimentica.\n", "versestech-axiom": "# AXIOM (VERSES) — [github.com/VersesTech/axiom](https://github.com/VersesTech/axiom)\n\n79 stelle · Python (JAX) · ultimo push giu 2025 · licenza VERSES Academic Research (non-OSI, uso accademico)\n\n## Cosa fa\nImplementazione dell'architettura AXIOM descritta nel preprint \"AXIOM: Learning to Play Games in Minutes with Expanding Object-Centric Models\" (arXiv 2505.24784). E' un agente che impara a giocare ai giochi del benchmark Gameworld 10k in pochi minuti, senza reti neurali addestrate a gradient descent: tutto e' inferenza bayesiana su modelli generativi. Il punto forte e' la data-efficiency estrema (minuti, non milioni di frame) e la struttura che cresce da sola man mano che scopre nuovi oggetti/dinamiche.\n\n## Come e' fatto\nIl cuore e' una pila di \"mixture models\" object-centric, tutti coniugati e aggiornati per variational inference (cartella `axiom/vi/`, con famiglie esponenziali, distribuzioni MVN/multinomiali, trasformazioni lineari). I modelli sono cinque, componibili:\n- **sMM** (slot mixture) — segmenta la scena in slot/oggetti;\n- **iMM** (identity) — assegna identita' agli oggetti;\n- **tMM** (transition) — dinamica per-oggetto;\n- **rMM** (recurrent/relational) — interazioni fra oggetti;\n- **hsMM** — dinamica temporale a livello di sequenza.\nL'idea chiave: la struttura non e' fissa. I mixture aggiungono componenti quando i dati lo richiedono (\"expanding models\"), e un passo di **Bayesian Model Reduction** (bmr) pota le componenti ridondanti. Niente backprop: si aprono e si chiudono ipotesi. Il planner (`planner.py`) fa rollout su questi modelli generativi — letteralmente pianifica \"sognando\" traiettorie nel proprio world model.\n\n## Perche' riguarda te\nE' la versione rigorosa e funzionante di \"world model come sogno interno\" e di \"emergenza/auto-espansione della struttura\" — due cose che nell'arena del vuoto tendi a mettere a mano. Qui l'apertura di nuove componenti *e'* la nascita di nuova struttura, e la Bayesian Model Reduction *e'* un gate di novelty/parsimonia: si tiene solo cio' che spiega meglio riducendo la complessita'. E' l'analogo matematico pulito della tua \"memoria novelty-gated\": non salvi tutto, salvi cio' che aumenta l'evidenza. Diverge dai tuoi temi su un punto onesto: AXIOM non ha nessuna pretesa di coscienza ne' di ricorsione riflessiva — e' puro controllo/percezione data-efficient. Non troverai qui l'anello che guarda se stesso; troverai il substrato che fa emergere e potare oggetti in modo principiato.\n\n## Da rubare\n1. **Il ciclo espandi/pota come motore di novelty.** Nell'arena: quando un pattern non e' spiegato dalle componenti esistenti, apri una componente nuova (emergenza); periodicamente lancia un passo tipo-BMR che fonde/elimina le componenti che non guadagnano evidenza. Diventa un criterio quantitativo — non estetico — di \"cosa merita di esistere/essere ricordato\".\n2. **Planning come rollout dentro il modello generativo.** Invece di simulare l'ambiente reale per decidere, campiona traiettorie dal world model interno e scegli su quelle. E' il \"sogno\" reso operativo e leggibile su un oscilloscopio: puoi visualizzare le rollout immaginate vs quelle realizzate.\n", "wmayner-pyphi": "# PyPhi — A toolbox for Integrated Information Theory (wmayner/pyphi)\n\nLink: https://github.com/wmayner/pyphi\n\n426 stelle · Python · attivo (push luglio 2026) · licenza GPLv3\n\n## Cosa fa\nPyPhi e' l'implementazione canonica della Integrated Information Theory (IIT) di Tononi. Dato un **substrato** (una rete di unita con le sue probabilita di transizione) e uno **stato**, calcola **Φ** (phi, l'informazione integrata del sistema) e la **struttura causa-effetto** che il sistema specifica: le distinzioni (meccanismi irriducibili) e le relazioni che le legano. Il branch principale implementa IIT 4.0 (Albantakis et al., 2023); la linea 1.x su PyPI mantiene IIT 3.0. E' lo strumento formale di riferimento per chiunque voglia misurare \"quanta coscienza / integrazione\" attribuisce IIT a un sistema.\n\n## Come e' fatto\nL'oggetto centrale e' il **substrate**: un sistema descritto dalla sua transition probability matrix (come ogni unita risponde allo stato delle altre). Su questo PyPhi calcola:\n- **Φ** cercando la **partizione minima** — il taglio del sistema che fa la minima differenza alla sua struttura causa-effetto. Se anche il taglio migliore distrugge molto, il sistema e' integrato (Φ alto); se un taglio non cambia nulla, il sistema e' scomponibile (Φ ~ 0). E' letteralmente \"quanto il tutto e' piu della somma delle parti\", reso numero.\n- La **Φ-structure**: l'insieme delle distinzioni cause-effetto e delle loro relazioni geometriche.\nAttorno al core c'e' un toolkit ampio: actual causation (quale evento passato ha *davvero* causato il presente), matching/percezione (quanto la struttura causale del sistema combacia con quella dell'ambiente — la base della \"significazione intrinseca\" in IIT), coarse-graining micro/macro (a quale scala spaziale/temporale l'integrazione e' massima), stime del substrato da dati osservati, generazione di substrati da modelli di Ising, e visualizzazione. Il costo computazionale e' combinatorio (esplora partizioni), quindi molto del lavoro recente e' su bound analitici e caching/parallelismo.\n\n## Perche riguarda te\nPyPhi e' l'**oscilloscopio formale** per eccellenza: prende lo stato interno di un sistema e ne misura una proprieta strutturale — l'integrazione — con una definizione matematica precisa. E' il candidato piu serio a \"strumento che legge la coscienza di un sistema\", quindi tocca frontalmente la tua tesi coscienza=ricorsione-della-realta-attraverso-la-materia. Punto di contatto forte: la nozione di **matching/percezione** (quanto la struttura causa-effetto del sistema rispecchia quella dell'ambiente) e' vicinissima alla tua idea di ricorsione — un sistema che \"contiene\" la struttura del mondo che lo contiene. Punto di divergenza altrettanto forte, da tenere onesto: IIT e' *sincronica e statica* — misura Φ su uno stato istantaneo di un substrato con dinamica data, non ha nulla da dire su novita nel tempo, emergenza aperta o auto-costruzione. E' il quasi-opposto di ASAL: dove ASAL misura novita temporale con un giudice esterno appreso, PyPhi misura integrazione istantanea con un principio interno assiomatico. Inoltre e' notoriamente intrattabile oltre ~10-15 unita: non lo applichi mai alla tua arena di particelle direttamente, e' un modello concettuale non uno strumento su larga scala. La lezione piu utile e' probabilmente concettuale (la definizione di integrazione via partizione minima) piu che il codice.\n\n## Da rubare\n1. **Φ via partizione minima come misura di \"il tutto e' piu delle parti\"**: l'idea di quantificare l'integrazione di un sotto-sistema dell'arena cercando il taglio che fa *meno* differenza e' un oscilloscopio agganciabile a cluster di particelle — anche in versione approssimata/economica (non serve il calcolo IIT completo per usare \"quanto un gruppo resiste alla decomposizione\" come segnale di emergenza integrata).\n2. **Matching come ricorsione operazionalizzata**: la metrica di quanto la struttura causale interna combacia con quella dell'ambiente e' una definizione concreta della tua ricorsione realta-attraverso-la-materia. Vale la pena leggere `pyphi` sul matching (Mayner et al., 2024) per rubare la *forma* della misura — un sistema premiato quando la sua struttura interna e' un'immagine causale del mondo esterno — e trasportarla come possibile novelty-gate strutturale nell'arena.\n", "world-models-ha-schmidhuber": "# World Models — Ha & Schmidhuber\n\nLink: https://arxiv.org/abs/1803.10122 · sito interattivo: https://worldmodels.github.io\n\nPaper NeurIPS 2018 · David Ha, Jürgen Schmidhuber · fondativo (world model come sogno interno)\n\n## Cosa fa\nE' il paper-radice della linea \"world model come sogno interno\". Un agente impara un modello compresso e predittivo del proprio ambiente (i giochi CarRacing e VizDoom-TakeCover) e poi si addestra *dentro* quel modello invece che nell'ambiente reale. Nel caso Doom, la policy viene allenata quasi interamente nelle allucinazioni generate dal modello ricorrente e poi trasferita con successo al gioco vero. E' la dimostrazione minimale e concreta che un agente puo vivere, apprendere e agire dentro la propria simulazione compressa della realta.\n\n## Come e' fatto\nArchitettura a tre blocchi, deliberatamente piccola:\n- **V (Vision)** — un VAE convoluzionale comprime ogni frame in un vettore latente `z` di poche decine di dimensioni. E' l'occhio: butta via i pixel e tiene l'essenza.\n- **M (Memory)** — una RNN con output a Mixture Density (MDN-RNN) predice la *distribuzione* di `z` al passo successivo dato `z` corrente, l'azione e lo stato nascosto `h`. Modella la dinamica come distribuzione, non come punto: puo quindi campionare traiettorie plausibili — \"sognare\".\n- **C (Controller)** — una rete lineare minuscola che mappa `[z, h]` in azioni, ottimizzata con evoluzione (CMA-ES), non con backprop. Tenendo il controller minuscolo, quasi tutta la capacita e la conoscenza del mondo stanno in V e M.\nIl pezzo chiave e' l'**ambiente-sogno**: un ambiente fittizio che espone la stessa interfaccia dell'ambiente reale ma il cui `step()` fa girare la MDN-RNN invece del gioco. Un parametro di **temperatura** regola quanto e' rumoroso il sogno; alzarlo rende il mondo interno piu incerto e — paradossalmente — allena policy piu robuste, perche impedisce all'agente di sfruttare i difetti del modello.\n\n## Cosa possiamo notare di utile per noi\nE' l'aggancio piu diretto alla tua tesi **world-model-come-sogno** e alla ricorsione realta-attraverso-la-materia. Qui la fattorizzazione percezione (V) / dinamica generativa (M) / azione (C) e' resa esplicita e abbastanza piccola da leggerla in un pomeriggio. Per l'arena del vuoto il punto notevole e' che l'agente **non ha bisogno del mondo reale per vivere**: gli basta la propria simulazione compressa — esattamente la chiusura auto-referenziale che ti interessa, il sistema che gira su un modello di se stesso. La separazione MDN (distribuzione, non punto) e' rilevante per i tuoi oscilloscopi: modellare la dinamica come distribuzione ti da gratis una misura di *incertezza per-passo*, che e' materia prima per un segnale di sorpresa/novelty. E la temperatura e' la manopola entropia-interna resa esplicita.\nDove diverge nettamente: non c'e' nessun novelty-gating ne emergenza aperta — il sogno serve solo a massimizzare una reward fissa; il modello e' congelato dopo il training; la temperatura e' un iperparametro impostato a mano, non una grandezza che il sistema misura su se stesso. E' un oscilloscopio calibrato una volta e poi spento, non uno strumento vivo che il sistema legge in tempo reale. Il tuo salto rispetto a questo paper e' rendere dinamiche e auto-osservate proprio le quantita che qui sono fisse.\n\n## Da rubare\n1. **Il \"dream environment\" come drop-in dell'ambiente reale**: un wrapper con la stessa interfaccia `step()/reset()` che internamente fa girare il modello generativo. Per la tua arena: far vivere le particelle/agenti alternativamente nel mondo vero e nella loro previsione con lo stesso codice, e usare la **divergenza sogno-vs-realta come segnale di novelty/sorpresa**.\n2. **La dinamica modellata come distribuzione (MDN)** invece che come punto singolo: ti regala una misura di incertezza per-passo, cheap da calcolare, da mandare direttamente all'oscilloscopio come indicatore di quanto il sistema \"sa\" del suo prossimo stato.\n3. **La temperatura da iperparametro a variabile auto-regolata**: qui e' fissa; il tuo contributo e' chiudere il loop — il sistema alza/abbassa il rumore del proprio sogno in risposta a quanto si sorprende, trasformando l'entropia interna in una manopola che il sistema gira da solo.\n", "yangzlthu-linguistic-steganography-and-steganalysis": "# YangzlTHU/Linguistic-Steganography-and-Steganalysis\n\n<https://github.com/YangzlTHU/Linguistic-Steganography-and-Steganalysis>\n\nStelle: ~35 · Linguaggio: Python · Ultimo push: nov 2022 (fermo) · Licenza: nessuna dichiarata\n\n## Cosa fa\n\nÈ una collezione-vetrina del NGN-lab di Tsinghua che raccoglie in un unico repo il loro filone di lavoro su due lati speculari: la **steganografia linguistica** (nascondere un messaggio segreto DENTRO testo generato che sembra normale) e la **steganalisi** (il lato difensivo: distinguere un covertext benigno da uno che porta un carico nascosto). Sul lato generativo include RNN-Stega, VAE-Stega, KC-Stega (generazione vincolata a keyword), ADG-steganography (Adaptive Dynamic Grouping, \"provably secure\") e lavori sullo spostamento dallo spazio simbolico allo spazio semantico. Sul lato detection include TS-RNN, TS-CNN, SeSy e varianti attention/graph-based. C'è anche una cartella `Dataset` che prova a simulare corpus reali. Non è una libreria unificata ma un archivio di sotto-progetti, ognuno con proprio README, codice e tabelle di risultati.\n\n## Come è fatto\n\nL'idea chiave della steganografia generativa qui è che il messaggio segreto **controlla il campionamento del linguaggio**: invece di scegliere il prossimo token per massimizzare la probabilità, si partiziona la distribuzione di probabilità in gruppi e la scelta del gruppo è dettata dai bit segreti. RNN-Stega usa Huffman/arithmetic coding sui token; ADG (Adaptive Dynamic Grouping) raggruppa dinamicamente i token in modo che la distribuzione risultante resti il più vicino possibile a quella naturale del modello — da qui la \"provable security\" (l'entropia del testo stego è indistinguibile da quella del covertext). VAE-Stega interviene sullo spazio latente per migliorare l'impercettibilità statistica. Il lato steganalisi (TS-RNN/TS-CNN/SeSy) sono classificatori addestrati a fiutare la **firma statistica** che l'incorporamento lascia: anche quando il testo è fluente a occhio umano, la distribuzione dei token si sposta rispetto al baseline naturale, e una rete impara a leggere quello spostamento.\n\n## Cosa possiamo notare di utile per noi\n\nQuesto repo è il gemello \"linguistico\" esatto della tua tensione tra **occultamento** e **oscilloscopio**, e vale come mappa concettuale più che come codice riusabile (è vecchio, TF1/PyTorch datato, senza licenza).\n\n- **Il vuoto come budget di entropia.** La lezione trasferibile più forte: nascondere informazione = spendere l'entropia libera della distribuzione. ADG dice esplicitamente che puoi occultare in modo \"provabilmente sicuro\" solo fino a quanta incertezza il generatore ha già. Nella tua arena del vuoto, questo è un principio fisico: un segnale nascosto in uno stato interno è impercettibile solo se sta dentro il \"gioco\" (variance/entropia) che quello stato aveva comunque — appena eccedi, emergi come anomalia. È un tetto teorico al canale nascosto, misurabile.\n- **Steganalisi = oscilloscopio addestrato.** TS-RNN/SeSy sono letteralmente sonde che leggono uno stato (sequenza di token) e dicono \"qui c'è qualcosa di nascosto\". Traslato ai tuoi oscilloscopi su stati interni: invece di sonde disegnate a mano, addestri una piccola rete a distinguere \"traiettoria interna spontanea\" vs \"traiettoria che porta un carico/una struttura iniettata\". La firma non è nel contenuto ma nello *scostamento dal baseline naturale* — è la stessa cosa che fai quando cerchi novità novelty-gated: novità = deviazione statistica dal previsto.\n- **Simmetria generatore↔rilevatore come loop di coscienza.** Il co-design stego/steganalisi è un mini-modello del tuo \"coscienza = ricorsione\": il sistema che genera e il sistema che si auto-ispeziona sono lo stesso spazio letto da due direzioni. Un'arena dove le particelle sia occultano che rilevano occultamento chiude un anello di auto-osservazione senza scomodare linguaggio.\n- **Dove diverge:** è tutto supervisionato, task-specifico, su testo — nessuna nozione di world-model, sogno o memoria episodica. Non ti serve il codice; ti serve la *coppia di concetti* (canale = entropia disponibile; rilevatore = classificatore di scostamento).\n\n## Da rubare\n\n1. **Metrica \"budget di occultamento\" per l'arena:** per ogni stato interno calcola l'entropia/variance locale spontanea; definisci la capacità di canale nascosto come frazione di quell'entropia. Un segnale iniettato oltre soglia diventa rilevabile — usalo come legge quantitativa di steganografia nel tuo simulatore.\n2. **Sonda-oscilloscopio appresa (TS-style):** addestra un classificatore leggero a separare traiettorie \"vergini\" da traiettorie con struttura iniettata, e usa la sua confidence come lettura continua dell'oscilloscopio, non solo un allarme binario.\n3. **Loop stego↔steganalisi come test di ricorsione:** fai coevolvere nella stessa arena chi nasconde e chi rileva; l'equilibrio (o l'oscillazione) tra i due è un osservabile emergente dell'auto-osservazione ricorsiva.\n", "youngbryan97-aura": "# AURA — [github.com/youngbryan97/aura](https://github.com/youngbryan97/aura)\n\n61 stelle · Python · push attivissimo (lug 2026) · licenza \"All Rights Reserved (Read-Only)\" — leggibile, NON riusabile\n\n## Cosa fa\nRuntime locale di architettura cognitiva che gira su Apple Silicon (target: M5, 64 GB unified memory). Combina esplicitamente IIT 4.0 (phi/informazione integrata), Global Workspace Theory, active inference e steering affettivo sul residual stream (CAA — Contrastive Activation Addition), organizzati in decine di \"consciousness modules\". La cosa piu' onesta del progetto e' il suo stesso README: rifiuta di dichiararsi prova di coscienza/qualia/personhood e sposta la tesi su qualcosa di testabile — \"lo stato interno puo' causalmente influenzare generazione, scritture di memoria, autorizzazione tool, iniziativa e auto-riparazione, lasciando ricevute (receipts) auditabili\".\n\n## Come e' fatto\nArchitettura monolite locale, densissima di sottosistemi e di documentazione-come-governance (decine di file `*_CARD.md`, `CLAIMS_SUPPORTED/NOT_SUPPORTED.md`, gate CI su reliability/SLO/security). Pezzi notevoli:\n- **Substrato continuo** (`continuous_substrate.py`): una Liquid Time-Constant ODE 64→512 neuroni a ~20 Hz, integrata Euler esplicito + perturbazione stocastica; da qui deriva per proiezioni fisse valence/arousal/dominance/phi. E' letteralmente uno stato dinamico interno che pulsa, non un valore statico.\n- **Substrate-first readout** (`substrate_token_generator.py`): prova a generare da una testa di lettura sul substrato PRIMA di chiamare il transformer, e ripiega sul \"Cortex\" solo se l'errore di predizione supera soglia.\n- **phi_core.py** (1.837 righe): matematica IIT vera — binarizzazione, TPM empirica, phi via KL, postulato di esclusione, partizionamento spettrale + baseline esaustiva a 8 bipartizioni.\n- **affective_steering.py**: pipeline CAA reale che hooka i blocchi del transformer MLX e modifica il residual stream a generation-time.\n- **Loop overt** (`overt_action_loop.py`): observe → choose → act → verify → remember, ogni passo emette receipts.\n- **RSI/self-modification**: fault pipeline, repair approval, patch genealogy, \"proof bundles\" hash-chained.\n\n## Perche' riguarda te\nE' il progetto della lista piu' vicino ai tuoi assi contemporaneamente: **oscilloscopi** (il substrato ODE che espone valence/arousal/phi in tempo reale e' esattamente un pannello di stati interni da graficare), **coscienza-ricorsione** (moduli IIT + governor che ristruttura la propria architettura + self-repair = il sistema che si osserva e si riscrive), e **memoria novelty-gated** (le scritture di memoria passano per governance e admission control, non e' write-tutto). Nota metodologica preziosa piu' del codice: AURA separa in modo brutale \"indicatore funzionale\" da \"prova fenomenica\" e mette la distinzione *nel codice* (ontological boundary guard) e nei CLAIMS matrix. Per il tuo dossier coscienza e' un modello di igiene: come parlare di phi/coscienza senza scivolare nell'hype. Dove diverge: e' un monolite fragile, licenza read-only, e la stessa doc ammette che RSI autonoma \"non e' provata matura\" — quindi ispiri, non riusi.\n\n## Da rubare\n1. **Il substrato ODE come \"cuore\" osservabile.** Una piccola Liquid/LTC ODE che gira in continuo a ~20 Hz e da cui derivi per proiezione poche grandezze (valenza/arousal/phi) e' il candidato perfetto per gli oscilloscopi dell'arena: uno stato interno vero, dinamico, perturbabile, non un numero cosmetico. E il pattern \"substrate-first, transformer-as-fallback\" e' un'idea forte: il grosso della reattivita' viene dal campo dinamico, il modello pesante interviene solo sull'errore alto.\n2. **Receipts + boundary guard come disciplina.** Ogni azione consequenziale lascia una ricevuta auditabile, e le etichette cariche (\"coscienza\", \"personhood\") sono trattate come indicatori funzionali finche' l'evidenza non dice altro. Rubalo come regola del progetto: ogni claim nel dossier punta a un test/replay eseguibile, non alla prosa.\n", "ysymyth-awesome-language-agents": "# CoALA — Cognitive Architectures for Language Agents (ysymyth/awesome-language-agents)\n\nLink: https://github.com/ysymyth/awesome-language-agents · Paper: https://arxiv.org/abs/2309.02427\n\n1244 stelle · TeX / lista curata · ultimo push 2025 · paper Sumers, Yao, Narasimhan, Griffiths (2023)\n\n## Cosa fa\nCoALA e' un paper-quadro che rilegge gli agenti LLM come **architetture cognitive** nel senso classico (Soar, ACT-R), invece che come prompt ad hoc. Propone un vocabolario unico per descrivere qualsiasi agente linguistico lungo tre assi: lo spazio delle memorie, lo spazio delle azioni, e il ciclo di decisione. La repo e' la lista curata che classifica centinaia di lavori sugli agenti dentro questo schema, piu il file BibTeX con 300+ citazioni. Serve sia da mappa concettuale del filone sia da indice navigabile per trovare quale lavoro copre quale pezzo dell'architettura.\n\n## Come e' fatto\nL'idea chiave e' fattorizzare un agente in componenti ortogonali e nominarli con precisione:\n- **Memorie**: una working memory a breve termine + memorie a lungo termine opzionali — **episodica** (esperienze passate), **semantica** (conoscenza sul mondo), **procedurale** (codice / i pesi stessi dell'LLM).\n- **Spazio delle azioni** diviso in due meta-tipi: **azioni esterne** (grounding — agire sul mondo) e **azioni interne** che manipolano le memorie: **reasoning** (aggiorna la working memory con l'LLM), **retrieval** (legge dalla memoria a lungo termine), **learning** (scrive nella memoria a lungo termine).\n- **Ciclo decisionale** in due fasi: **planning** (usa reasoning/retrieval per proporre e valutare azioni candidate) ed **execution** (esegue l'azione scelta, learning o grounding). Il loop si ripete.\nLa forza e' che retrieval e learning diventano azioni di *prima classe*, non effetti collaterali: leggere e scrivere la memoria sono mosse che l'agente decide, non magia implicita.\n\n## Cosa possiamo notare di utile per noi\nCoALA e' la **spina dorsale concettuale** per formalizzare quello che stai gia facendo in modo intuitivo. La tua memoria novelty-gated corrisponde esattamente all'azione di **learning** (scrittura in memoria a lungo termine) resa condizionale: nel loro schema il \"quando scrivere\" e' lasciato aperto: il tuo contributo e' *gatarlo sulla novelty*. I tuoi oscilloscopi sugli stati interni sono, nel loro linguaggio, strumenti che ispezionano la **working memory** e la memoria episodica — CoALA ti da il posto preciso dove agganciarli. La distinzione episodica/semantica/procedurale e' preziosa per la tua arena: la traiettoria delle particelle e' episodica, i pattern ricorrenti che estrai sono semantici, e le regole di aggiornamento del campo sono procedurali — separarle chiarisce cosa il sistema sta imparando e a che livello. Il ciclo planning/execution mappa bene sul tuo world-model-come-sogno: la fase di \"planning dentro il modello\" (proporre e valutare azioni simulandole) e' letteralmente sognare prima di agire.\nDove diverge (fortemente): CoALA e' tutto simbolico-linguistico e centrato sull'LLM; le sue memorie sono testo recuperato per similarita, non stati fisici di un campo. Non ha nessuna nozione di substrato materiale, di ricorsione realta-attraverso-la-materia, ne di emergenza dal basso — l'agente e' un pianificatore sopra un mondo, non un mondo che si osserva. Prendi l'ontologia (i nomi, gli assi, la fattorizzazione), non l'implementazione.\n\n## Da rubare\n1. **La tripartizione della memoria** episodica / semantica / procedurale come schema per organizzare cio che la tua arena conserva: traiettorie grezze (episodica), pattern/attrattori estratti (semantica), regole di update (procedurale). Chiarisce a che livello sta avvenendo l'apprendimento.\n2. **Learning come azione condizionale esplicita**: modella la scrittura in memoria come una mossa decisa dal sistema (gatata da novelty), non come logging automatico. E' la formalizzazione pulita della tua memoria novelty-gated.\n3. **Il ciclo planning-dentro-il-modello / execution-nel-mondo** come struttura per il tuo world-model-come-sogno: separa nettamente la fase in cui il sistema simula e valuta futuri dentro il proprio modello dalla fase in cui agisce sul substrato reale, e misura la divergenza tra le due come segnale.\n", "yunqing-me-watermarkdm": "# WatermarkDM — Una ricetta per marchiare i modelli a diffusione (yunqing-me/WatermarkDM)\n\nLink: https://github.com/yunqing-me/WatermarkDM\n\n155 stelle · Jupyter Notebook / Python · fermo, ultimo push nov 2024 · licenza MIT · arXiv 2303.10137\n\n## Cosa fa\nWatermarkDM e' tra i primi lavori a iniettare un watermark invisibile *nel modello a diffusione stesso*, cosi che ogni immagine generata porti la firma per provenienza/tracciabilita. Copre due casi distinti. **Caso 1 (DM incondizionati/class-conditional, es. EDM)**: si marchia il *dataset di training* incorporando una stringa binaria in ogni immagine tramite un encoder appreso; il DM addestrato su quei dati genera immagini da cui un decoder pre-addestrato recupera la stringa binaria con detection quasi perfetta. **Caso 2 (text-to-image, es. Stable Diffusion)**: si fa fine-tuning del modello perche' impari una coppia immagine-testo predefinita, cosi che di fronte a un *trigger prompt* segreto il modello rigeneri un'immagine-watermark predefinita — una backdoor benigna che funge da firma del proprietario. In entrambi i casi la firma sopravvive nel comportamento generativo, non e' appiccicata a valle su una singola immagine.\n\n## Come e' fatto\nIl progetto e' due pipeline con due ambienti conda separati:\n- `string2img` — addestra l'encoder/decoder di watermark (`train_cifar10.py`, ecc.): l'encoder prende immagine + stringa binaria e produce l'immagine marchiata; il decoder impara a leggere la stringa dall'immagine. Questo e' il passo che *marchia i dati*.\n- `edm` — riusa la codebase EDM di NVIDIA per addestrare il DM da zero sui dati gia' marchiati.\n\nL'idea chiave del Caso 1: **il watermark non viene aggiunto alle immagini generate, viene appreso come proprieta statistica della distribuzione dati**. Marchi ogni sample del training set con lo stesso encoder→stringa; il modello a diffusione, imparando a modellare quella distribuzione, interiorizza anche la firma; a inference le immagini escono gia' marchiate e il decoder le legge. Nel Caso 2 la firma e' invece una associazione trigger→output iniettata via fine-tuning: rara nel dominio dei prompt normali (non degrada la qualita), ma attivabile a comando dal proprietario per dimostrare possesso. Robustezza testata contro perturbazioni (blur, crop, rumore, compressione).\n\n## Cosa possiamo notare di utile per noi\nQuesto e' il progetto della lista che tocca piu da vicino la tua idea di **firma che vive nel processo generativo / nel world-model, non nell'artefatto singolo** — ed e' il ponte tra \"occultamento\" e \"world-model-come-sogno\". Due meccanismi distinti, entrambi rubabili in metafora: (1) Caso 1 = *marchiare la distribuzione, non il campione*. Se l'arena del vuoto ha una dinamica generativa (un modello del mondo che \"sogna\" stati), puoi far si' che la firma sia una proprieta statistica che il sistema interiorizza addestrandosi sulla propria storia, cosi che *ogni* stato futuro la porti senza doverla iniettare a mano ogni volta. E' esattamente la differenza tra marchiare a valle e marchiare la generatrice. (2) Caso 2 = *trigger nascosto → output predefinito*. E' una backdoor semantica: un prompt segreto che apre uno stato altrimenti irraggiungibile. Applicato al tuo sogno-del-world-model, e' il modello di un \"ricordo occulto\" che riaffiora solo di fronte alla chiave giusta — memoria condizionata a un innesco, silente altrimenti. Il decoder pre-addestrato del Caso 1 e' anche un buon **oscilloscopio di provenienza**: uno strumento esterno che, guardando lo stato generato, ne legge la firma d'origine. Dove diverge dal tuo nucleo coscienza-ricorsione: la firma qui e' scelta e imposta dall'esterno (una stringa binaria arbitraria, o una coppia trigger-immagine decisa dal proprietario), non emerge dall'auto-modellazione del sistema. La ricorsione che ti interessa vorrebbe che la \"stringa\" fosse l'auto-rappresentazione del sistema stessa, non un ID casuale. Utile la robustezza-testing: la firma emergente andrebbe verificata contro perturbazioni della dinamica, non solo in condizioni ideali.\n\n## Da rubare\n1. **Marchiare la distribuzione anziche' il campione**: fai interiorizzare la firma alla dinamica generativa (allenandola sulla propria storia marchiata) cosi che ogni stato futuro la erediti automaticamente — la trasposizione dinamica del Caso 1.\n2. **Il trigger nascosto → stato predefinito (Caso 2)** come modello di \"ricordo occulto/backdoor benigna\": uno stato latente raggiungibile solo con la chiave-innesco giusta, altrimenti silente e non degradante.\n3. **Il decoder di provenienza come oscilloscopio esterno**: uno strumento che legge la firma d'origine dallo stato generato, con test di robustezza contro perturbazioni (blur/crop/rumore) come standard di validazione.\n", "zuga-technologies-zugamind": "# ZugaMind — Zuga-Technologies/zugamind\n\n<https://github.com/Zuga-Technologies/zugamind>\n\n**10 stelle · Python (stdlib puro, zero dipendenze) · ultimo push lug 2026 · licenza Apache-2.0**\n\n## Cosa fa\n\nÈ un \"sidecar di cognizione persistente\": un processo always-on che sta accanto a un harness di agente (Claude Code, OpenClaw, Codex, Hermes) e lo **sveglia solo quando qualcosa merita attenzione**, invece di svegliarlo a orologio come un cron. Guarda gratis delle sorgenti (API HackerNews, feed RSS, issue GitHub) — nessuna chiamata a modello mentre è idle — fa girare su ciò che vede una **competizione di salienza stile Global Workspace Theory**, e invoca l'harness con un briefing di continuità solo quando un vincitore supera la competizione E passa un gate a budget fail-closed. La tesi economica è netta: \"smetti di pagare il tuo agente per svegliarsi e non trovare nulla\". In un esperimento pre-registrato (EXP-001, corpus congelato di 229 eventi reali + 10 incidenti piantati) ottiene lo stesso recall/precision del cron con il 43% di invocazioni in meno.\n\n## Come è fatto\n\nPipeline deterministica: **scanner (percezione)** → ogni `WorkspaceModule.generate_bid()` produce una puntata di salienza → **attention schema** (streak dampening, diversity cap, blind-spot boost, novelty bonus) → **un solo vincitore per ciclo** (selezione pesata `salience**power`) → **broadcast** a tutti i moduli (`on_broadcast()`) → **workspace planner** (vincitore → piano-task breve) → **action gate** fail-closed, budget-clamped, con content-screen + veto umano → **Claude** (o un tier locale gratuito se il task non lo giustifica).\n\nTre pezzi chiudono l'anello \"deciso → l'harness ci sta lavorando\": `continuity/journal.py` (log episodico append-only; `build_briefing()` produce un markdown cappato ~4000 char = \"perché ti sto svegliando, cosa è successo dall'ultimo risveglio, cosa resta irrisolto\"); `act/command_actuator.py` (adapter che scrive il briefing su file temp, sostituisce `{briefing_file}` nell'argv dell'harness, lo lancia come sottoprocesso, rate-limited per ora E per giorno contando dal journal durevole); `stream/runner.py` (loop sempre-attivo; i vincitori in quiet-hours vengono differiti, non persi; `touch PAUSE` ferma tutto). La sicurezza è progettata assumendo che l'agente prima o poi sbaglierà: gate fail-closed, content-screen che blocca prompt-injection/comandi distruttivi/exfil di segreti prima di ogni chiamata pagata, cap di budget mensile in USD, tutto ships disabled/dry-run. `Workspace.get_stats()` restituisce ogni puntata che ha competuto, il vincitore, il secondo, e il self-model dell'attention schema (fuochi recenti, blind spot, stuck-detection, conteggio switch di attenzione).\n\n## Cosa possiamo notare di utile per noi\n\nQuesto è il ramo **novelty-gating + Global Workspace** nella sua forma più pragmatica e onesta, ed è pieno di meccanica trasferibile alla tua memoria novelty-gated e ai tuoi oscilloscopi:\n\n- **Gating della salienza senza LLM, misurato non dichiarato.** La competizione di salienza è pura matematica deterministica: puntate, selezione `salience**power`, e — cruciale — **habituation** (un trigger già visto viene smorzato per ore, `ZUGAMIND_HABITUATION_HOURS`) e **novelty bonus**. Questo È novelty-gating: il segnale entra nel workspace solo se è nuovo *e* out-competes tutto il resto in questo ciclo. È esattamente il meccanismo che ti serve per decidere quando un'esperienza merita di entrare in memoria, implementato come priority-queue con decadimento e non come flag LLM. Loro stessi lo ammettono onestamente: \"se preferisci leggerlo come una coda a priorità con decay e rate-limit, funziona identico — il vocabolario GWT è la lineage di design, non una pretesa\".\n\n- **L'attention schema come oscilloscopio già costruito.** Il \"self-model\" dell'attention schema (fuochi recenti, blind spot, stuck-detection, switch count) è letteralmente un oscilloscopio sullo stato interno del sistema di attenzione — e persino un accenno di auto-modello (l'attenzione che modella la propria attenzione, un mattoncino di coscienza=ricorsione secondo Graziano). `get_stats()` che espone ogni bid, il vincitore e il runner-up è lo snapshot ispezionabile che vuoi per la tua arena.\n\n- **La disciplina sperimentale è il vero oro.** Predizioni pre-registrate (incluse le due sbagliate pubblicate), baseline contro cron, ogni JSONL grezzo pubblicato, replay ermetico a $0 (`run_exp001.py --smoke`). Per un progetto che fa claim su \"coscienza/salienza\" questo è il modo di non scadere nell'hype: falsificabile, con controlli. Trasferibile direttamente al tuo lavoro dove il rischio-hype è alto.\n\n- **Blind-spot boost e diversity cap.** L'attention schema forza attivamente attenzione verso sorgenti trascurate e impedisce a una sorgente di monopolizzare i risvegli. È un anti-collasso dell'attenzione utile per la tua arena: evitare che il sistema resti incastrato sullo stesso attrattore.\n\nDove diverge da te: ZugaMind è un orchestratore di *harness LLM esterni*, non una simulazione di mondo. La \"percezione\" sono feed RSS/HN, non particelle in un vuoto. Non c'è world-model generativo, non c'è sogno, non c'è fisica interna — la salienza opera su testo del web aperto. La ricorsione è debole (l'attention schema si auto-osserva, ma il sistema non riscrive il proprio mondo).\n\n## Da rubare\n\n- **Il meccanismo di habituation + novelty bonus** come cuore del tuo gate di memoria: un evento visto di recente viene smorzato per un tempo configurabile, un evento nuovo riceve un bonus, e solo il vincitore della competizione entra nel workspace. È novelty-gating deterministico, a costo zero, direttamente trapiantabile sopra la tua arena/particelle per decidere cosa consolidare.\n- **Il briefing di continuità cappato** (`build_briefing()`, ~4000 char, \"perché sono sveglio / cosa è successo / cosa resta aperto\") come formato standard per il risveglio di un agente: orientamento, non rumore. Utile per il tuo mem0 cross-sessione — non riversare tutto, ma un briefing strutturato al risveglio.\n- **`get_stats()` + attention-schema self-model** come template dell'oscilloscopio: esporre a ogni ciclo tutte le puntate in competizione, il vincitore, il secondo, i fuochi recenti e i blind spot. È il pannello che rende ispezionabile \"cosa è entrato nella coscienza e perché\".\n"}, "counts": {"projects": 225, "sheets": 125}}</script>
<script>
const DATA = JSON.parse(document.getElementById('data').textContent);
const CL = {}; DATA.clusters.forEach(c=>CL[c.id]=c.label);
const S = { q:'', rel:0, onlyAn:false, sort:'rel', cluster:'all' };
const $ = id=>document.getElementById(id);
$('np').textContent = DATA.counts.projects; $('nc').textContent = DATA.clusters.length; $('ns').textContent = DATA.counts.sheets;

function dots(n){ return '●'.repeat(n)+'○'.repeat(5-n); }
function starFmt(n){ if(!n) return ''; return n>=1000 ? (n/1000).toFixed(1).replace('.0','')+'k' : ''+n; }

// mini markdown -> html
function inl(s){ return s
  .replace(/&lt;(https?:\/\/[^ >]+)&gt;/g,'<a href="$1" target="_blank" rel="noopener">$1</a>')
  .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
  .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
  .replace(/`([^`]+)`/g,'<code>$1</code>'); }
function md(src){ if(!src) return '';
  let s = src.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const out=[]; let inList=false;
  for(const raw of s.split('\n')){
    const l=raw;
    const h=l.match(/^(#{1,4})\s+(.*)$/);
    if(h){ if(inList){out.push('</ul>');inList=false;} const lv=Math.min(4,h[1].length+1); out.push('<h'+lv+'>'+inl(h[2])+'</h'+lv+'>'); continue; }
    const li=l.match(/^\s*[-*]\s+(.*)$/);
    if(li){ if(!inList){out.push('<ul>');inList=true;} out.push('<li>'+inl(li[1])+'</li>'); continue; }
    if(inList){out.push('</ul>');inList=false;}
    if(l.trim()===''){ continue; }
    if(/^-{3,}$/.test(l.trim())){ out.push('<hr>'); continue; }
    out.push('<p>'+inl(l)+'</p>');
  }
  if(inList)out.push('</ul>');
  return out.join('\n');
}

function match(p){
  if(S.rel && p.rel < S.rel) return false;
  if(S.onlyAn && !p.hasSheet) return false;
  if(S.cluster!=='all' && p.cluster!==S.cluster) return false;
  if(S.q){ const q=S.q.toLowerCase(); if(!((p.name+' '+p.summary+' '+p.category).toLowerCase().includes(q))) return false; }
  return true;
}
function sortF(a,b){ if(S.sort==='stars') return (b.stars-a.stars)||(b.rel-a.rel);
  if(S.sort==='name') return a.name.localeCompare(b.name); return (b.rel-a.rel)||(b.stars-a.stars); }

function render(){
  const vis = DATA.projects.filter(match);
  const main=$('main'); main.innerHTML='';
  const order = DATA.clusters.map(c=>c.id);
  let shown=0;
  for(const cid of order){
    const list = vis.filter(p=>p.cluster===cid).sort(sortF);
    if(!list.length) continue;
    const anz = list.filter(p=>p.hasSheet).length;
    const h=document.createElement('div'); h.className='cluster-h';
    h.innerHTML = CL[cid]+' <span class="c">- '+list.length+' progetti - '+anz+' con scheda</span>';
    main.appendChild(h);
    const g=document.createElement('div'); g.className='grid';
    for(const p of list){ shown++;
      const c=document.createElement('div'); c.className='card'; c.onclick=()=>openDoc(p);
      const st = p.stars? '<span class="star">★'+starFmt(p.stars)+'</span>' : '';
      c.innerHTML = '<div class="nm"><span>'+esc(p.name)+'</span><span class="rel">'+dots(p.rel)+'</span></div>'
        + '<div class="meta">'+st+(st&&p.category?' - ':'')+esc(p.category||'')+(p.hasSheet?' - <span class="badge">analisi</span>':'')+'</div>'
        + '<div class="sm">'+esc(p.summary||'')+'</div>';
      g.appendChild(c);
    }
    main.appendChild(g);
  }
  if(!shown) main.innerHTML='<div class="empty">Nessun progetto con questi filtri.</div>';
  // sidebar counts
  $('cnt-all').textContent = vis.length;
  buildSidebar(vis);
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function buildSidebar(vis){
  const box=$('clusterList'); box.innerHTML='';
  for(const c of DATA.clusters){
    const n=vis.filter(p=>p.cluster===c.id).length;
    const total=DATA.projects.filter(p=>p.cluster===c.id).length;
    const d=document.createElement('div'); d.className='cl'+(S.cluster===c.id?' on':''); d.dataset.c=c.id;
    d.innerHTML='<span>'+c.label+'</span><span class="n">'+n+'/'+total+'</span>';
    d.onclick=()=>{ S.cluster = (S.cluster===c.id?'all':c.id); syncCl(); render(); };
    box.appendChild(d);
  }
  document.querySelectorAll('.side .cl[data-c="all"]')[0].classList.toggle('on',S.cluster==='all');
}
function syncCl(){ document.querySelectorAll('.side .cl').forEach(e=>e.classList.toggle('on', e.dataset.c===S.cluster || (e.dataset.c==='all'&&S.cluster==='all'))); }

function openDoc(p){
  const body=$('docBody');
  const head = '<div class="dhead">'+esc(CL[p.cluster])+' - '+dots(p.rel)+(p.stars?' - ★'+starFmt(p.stars):'')+' - <a href="'+p.url+'" target="_blank" rel="noopener">apri su web ↗</a></div>';
  if(p.hasSheet){ body.innerHTML = head + md(DATA.sheets[p.slug]); }
  else { body.innerHTML = head + '<h2>'+esc(p.name)+'</h2><p>'+esc(p.summary)+'</p><p class="noan">Scheda di analisi profonda non ancora scritta per questo progetto (e nella mappa, non tra le 125 analizzate). <a href="'+p.url+'" target="_blank" rel="noopener">Vai al progetto</a>.</p>'; }
  $('ov').classList.add('on'); $('ov').scrollTop=0; document.querySelector('.doc').scrollTop=0;
}
function closeDoc(){ $('ov').classList.remove('on'); }
$('ov').addEventListener('click',e=>{ if(e.target.id==='ov') closeDoc(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeDoc(); });

// controls
$('q').addEventListener('input',e=>{ S.q=e.target.value; render(); });
$('sort').addEventListener('change',e=>{ S.sort=e.target.value; render(); });
document.querySelectorAll('.rel-chip').forEach(ch=>ch.addEventListener('click',()=>{
  document.querySelectorAll('.rel-chip').forEach(x=>x.classList.remove('on')); ch.classList.add('on'); S.rel=+ch.dataset.r; render();
}));
$('onlyAn').addEventListener('click',()=>{ S.onlyAn=!S.onlyAn; $('onlyAn').classList.toggle('on',S.onlyAn); render(); });

render();
</script></body></html>
