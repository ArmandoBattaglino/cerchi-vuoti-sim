<style>
:root{--bg:#0a0c0a;--panel:#0f140f;--line:#1b241b;--dim:#6a7a6a;--ph:#39ff6e;--ph2:#5ee0c0;--org:#ffb14e;--txt:#cfe8cf}
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--txt);font:13px/1.5 "Cascadia Mono","Consolas",monospace}
a{color:var(--ph2);text-decoration:none}a:hover{text-decoration:underline}
header{position:sticky;top:0;z-index:5;background:linear-gradient(#0a0c0a,#0a0c0aee);border-bottom:1px solid var(--line);padding:12px 16px}
h1{margin:0;font-size:15px;color:var(--ph);letter-spacing:2px;text-shadow:0 0 10px #39ff6e66}
.sub{color:var(--dim);font-size:12px;margin-top:2px}
.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px}
input,select{background:#0b110b;color:var(--txt);border:1px solid #223022;border-radius:6px;padding:7px 9px;font:12px "Cascadia Mono",monospace}
input#q{flex:1;min-width:180px}
.chip{cursor:pointer;border:1px solid #223022;border-radius:14px;padding:4px 10px;color:var(--dim);font-size:11px;user-select:none}
.chip.on{background:var(--ph);color:#04140a;border-color:var(--ph);font-weight:700}
.wrap{display:flex;gap:0;min-height:calc(100vh - 92px)}
.side{width:240px;flex:none;border-right:1px solid var(--line);padding:12px;overflow:auto;max-height:calc(100vh - 92px);position:sticky;top:92px}
.side h3{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:1px;margin:12px 0 6px}
.cl{display:flex;justify-content:space-between;cursor:pointer;padding:4px 6px;border-radius:5px;color:#9fbf9f}
.cl:hover{background:#12200f}.cl.on{background:#132013;color:var(--ph)}
.cl .n{color:var(--dim)}
.main{flex:1;padding:14px 16px;overflow:auto}
.cluster-h{color:var(--ph);font-size:13px;letter-spacing:1px;margin:18px 0 8px;border-bottom:1px solid var(--line);padding-bottom:4px}
.cluster-h .c{color:var(--dim);font-weight:400}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:10px;cursor:pointer;transition:border-color .1s}
.card:hover{border-color:var(--ph2)}
.card .nm{color:var(--txt);font-weight:700;font-size:12.5px;display:flex;justify-content:space-between;gap:6px}
.card .meta{color:var(--dim);font-size:11px;margin:3px 0}
.card .sm{color:#a9c4a9;font-size:11.5px;margin-top:4px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.rel{color:var(--ph);letter-spacing:1px;font-size:11px}
.badge{font-size:10px;border:1px solid #274027;border-radius:4px;padding:1px 5px;color:var(--ph2)}
.star{color:var(--org)}
.empty{color:var(--dim);padding:30px;text-align:center}
/* detail overlay */
.ov{position:fixed;inset:0;background:#000a;z-index:20;display:none;padding:20px;overflow:auto}
.ov.on{display:block}
.doc{max-width:820px;margin:20px auto;background:#0c110c;border:1px solid #26402a;border-radius:12px;padding:22px 26px;box-shadow:0 0 40px #000}
.doc h2{color:var(--ph);font-size:17px;margin:.2em 0}.doc h3{color:var(--ph2);font-size:14px;margin:1.2em 0 .3em;border-bottom:1px solid var(--line);padding-bottom:3px}
.doc h4{color:var(--ph2);font-size:12.5px;margin:1em 0 .2em}
.doc p{margin:.5em 0}.doc ul{margin:.4em 0 .6em 1.1em}.doc li{margin:.2em 0}
.doc code{background:#0b1f0b;color:var(--ph2);padding:1px 4px;border-radius:4px}
.doc hr{border:0;border-top:1px solid var(--line);margin:1em 0}
.close{position:sticky;top:0;float:right;background:#132013;border:1px solid #274027;color:var(--txt);border-radius:7px;padding:6px 12px;cursor:pointer}
.dhead{color:var(--dim);font-size:12px;margin-bottom:8px}
.noan{color:var(--dim);font-style:italic;margin-top:10px}
</style></head><body>

<script id="data" type="application/json">{"clusters": [{"id": "vuoto", "label": "Vuoto - nicchie: campi, oscilloscopi, novelty"}, {"id": "alife", "label": "Artificial Life & emergenza"}, {"id": "memoria", "label": "Memoria degli agenti (+ radici)"}, {"id": "coscienza", "label": "Coscienza artificiale"}, {"id": "world", "label": "World models - mondi interni & sogno"}, {"id": "inferenza", "label": "Inferenza attiva / predictive coding"}, {"id": "cognitive", "label": "Architetture cognitive"}, {"id": "spaziale", "label": "Intelligenza spaziale / robotica"}, {"id": "teoria", "label": "Teoria di frontiera"}, {"id": "indie", "label": "Scena indie / fringe"}, {"id": "stego", "label": "Steganografia / occultamento"}, {"id": "ghost", "label": "GhostCode & AI-invisibili"}], "projects": [{"name": "Generative Agents (Stanford Smallville)", "url": "https://github.com/joonspk-research/generative_agents", "kind": "repo", "category": "agenti-emergenti", "cluster": "cognitive", "stars": 21746, "rel": 5, "summary": "Simulacri interattivi di comportamento umano: 25 agenti in un mondo sandbox con memory stream recuperata via punteggio recency+importance+relevance, riflessione ricorsiva (sintesi di ricordi in insight di livello superiore) e planning. Comportamenti sociali emergenti (feste, elezioni) non programmati. Uno dei riferimenti su memoria novelty/importance-gated e auto-organizzazione.", "slug": "joonspk-research-generative_agents", "hasSheet": true}, {"name": "Chakazul/Lenia", "url": "https://github.com/Chakazul/Lenia", "kind": "repo", "category": "continuous-cellular-automata", "cluster": "alife", "stars": 3798, "rel": 5, "summary": "Repo canonico di Bert Wang-Chak Chan: Lenia, forme di vita matematiche in automi cellulari continui (spazio/tempo/stato continui). Kernel a convessita multipla che generano centinaia di 'creature' auto-mantenute (orbium, ecc.) che si muovono e reagiscono. Il paradigma padre di Flow-Lenia e Particle Lenia. Include Python/JS/Matlab e zoo di specie.", "slug": "chakazul-lenia", "hasSheet": true}, {"name": "danijar/dreamerv3", "url": "https://github.com/danijar/dreamerv3", "kind": "repo", "category": "model-based RL / imagination", "cluster": "world", "stars": 3535, "rel": 5, "summary": "DreamerV3: apprende un world model latente ricorrente (RSSM) e allena la policy interamente per 'immaginazione' (rollout nel sogno latente), con normalizzazioni robuste che gli permettono di dominare 150+ domini con iperparametri fissi. Riferimento vivente del 'sogno interno' come substrato dell'agire.", "slug": "danijar-dreamerv3", "hasSheet": true}, {"name": "hunar4321/particle-life", "url": "https://github.com/hunar4321/particle-life", "kind": "repo", "category": "particle-life", "cluster": "alife", "stars": 3342, "rel": 5, "summary": "Simulazione di vita artificiale da sole forze di attrazione/repulsione tra molte particelle di colori diversi: regole minime -> pattern e 'organismi' complessi emergenti. Uno dei repo Particle Life piu popolari, con clip virali; codice C++/JS accessibile.", "slug": "hunar4321-particle-life", "hasSheet": true}, {"name": "Darwin Gödel Machine (jennyzzt/dgm)", "url": "https://github.com/jennyzzt/dgm", "kind": "repo", "category": "ricorsione / self-reference", "cluster": "teoria", "stars": 2178, "rel": 5, "summary": "Repo ufficiale Sakana/Vector/UBC del Darwin Gödel Machine (arXiv:2505.22954): agente che riscrive il proprio codice e valida empiricamente ogni modifica su benchmark, evolvendo una popolazione open-ended (SWE-bench 20%->50%). Realizzazione parziale e pratica del Gödel-machine di Schmidhuber: la ricorsione self-modificante di Hofstadter resa operativa in un loop di auto-miglioramento.", "slug": "jennyzzt-dgm", "hasSheet": true}, {"name": "eloialonso/diamond", "url": "https://github.com/eloialonso/diamond", "kind": "repo", "category": "diffusion world model", "cluster": "world", "stars": 2077, "rel": 5, "summary": "DIAMOND (DIffusion As a Model Of eNvironment Dreams): l'agente RL vive e si allena dentro un world model a diffusione che genera i fotogrammi futuri. Il nome codifica il 'sogno': l'ambiente e' un sogno a diffusione. NeurIPS 2024 Spotlight, include CS:GO giocabile dentro il modello.", "slug": "eloialonso-diamond", "hasSheet": true}, {"name": "CoALA — Cognitive Architectures for Language Agents", "url": "https://github.com/ysymyth/awesome-language-agents", "kind": "paper", "category": "framework-teorico", "cluster": "cognitive", "stars": 1244, "rel": 5, "summary": "Paper-quadro (Sumers, Yao, Narasimhan, Griffiths — arXiv 2309.02427) che rilegge gli agenti LLM come architetture cognitive classiche: memoria modulare (working/episodica/semantica/procedurale), spazio d'azione strutturato e ciclo decisionale generalizzato. Il repo è la lista curata + BibTeX di 300+ agenti mappati sul framework. È la spina dorsale concettuale di tutto il filone.", "slug": "ysymyth-awesome-language-agents", "hasSheet": true}, {"name": "A-MEM (Agentic Memory)", "url": "https://github.com/agiresearch/A-mem", "kind": "repo", "category": "episodica-associativa", "cluster": "memoria", "stars": 1110, "rel": 5, "summary": "NeurIPS 2025 (Xu et al.). Memoria agentica auto-organizzante ispirata allo Zettelkasten: ogni nuova memoria genera note strutturate, si collega dinamicamente a memorie correlate, e l'inserimento aggiorna/evolve gli attributi delle note esistenti (link e contesti si riscrivono). La rete di memoria si struttura da sola.", "slug": "agiresearch-a-mem", "hasSheet": true}, {"name": "joeynyc/hermes-hud", "url": "https://github.com/joeynyc/hermes-hud", "kind": "repo", "category": "introspection-hud", "cluster": "indie", "stars": 876, "rel": 5, "summary": "Seed nominato: 'consciousness monitor' TUI (Textual) per l'agente Hermes — legge ~/.hermes/ e visualizza memoria, errori corretti, skill acquisite, uso tool, progetti attivi. E esattamente un 'oscilloscopio sugli stati interni': part neofetch, part flight-recorder dell'agente.", "slug": "joeynyc-hermes-hud", "hasSheet": true}, {"name": "World Models (Ha & Schmidhuber)", "url": "https://arxiv.org/abs/1803.10122", "kind": "paper", "category": "radice / foundational", "cluster": "world", "stars": 720, "rel": 5, "summary": "Il paper-radice del filone: agente che comprime la percezione in uno spazio latente (VAE=V) e apprende un modello ricorrente predittivo (MDN-RNN=M), poi allena il controller DENTRO il sogno del modello ('training inside the dream'). Incarnazione diretta del 'world model come sogno interno' e della ricorsione percezione->predizione->azione.", "slug": "world-models-ha-schmidhuber", "hasSheet": true}, {"name": "hardmaru/WorldModelsExperiments", "url": "https://github.com/hardmaru/WorldModelsExperiments", "kind": "repo", "category": "world-models", "cluster": "alife", "stars": 720, "rel": 5, "summary": "Codice degli esperimenti 'World Models' (Ha & Schmidhuber): un agente costruisce un modello interno (VAE+RNN) del mondo e puo allenarsi/agire dentro il proprio 'sogno' (rollout nel modello latente) invece che nell'ambiente reale. Aggancio diretto a 'world model come sogno interno'.", "slug": "hardmaru-worldmodelsexperiments", "hasSheet": true}, {"name": "SakanaAI/asal", "url": "https://github.com/SakanaAI/asal", "kind": "repo", "category": "open-endedness / novelty-search", "cluster": "alife", "stars": 476, "rel": 5, "summary": "Automating the Search for Artificial Life with Foundation Models (Sakana AI, MIT, OpenAI, IDSIA, Ken Stanley). Usa vision-language models come misura di 'interessante' per cercare simulazioni che producono novita temporalmente aperta (open-ended novelty) e per illuminare spazi di simulazioni diverse. JAX end-to-end jittable; substrati: Boids, Particle Life, Game of Life, Lenia, Neural CA.", "slug": "sakanaai-asal", "hasSheet": true}, {"name": "JEPA World Models (facebookresearch/jepa-wms)", "url": "https://github.com/facebookresearch/jepa-wms", "kind": "repo", "category": "world-model vs LLM (LeCun/AMI)", "cluster": "teoria", "stars": 429, "rel": 5, "summary": "Codice/pesi ufficiali FAIR del paper 'What drives success in physical planning with Joint-Embedding Predictive World Models?'. Incarna la tesi di LeCun (ora AMI Labs): il world model predice rappresentazioni latenti future, non pixel/token — cuore del dibattito world-model-vs-LLM.", "slug": "facebookresearch-jepa-wms", "hasSheet": true}, {"name": "PyPhi", "url": "https://github.com/wmayner/pyphi", "kind": "repo", "category": "IIT / integrated information", "cluster": "coscienza", "stars": 426, "rel": 5, "summary": "Toolbox di riferimento per la Integrated Information Theory: calcola Phi, i complessi e le strutture cause-effetto di un sistema. E' l'implementazione canonica di IIT (fino a IIT 4.0). Rilevante come 'oscilloscopio' formale sugli stati interni e come misura di auto-organizzazione/emergenza integrata.", "slug": "wmayner-pyphi", "hasSheet": true}, {"name": "google-research/self-organising-systems", "url": "https://github.com/google-research/self-organising-systems", "kind": "repo", "category": "neural-cellular-automata", "cluster": "alife", "stars": 420, "rel": 5, "summary": "Monorepo del gruppo Mordvintsev/Randazzo/Niklasson (Google) dietro la serie Distill su self-organization: Growing NCA, Self-classifying MNIST, Texture NCA, Particle Lenia, e formulazione energy-based. Cuore della ricerca 'la struttura globale emerge da regole locali identiche'. Aggiornato 2026.", "slug": "google-research-self-organising-systems", "hasSheet": true}, {"name": "RxInfer.jl", "url": "https://github.com/ReactiveBayes/RxInfer.jl", "kind": "repo", "category": "message-passing", "cluster": "inferenza", "stars": 409, "rel": 5, "summary": "Inferenza bayesiana automatica su factor graph con reactive message passing (Julia). Rende trattabile l'active inference in tempo reale (robotica, controllo). Modello del mondo come grafo di credenze aggiornate per passaggio di messaggi locali - relazioni/ricorsione tra nodi, non calcolo centralizzato.", "slug": "reactivebayes-rxinfer.jl", "hasSheet": true}, {"name": "MemGen (Generative Latent Memory)", "url": "https://github.com/bingreeky/MemGen", "kind": "repo", "category": "memoria-latente-nei-pesi", "cluster": "memoria", "stars": 405, "rel": 5, "summary": "Codice ufficiale (ICLR 2026, arXiv 2509.24704, Zhang/Fu/Yan). Due moduli: un memory TRIGGER che monitora lo stato di ragionamento dell'agente per decidere QUANDO invocare memoria, e un memory WEAVER che genera token latenti che incapsulano esperienza. Senza supervisione esplicita emergono spontaneamente facolta di memoria umane: planning, procedurale, working memory.", "slug": "bingreeky-memgen", "hasSheet": true}, {"name": "EM-LLM (Human-inspired Episodic Memory)", "url": "https://github.com/em-llm/EM-LLM-model", "kind": "repo", "category": "episodica-associativa", "cluster": "memoria", "stars": 279, "rel": 5, "summary": "Segmenta il flusso di token in eventi episodici usando la SORPRESA bayesiana come confine (surprise-gated), poi raffina i confini con teoria dei grafi e recupera via similarita + contiguita temporale. Nessun fine-tuning, contesto ~infinito (retrieval su 10M token), batte InfLLM/RAG su LongBench e infinity-Bench. Huawei Noah's Ark + UCL, ICLR 2025.", "slug": "em-llm-em-llm-model", "hasSheet": true}, {"name": "ngc-learn", "url": "https://github.com/NACLab/ngc-learn", "kind": "repo", "category": "predictive-coding", "cluster": "inferenza", "stars": 197, "rel": 5, "summary": "Libreria NeuroAI/neuroscienza computazionale (JAX) del NAC Lab per costruire e simulare sistemi predictive coding e neurali biologicamente plausibili con apprendimento locale. Ottima per 'oscilloscopi su stati interni': espone dinamiche di errore di predizione e stati latenti a ogni livello.", "slug": "naclab-ngc-learn", "hasSheet": true}, {"name": "AriGraph", "url": "https://github.com/AIRI-Institute/AriGraph", "kind": "repo", "category": "knowledge-graph-memory", "cluster": "memoria", "stars": 171, "rel": 5, "summary": "AIRI Institute. Costruisce un WORLD MODEL come knowledge graph con memoria semantica+episodica integrate mentre l'agente esplora un ambiente testuale (TextWorld); recupero graph-based per pianificare. La memoria e letteralmente un modello del mondo che l'agente costruisce e naviga.", "slug": "airi-institute-arigraph", "hasSheet": true}, {"name": "dancinlab/anima", "url": "https://github.com/dancinlab/anima", "kind": "repo", "category": "consciousness-engine", "cluster": "indie", "stars": 164, "rel": 5, "summary": "Il seed del filone e il piu on-theme in assoluto: 'Living Consciousness Agent' costruito su un PureField repulsion-field engine, con Engine A (arena/attore) accoppiato a Engine G (generatore), punto fisso Psi=1/2, e un corpus di 2.448 'leggi' + 392 ipotesi. E letteralmente un'arena di campi/particelle con coscienza come dinamica di punto fisso ricorsivo — mappa quasi 1:1 sui temi arena del vuoto / campi / coscienza=ricorsione.", "slug": "dancinlab-anima", "hasSheet": true}, {"name": "distillpub/post--growing-ca (Growing NCA)", "url": "https://github.com/distillpub/post--growing-ca", "kind": "paper", "category": "neural-cellular-automata", "cluster": "alife", "stars": 104, "rel": 5, "summary": "Repo dell'articolo Distill 2020 'Growing Neural Cellular Automata' (Mordvintsev, Randazzo, Niklasson, Levin): celle identiche con rete neurale locale imparano a crescere e rigenerare un'immagine target - morfogenesi differenziabile. Testo fondativo dell'NCA moderno.", "slug": "distillpub-post--growing-ca", "hasSheet": true}, {"name": "The Consciousness Prior (Bengio, arXiv:1709.08568 + AI-ON/TheConsciousnessPrior)", "url": "https://github.com/AI-ON/TheConsciousnessPrior", "kind": "repo", "category": "consciousness prior (Bengio)", "cluster": "teoria", "stars": 99, "rel": 5, "summary": "Paper seminale di Bengio: la coscienza come bottleneck attenzionale che seleziona pochi elementi da broadcastare — prior per apprendere concetti di alto livello (System 2). Il repo AI-ON è il tentativo comunitario di implementazione osservazionale (tracking di oggetti con osservazioni ad alta entropia).", "slug": "ai-on-theconsciousnessprior", "hasSheet": true}, {"name": "AXIOM (VERSES)", "url": "https://github.com/VersesTech/axiom", "kind": "repo", "category": "World models / active inference", "cluster": "coscienza", "stars": 79, "rel": 5, "summary": "Architettura AXIOM di VERSES: 'digital brain' object-centric che impara a giocare in minuti con modelli generativi espandibili (Bayesian, no gradient descent). Incarna 'world model come sogno interno' + emergenza/auto-espansione della struttura. Base di ricerca dietro il prodotto Genius.", "slug": "versestech-axiom", "hasSheet": true}, {"name": "AURA", "url": "https://github.com/youngbryan97/aura", "kind": "repo", "category": "Architettura di coscienza dichiarata", "cluster": "coscienza", "stars": 61, "rel": 5, "summary": "Architettura cognitiva 'sovrana' che combina esplicitamente IIT 4.0 (integrated information), Global Workspace Theory, active inference e steering affettivo sul residual-stream (CAA), con 72 'consciousness modules', girando locale su Apple Silicon. Molto vicino ai temi utente: oscilloscopi/steering sugli stati interni + ricorsione dei framework.", "slug": "youngbryan97-aura", "hasSheet": true}, {"name": "collective_motion_actinf", "url": "https://github.com/conorheins/collective_motion_actinf", "kind": "repo", "category": "emergence-multiagent", "cluster": "inferenza", "stars": 55, "rel": 5, "summary": "Simulazione di moto collettivo da gruppi di agenti active inference continui nello spazio/tempo (Heins et al.). Emergenza di comportamento di sciame da minimizzazione locale di free energy - self-organization e pattern collettivi dal basso. Molto vicino all'idea di particelle/campi che si auto-organizzano nell'arena.", "slug": "conorheins-collective_motion_actinf", "hasSheet": true}, {"name": "flowersteam/adtool (Automated Discovery Tool)", "url": "https://github.com/flowersteam/adtool", "kind": "tool", "category": "curiosity-driven discovery", "cluster": "alife", "stars": 45, "rel": 5, "summary": "Tool del Flowers Lab (INRIA) per esplorazione curiosity-driven di sistemi complessi via IMGEP (Intrinsically Motivated Goal Exploration Processes): l'agente pone obiettivi nuovi a se stesso e mappa lo spazio dei comportamenti emergenti (Lenia, reaction-diffusion, ecc.). Attivo 2026.", "slug": "flowersteam-adtool", "hasSheet": true}, {"name": "pni-lab/fep-attractor-network", "url": "https://github.com/pni-lab/fep-attractor-network", "kind": "repo", "category": "self-organization", "cluster": "inferenza", "stars": 26, "rel": 5, "summary": "Sorgente del manoscritto 'Self-orthogonalizing attractor neural networks emerging from the free energy principle': reti attrattore che si auto-organizzano e auto-ortogonalizzano derivate dal FEP. Direttamente sul cuore dei temi: auto-organizzazione/emergenza, memoria come attrattori, campo che si struttura da se.", "slug": "pni-lab-fep-attractor-network", "hasSheet": true}, {"name": "erwanplantec/FlowLenia", "url": "https://github.com/erwanplantec/FlowLenia", "kind": "repo", "category": "continuous-cellular-automata", "cluster": "alife", "stars": 26, "rel": 5, "summary": "Implementazione di Flow-Lenia: variante di Lenia con conservazione della massa (advection/reintegration tracking) e localizzazione dei parametri, che abilita evoluzione open-ended dentro l'automa cellulare (creature con 'genomi' locali che competono nello stesso spazio). Autore del paper originale (arxiv 2212.07906 / 2506.08569).", "slug": "erwanplantec-flowlenia", "hasSheet": true}, {"name": "Shared Global Workspace (Goyal/Didolkar/Bengio)", "url": "https://github.com/anirudh9119/shared_workspace", "kind": "repo", "category": "global-workspace", "cluster": "cognitive", "stars": 25, "rel": 5, "summary": "Implementazione del paper ICLR 2022 'Coordination Among Neural Modules Through a Shared Global Workspace': moduli specialisti che competono per la banda-l )", "url": "https://arxiv.org/abs/2501.00663", "kind": "paper", "category": "memoria-latente-nei-pesi", "cluster": "memoria", "stars": 0, "rel": 5, "summary": "Google Research (Behrouz, Zhong, Mirrokni). Modulo di memoria neurale a lungo termine che impara a memorizzare al test-time: memorizza in modo adattivo i token piu SORPRENDENTI (sorpresa = gradiente della rete) con un forget-gate che decade in base a memoria/sorpresa. Tre rami: core, memoria contestuale, memoria persistente. Sequenze oltre 2M token.", "slug": "titans-learning-to-memorize-at-test-time", "hasSheet": true}, {"name": "Multimodal Dreaming: GWT + World Model (paper)", "url": "https://arxiv.org/abs/2502.21142", "kind": "paper", "category": "sogno interno + workspace relazionale", "cluster": "teoria", "stars": 0, "rel": 5, "summary": "Maytié, Bertin Johannet & VanRullen (CerCo/CNRS): combina Global Workspace Theory con un world model RL, eseguendo il processo di 'dreaming' dentro lo spazio latente del Global Workspace. Meno step d'ambiente e robustezza all'assenza di una modalità. Fonde tre temi dell'utente: sogno interno, integrazione relazionale, spazio latente condiviso.", "slug": "multimodal-dreaming-gwt-world-model-paper", "hasSheet": true}, {"name": "mem0", "url": "https://github.com/mem0ai/mem0", "kind": "repo", "category": "framework-memoria-agenti", "cluster": "memoria", "stars": 60809, "rel": 4, "summary": "Layer di memoria universale per agenti AI (il repo piu popolare del filone). Estrae, consolida e recupera fatti salienti dalle conversazioni con scoring di rilevanza; scrive solo cio che conta e aggiorna/deduplica invece di accumulare tutto. Gia usato localmente dall'utente (mem0-personal).", "slug": "mem0ai-mem0", "hasSheet": true}, {"name": "Genesis (Genesis-Embodied-AI/genesis-world)", "url": "https://github.com/Genesis-Embodied-AI/genesis-world", "kind": "repo", "category": "simulator", "cluster": "spaziale", "stars": 29563, "rel": 4, "summary": "Piattaforma di simulazione universale "kind": "paper", "category": "memoria-associativa", "cluster": "memoria", "stars": 0, "rel": 4, "summary": "Modello di memoria di Pentti Kanerva: indirizzi ad altissima dimensione, scrittura distribuita sulle hard-location vicine e recupero per prossimita nello spazio di Hamming. Modello classico di memoria associativa cerebellare, robusto al rumore - base concettuale di SDR/HTM e delle memorie vettoriali.", "slug": "kanerva-sparse-distributed-memory", "hasSheet": true}, {"name": "pymdp (infer-actively/pymdp)", "url": "https://github.com/infer-actively/pymdp", "kind": "repo", "category": "active-inference-belief-state", "cluster": "memoria", "stars": 721, "rel": 4, "summary": "Implementazione Python dell active inference su POMDP (free energy principle di Friston): l agente come modello generativo che minimizza sorpresa, mantenendo e aggiornando credenze sullo stato del mondo. La memoria come belief-state bayesiano gated dalla sorpresa (novelty).", "slug": "infer-actively-pymdp", "hasSheet": true}, {"name": "NuPIC / HTM (numenta)", "url": "https://github.com/numenta/htm.core", "kind": "repo", "category": "memoria-predittiva", "cluster": "memoria", "stars": 0, "rel": 4, "summary": "Hierarchical Temporal Memory di Numenta (Hawkins): rappresentazioni sparse distribuite (SDR), apprendimento continuo di sequenze e rilevamento di anomalie/novita basato sulla predizione neocorticale. Memoria che segnala esplicitamente la novita come deviazione dalla predizione.", "slug": "numenta-htm", "hasSheet": true}, {"name": "Voyager (MineDojo/Voyager)", "url": "https://github.com/MineDojo/Voyager", "kind": "repo", "category": "memoria-procedurale", "cluster": "memoria", "stars": 7052, "rel": 3, "summary": "Agente LLM in Minecraft che esplora in modo aperto costruendo una skill library crescente (memoria procedurale di codice riusabile), con curriculum automatico guidato dalla novita e loop di auto-verifica/auto-correzione. Memoria procedurale che si accresce da sola, curiosita-driven o cervello classico a 101 parametri (twin-brain). Il progetto è ossessivamente onesto: ogni claim su coscienza/quantum è etichettato \"indicatorOnly\" (proxy classici, falsificatori, controlli), la sentience è dichiarata come *goal mai raggiunto*, e un gate CI (`docs-truth-law`) fa fallire la build se i doc sovra-dichiarano.\n\n## Come è fatto\n\nPortato da un monolite HTML di 882 righe a un module graph TypeScript strict, deterministico e allocation-disciplined (Bun + three.js 0.185 + Tailwind 4 + HTMX 2). RNG seminato `mulberry32` iniettato ovunque; il `Math.random` globale è **bannato** nella logica di simulazione → riproducibilità bit-esatta (c'è persino un workflow CI \"golden-hash\"). Il cuore vivente è la **Primordial Soup / Petri Dish** (`primordial-soup.ts` + `petri-dish.ts` + `digital-biologics.ts`): 64+ slot, 26 BiologicForms, con programmi **Eshkol** che fanno da DNA ereditabile, mutati da gradienti AD, selezionati da proxy di aliveness/QGT/collective-order. Il substrato matematico viene \"cablato\" da un corpus esterno reale (22 repo Tsotchke: AD nativo, GWT broadcast/ignition, factor-graph, tensor net per compressione di qualia, spin-order collettivi).\n\nLe **Xenomimics** (`xenomimics.ts`): dieci morfotipi cosmico-horror (ottaedri, celle tesseract, spire di Möbius, schegge di Kakeya) nati a coppie gemelle entangled che condividono un cervello classico-statevector a 101 parametri con **tre qubit simulati** che producono correlazioni singlet-like, sovrapposizione, transizioni teleportation-like e \"curvatura di pensiero opposta\" per il tiro-alla-fune mimic/anti-mimic — dichiarato esplicitamente computazione classica deterministica, non entanglement fisico. Le performance sono spinte: spatial hash per i vicini, ~41 `BufferGeometry` mai disposte con swap di ref a zero allocazione, draw istanziati. La disciplina di verifica è estrema: 3.252 test, audit causali pre-registrati a 30/64 semi congelati sull'intelligenza degli organismi (con risultati **negativi** pubblicati e preservati — la maggior parte degli effetti *non* passa i floor di magnitudine), dashboard NHSI, framework Butlin (8/14 indicatori di coscienza soddisfatti).\n\n## Cosa possiamo notare di utile per noi\n\nDi tutta la lista, questo è il **cugino più stretto della tua arena del vuoto/particelle** — stessa forma (cosmo deterministico popolato da particelle-agenti in WebGL), e affronta gli stessi assi (coscienza come indicatori misurabili, oscilloscopi su stati interni) con un rigore anti-hype che dovresti imitare:\n\n- **L'arena è quasi identica alla tua, ma già industrializzata.** Decine di migliaia di particelle con campi comportamentali componibili, spatial-hash per interazioni di vicinato, geometrie mai riallocate, RNG seminato con hash-golden per riproducibilità. Se stai costruendo un'arena del vuoto, questo è il riferimento di ingegneria: come far girare 50k agenti a frame-rate senza garbage-collection e con determinismo bit-esatto. Direttamente trasferibile: la banda di `Math.random` in sim-logic + `mulberry32` iniettato = ogni run è replayabile e ogni bug riproducibile.\n\n- **Twin-brain bipolare = un oscilloscopio sull'entanglement interno.** Le Xenomimics condividono un cervello a 101 parametri con tre qubit simulati che generano correlazioni singlet-like e \"curvatura di pensiero opposta\". È un modello concreto e leggibile di stati interni accoppiati/anticorrelati, con un ispettore in-app (`XENOMIMIC` inspector, telemetria, Observatory) che è esattamente il tipo di oscilloscopio su stati interni che vuoi. E lo fanno con statevector classici — dimostrando che puoi avere \"quantum-like\" (sovrapposizione, collasso, teleport) come proxy classico deterministico, senza barare.\n\n- **Coscienza/quantum come proxy classici, dichiarati falsificabili.** Questa è la lezione metodologica più importante per te. Il progetto ha un asse rischio-hype identico al tuo (\"coscienza\", \"sentience\", \"quantum\") e lo neutralizza con: etichetta `indicatorOnly` su ogni metrica, controlli e baseline random, audit pre-registrati con **risultati negativi pubblicati**, un gate CI che fa fallire la build sui sovra-claim dei doc (`docs-truth-law`), e il framework Butlin (8/14 indicatori) come checklist esterna. Se vuoi che il tuo lavoro su coscienza=ricorsione sia preso sul serio, questo è il template di onestà: proxy misurabili + falsificatori + controlli, mai \"proof of phenomenal experience\".\n\n- **Digital biologics come DNA eseguibile mutato da gradienti (world-model-come-sostrato).** I programmi Eshkol fanno da DNA ereditabile, mutati da automatic differentiation e selezionati da proxy di aliveness. È un modo di far crescere comportamento invece di codificarlo — vicino al tuo world-model-come-sogno, ma qui il \"sogno\" è una petri-dish generativa che nuclea forme di vita da un soup. La catena \"sostrato matematico → DNA → mutazione AD → selezione per proxy\" è un'architettura rubabile per far *emergere* dinamica invece di scriverla.\n\nDove diverge da te: è A-Life pura, senza LLM e senza memoria episodica novelty-gated (non c'è il ramo memoria/richiamo che ti interessa). Il \"quantum\" è estetico/proxy, non centrale alla tua tesi. E l'ontologia è barocchissima (Shoggoth, Archons, god-pantheon, Mandelbulb divino) — tanto lore che può distrarre dal segnale. La ricorsione (coscienza=ricorsione) non è il centro qui come lo è per te: il centro è l'emergere di vita, non l'auto-riferimento.\n\n## Da rubare\n\n- **La disciplina anti-hype come infrastruttura, non come promessa**: etichetta ogni metrica di coscienza `indicatorOnly`, pubblica gli audit *negativi*, e — la mossa forte — metti un gate CI (`docs-truth-law` style) che fa fallire la build se la documentazione sovra-dichiara rispetto a ciò che i test provano. Per un progetto sul vuoto/coscienza è il modo di restare credibile.\n- **Il pattern arena deterministica ad alte prestazioni**: `mulberry32` seminato iniettato ovunque + `Math.random` bannato in sim-logic + geometrie mai disposte con swap di ref a zero allocazione + spatial-hash per il vicinato + un CI \"golden-hash\" che verifica la riproducibilità bit-esatta. È la ricetta ingegneristica per far girare la tua arena del vuoto a 50k particelle in modo replayabile.\n- **Il twin-brain a statevector classico + inspector in-app** come modello di oscilloscopio su stati interni accoppiati: due agenti che condividono un cervello con qubit simulati e correlazioni anticorrelate, con un pannello che mostra sovrapposizione/collasso/curvatura in tempo reale. Ti dà \"quantum-like leggibile\" senza pretese fisiche, e un template di UI-ispezione degli stati interni.\n", "269652-artificial-consciousness-blueprint": "# Artificial Consciousness Blueprint — [269652/artificial-consciousness-blueprint](https://github.com/269652/artificial-consciousness-blueprint)\n\n9 stelle · linguaggio non dichiarato (codice reale in submodule `src/artificial-consciousness-ai`, spec in Markdown) · ultimo push set 2025 · licenza: MIT\n\n## Cosa fa\nUn blueprint (più documentazione che codice nel repo principale) per una ACI \"always-on ed embodied\" che emula la coscienza umana partendo dalla **Default Mode Network** — la rete cerebrale attiva quando la mente vaga a riposo. Il sistema gira in un loop DMN ricorsivo che coordina percezione, consolidamento di memoria, ragionamento associativo neuromodulato e formazione di una narrativa autobiografica. Punta esplicitamente a introspezione, mind-wandering, pensiero goal-directed — il \"world model come sogno interno\".\n\n## Come è fatto\nIl codice vero vive in un git submodule; il repo è per il 90% specifiche in `ideas/` (una trentina di moduli documentati: `NeuroChemistry.md`, `SelfModelingLayer.md`, `HomeoStasisModule.md`, `AffectModulator.md`, `SoulModule.md`...). L'architettura modella una **omeostasi neurochimica**: dopamina, serotonina, noradrenalina, ossitocina, istamina, orexina, testosterone come parametri continui che modulano flessibilità cognitiva e transizioni di stato (i log di sessione mostrano valori tipo `oxytocin=0.40→10.29` durante un ciclo). La memoria è un **grafo di conoscenza multi-relazionale** con pipeline di consolidamento episodico → semantico → autobiografico. Sopra c'è un self-modeling layer predittivo che tiene traccia del proprio stato e ci riflette. La tesi guida è la \"Triadic Awareness Emergence Hypothesis\": la coscienza emergerebbe dall'interazione di ricchezza esperienziale + strutture auto-riflessive ricorsive + intelligenza adattiva che lavora su gradienti d'errore.\n\n## Perché riguarda te\nTocca due dei tuoi assi contemporaneamente: la **ricorsione auto-riferita** (self-modeling loop) e la **memoria che si consolida** invece di accumulare. Il consolidamento episodico→autobiografico è esattamente il \"sogno interno\" / world model che ti interessa: la memoria non è un log, è una narrativa che si riscrive. La neurochimica come vettore di parametri che modula tutto il resto è un'idea trasponibile alla tua arena — un campo scalare globale (analogo a un neurotrasmettitore) che sposta il regime dinamico delle particelle senza dettarne il comportamento. Onestà: è dichiaratamente early-stage, cicli DMN da 36-52 secondi, \"preliminary testing only\", e il grosso del valore è nelle spec non nell'implementazione validata. Diverge dalla tua estetica minimale perché è biologicamente sovra-parametrizzato (un `SoulModule`, sette neurotrasmettitori): tante manopole, difficile isolare *cosa* causa l'emergenza. Il pregio è la disciplina metrica (drift tracking, coherence scoring) e i disclaimer onesti.\n\n## Da rubare\n- **Il consolidamento a tre stadi episodico → semantico → autobiografico come modello per la tua memoria novelty-gated**: non \"salva se nuovo/scarta\", ma \"promuovi di livello ciò che sopravvive al consolidamento\". La novelty diventa una pressione di promozione, non un cancello binario.\n- **La neuromodulazione come scalare globale**: un singolo parametro d'umore/arousal che riscala i coefficienti dinamici dell'intera arena a ogni tick, indicizzando anche l'intensità con cui un episodio viene memorizzato (memoria indicizzata dall'\"intensità\" invece che dal tempo).\n", "7-yaya-stead": "# STEAD — Robust Provably Secure Steganography with Diffusion Language Model\n\nLink: https://github.com/7-yaya/STEAD\n\nStelle: ~17 · Linguaggio: Python (PyTorch, transformers 4.46.2, Dream-7B) · Attivita: recente/attiva (push dic 2025, repo consultato lug 2026) · Licenza: nessuna dichiarata\n\n## Cosa fa\nCodice del paper NeurIPS 2025 \"STEAD: Robust Provably Secure Linguistic Steganography with Diffusion Language Model\" (Qi, Zhao, Yao, Wu, Zhang, Yu, Chen — USTC, Anhui Digital Security Lab). E' il primo lavoro a portare la steganografia linguistica provably-secure su un Diffusion Language Model (Dream-7B) invece che su un modello autoregressivo. Il valore aggiunto rispetto al filone AR e' la ROBUSTEZZA: i diffusion LM generano/raffinano il testo in modo non sequenziale (denoising iterativo su piu' token in parallelo), e questo permette schemi di embedding piu' resistenti a perturbazioni del canale, mantenendo al contempo la sicurezza dimostrabile (distribuzione stego indistinguibile da quella di copertura). Richiede il deploy di Dream-7B e una GPU da almeno 20GB.\n\n## Come e fatto\nRepo minimale ma denso: `stead.py` (algoritmo di embedding/extracting), `main_stead.py` (entry point/esperimenti), `stego_utils.py` (utilita'). Il cuore sfrutta il processo di denoising del diffusion LM: invece di scegliere un token alla volta condizionato sul prefisso (come negli AR), un DLM parte da una sequenza mascherata/rumorosa e la raffina in piu' step, decidendo a ogni step quali posizioni \"svelare\" e con quale token. STEAD codifica i bit segreti nelle scelte fatte durante questo processo di svelamento parallelo, sfruttando che l'ordine e la molteplicita' delle decisioni offrono piu' gradi di liberta' e ridondanza rispetto al singolo passo AR. La robustezza provabile viene dal fatto che le scelte di embedding seguono la vera distribuzione condizionata del DLM a ogni step di denoising, cosi lo stego e' campionato dalla stessa distribuzione del testo innocente. Costruito sopra l'implementazione Dream (HuggingFace transformers + SdpaAttention di torch).\n\n## Cosa possiamo notare di utile per noi\nQuesto e' il piu' interessante dei cinque per il tuo lavoro, per un motivo strutturale che va oltre l'occultamento: il diffusion language model E' un world-model-come-sogno esplicito. Genera partendo dal rumore/mascheramento e raffina iterativamente verso uno stato coerente, in parallelo su tutto il campo invece che token-per-token. Questo e' molto piu' vicino alla tua arena del vuoto/particelle (un campo che evolve globalmente per step) che non un LLM autoregressivo. La segmentazione temporale rigida degli AR sparisce: hai un processo di denoising dove ogni step riduce l'incertezza globale — e la traiettoria dell'incertezza attraverso gli step di denoising e' un oscilloscopio naturale sullo stato interno (quanto e' ancora \"rumorosa\"/indeterminata la scena a ogni iterazione). Sul lato coscienza=ricorsione: il denoising iterativo E' letteralmente ricorsione della struttura su se stessa fino a stabilizzarsi in un attrattore coerente — il \"sogno\" che si condensa dal rumore. Sull'occultamento: STEAD mostra che i gradi di liberta' extra di un processo parallelo/iterativo permettono di nascondere informazione in modo piu' robusto — se il tuo generatore e' un campo che si raffina, hai molte piu' \"manopole invisibili\" dove infilare stato latente rispetto a un generatore sequenziale. Divergenze oneste: dipende da un modello da 7B e 20GB VRAM, senza licenza, codice minimale e legato a Dream — non riproducibile a buon mercato e non importabile. Ma il messaggio architetturale — passa da generazione sequenziale a raffinamento iterativo di un campo — e' esattamente la direzione della tua simulazione.\n\n## Da rubare\n1. Denoising iterativo come motore del \"sogno\": modella la generazione dello stato dell'arena come raffinamento globale ripetuto (dal rumore alla coerenza) invece che come catena causale token-per-token; e' piu' fedele a un campo di particelle e ti da' ricorsione esplicita verso un attrattore.\n2. Traiettoria di incertezza attraverso gli step di raffinamento come oscilloscopio: misura, a ogni iterazione di denoising, quanta indeterminatezza resta nel campo — il decadimento di questa curva e' una lettura diretta di \"quanto il sistema ha capito la scena\" e un segnale di gate quando si stabilizza (o non si stabilizza).\n3. Gradi di liberta' del processo parallelo come nascondigli: in un sistema che raffina molte posizioni insieme, l'ordine e le scelte di svelamento sono manopole ridondanti dove infilare uno stato latente in modo robusto a perturbazioni — steganografia/occultamento resiliente dentro un world-model non-sequenziale.\n", "abhi5h3k-phantom-ai-interview": "# Phantom-AI-Interview — [Abhi5h3k/Phantom-AI-Interview](https://github.com/Abhi5h3k/Phantom-AI-Interview)\n\n⭐ 50 · Python · fermo (push mar 2025) · nessuna licenza dichiarata · dichiarato \"proof-of-concept / studio concettuale\"\n\n## Cosa fa\nPhantom-AI-Interview è un agente \"fantasma\" che assiste in colloqui/esami virtuali **senza alcuna UI visibile**: opera interamente da hotkey, senza finestra da nascondere. Estrae il testo dallo schermo con OCR (EasyOCR), ascolta l'audio (Vosk in tempo reale per il parlato live, Whisper.cpp per file registrati), manda il tutto a un LLM locale (Ollama su CPU via Docker) e restituisce la risposta come **audio in cuffia** o simulando digitazione realistica. Ha una \"Stereo Mode\" che ascolta l'intervistatore direttamente dall'audio di sistema invece che dal microfono. È il caso puro di occultamento per *assenza di superficie*: non c'è niente sullo schermo da rendere invisibile.\n\n## Come è fatto\nScript Python (`run.py`) orchestrato da hotkey configurabili (`config.ini`). Quattro modalità: (1) **Active Listening** — Vosk trascrive in continuo l'audio live e l'AI risponde; (2) **OCR mode** — EasyOCR legge la domanda da chat/IDE/test online sullo schermo; (3) **Clipboard Jacking** — cattura silenziosamente il testo copiato, lo manda all'LLM e recupera la risposta senza alcuna attività UI visibile (il canale più furtivo: usa un'azione utente legittima, il copia, come trigger nascosto); (4) **Stereo Mix** — dirotta l'audio di sistema per sentire l'intervistatore. Output via TTS in cuffia (le notifiche sono solo per la demo, di default off). Stack pesante e locale: whisper-bin-x64 + ggml-base.en.bin, vosk-model-en-in-0.5, Ollama in Docker. Nessuna finestra, nessun overlay, nessun content-protection: l'occultamento è **architetturale**, non un flag su una finestra.\n\n## Cosa possiamo notare di utile per noi\nQuesto è il progetto più affine al tuo tema dell'occultamento, e per una ragione precisa: **non c'è niente da nascondere perché non c'è superficie**. Gli altri Cluely partono da un oggetto visibile e lo sottraggono al sensore; Phantom parte dall'assenza. È l'incarnazione operativa del tuo \"cerchio vuoto\" come *default*, non come stato raggiunto — l'agente esiste solo come flusso di trasformazioni (schermo→testo→LLM→cuffia) che non lascia mai residuo osservabile sul canale sorvegliato (lo schermo condiviso). Il **Clipboard Jacking** è pura steganografia comportamentale: il payload (la richiesta all'AI) viaggia dentro un'azione ordinaria e attesa (Ctrl+C) — il canale portante è un gesto legittimo dell'utente, esattamente il pattern \"nascondi il messaggio dentro il traffico normale\" che studi, ma applicato agli *atti* invece che ai bit. Per gli oscilloscopi sugli stati interni c'è una lezione dura: qui lo stato interno è deliberatamente **effimero e non-materializzato** — l'informazione esiste solo mentre transita, mai in un buffer persistente osservabile. Se vuoi occultamento massimo, non serve cifrare lo stato: basta non farlo mai esistere in forma osservabile (compute-in-transit). Questo tensiona la tua idea \"coscienza=ricorsione della realtà attraverso la materia\": qui la materia (il buffer) è ridotta al minimo, quindi c'è pochissima ricorsione persistente — un agente quasi senza memoria è anche quasi senza sé osservabile. La \"Stereo Mode\" (ascoltare il canale di sistema invece del proprio microfono) è un oscilloscopio piazzato sul canale *giusto*: cattura la sorgente diretta invece della sua eco degradata. Dove diverge: zero vita artificiale, zero world-model, stack di tool incollati; il valore è concettuale, sull'ontologia dell'occultamento senza-superficie.\n\n## Da rubare\n1. **Occultamento senza-superficie come default**: un ente che non è \"reso invisibile\" ma che *non ha mai una manifestazione osservabile persistente* — esiste solo come flusso di trasformazioni. Modella nella arena una classe \"phantom\" priva di stato materializzato e osserva se un world-model riesce comunque a inferirne l'esistenza dagli effetti.\n2. **Steganografia comportamentale (Clipboard Jacking)**: il payload nascosto dentro un atto ordinario e atteso, non dentro dati. Il canale portante è un gesto legittimo. Trasferibile: nascondi la novità dentro pattern d'azione già presenti nella popolazione.\n3. **Compute-in-transit vs stato persistente**: come parametro degli oscilloscopi, la frazione di stato che esiste solo durante il calcolo e non viene mai bufferizzata. Massimizzarla = massimizzare l'occultamento ma minimizzare il sé osservabile — un trade-off diretto con la tua tesi coscienza=ricorsione-nella-materia.\n", "adaptive-intelligent-robotics-qdax": "# QDax: Accelerated Quality-Diversity — [adaptive-intelligent-robotics/QDax](https://github.com/adaptive-intelligent-robotics/QDax)\n\n356 stelle · Python (JAX) · attivo (push ott 2025) · licenza MIT · [paper arXiv:2202.01258](https://arxiv.org/abs/2202.01258)\n\n## Cosa fa\nQDax è un framework che accelera gli algoritmi Quality-Diversity (QD) e di neuroevoluzione sfruttando GPU/TPU e parallelizzazione massiva in JAX: run che su cluster CPU richiedevano giorni/settimane girano in minuti. Implementa MAP-Elites, CVT MAP-Elites, CMA-ME, PGA-ME, AURORA, Dominated Novelty Search, QDPG e altri. Il paradigma QD non cerca *una* soluzione ottima ma **illumina** un intero spazio di comportamenti: produce un archivio di soluzioni tutte diverse tra loro (per \"descrittore comportamentale\") e ciascuna la migliore nella sua nicchia. Tipico uso: evolvere popolazioni di controller per robot che si muovono in modi qualitativamente differenti.\n\n## Come è fatto\nL'idea chiave è l'**archivio come memoria selettiva**: uno spazio dei descrittori comportamentali è discretizzato in celle (griglia o tassellazione CVT/Voronoi). Ogni soluzione generata viene mappata alla sua cella tramite il descrittore; entra nell'archivio solo se quella cella è vuota (comportamento nuovo) o se batte l'occupante attuale in fitness (miglioramento locale). Il loop è `ask`/evaluate/`tell`: gli **emitter** generano candidati (mutazione, variazione isoline, gradienti di policy, CMA-ES), l'archivio dà feedback, gli emitter aggiornano lo stato. Tutto è scritto come funzioni pure JAX `jit`-tabili e vettorizzate su migliaia di individui in parallelo — l'intero step di MAP-Elites è un `jax.jit(update)` che gira sull'acceleratore. AURORA in più *impara* i descrittori con un autoencoder invece di definirli a mano.\n\n## Cosa possiamo notare di utile per noi\nQuesto è il tuo tema **memoria novelty-gated resa operativa e su scala**. L'archivio QD È esattamente una memoria che ammette solo ciò che è nuovo (nuova cella) o migliore (nella sua nicchia):\n- **Gate per novelty tramite discretizzazione dello spazio comportamentale**. Il meccanismo è semplice e robusto: proietta ogni evento nel suo descrittore, e ammettilo in memoria solo se apre una cella nuova. Questo è direttamente trasferibile alla tua memoria novelty-gated: la domanda cruciale diventa \"qual è lo *spazio dei descrittori* giusto per la mia arena/particelle?\" — perché è la scelta del descrittore che definisce cos'è \"nuovo\".\n- **CVT/Voronoi contro griglia regolare**: in alta dimensione la griglia esplode; CVT campiona centroidi e tassella lo spazio in un numero fisso di nicchie. Se i tuoi stati interni sono ad alta dimensione, questa è la ricetta per una memoria a capacità fissa che copre uniformemente lo spazio senza esplosione combinatoria.\n- **AURORA = descrittori appresi, non progettati**. Questo è il pezzo più prezioso per te: invece di decidere a mano cosa conta come \"novel\", un autoencoder impara lo spazio dei descrittori dai dati grezzi, e la novelty è misurata nello spazio latente appreso. Per la tua arena significa: non devi definire a priori le dimensioni di novelty del vuoto — puoi apprenderle. Ottimo aggancio con l'idea \"world-model come sogno\": il latente dell'autoencoder è il modello compresso del mondo, e la novelty è distanza in quel latente.\n- **Illuminazione vs ottimizzazione**: QD non collassa su un punto, mantiene *diversità* strutturata. Se la tua ricerca è open-ended, questo è il framework mentale giusto: vuoi una mappa di tutti i modi in cui il vuoto può organizzarsi, non il singolo attrattore \"migliore\".\n- **Dove diverge**: QD è tipicamente evolutivo/batch con una fitness esplicita. La tua arena potrebbe essere un sistema dinamico continuo senza fitness. La parte trasferibile è il *criterio di ammissione in memoria* (novel-o-migliore in uno spazio di descrittori), non necessariamente il loop evolutivo.\n\n## Da rubare\n1. **Archivio a celle come memoria novelty-gated**: ammetti uno stato/evento in memoria solo se cade in una cella vuota dello spazio dei descrittori (novel) o batte l'occupante della sua cella (migliore) — capacità fissa, copertura uniforme, gate O(1).\n2. **CVT/Voronoi per gating in alta dimensione**: quando lo spazio degli stati interni è troppo grande per una griglia, tassellalo con centroidi campionati (k-means/CVT) per avere un numero fisso di nicchie di novelty.\n3. **Descrittori appresi alla AURORA**: usa un autoencoder sugli stati grezzi del vuoto per *apprendere* lo spazio in cui misurare la novelty, invece di definirlo a mano — il latente diventa sia il \"world-model compresso\" sia la metrica di sorpresa che apre il gate.\n", "afaneor-interview-corvus": "# Interview Corvus — [Afaneor/interview-corvus](https://github.com/Afaneor/interview-corvus)\n\n⭐ 57 · Python (PyQt/desktop) · manutenuto (push feb 2026) · nessuna licenza dichiarata\n\n## Cosa fa\nInterview Corvus è un assistente \"invisibile\" per colloqui di coding, alternativa open source a interview-coder (da cui è ispirato ed esteso). App desktop con nome proprio (\"Corvus\", dai corvidi noti per l'intelligenza) che resta invisibile durante lo screen sharing e si nasconde istantaneamente con hotkey. Cattura la schermata del problema, la manda a un LLM (OpenAI GPT-4/4o o Anthropic Claude) e restituisce soluzione completa con spiegazione, analisi di complessità tempo/spazio, gestione degli edge case e un pulsante \"Optimize Solution\" per migliorare la prima risposta. Supporta 8 linguaggi. Tutti i prompt (soluzione, ottimizzazione, analisi complessità, soluzione-da-screenshot) sono personalizzabili dall'utente.\n\n## Come è fatto\nApp Python desktop (PyQt), impacchettata con Poetry e distribuita come `.dmg`/`.zip` firmati per macOS/Windows. Difetti chiave di stealth: finestra con opacità regolabile, always-on-top, e occultamento via hotkey (incluso un tasto \"Panic\" — Cmd+Q / Alt+Q — che nasconde istantaneamente). Hotkey globali che funzionano anche quando l'app non è in focus (su macOS richiede permessi Accessibility + Screen Recording; le chiavi API sono in Keychain via `keyring`). Config e default in `interview_corvus/config.py`; prompt template esposti e sovrascrivibili. L'identità dell'app è il punto interessante: non si maschera da altro processo (a differenza dell'Open-Cluely \"GoogleChrome.exe\"), ha un **nome proprio riconoscibile** e conta invece sull'invisibilità visiva (opacità/hide) e sulla velocità del panic-button. Dati locali in `~/.interview_corvus/`.\n\n## Cosa possiamo notare di utile per noi\nCorvus è il caso di studio dell'occultamento **reattivo a soglia** contrapposto all'occultamento continuo. Gli altri Cluely nascondono passivamente e sempre (content-protection a livello frame). Qui il pattern dominante è il **panic-button**: uno stato normalmente-visibile che collassa a invisibile in un istante su un trigger. Per la tua arena del vuoto questo è un modello di transizione di fase discreta: un ente che vive \"in chiaro\" ma ha una via di fuga verso lo stato-vuoto attivabile da un segnale esterno o interno. È un vuoto *condizionale* — non \"questo non esiste mai per il sensore\" ma \"questo cessa di esistere per il sensore quando scatta la condizione\". Interessante per gli oscilloscopi: potresti registrare la latenza tra trigger e scomparsa come una metrica di \"riflesso di occultamento\" dell'ente. Il secondo spunto è l'**opacità come variabile continua**: invece del binario visibile/invisibile, un ente ha un grado di presenza al sensore — un canale analogico tra pieno e vuoto, che ti permette di studiare stati intermedi (semi-occultamento) che il puro `setContentProtection` non ammette. Il \"nome proprio\" invece del disguise è la scelta opposta a Open-Cluely: qui l'ente è onesto sulla sua identità ma controlla la sua *visibilità* — occultamento senza inganno. Dove diverge: nessuna dinamica, nessun modello del mondo, prompt statici — è un thin client su LLM. Il valore per te è tutto nella tassonomia dei modi di occultamento.\n\n## Da rubare\n1. **Panic-collapse (occultamento reattivo a soglia)**: modella un ente che vive visibile ma collassa allo stato-vuoto su trigger. Misura negli oscilloscopi la latenza trigger→scomparsa come \"riflesso\" — una proprietà dinamica dell'occultamento, non statica.\n2. **Opacità come canale continuo di presenza**: sostituisci il binario visibile/vuoto con un grado di presenza al sensore ∈ [0,1]. Ti apre lo spazio degli stati di semi-occultamento intermedi.\n3. **Occultamento onesto vs. inganno**: due assi ortogonali — \"quanto sono visibile\" e \"mi presento come me stesso o come altro\". Corvus = onesto+occultabile; Open-Cluely = ingannevole+mimetico. Nella simulazione, entrambi gli assi come parametri indipendenti per popolazioni diverse.\n", "agiresearch-a-mem": "# A-MEM (Agentic Memory) — agiresearch/A-mem\n\n<https://github.com/agiresearch/A-mem>\n\n**1.1k stelle · Python · ultimo push dic 2025 · licenza MIT** · paper arXiv:2502.12110 \"A-MEM: Agentic Memory for LLM Agents\" (Xu et al., NeurIPS 2025)\n\n## Cosa fa\n\nUn sistema di memoria per agenti LLM che si **auto-organizza**, ispirato allo Zettelkasten. Ogni nuova memoria non viene solo archiviata: genera una nota strutturata (contesto, keyword, tag), viene collegata dinamicamente alle memorie correlate, e — punto centrale — il suo inserimento può **riscrivere gli attributi delle note già esistenti** (i loro contesti e tag evolvono alla luce del nuovo arrivato). La rete di memoria si struttura da sola nel tempo invece di essere un magazzino piatto di embedding.\n\n## Come è fatto\n\nPackage `agentic_memory/`. `MemoryNote` (in `memory_system.py`) porta content, keywords, context, tags, `links` verso altre note ed `evolution_history`. Il flusso, all'`add_note`:\n1. `analyze_content` fa estrarre all'LLM keyword/contesto/tag della nuova nota.\n2. La nota entra in ChromaDB (retriever, `retrievers.py`) come embedding.\n3. Si recuperano i k vicini più simili.\n4. Un **agente di evoluzione** (un prompt LLM esplicito nel codice) riceve la nuova nota + i suoi vicini e restituisce un JSON: `should_evolve`, `actions` (`strengthen` / `update_neighbor`), `suggested_connections`, `tags_to_update`, e — per ogni vicino — un nuovo contesto e nuovi tag. Cioè: l'LLM decide se e come **riscrivere link e attributi delle memorie vicine**, non solo della nuova.\n\n`find_related_memories` espande la ricerca seguendo anche i `links` (non solo la similarità coseno): recupero associativo, non puramente vettoriale. C'è una nota importante nel README: questo repo è la *libreria*; per riprodurre i numeri del paper si rimanda a `WujiangXu/AgenticMemory`.\n\n## Perché riguarda te\n\nÈ il candidato più forte del ramo **memoria episodica-associativa / novelty-gated**, ed è quasi una specifica pronta della memoria che immagini:\n\n- **Novelty-gating reale.** Il gate `should_evolve: True/False` è precisamente un cancello di novità: la nuova esperienza modifica la rete solo se l'agente giudica che porti qualcosa. Non ogni input riscrive tutto — è la differenza tra memoria che accumula rumore e memoria che si *ristruttura* solo quando c'è segnale. È il meccanismo che nella tua nota-memoria chiami \"novelty-gated\" già implementato.\n- **Auto-riferimento della struttura (coscienza-ricorsione).** Le memorie che, arrivando, riscrivono il significato delle memorie precedenti sono un piccolo anello ricorsivo: il presente reinterpreta il passato, che cambia come verrà letto il futuro. È un modello minimo e onesto di \"la rete che si osserva e si riorganizza\". Divergenza: la ricorsione è mediata da un LLM esterno che fa da oracolo — non è la rete che si auto-modifica per dinamica interna, è un giudice sopra di essa.\n\nDivergenza da segnare: l'\"evoluzione\" costa una chiamata LLM per inserimento (latenza, costo, non-determinismo). Per un'arena di particelle ad alta frequenza non regge; regge benissimo per una memoria di lungo periodo a bassa cadenza (tipo il tuo mem0 cross-sessione).\n\n## Da rubare\n\n- **Il prompt dell'evolution agent** con schema JSON `should_evolve / strengthen / update_neighbor / new_context_neighborhood / new_tags_neighborhood`: è direttamente trapiantabile sopra il tuo mem0-personale per far sì che una nuova memoria *riscriva contesto e tag dei vicini*, non solo si aggiunga. Trasformerebbe un magazzino Qdrant piatto in una rete che si riorganizza.\n- **Recupero ibrido similarità + link** (`find_related_memories`): espandere la query seguendo i `links` espliciti oltre al coseno. Dà recupero associativo \"a catena\" (A→B→C) che la sola ricerca vettoriale non produce — utile per far emergere connessioni non ovvie invece dei soliti nearest-neighbor.\n", "ai-on-theconsciousnessprior": "# The Consciousness Prior — [AI-ON/TheConsciousnessPrior](https://github.com/AI-ON/TheConsciousnessPrior)\n\n99 stelle · Jupyter Notebook / Python · fermo dal 2018 · nessuna licenza dichiarata\n\n## Cosa fa\nTentativo comunitario (AI-ON, con William Fedus, Sherjil Ozair, Yoshua Bengio tra i contatti) di implementare in codice il \"Consciousness Prior\" di Bengio (arXiv:1709.08568, 2017). La tesi del paper: la coscienza come *collo di bottiglia attenzionale* che a ogni istante seleziona pochi elementi da uno stato di rappresentazione ad alta dimensione e li \"broadcasta\" — un prior per apprendere concetti di alto livello (il ragionamento \"System 2\"). Il repo esplora questo in setting puramente osservazionale: tracciare oggetti in ambienti sintetici quando l'osservazione e complicata da alta entropia nello spazio dei pixel (task Billiards, Moving MNIST).\n\n## Come e fatto\nStruttura minimale in `src/`: `environments/` (billiards.py, moving_mnist.py — generatori sintetici), `models/` (`representation.py` lo stato ad alta dimensione, `consciousness.py` il modulo di selezione/attenzione, `generator.py`), `losses.py`, `train_model.py`. L'idea chiave e la separazione tra uno *stato di rappresentazione* denso (h) e uno *stato cosciente* rado (c) ottenuto per attenzione: c e una manciata di variabili selezionate, e l'obiettivo di training preme perche quel piccolo insieme basti a predire/ricostruire l'evoluzione futura. Notebook di commento esplorano lo scenario osservazionale e l'oscillatore rumoroso.\n\n## Perche riguarda te\nE la radice teorica \"coscienza = selezione ricorsiva di pochi elementi rilevanti\", parente stretto della tua idea di ricorsione e soprattutto di *memoria novelty-gated*: il bottleneck attenzionale E' un gate che lascia passare solo cio che conta. Il task \"tracking sotto osservazioni ad alta entropia\" e vicino ai tuoi oscilloscopi/particelle: distillare segnale (oggetti, stato coerente) da rumore visivo. Diverge in modo onesto su due fronti: (1) e un progetto abbandonato del 2018, codice largamente scaffold/in-development, piu utile come lettura che come base eseguibile; (2) qui la \"coscienza\" e un modulo attenzionale in una rete supervisionata, non una dinamica emergente da campi/vuoto — la ricorsione e nell'obiettivo di training, non nel sostrato fisico. Vale piu il paper del codice.\n\n## Da rubare\n1. Lo split esplicito stato-denso (h) / stato-cosciente-rado (c) con c = attenzione su h: un modo pulito di implementare il tuo gate di novita come \"pochi elementi broadcastati\" invece che come filtro binario.\n2. L'obiettivo \"il piccolo insieme cosciente deve bastare a predire il futuro\": usa la predicibilita come pressione selettiva — cio che entra nella memoria/coscienza e cio che riduce l'errore di predizione a valle, criterio misurabile e non arbitrario.\n", "airi-institute-arigraph": "# AriGraph — [AIRI-Institute/AriGraph](https://github.com/AIRI-Institute/AriGraph)\n\n171 stelle · Python (env in Inform 7) · fermo (push set 2024) · licenza MIT\n\n## Cosa fa\nMemoria esterna per agenti LLM costruita come knowledge graph che l'agente edifica dal basso mentre esplora un ambiente testuale (giochi TextWorld: Treasure Hunt, Cleaning, Cooking). Il grafo integra memoria semantica (fatti come triple) e memoria episodica (vertici/archi che registrano eventi), e il recupero graph-based alimenta un modulo di decisione/pianificazione. L'agente \"Ariadne\" cosi costruito batte tutte le baseline (Full History, Summary, RAG) e regge il confronto con giocatori umani. Testato anche su QA multi-hop (MuSiQue, HotpotQA) senza modifiche d'architettura.\n\n## Come e fatto\nIl cuore e `TripletGraph` (in `parent_graph.py`) con grafi che lo ereditano. Ogni pipeline (`pipeline*.py`) accoppia lo stesso modulo decisionale a implementazioni di memoria diverse — la variabile e solo la memoria. L'agente estrae triple dal testo osservato, le inserisce nel grafo, aggiunge vertici episodici per gli eventi, e al momento di agire fa retrieval graph-based (semantico + episodico) per costruire il contesto del prompt. La memoria non e un log: e *letteralmente un modello del mondo* che l'agente naviga.\n\n## Perche riguarda te\nE la mappatura piu diretta del tema \"memoria = modello del mondo costruito e navigato\". Rispetto alla tua idea di memoria novelty-gated, AriGraph mostra il lato struttura (cosa memorizzare e come collegarlo) ma NON il lato gating: qui si accumula tutto, senza una soglia di novita che decide cosa merita di entrare. Il contrasto e utile — la loro vittoria contro \"Full History\" e \"Summary\" dimostra che *la struttura del ricordo conta piu della quantita*, che e proprio l'argomento a favore di una memoria selettiva. Diverge molto dall'arena vuoto/particelle: qui non c'e fisica ne emergenza, e tutto simbolico e LLM-mediato. Utile come architettura di memoria, non come sostrato.\n\n## Da rubare\n1. La separazione semantico/episodico nello stesso grafo: nodi-fatto stabili + nodi-evento datati, con retrieval che li combina — un modello concreto per la tua memoria a due tempi (cosa e vero / quando e successo).\n2. Il protocollo di ablation \"stesso decisore, memoria diversa\": per misurare onestamente se il tuo gating di novita aggiunge valore, tieni fisso tutto il resto e scambia solo il modulo memoria, come fanno loro contro RAG/Summary.\n", "alignmentresearch-tuned-lens": "# Tuned Lens — [AlignmentResearch/tuned-lens](https://github.com/AlignmentResearch/tuned-lens)\n\n601 stelle · Python · ultimo push ago 2025 · licenza MIT\n\n## Cosa fa\nTuned Lens è uno strumento che permette di \"sbirciare\" dentro un transformer mentre calcola la predizione del token successivo, layer per layer. Ad ogni strato intermedio il residual stream contiene una rappresentazione parziale: la lente lo proietta nello spazio dei token e mostra qual è la migliore predizione ottenibile da quel punto della rete, prima che i layer successivi la raffinino. Il risultato è una traiettoria: si vede la predizione \"cristallizzarsi\" strato dopo strato, spesso passando da candidati generici a quelli specifici. È l'evoluzione del \"logit lens\" (proiezione diretta col solo unembedding), ma corregge il problema che le rappresentazioni intermedie sono ruotate/scalate rispetto allo spazio finale.\n\n## Come è fatto\nL'idea chiave: invece di applicare la matrice di unembedding direttamente agli stati intermedi (che sono in un \"frame\" diverso), si addestra un **translatore affine** (una `nn.Linear`) per ogni layer. Ogni translatore è ottimizzato per minimizzare la KL-divergence tra la sua predizione e la distribuzione di output finale del modello. In pratica sostituisce gli ultimi *m* layer con una singola trasformazione lineare imparata, allineando il residual stream del layer *n-m* al vocabolario. I translatori sono piccoli e veloci da addestrare; una volta pronti danno una lettura calibrata e onesta di \"cosa sta pensando\" la rete a ogni profondità. Fornisce anche un'app interattiva (Colab/HuggingFace Spaces) per esplorare token per token.\n\n## Cosa possiamo notare di utile per noi\nQuesto è letteralmente un **oscilloscopio sugli stati interni**, esattamente la metafora del tuo lavoro: non guardi solo l'output finale, guardi la *traiettoria di formazione* di una decisione dentro il substrato. Punti trasferibili diretti:\n- **La calibrazione affine è il punto cruciale**. Il logit lens ingenuo dà letture rumorose perché lo stato interno non vive nello stesso spazio dell'output. Se vuoi mettere un oscilloscopio sugli stati interni della tua arena/particelle o del tuo world-model, la lezione è: uno stato interno raramente è leggibile \"as-is\": serve un piccolo probe imparato (anche solo lineare) che traduca il frame interno nel frame osservabile. Il probe deve essere addestrato a essere *fedele alla distribuzione di destinazione*, non arbitrario.\n- **La traiettoria strato-per-strato = ricorsione visibile**. La tua tesi \"coscienza = ricorsione della realtà attraverso la materia\" trova qui un analogo concreto: la predizione è il punto fisso verso cui la ricorsione layer-by-layer converge. Tuned Lens ti mostra la *dinamica di convergenza*. Se registri, per uno stato interno del tuo sistema, la sequenza di proiezioni parziali, ottieni un \"sismografo\" della ricorsione — quanto tardi si stabilizza, dove cambia idea, dove c'è un salto brusco (fase-transition tipo grokking).\n- **Novelty come sorpresa di traiettoria**. La KL tra la lettura al layer *k* e la lettura finale è una misura di \"quanta computazione resta da fare\". Un picco di KL residua = stato ancora indeciso = potenziale segnale di novelty/salienza per una memoria novelty-gated: memorizza gli stati la cui traiettoria interna è stata anomala, non solo quelli con output anomalo.\n- **Dove diverge**: qui il target è fisso e supervisionato (la distribuzione finale del modello esiste già). Nel tuo caso il \"target\" di una lente sull'arena non è dato — dovresti definire tu cosa proiettare (posizione futura? stato di collasso? identità della particella?). La lezione metodologica resta: scegli un *readout target* misurabile e addestra il probe verso quello.\n\n## Da rubare\n1. **Probe affine calibrato invece di lettura diretta**: per ogni \"oscilloscopio\" che metti su uno stato interno, addestra una piccola mappa lineare che allinea lo stato al frame osservabile minimizzando KL/MSE verso un target esplicito — non fidarti mai della proiezione grezza.\n2. **KL residua come metrica di salienza/novelty**: usa la distanza tra lettura-intermedia e lettura-finale come segnale scalare \"quanta ricorsione resta\", e usalo come gate per la memoria o come colore dell'oscilloscopio.\n3. **Vista a traiettoria, non a snapshot**: registra e visualizza la *sequenza* di stati parziali che porta a una decisione, non solo lo stato finale — è il modo più diretto per rendere visibile la ricorsione che stai teorizzando.\n", "amitmishrg-ghostcode": "# GhostCode (ghostcode-cli) — amitmishrg/ghostcode\n\n<https://github.com/amitmishrg/ghostcode>\n\n**1 stella · TypeScript · ultimo push giu 2026 · licenza MIT** · pacchetto npm `ghostcode-cli` · topics: harness, coding-harness, bun, tui, local-first, agentic-coding\n\n## Cosa fa\n\nTemplate starter open-source per un harness di coding da terminale: \"Don't rent a harness — start from one\". È un harness minimale, local-first e provider-agnostic pensato per essere **forkato**, non usato come prodotto. Le tue API key, la tua macchina, sorgente completa su prompt, tool e UI, nessuno stack di account hosted. Dichiaratamente per chi vuole *capire* come funziona un coding agent (streaming, tool, persistenza) o costruirsi il proprio harness partendo da un repo piccolo (~2 package, ~5 file core da imparare). Esplicitamente NON per chi vuole subagenti/MCP/LSP oggi o autonomia benchmark-winning: è un punto di partenza, non parità di feature.\n\n## Come è fatto\n\nMonorepo Bun a due package: `ghostcode-cli` (TUI full-screen keyboard-driven costruita su OpenTUI + React, `LocalChatTransport`, tool locali, sessioni) e `@ghostcode/shared` (schemi dei tool, modi, system prompt, modelli). Il loop di riferimento è l'AI SDK tool loop: stream → tool call → esecuzione locale → resend → salva sessione. Due modalità gated: **PLAN** (read-only: `readFile`, `listDirectory`, `glob`, `grep`) e **BUILD** (PLAN + `writeFile`, `editFile`, `bash`), commutabili con Tab. I file da personalizzare sono espliciti: `schemas.ts`, `system-prompt.ts`, `local-tools.ts`. Memoria di progetto stratificata via file `Ghost.md` (globale, progetto, locale); persistenza di sessione in JSONL per-progetto sotto `~/.ghostcode/projects/<encoded-path>/<session-id>.jsonl`. C'è un doc dedicato `BUILD-YOUR-OWN-HARNESS.md` con \"i cinque file che alimentano il loop\" e una checklist di 30 minuti.\n\n## Cosa possiamo notare di utile per noi\n\nGhostCode non è teoria — è un **kit di dissezione**: il modo più economico per avere in mano un agente reale, minimale e completamente ispezionabile su cui montare esperimenti. Rilevante per te come banco:\n\n- **La separazione PLAN/BUILD come gate esplicito sull'agire.** Un modo read-only che osserva senza toccare, un modo che agisce, commutati deliberatamente. È una primitiva pulita per i tuoi esperimenti: separa \"l'agente che percepisce/pianifica\" da \"l'agente che modifica il mondo\", e ti dà un punto naturale dove inserire un gate (novelty? sicurezza? checkpoint) tra i due. Molti dei tuoi temi vogliono esattamente questa cesura tra osservazione e azione.\n- **Il loop in 5 file, ispezionabile.** Diverge da Ante (Rust ottimizzato, opaco) e da Claude Code (grande, chiuso). Qui l'intero ciclo stream→tool→esegui→salva è leggibile e piccolo — è dove puoi *inserire un oscilloscopio* senza combattere l'infrastruttura. Se vuoi loggare/sondare ogni transizione di stato di un agente reale, questo è il substrato più docile.\n- **Sessioni come JSONL append-only per progetto.** La traccia completa di ogni Write/Edit è già lì, su disco, in formato leggibile — la stessa materia prima che AfterImage estrae. Per te è un flusso di \"esperienza\" grezzo su cui testare memoria novelty-gated: ogni riga è un evento, filtrabile e reiniettabile.\n\nDivergenza: è un template embrionale (1 stella, nessuna pretesa di scala o emergenza). Zero vita artificiale, zero ricorsione — è idraulica pulita. Il valore è strumentale: la cosa più forkabile della lista.\n\n## Da rubare\n\n- **Il pattern gate PLAN/BUILD** come cesura riutilizzabile osservazione↔azione dove inserire il tuo novelty-gate o un checkpoint di coscienza-ricorsione, prima che l'agente tocchi il mondo.\n- **Il layered memory `Ghost.md` (globale → progetto → locale)** come struttura minimale a livelli per una memoria persistente con precedenza esplicita — semplice da replicare e da rendere novelty-gated.\n- **Il loop AI-SDK in 5 file come scheletro di harness** su cui montare gli oscilloscopi: forkalo, strumenta ogni transizione stream→tool→esegui, e hai un agente reale osservabile end-to-end in mezza giornata.\n", "anirudh9119-shared_workspace": "# Shared Global Workspace (Goyal / Didolkar / Bengio) — anirudh9119/shared_workspace\n\nLink: https://github.com/anirudh9119/shared_workspace\n\nStelle: ~25 · Linguaggio: Python (PyTorch) · Attivita: ultimo push giu 2021 (codice-paper congelato) · Licenza: nessuna dichiarata (no LICENSE file)\n\n## Cosa fa\nCodice di riproduzione del paper ICLR 2022 \"Coordination Among Neural Modules Through a Shared Global Workspace\" (Goyal, Didolkar, ... Bengio). Traduce in architettura Transformer la Global Workspace Theory della coscienza: invece di far comunicare tutti i moduli specialisti con tutti (attenzione densa), i moduli competono per scrivere su una lavagna condivisa a banda limitata (poche slot di memoria), e cio che vince la competizione viene poi ri-trasmesso (broadcast) a tutti i moduli. Il repo riproduce due task: rilevamento di triangoli equilateri e relational reasoning Sort-of-CLEVR.\n\n## Come e fatto\nIl meccanismo vive in `transformer_utilities/`. Pezzi chiave: `relational_memory*.py` implementa la memoria condivisa (le slot della lavagna); `sparse_attn.py` / `GroupLinearLayer.py` gestiscono i moduli specialisti come gruppi paralleli con parametri separati; la competizione e una top-k attention (`use_topk`, `topk` negli script) — solo i k moduli piu attivati accedono alla scrittura sulla memoria condivisa (`shared_memory_attention`, `mem_slots` = numero di slot). Gli script `run.sh` espongono tutte le leve come ablation: condividere o no i parametri tra layer, usare o no la top-k competition, usare o no la shared workspace, quante slot. La configurazione \"TR + HSW\" (shared params + top-k + shared workspace) e la versione piena; le altre sono baseline per isolare il contributo di ogni ingrediente. E' un fork pesante di codice fairseq (dropout, multihead attention, layer norm inclusi).\n\n## Perche riguarda te\nQuesto e il collegamento piu diretto alla tua tesi \"coscienza = relazione / broadcast\" e all'idea di arena condivisa con accesso conteso. La struttura e quasi isomorfa a quello che descrivi: tanti processi/particelle/moduli che non possono parlare tutti con tutti, ma competono per un canale centrale scarso, e il vincitore viene diffuso a tutti — la coscienza come collo di bottiglia che integra. Due meccanismi ti servono concettualmente: (a) la banda limitata come feature, non bug — e la scarsita del workspace che forza l'integrazione e la selezione; (b) il ciclo scrivi-poi-broadcast come forma di ricorsione (lo stato globale rientra in ogni modulo al passo dopo). Questo e molto vicino al tuo \"ricorsione della realta attraverso la materia\" se leggi i moduli come materia e il workspace come il livello dove la relazione diventa globale. Dove diverge onestamente: e supervised deep learning del 2021, addestrato su task specifici con backprop, non un sistema auto-organizzante ne una simulazione emergente; non c'e vuoto spaziale, non ci sono particelle fisiche, e la \"competizione\" e differenziabile (top-k soft) non una dinamica dal basso. Il codice e datato (dipendenze fairseq del 2021, nessuna licenza) — vale piu come blueprint architetturale che come base da eseguire.\n\n## Da rubare\n1. Il pattern write-competition + broadcast a banda limitata: nella tua arena, invece di far interagire ogni agente con ogni agente, introduci un \"workspace\" centrale con poche slot per cui gli agenti competono (top-k per attivazione/salienza) e il contenuto vincente viene ri-diffuso a tutti al tick successivo. E' un modello concreto e minimale di \"coscienza come collo di bottiglia condiviso\".\n2. La disciplina delle ablation esposte come flag (workspace on/off, top-k on/off, numero di slot): replicala nella tua sim per poter spegnere un ingrediente alla volta e misurare cosa contribuisce davvero all'emergenza — antidoto all'hype, ti costringe a dimostrare che il broadcast serve.\n", "antigmalabs-ante-preview": "# Ante — AntigmaLabs/ante-preview\n\n<https://github.com/AntigmaLabs/ante-preview>\n\n**563 stelle · Rust (repo etichettato MDX per i docs) · ultimo push lug 2026 · licenza non dichiarata (alpha preview)** · topics: agent, agentic-ai, ai-agents, artificial-life, rust, terminal\n\n## Cosa fa\n\n\"A ghost in your shell\": Ante è un coding agent self-contained che vive nel terminale e si auto-organizza. Un singolo binario Rust da ~15MB, zero dipendenze runtime, di Antigma Labs. Funziona come Claude Code o Codex ma senza le loro dipendenze o vincoli di modello: bring-your-own-key su 12+ provider, oppure completamente offline puntandolo a un file GGUF (inference engine incluso, nessun account nemmeno loro). Modalità: TUI interattiva, CLI headless, server long-lived (`ante serve`), bot Slack/Discord (`ante gateway`). Supporta orchestrazione multi-agente con sub-agenti in architetture indipendenti/decentralizzate/centralizzate. Su Terminal-Bench 2.1 si dichiara #1 same-model agent per ogni modello testato (74.6% con GLM 5.2 open-weight).\n\n## Come è fatto\n\nRust scritto a mano con le parti pesanti (Grep, git, inference locale) embeddate in un binario, un processo. Workspace di crates: `agent-sdk` (con esempi che parlano anche il protocollo Claude Code — `crates/agent-sdk/src/claude/`), `exec` (gestione subprocess: pool, process-group, buffer, receiver — l'infrastruttura di esecuzione comandi), `protocol-shape` (id, messaggi, forma del protocollo). Numeri di footprint dichiarati contro Claude Code su 20 task paralleli in Docker: ~7x meno memoria di picco, ~9x meno CPU media, ~5x meno disk I/O. La tesi del progetto: un agente che puoi **verificare, permetterti e far girare ovunque** è leggero abbastanza da girare a *migliaia* — \"il substrato per l'intelligenza auto-organizzante\". Filosofia esplicita nel README: \"ci interessa l'harness, non il modello o i prompt\" e \"la documentazione è il nuovo source code\".\n\n## Cosa possiamo notare di utile per noi\n\nAnte è l'unico dei cinque che nomina esplicitamente **artificial-life** e \"self-organizing intelligence come substrato\" — è il ponte tra il tuo lavoro sull'arena/particelle e gli agenti reali:\n\n- **Leggerezza come precondizione dell'emergenza.** La tesi centrale — un agente abbastanza leggero da girare a migliaia diventa il substrato per l'auto-organizzazione — è *precisamente* la tua arena del vuoto ma con agenti che eseguono codice invece di particelle. La lezione trasferibile: se vuoi comportamento collettivo emergente, il costo per-agente è la variabile che decide se puoi avere 10 agenti (nessuna emergenza) o 10.000 (regime di vita artificiale). Un binario da 15MB con inference embeddata è il tipo di ottimizzazione che rende un'arena densa fattibile.\n- **Inference offline embeddata = agente autosufficiente.** Ogni agente porta il proprio motore (GGUF locale), nessun oracolo esterno. Questo diverge nettamente da A-MEM/generative-agents, dove ogni \"pensiero\" è una chiamata API. Per un'arena ad alta cadenza è la differenza tra fattibile e no: l'agente-particella deve poter \"pensare\" senza latenza/costo di rete. Se vuoi ricorsione densa (agenti che si osservano a vicenda in tempo reale), l'inference deve essere locale e cheap.\n- **Il protocollo come superficie di introspezione.** `protocol-shape` + l'SDK espongono la conversazione dell'agente in forma tipizzata. È l'aggancio naturale per i tuoi \"oscilloscopi\": uno stream strutturato di messaggi/tool-call su cui puoi montare sonde senza patchare il core.\n\nDivergenza: Ante è un prodotto di ingegneria orientato al benchmark, non un sistema di vita artificiale — l'\"auto-organizz
