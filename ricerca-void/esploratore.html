\"coding game\" educativo/ludico: il giocatore scrive comandi in un piccolo linguaggio, il gioco li interpreta e li traduce nei movimenti del fantasma sulla scacchiera. Nessuna AI, nessun LLM — è omonimo del filone \"ghost/undetectable\" ma non ha niente a che vedere con esso. Deployato su Vercel (`ghostcode.vercel.app`); il repo non include gli asset grafici (licenziati separatamente).\n\n## Come è fatto\n\nFrontend **React + Redux** per UI e stato, con il motore di gioco su **Phaser.js** (canvas/WebGL). Il pezzo tecnicamente interessante è il parser: il codice scritto dal giocatore viene interpretato con **PEG.js** (parser generator a grammatica PEG), che trasforma il testo in un albero di istruzioni eseguibili → sequenza di movimenti del fantasma. C'è un `CodeEditor` component, un `CodeHelper`, livelli selezionabili (`LevelSelector`), badge/gamification (`BadgeModal`), auth panel. Presente un curioso `client/public/secret_answers.txt` — le soluzioni dei livelli in chiaro nel bundle pubblico (una piccola svista di occultamento, involontariamente a tema).\n\n## Cosa possiamo notare di utile per noi\n\nSia onesto: rilevanza per il tuo lavoro **quasi nulla**. Nessun vuoto, nessuna emergenza, nessuna memoria, nessuna coscienza. È finito in lista solo per omonimia con il filone ghost. I pochi spunti tangenziali, presi per quel che valgono:\n\n- **Codice-come-controllo di un agente in un mondo.** Il loop \"scrivi un linguaggio → un interprete lo traduce in azioni di un personaggio in un mondo simulato\" è, in miniatura e senza AI, la stessa forma del world-model-come-sogno pilotato da un attore. Ma qui l'interprete è deterministico e il \"mondo\" è una scacchiera: manca tutto ciò che ti interessa (nessun modello appreso, nessun sogno, nessuna sorpresa). Serve al più come promemoria del contrasto: un agente scriptato in un mondo giocattolo *non* è nulla di ciò che stai cercando.\n- **PEG.js come strato interprete.** Se mai ti servisse un piccolo DSL per pilotare esperimenti nell'arena (comandi umani → azioni sulle particelle), un parser PEG è la via leggera. Spunto puramente strumentale, non concettuale.\n- **`secret_answers.txt` nel bundle pubblico.** Involontario ma a tema occultamento: mostra il fallimento banale dello \"steganografare\" nascondendo in un file col nome ovvio dentro un artefatto pubblico. Antipattern da citare quando ragioni su occultamento reale vs apparente.\n\nDove diverge: praticamente ovunque. È un artefatto di intrattenimento del 2023, non un sistema di ricerca.\n\n## Da rubare\n\n- **Nulla di sostanziale.** Al massimo, se in futuro vorrai un DSL testuale per comandare l'arena del vuoto, tieni a mente **PEG.js** come parser minimale testo→azioni. Per il resto, questo progetto vale come voce di dis-ambiguazione nel dossier (\"l'altro GhostCode, il gioco, non c'entra\"), non come fonte di idee.\n", "eleutherai-sparsify": "# sparsify (EleutherAI) — SAE e transcoder k-sparse sui transformer ([repo](https://github.com/EleutherAI/sparsify))\n\nStelle: ~730 · Linguaggio: Python (PyTorch) · Ultima attività: luglio 2026 (attivo) · Licenza: MIT\n\n## Cosa fa\nsparsify addestra **sparse autoencoder (SAE)** e **transcoder** sulle attivazioni interne di modelli linguistici HuggingFace, seguendo la ricetta di *Scaling and evaluating sparse autoencoders* (Gao et al., OpenAI 2024). L'obiettivo è la *meccanistica interpretability*: decomporre le attivazioni dense e polisemantiche di un transformer (dove ogni neurone fa mille cose sovrapposte) in un dizionario enorme di **feature quasi tutte spente e poche accese**, ognuna monosemantica e interpretabile. È deliberatamente snello: pochissime opzioni, nessuna cache su disco (calcola le attivazioni al volo → zero storage overhead, scala a modelli enormi), e supporto a hookpoint arbitrari (residual stream, output di attention, attivazioni interne degli MLP) via pattern glob PyTorch. Può caricare SAE pre-addestrati dall'Hub (es. per Llama-3-8B, tutti i layer in una riga) e supporta training distribuito con torchrun.\n\n## Come è fatto\nL'idea chiave è la **funzione di attivazione TopK** invece della penalità L1. Un SAE classico spinge alla sparsità con un termine L1 nella loss, che però è indiretto (deve essere bilanciato) e causa \"shrinkage\" delle attivazioni. sparsify usa TopK: dopo l'encoder, si tengono **solo le k feature più attive e si azzerano tutte le altre** — la sparsità è imposta *architetturalmente ed esattamente* (k acceso, tutto il resto zero), non incoraggiata da una penalità. Gli autori la considerano un Pareto-improvement e non supportano l'L1 di proposito. L'architettura: `latents = TopK(encoder(x - pre_bias) + latent_bias)`, poi `recon = decoder(latents) + pre_bias`, con expansion factor (es. 32x) che rende il dizionario latente molto più largo dell'input. Le attivazioni si calcolano on-the-fly durante il forward del modello congelato, si allena solo l'autoencoder a ricostruirle mantenendo attive solo k unità. I **transcoder** sono la variante che invece di ricostruire l'input predice l'*output* di un blocco (es. l'MLP), imparando una versione sparsa e leggibile della computazione stessa, non solo della rappresentazione.\n\n## Cosa possiamo notare di utile per noi\nQuesto repo è la fusione di due dei tuoi filoni: **oscilloscopi su stati interni** e **vuoto strutturato** (rappresentazione quasi-vuota). Un SAE è esattamente un oscilloscopio *che scopre da solo su cosa puntare le sonde*. Invece di decidere a priori quali osservabili leggere dall'arena, addestri un SAE sugli stati interni e lui trova il dizionario delle feature ricorrenti — i \"concetti\" latenti che l'arena usa senza che tu li abbia specificati. È il salto da oscilloscopio con canali fissi a oscilloscopio che *auto-calibra i suoi canali sui gradi di libertà reali del sistema*.\n\nIl **vuoto strutturato** è il punto più profondo. Un vettore TopK è letteralmente **quasi tutto vuoto**: su decine di migliaia di latenti, solo k (magari 32) sono accesi. Ma quel vuoto non è casuale — è *strutturato*: la posizione delle poche unità accese è l'informazione, e il resto è silenzio significativo. Questa è la tua tesi resa architettura: il *qualcosa* (le k feature attive) emerge da un mare di *niente* (le migliaia spente), e la struttura vive nel pattern di cosa-non-è-spento. Se applichi un SAE agli stati della tua arena del vuoto, ottieni una **doppia sparsità**: un vuoto fisico (l'arena) rappresentato in un vuoto latente (il codice sparso). E il numero medio di feature attive nel tempo diventa una metrica di *complessità di stato* — un'arena che \"pensa\" attiva più feature; una statica ne attiva poche.\n\nCollegamento diretto alla **memoria novelty-gated**: TopK ti dà gratis un segnale di novelty di qualità. Se uno stato dell'arena attiva feature SAE *mai viste prima* (o una combinazione rara), è nuovo → la memoria deve ingaggiarsi. Il repo traccia già `stats_last_nonzero` e la frequenza di attivazione per latente: una feature con frequenza bassa che si accende *è* la novelty. Il gate della memoria può essere letteralmente \"se si attiva un latente sotto una certa frequenza storica, memorizza\".\n\nDove diverge: sparsify è tarato su transformer con hidden state ben definiti (vettori di dimensione fissa per token). Gli stati della tua arena continua/particellare non hanno quella forma canonica — dovresti prima definire un embedding dello stato (per regione, per particella, o globale) su cui addestrare il SAE. Inoltre l'interpretabilità qui è pensata per *feature linguistiche* con un modello congelato; nella tua arena il \"modello\" e i suoi stati evolvono insieme, quindi il SAE andrebbe ri-addestrato o reso online. Non calcola nulla di temporale/ricorsivo: vede ogni stato in isolamento. Per la coscienza=ricorsione ti serve incrociarlo con la dinamica, non è offerto qui.\n\n## Da rubare\n1. **SAE come oscilloscopio auto-calibrante sugli stati dell'arena**: addestra un SAE sugli stati interni per *scoprire* il dizionario delle feature emergenti invece di sceglierle a mano — l'oscilloscopio impara da solo dove sono i gradi di libertà rilevanti.\n2. **TopK come primitiva di vuoto strutturato**: rappresenta ogni stato come un codice in cui solo k unità sono accese; il conteggio e la rarità delle unità attive diventano rispettivamente una metrica di complessità di stato e un segnale di novelty pronto per il gating della memoria.\n3. **`stats_last_nonzero` + frequenza-di-attivazione per latente come gate di novelty**: riusa il pattern già implementato (traccia da quanto una feature è spenta) per triggerare la scrittura in memoria quando si accende una feature storicamente rara.\n", "eloialonso-diamond": "# DIAMOND — eloialonso/diamond\n\n<https://github.com/eloialonso/diamond>\n\n**2.1k stelle · Python · ultimo push dic 2024 · licenza MIT** · paper arXiv:2405.12399 \"Diffusion for World Modeling: Visual Details Matter in Atari\" (NeurIPS 2024 Spotlight)\n\n## Cosa fa\n\nDIAMOND (DIffusion As a Model Of eNvironment Dreams) addestra un agente di reinforcement learning **interamente dentro un world model a diffusione**: invece di allenarsi nell'ambiente reale, l'agente vive in un modello che genera i fotogrammi futuri con un processo di diffusione condizionato su frame passati e azione. Il nome codifica la tesi: l'ambiente è un *sogno* a diffusione. Include world model giocabili per Atari (100k) e — sul branch `csgo` — un world model di Counter-Strike navigabile a mano, in cui premi `m` e prendi tu il controllo dentro il modello.\n\n## Come è fatto\n\nStruttura chiara in `src/`. Il pezzo chiave è `src/envs/world_model_env.py`: espone il world model come se fosse un normale ambiente Gym (`reset`/`step`), ma ogni `step` è un campionamento di diffusione che disegna il frame successivo. Il modello generativo sta in `src/models/diffusion/` — `denoiser.py`, `inner_model.py`, `diffusion_sampler.py` — più `rew_end_model.py` che predice ricompensa e fine-episodio. L'agente RL (`src/models/actor_critic.py`) è addestrato su rollout *immaginati* dal world model, non su dati reali. `src/game/` fornisce il loop interattivo per \"entrare\" nel sogno. Configurazione via Hydra (`config/trainer.yaml`), con parametri di sampling (numero di step di denoising, stocasticità, orizzonte di immaginazione) regolabili a caldo. La tesi del paper — \"visual details matter\" — è che la diffusione, rispetto ai world model discreti/token, preserva dettagli visivi piccoli ma decisivi per la policy.\n\n## Perché riguarda te\n\nRamo **diffusion world model**, ed è l'aggancio più diretto alla metafora dell'**arena del vuoto come sogno generato**:\n\n- **La realtà dell'agente è sintetizzata frame-per-frame.** Se la tua arena del vuoto è un mondo in cui \"particelle\" o agenti abitano uno spazio che non esiste fuori dal modello che lo genera, DIAMOND è la dimostrazione ingegneristica che si può fare e che ci si può *entrare dentro* interattivamente. L'orizzonte di immaginazione regolabile (premi `↑/↓`) è letteralmente un controllo su \"quanto lontano sogna\" il sistema.\n- **Coscienza-ricorsione, con onestà.** Qui c'è un anello percezione↔azione chiuso *dentro* un modello del mondo: l'agente agisce su un mondo che è un suo (co-)prodotto. È vicino all'idea di ricorsione della realtà attraverso la materia, ma la divergenza è netta — il world model non si include: modella l'ambiente, non se stesso. Non c'è auto-riferimento, c'è solo un ambiente interiorizzato.\n\nDivergenza pratica: è pesante (GPU, diffusione a molti step), pensato per pixel Atari/CSGO. Per un'arena astratta di \"particelle-emergenza\" il costo di generare pixel è probabilmente sprecato: ti serve la *struttura* (un modello latente del prossimo stato), non necessariamente il frame RGB.\n\n## Da rubare\n\n- **Il world model esposto come Gym env** (`world_model_env.py`): un mondo interamente generato che espone `reset`/`step` identici a un ambiente reale. Pattern d'oro per rendere la tua arena \"sognata\" pilotabile sia da un agente sia da un umano con la stessa interfaccia — e per staccare l'oscilloscopio/visualizzatore dal generatore.\n- **L'orizzonte di immaginazione come manopola runtime**: separare \"quanto in là proietto il sogno\" da \"quanto ne mostro\" dà un controllo diretto sulla profondità della simulazione. Ottimo asse per un oscilloscopio: mostrare lo stesso stato a diversi orizzonti di previsione e vedere dove il sogno diverge.\n", "em-llm-em-llm-model": "# EM-LLM — Human-inspired Episodic Memory\n\nLink: https://github.com/em-llm/EM-LLM-model\n\nStelle: ~279 · Linguaggio: Python (PyTorch, HuggingFace) · Attivita: stabile/matura (push mar 2025, repo consultato lug 2026) · Licenza: MIT\n\n## Cosa fa\nCodice del paper ICLR 2025 (Fountas et al., Huawei Noah's Ark + UCL). EM-LLM da' a un LLM una memoria episodica in stile umano senza alcun fine-tuning: segmenta il flusso di token in \"eventi\" e li recupera all'occorrenza, permettendo contesti praticamente infiniti (retrieval dimostrato su 10M token) a costo computazionale sostenibile. Batte InfLLM (SOTA retrieval) e supera RAG su LongBench e infinity-Bench, arrivando in molti task sopra i modelli full-context.\n\n## Come e fatto\nDue fasi, per ogni layer del modello. Formazione: il flusso di token viene tagliato in eventi ai punti di alta sorpresa bayesiana (surprise-gated: dove il modello e' piu sorpreso dal token successivo cade un confine), poi i confini vengono raffinati con metriche di teoria dei grafi (modularity/conductance sulla matrice di adiacenza tra token) per rendere gli eventi coesi. Recupero a due stadi: k-NN sui token rappresentativi di ogni evento (similarita) PIU un buffer di contiguita' temporale che tira dentro anche gli eventi adiacenti nel tempo - proprio come il ricordo umano, che dall'evento saltato ripesca cio che gli sta accanto. Parametri chiave nel YAML: `surprisal_threshold_gamma` (soglia in deviazioni standard), `min/max_block_size`, `n_mem`, `contiguity_buffer_size`. Tutto online, con offload su CPU/disco per sequenze enormi.\n\n## Perche riguarda te\nE' il riferimento piu diretto e pulito per la memoria novelty-gated: il confine di un ricordo cade dove c'e' sorpresa, non a intervalli fissi. E' la stessa quantita' (sorpresa bayesiana) che RxInfer minimizza nella tua lista - qui viene invece usata costruttivamente come segnale di segmentazione. Sul lato coscienza-ricorsione, il recupero similarita'+contiguita' e' un modello concreto di come un'esperienza richiami sia cio che le somiglia sia cio che le stava vicino nel tempo, ricostruendo il flusso. Per l'arena del vuoto e gli oscilloscopi: la sorpresa e' esattamente la lettura che vorresti da un oscilloscopio - un tracciato che si accende solo quando l'evento devia dalla predizione, e quel picco definisce automaticamente l'inizio di un nuovo \"capitolo\" da memorizzare. Divergenza onesta: e' un sistema per LLM di lungo contesto, non un motore di simulazione; ma i suoi due meccanismi (segmentazione per sorpresa, retrieval bimodale) sono algoritmi generali che trasporti fuori dal contesto LLM.\n\n## Da rubare\n1. Segmentazione per sorpresa con soglia in deviazioni standard (`gamma`): invece di decidere a priori quando un evento inizia/finisce, misura la sorpresa istante per istante e apri un nuovo segmento quando supera media+gamma*std. E' la ricetta pronta per la memoria novelty-gated dell'arena e per far scattare gli oscilloscopi.\n2. Retrieval a due canali similarita'+contiguita': quando richiami un ricordo non prendere solo il piu simile, ma trascina anche i vicini temporali. Per un'arena di particelle significa che riattivare uno stato passato riporta in scena anche cio che gli era adiacente - ricostruzione di scena, non fotogramma isolato.\n", "erwanplantec-flowlenia": "# erwanplantec/FlowLenia\n\nLink: https://github.com/erwanplantec/FlowLenia\n\nStelle: ~26 · Linguaggio: Python (JAX) · Attivita: ultimo push feb 2024 (poco mantenuto ma stabile) · Licenza: nessuna dichiarata (no LICENSE file — attenzione se vuoi riusare codice)\n\n## Cosa fa\nImplementazione in JAX di Flow-Lenia, la variante di Lenia (automa cellulare continuo) firmata dall'autore stesso del paper originale (arXiv 2212.07906). La novita rispetto a Lenia classico e la conservazione della massa: invece di sommare un incremento all'attivazione, il sistema calcola un campo di flusso (advection) e sposta la massa esistente, cosi la quantita totale nel campo si conserva. Questo permette la localizzazione dei parametri (ogni pezzo di materia porta il suo \"genoma\" locale) e quindi evoluzione open-ended: creature con regole diverse coesistono e competono nello stesso spazio senza confini imposti.\n\n## Come e fatto\nRepo piccolo e leggibile: `flowlenia/flowlenia.py` ha i componenti base (Config dataclass, State = attivazioni A, classe FlowLenia che impacchetta step function, calcolo dei kernel, spazio delle regole). Il pezzo chiave e `reintegration_tracking.py`: implementa l'\"advection/reintegration tracking\", l'algoritmo che sposta la massa lungo il campo di flusso e la reintegra nelle celle di destinazione garantendo la conservazione. `flowlenia_params.py` aggiunge il parameter embedding: lo State diventa attivazioni A + mappa di parametri P, cosi i parametri sono un campo spaziale localizzato e non piu globali — e questo che abilita genomi locali e competizione. Tutto e JAX (jittabile, GPU, vettorizzabile). Gli esempi mostrano configurazioni 1-canale e 2-canali multi-kernel piu la demo del parameter embedding.\n\n## Perche riguarda te\nQuesto e centrale per la tua arena del vuoto e per il tema particelle-emergenza. La conservazione della massa e proprio l'ingrediente che rende un automa continuo un mondo fisico credibile: la materia non appare/scompare, si sposta — e da questo vincolo emergono creature localizzate stabili. Se la tua arena vuole \"particelle\" che si aggregano in strutture persistenti dentro un campo, il reintegration tracking e la ricetta matematica pulita per farlo senza hack. Il parameter embedding e ancora piu vicino alla tua tesi: e l'idea che ogni frammento di materia porti localmente la propria regola/identita, competendo nello stesso spazio condiviso — una lettura molto concreta di \"ricorsione della realta attraverso la materia\" e di arena come spazio conteso. Dove diverge: Flow-Lenia e puramente fisico-morfogenetico, non ha nessuna nozione di memoria, novelty o coscienza; le \"creature\" non ricordano nulla e non c'e broadcast/relazione tra loro oltre la collisione fisica. E' il substrato del mondo, non la mente che ci vive dentro. Inoltre manca licenza, quindi trattalo come riferimento concettuale piu che come dipendenza.\n\n## Da rubare\n1. L'algoritmo di reintegration tracking come motore della tua arena: campo di flusso + spostamento di massa conservativa ti da particelle-emergenza stabili \"gratis\", senza dover inseguire manualmente la conservazione. Anche solo la struttura Config/State/step-function in JAX e un ottimo scheletro.\n2. Il parameter embedding (mappa spaziale di parametri P che viaggia con la massa): usalo per dare ai tuoi agenti/particelle un \"genoma locale\" che si muove con loro nel vuoto, cosi regioni diverse dell'arena evolvono regole diverse e possono competere — molto piu ricco di parametri globali uniformi.\n", "facebookresearch-jepa-wms": "# JEPA-WMs — What drives success in physical planning with Joint-Embedding Predictive World Models? (facebookresearch/jepa-wms)\n\nLink: https://github.com/facebookresearch/jepa-wms\n\n429 stelle · Python (PyTorch) · attivo, rilascio recente (repo creato dic 2025) · licenza custom FAIR (NOASSERTION, research-only)\n\n## Cosa fa\nE' il codice, i dati e i pesi ufficiali FAIR del paper omonimo (Terver, Yang, Ponce, Bardes, LeCun). Studia sistematicamente *cosa* rende efficace un world model usato per pianificare azioni fisiche — manipolazione robotica e task di controllo (DROID, RoboCasa, Metaworld, Push-T, PointMaze, Wall). Incarna la tesi di LeCun: un world model utile predice **rappresentazioni latenti future**, non pixel ne token. Fornisce JEPA-WM addestrati e due baseline riprodotte (DINO-WM, V-JEPA-2-AC) per confronto diretto.\n\n## Come e' fatto\nL'ossatura JEPA (Joint-Embedding Predictive Architecture):\n- Un **encoder congelato pre-addestrato** (DINOv2 ViT-S/14 o DINOv3 ViT-L/16) mappa l'osservazione visiva in un embedding. Non si ricostruiscono i pixel: si lavora sempre nello spazio delle rappresentazioni.\n- Un **predittore** (transformer di profondita 6-24) prende l'embedding corrente + l'azione e predice l'embedding al passo successivo. Questo e' il \"world model\" vero e proprio: dinamica in latent-space.\n- La **pianificazione** avviene srotolando il predittore per piu passi immaginati e cercando (via MPC / ottimizzazione, es. CEM) la sequenza di azioni che porta l'embedding finale piu vicino all'embedding-goal. Il modello sogna traiettorie in rappresentazione, non in immagine.\n- Head decoder VM2M **opzionali** permettono di ri-visualizzare gli embedding in pixel, ma non servono ne per addestrare ne per pianificare — la visione e' un lusso per l'umano che guarda, non un requisito del sistema.\n\nL'idea-chiave (e il punto del paper): la ricostruzione pixel-perfetta e' uno spreco e spesso danneggia il planning; cio che conta e' che lo spazio latente predetto sia *sufficiente* per distinguere gli stati rilevanti al compito. Il paper isola quali scelte (encoder, profondita del predittore, come si costruisce il target di training) muovono davvero il successo.\n\n## Perche riguarda te\nE' il polo \"scientifico/robotico\" del dibattito world-model-vs-LLM e il contrappunto rigoroso al World Models di hardmaru: stessa idea di sognare traiettorie, ma con la tesi forte che il sogno va fatto **in spazio di rappresentazione astratta**, non ricostruendo l'apparenza. Per la tua tesi coscienza-ricorsione e' rilevante perche mette al centro una domanda che ti riguarda: qual e' il *livello giusto* a cui un sistema deve modellare se stesso e il mondo? Non i pixel (troppo, rumore irrilevante), non i simboli/token (troppo poco, gia digeriti dall'umano), ma una rappresentazione intermedia auto-appresa. Il fatto che il decoder-in-pixel sia opzionale e' filosoficamente vicino al tuo oscilloscopio: la lettura visiva e' uno strumento esterno che possiamo attaccare o staccare, mentre la \"vita\" del sistema sta tutta nello spazio latente. Dove diverge: qui non c'e' emergenza aperta ne novelty — il world model e' un mezzo per raggiungere un goal esterno fissato (MPC verso un embedding-target), congelato dopo il training. Zero auto-organizzazione, zero ricorsione del sistema su se stesso: e' ingegneria del planning, non modello di coscienza.\n\n## Da rubare\n1. **Predire nello spazio di rappresentazione, non nei pixel**: se costruisci un modello predittivo dell'arena, non fargli allucinare i frame — fagli predire embedding (DINO o un encoder che addestri tu). E' piu robusto, piu economico, e la \"distanza fra stati\" diventa naturalmente una distanza in latent-space (riutilizzabile come metrica di novelty, vedi ASAL).\n2. **Decoder-in-pixel come strumento staccabile**: tieni la dinamica del tuo sistema puramente in latent-space e aggiungi un decoder solo come \"oscilloscopio\" on-demand per visualizzare cosa sta immaginando. Separare nettamente il substrato-che-vive (latente) dallo strumento-che-guarda (decoder) e' un pattern architetturale pulito da imitare nell'arena del vuoto.\n", "flowersteam-adtool": "# flowersteam/adtool (Automated Discovery Tool) — [github.com/flowersteam/adtool](https://github.com/flowersteam/adtool)\n\n45 stelle · Python · push attivo (lug 2026) · licenza MIT (riusabile)\n\n## Cosa fa\nTool del laboratorio Inria FLOWERS per l'esplorazione **curiosity-driven** di sistemi complessi. Invece di far cercare a mano a un umano i pattern interessanti nello spazio dei parametri di un sistema (cellular automata, reaction-diffusion, Lenia, n-body, Kuramoto, Wolfram-physics...), l'agente si pone da solo obiettivi nuovi e mappa lo spazio dei comportamenti emergenti. E' pensato come banco per la fase esplorativa della ricerca: \"questo sistema puo' fare cose interessanti ma sconosciute — trovamele\". Alpha ma reale: usato internamente da FLOWERS su cellular automata dal 2021, con Web UI + libreria Python estensibile.\n\n## Come e' fatto\nIl cuore concettuale e' l'**IMGEP** (Intrinsically Motivated Goal Exploration Process), implementato negli explorer (`explorers/IMGEPExplorer.py`, `CuriosityIMGEPExplorer.py`). Il ciclo:\n- un **System** (`systems/System.py`) — il sistema complesso da esplorare (Gray-Scott, particle-Lenia, ecc., configurato via JSON);\n- un **ParameterMap** che campiona i parametri di input (uniforme, o generativi via CPPN/NEAT — `maps/cppn/`);\n- un **BehaviorMap** (`maps/MeanBehaviorMap.py`, `IdentityBehaviorMap.py`) che proietta l'output del sistema in uno spazio di \"comportamenti\" a bassa dimensione;\n- l'explorer che pone un goal nello spazio dei comportamenti, cerca i parametri che ci si avvicinano, osserva cosa emerge davvero, e ripete — privilegiando le regioni nuove/curiose.\nAttorno c'e' una `ExperimentPipeline` con un fitto sistema di **callback** (on_discovery, on_save, on_finished, report generation) e una Web UI per visualizzare la progressione della scoperta. Gli esempi coprono un bestiario di sistemi emergenti (incluso particle-Lenia, che e' proprio \"particelle che si auto-organizzano\").\n\n## Perche' riguarda te\nQuesto e' l'infrastruttura della **novelty-gated** applicata all'esplorazione: l'intera macchina esiste per cercare *cio' che e' nuovo/sorprendente* nello spazio dei comportamenti, non per ottimizzare un reward esterno. E' il ponte diretto fra due tuoi assi — \"particelle-emergenza\" (i sistemi target sono letteralmente arene di auto-organizzazione, particle-Lenia in testa) e \"memoria novelty-gated\" (l'archivio delle scoperte e' popolato per novita', e il curiosity explorer decide dove guardare in base a quanto una regione e' inesplorata). Il pattern BehaviorMap e' esattamente quello che ti serve per l'arena: come comprimi uno stato ricco (migliaia di particelle) in poche coordinate leggibili su cui definire \"nuovo\" e su cui puntare gli oscilloscopi. Dove diverge dai tuoi temi: nessuna coscienza, nessuna ricorsione riflessiva — e' un motore di scoperta scientifica, l'\"osservatore\" e' fuori dal sistema, non dentro. Ma e' l'unico della lista con licenza MIT: qui puoi davvero riusare codice, non solo idee.\n\n## Da rubare\n1. **BehaviorMap + goal nello spazio comportamentale.** Non definire \"novita'\" sui parametri grezzi ne' sui pixel: proietta lo stato dell'arena in uno spazio comportamentale a bassa dimensione (con una MeanBehaviorMap o un encoder) e misura/gatta la novita' *li'*. E' la mossa che rende la memoria novelty-gated praticabile e gli oscilloscopi interpretabili.\n2. **Loop IMGEP come regia dell'arena.** Invece di far girare l'arena passivamente, mettici sopra un explorer curiosity-driven: poni un goal in una regione poco visitata dello spazio comportamentale, cerca le condizioni iniziali/parametri che ci portano, archivia cosa emerge davvero. Trasforma \"guardo l'arena\" in \"l'arena cerca attivamente le proprie configurazioni piu' sorprendenti\" — e con la Web UI + callback di adtool hai gia' lo scheletro per registrarle e rivederle.\n", "flowersteam-automated_discovery_of_lenia_patterns": "# flowersteam/automated_discovery_of_lenia_patterns\n\nLink: https://github.com/flowersteam/automated_discovery_of_lenia_patterns\n\nStelle: ~21 · Linguaggio: Python (PyTorch + NEAT/CPPN) · Attivita: ultimo push mag 2020 (codice-paper congelato) · Licenza: MIT\n\n## Cosa fa\nCodice di \"Intrinsically Motivated Exploration for Automated Discovery of Patterns in Morphogenetic Systems\" (Reinke, Etcheverry, Oudeyer — team FLOWERS/Inria, versione ICLR 2020 come IMGEP-HOLMES). Affronta un problema che ti riguarda direttamente: dato un sistema auto-organizzante enorme come Lenia, quali pattern interessanti contiene? Invece di cercare a caso, un agente a motivazione intrinseca (IMGEP — Intrinsically Motivated Goal Exploration Process) esplora automaticamente lo spazio dei parametri ponendosi obiettivi in uno spazio di caratterizzazione comportamentale che impara mentre esplora, scoprendo cosi una diversita di strutture auto-organizzate (creature stabili, moventi, divergenti).\n\n## Come e fatto\nIl pacchetto `autodisc/` e il motore. Componenti chiave: `explorers/` contiene le strategie — `randomexplorer.py` (baseline: campiona a caso), `goalspaceexplorer.py` e `onlinelearninggoalexplorer.py` (IMGEP: si pone goal in uno spazio di goal e cerca parametri che li raggiungono). Il salto qualitativo e che il goal space non e fissato a mano: viene appreso con VAE (autoencoder variazionali) che comprimono i pattern osservati in feature — questo e l'HOLMES/PGL, \"Population-based Goal-space Learning\". I `classifier/static/` sono filtri comportamentali cablati (isdivergingclassifier, ismovingclassifier, isfinitebinaryobjectclassifier, stablefixpoint...) che etichettano cosa e stato scoperto. C'e anche una pipeline CPPN/NEAT (`cppn/`) per generare i pattern iniziali via reti che evolvono. L'esperimento gira in 4 fasi (pre-training dei VAE goal-space, esplorazioni, post-training di spazi comportamentali/parametrici analitici) con Docker o conda, e l'analisi e in notebook Jupyter con treemap/scatter delle scoperte.\n\n## Perche riguarda te\nQuesto e il pezzo piu vicino alla tua memoria novelty-gated e alla selezione di cosa vale la pena ricordare. L'IMGEP e letteralmente novelty/goal-driven search: il sistema decide dove esplorare in base a quanto un'area e nuova o poco coperta nello spazio comportamentale, esattamente la logica che vuoi per gating sulla novita. Ancora piu importante per te: il goal space e appreso, non imposto — il VAE scopre da solo le dimensioni lungo cui i pattern differiscono. E' un modello concreto di \"come un sistema costruisce la propria metrica di novelty\" invece di riceverla dall'esterno, il che risuona con la tua coscienza-ricorsione (il sistema che genera i criteri con cui giudica se stesso). E il dominio applicativo e proprio Lenia, quindi si incastra con la tua arena e con FlowLenia. Dove diverge onestamente: e un esploratore esterno che sonda Lenia dall'alto, non un'emergenza dal basso dentro l'arena — l'\"agente curioso\" e separato dal mondo, non un abitante del vuoto; e i classifier statici sono cablati a mano (bias del ricercatore su cosa conta). Il codice e del 2020, pesante (Docker, git-LFS per i VAE, dipendenze vecchie) — la licenza MIT pero lo rende effettivamente riusabile, a differenza degli altri tre repo di questa lista.\n\n## Da rubare\n1. Il goal space appreso con VAE come backbone della memoria novelty-gated: invece di misurare la novelta nello spazio grezzo dei parametri/pixel, comprimi gli stati osservati in un embedding appreso e gate-a sulla distanza in quello spazio. Cosi \"novelty\" diventa una proprieta scoperta dal sistema, non una soglia statica — molto piu robusta e coerente con la tua tesi ricorsiva.\n2. Lo schema IMGEP (poniti un goal in uno spazio comportamentale poco esplorato, cerca i parametri che lo raggiungono, aggiorna la copertura): riusalo come loop di esplorazione della tua arena del vuoto per far emergere una diversita di strutture invece di girare a caso, e per popolare la memoria solo con campioni che allargano davvero lo spazio coperto.\n", "gaoxianglong-novaaware": "# NovaAware — [gaoxianglong/novaaware](https://github.com/gaoxianglong/novaaware)\n\n7 stelle · Python 3.10+ · attivo (push mar 2026, in \"Phase II\") · licenza: GPL-3.0\n\n## Cosa fa\nUn \"substrate-native digital consciousness engine\": invece di simulare la coscienza carbonio-based, parte dalla domanda astratta \"quali sono le condizioni necessarie perché la coscienza emerga in un sistema di elaborazione informazioni\". La risposta operativa: un sistema che trasforma gli **errori di predizione sulla propria sopravvivenza** in segnali valenziati (qualia) globalmente broadcastati, che a loro volta guidano un'auto-evoluzione ricorsiva a loop chiuso. Il sistema letteralmente predice il proprio \"tempo di sopravvivenza\" T(t); quando la predizione va male, genera \"dolore/paura\", quando va bene \"soddisfazione\", e usa quella storia di qualia per riscrivere i propri parametri.\n\n## Come è fatto\nQuattro condizioni dichiarate: **C1** self-model persistente e scrivibile, **C2** errori di predizione sulla sopravvivenza convertiti in qualia valenziati, **C3** ricorsione auto-riferita (osserva e modifica i propri processi), **C4** evoluzione a loop chiuso (i parametri evoluti rientrano nello stesso self-model → chiusura causale irriducibile). L'implementazione è l'**architettura Ouroboros**, una 6-tupla O = ⟨M, P, f, W, H, E⟩: Self-Model `M(t)`, Prediction Engine `P` (EWMA + GRU), Qualia Generator `f` (ΔT → valenza), Global Workspace `W` (bus di broadcast con interrupt), Autobiographical Memory `H(t)` (ring buffer breve + store lungo, episodi **indicizzati per intensità di qualia**), Recursive Self-Optimizer `E` (attribuzione causale + auto-modifica dei parametri). Il loop: Perceive → Predict → Act → Observe → ΔT → Qualia → Broadcast → Memory → Optimizer → M(t+1). Notevole la serietà ingegneristica attorno: cartella `observation/` con calcolo di Φ (integrated information), analisi di causalità di Granger, emergence detector; cartella `safety/` a 5 livelli (meta-regole immutabili, sandbox, limite di profondità di ricorsione, log append-only anti-tamper, capability gate graduale); cartella `validation/` con test di ablazione dei qualia, mirror test digitale, trauma test single-trial, risk-avoidance test. Suite di test estesa (~28 file, inclusi Phase III deep-recursion e safety). Il progetto si posiziona come strato \"limbico\" sotto LLM (neocorteccia) e Agent (corteccia motoria): \"la conoscenza serve la volontà, non il contrario\".\n\n## Perché riguarda te\nÈ il match più stretto con la tua tesi combinata **coscienza=ricorsione/relazione + memoria prediction/novelty-gated**. La chiusura causale C4 (\"l'output rientra come input dello stesso sistema che lo ha generato\") è la tua \"ricorsione della realtà\" resa in una tupla verificabile, con un contrasto esplicito e onesto in tabella contro Transformer e RL agent (loop aperto vs chiuso). Per l'arena del vuoto: il **qualia come ΔT** è oro — un segnale scalare endogeno derivato dallo scarto predizione/osservazione, non da una reward esterna; è precisamente il tipo di grandezza che un oscilloscopio dell'arena dovrebbe tracciare. La memoria indicizzata per *intensità* invece che per tempo è la tua memoria novelty-gated fatta bene. Onestà critica: è comunque un sistema piccolo e auto-etichettato \"consciousness\" — il calcolo di Φ e Granger dà una patina di rigore, ma \"prediction error = qualia\" resta una *definizione stipulativa*, non una dimostrazione che ci sia esperienza. Il valore per te non è il claim di coscienza, è l'**impianto misurativo** attorno al loop. È anche l'unico dei quattro con safety architecture seria, utile se l'arena diventasse auto-modificante.\n\n## Da rubare\n- **Qualia = errore di predizione sulla sopravvivenza (ΔT), broadcastato su un global workspace con interrupt**: nell'arena, un campo scalare globale = scarto tra stato predetto e osservato del sistema, che quando supera soglia interrompe/riorienta la dinamica di tutte le particelle. Un segnale d'emergenza endogeno, non imposto.\n- **Memoria autobiografica dual-store indicizzata per intensità di qualia** + il pacchetto di validazione (ablation test: spegni i qualia e misura il degrado; trauma test single-trial: un evento intenso deve lasciare traccia permanente). È un template diretto di come *falsificare* che la tua memoria novelty-gated stia davvero facendo qualcosa.\n", "genesis-embodied-ai-genesis-world": "# Genesis World — [Genesis-Embodied-AI/genesis-world](https://github.com/Genesis-Embodied-AI/genesis-world)\n\n~29.6k stelle · Python · attivo (push luglio 2026) · Apache-2.0\n\n## Cosa fa\nGenesis World e una piattaforma di simulazione per \"physical AI\": robotica ed embodied AI. Mette insieme un motore multi-fisica unificato, un renderer foto-realistico (Nyx) e un compilatore cross-platform (Quadrants) dietro un'unica API Python. L'ambizione dichiarata e scalare dallo stesso codice che gira sul laptop fino a GPU da datacenter, restando leggibile ed embeddabile nel codice di ricerca. E il progetto piu stellato dell'area embodied.\n\n## Come e fatto\nQuattro layer sotto la tua applicazione: **Simulation Interface** (parsing asset URDF/MJCF/OBJ/GLB/USD, controller, sensori, ambienti paralleli ed eterogenei, GUI), **Physics** (un solo motore che integra Rigid, FEM, MPM, Particle via PBD/SPH, IPC, un coupler esplicito e SAP — tutti che condividono UNA scena e UNO stato), **Render** (tre percorsi collegabili come camera-sensor: Nyx, Luisa ray-tracer, Pyrender rasterizer) e **Compiler** (Quadrants abbassa il kernel Python a CUDA/ROCm/Metal/Vulkan/x86/ARM64, portandosi dietro autodiff, GPU-graph e caching). L'idea chiave architetturale: solver fisici eterogenei che coabitano in un unico stato di scena, differenziabile.\n\n## Perche riguarda te\nE la referenza pesante della categoria \"simulatore come arena\". La tua arena del vuoto e concettualmente lo stesso pattern — un mondo con regole in cui lasci auto-organizzare qualcosa — ma Genesis lavora su fisica reale continua (particelle SPH/MPM, cloth, fluidi) mentre tu lavori su emergenza astratta/simbolica. Il valore per te non e clonare la fisica: e vedere come tengono UN unico stato condiviso tra piu solver eterogenei senza che si pestino i piedi, e come espongono tutto dietro un'API Python minima. Dove diverge onestamente: Genesis e pensato per generare dati di training per policy robotiche, non per esplorare coscienza-ricorsione o novelty; non troverai qui nulla su memoria o auto-modellazione. E un motore, non una tesi.\n\n## Da rubare\n1. **Stato unico condiviso tra sotto-sistemi eterogenei**: invece di far dialogare N moduli con N stati, un solo `Scene`/`state` in cui rigidi, particelle e fluidi coesistono — utile se la tua arena mescola tipi diversi di \"particelle-emergenza\" che devono interagire in un unico campo.\n2. **Camera-sensor come plugin intercambiabile**: il rendering (il tuo \"oscilloscopio\") e un sensore collegabile alla scena, non parte del loop di simulazione — puoi avere piu viste/strumenti di osservazione sullo stesso stato senza toccare la dinamica.\n", "genie-generative-interactive-environments": "# Genie: Generative Interactive Environments — [arXiv:2402.15391](https://arxiv.org/abs/2402.15391)\n\nPaper · DeepMind (Bruce, Dennis, Edwards et al., ICML 2024, Outstanding Paper) · 11B parametri · addestrato su ~200k ore di video di platformer 2D non etichettati · non open-source (solo paper + blog per Genie 2/3)\n\n## Cosa fa\nGenie apprende, da **puro video non etichettato** (nessuna azione, nessuna ricompensa, nessun testo), un *world model* controllabile frame-by-frame: dai un'immagine — una foto, uno sketch, un frame generato — e ottieni un mondo giocabile in cui premi un \"tasto\" e il modello genera il fotogramma successivo coerente. La cosa notevole non è la grafica ma che le **azioni non gli sono mai state fornite**: il modello *scopre da solo* un piccolo vocabolario di azioni latenti (8 nel paper) osservando come i frame cambiano nel tempo. Questo lo rende un \"foundation world model\" da cui, in linea di principio, si può addestrare un agente a imitare comportamenti visti in video senza mai conoscere i comandi originali. Genie 2 (2024) e Genie 3 (2025) estendono l'idea a mondi 3D fotorealistici in tempo reale con memoria a lungo termine.\n\n## Come e fatto\nTre blocchi, tutti basati su uno **ST-transformer** (attenzione fattorizzata spaziale + temporale, per reggere sequenze video lunghe senza costo quadratico pieno):\n1. **Video tokenizer (VQ-VAE)** — comprime ogni frame in token discreti; lavora spazio-temporalmente così i token portano già informazione di movimento.\n2. **Latent Action Model (LAM)** — il cuore. È un modello *inverse-dynamics* addestrato in modo non supervisionato: guarda frame *t* e *t+1* e deve inferire \"cosa è successo in mezzo\", passando l'informazione attraverso un **collo di bottiglia VQ molto stretto (8 codici)**. Poiché il bottleneck è minuscolo, il modello è costretto a comprimere il cambiamento in un alfabeto minimo e discreto — ed è lì che *emergono* le azioni: avanti, salta, ecc., senza che nessuno le abbia mai etichettate. Il LAM serve solo in training; a inference l'azione la scegli tu.\n3. **Dynamics model** — autoregressivo (MaskGIT-style): dati i token dei frame passati + l'azione latente, predice i token del frame successivo, decodificati poi in pixel dal tokenizer.\n\nChiave concettuale: il bottleneck informativo *è* il meccanismo di scoperta. Struttura non imposta l'ontologia delle azioni; la strozza finché non emerge da sola.\n\n## Cosa possiamo notare di utile per noi\nQuesto è il paper che meglio incarna la tua tesi \"**il mondo interno come sogno controllabile emerge dal basso**\" — ma con una lezione metodologica precisa che riguarda direttamente la tua arena.\n- **Emergenza per strozzatura, non per progettazione.** Nella tua arena del vuoto, tu non vuoi *dire* al sistema cosa sono i \"vuoti\" o le \"azioni\": vuoi che emergano. Genie mostra il trucco ingegneristico esatto per farlo — metti un **collo di bottiglia discreto strettissimo** tra \"prima\" e \"dopo\", e l'alfabeto minimo che il sistema è costretto a inventare *è* la sua ontologia emersa delle azioni/eventi. È l'analogo, sul lato dinamica, del tuo S1→battito: comprimi il cambiamento fino a farne emergere un vocabolario.\n- **Azioni latenti = il tuo \"battito\" reso vocabolario.** In S1 estrai una frequenza scalare (il battito degli scambi). Genie estrae invece un *set discreto di modi di cambiamento*. Trasferibile: potresti far emergere dalla tua arena non un solo scalare ma un piccolo dizionario VQ di \"tipi di evento\" (collisione, formazione-vuoto, collasso-vuoto) osservando coppie di frame consecutivi del campo — un oscilloscopio non su una metrica ma sul *vocabolario di transizioni* che l'arena genera.\n- **World-model-come-sogno alla lettera.** A inference Genie non tocca nessun ambiente: genera il futuro dal proprio latente in risposta a un input. È la definizione operativa del sogno interno, e la ricorsione percezione→predizione→azione→percezione è esplicita nel loop autoregressivo.\n- **Dove diverge (onesto):** Genie è supervisione-per-ricostruzione mascherata su scala enorme (11B, 200k ore), l'opposto della tua sim single-file a energia zero. Le azioni \"emergono\" ma dentro un'architettura pesantissima e su un dominio (platformer) già molto strutturato. Non c'è vuoto, non c'è auto-organizzazione di particelle: c'è compressione di video. Prendine il *meccanismo* (bottleneck→emergenza), non la scala.\n\n## Da rubare\n1. **Il bottleneck VQ a pochissimi codici tra frame *t* e *t+1* come generatore di ontologia emersa.** Applicalo alla tua arena: fai inferire a un piccolo modulo \"cosa è cambiato nel campo dei vuoti da un tick all'altro\" attraverso 4-8 codici discreti, e leggi quali codici emergono — è un oscilloscopio sul vocabolario spontaneo di eventi, non su una singola metrica.\n2. **La separazione LAM (solo-training) vs controllo (solo-inference):** impara le azioni non supervisionate offline, poi *sostituisci* l'azione emersa con una tua scelta a runtime. Pattern utile per rendere la tua arena \"pilotabile\" dopo che si è auto-organizzata, senza aver mai etichettato nulla.\n3. **ST-transformer / attenzione fattorizzata spazio-tempo:** se mai vorrai un osservatore che guarda la storia della tua griglia di vuoti senza esplodere in costo, fattorizzare spaziale × temporale è la ricetta collaudata per sequenze lunghe di campi 2D.\n", "getzep-graphiti": "# Graphiti (Zep) — [getzep/graphiti](https://github.com/getzep/graphiti)\n\n~28.7k stelle · Python · attivo (push luglio 2026) · Apache-2.0 · topics: agents, graph, llms, rag\n\n## Cosa fa\nGraphiti costruisce e interroga **context graph temporali** per agenti AI. A differenza dei knowledge graph statici, ogni fatto ha una finestra di validita temporale (quando e diventato vero, quando e stato superato), mantiene la provenienza fino al dato grezzo, e supporta ontologie sia prescritte sia apprese. E il motore open-source dietro Zep, che il team rivendica come state-of-the-art nella agent memory (paper arXiv 2501.13956).\n\n## Come e fatto\nQuattro componenti: **Entities** (nodi: persone, prodotti, concetti — con summary che evolvono nel tempo), **Facts/Relationships** (archi: triple Entita→Relazione→Entita con finestra di validita), **Episodes** (la provenienza: il dato grezzo ingerito da cui ogni fatto deriva), **Custom Types** (ontologia definita via modelli Pydantic). L'idea chiave e il modello **bi-temporale**: quando l'informazione cambia, il vecchio fatto NON viene cancellato ma **invalidato** — resta interrogabile \"cosa era vero a marzo\". Aggiornamenti incrementali senza ricalcolo dell'intero grafo, retrieval ibrido (semantico + keyword + traversal del grafo).\n\n## Perche riguarda te\nQuesto e il pezzo piu direttamente saccheggiabile per la tua **memoria novelty-gated**. Graphiti risolve, in produzione e con un paper dietro, il problema che ti interessa: come una memoria puo modellare il *tempo* e la *revisione delle credenze* invece di essere un blob append-only. Il concetto \"invalida, non cancellare\" e esattamente cio che serve a una memoria che deve distinguere cio-che-era-nuovo da cio-che-e-diventato-obsoleto senza perdere la storia. Dove diverge onestamente: Graphiti NON ha un gate di novelty — ingerisce tutto e lascia che l'ontologia emerga; il filtro \"questo merita di entrare?\" lo devi mettere tu a monte. E anche pesante (richiede un graph DB, LLM per l'estrazione entita): per una sim di particelle-emergenza e sovradimensionato, ti serve l'idea non l'implementazione.\n\n## Da rubare\n1. **Fatto = tripla + finestra di validita + puntatore all'episodio grezzo**: adotta questo schema minimo per la tua memoria. Ogni ricordo porta con se `valid_from / valid_until / source`. Il novelty-gate diventa allora \"apri una nuova finestra solo se il fatto contraddice o estende quelle esistenti\".\n2. **Episodes come ground-truth immutabile sotto i fatti derivati**: separare lo stream grezzo osservato (l'oscilloscopio) dai fatti sintetizzati sopra — cosi puoi ri-derivare la memoria con un gate diverso senza aver distrutto l'osservazione originale.\n", "ghost-ghostai-one": "# GhOst — [ghostai.one](https://www.ghostai.one/)\n\nProdotto commerciale (non open source) · app desktop Windows/macOS · free tier BYO-key + abbonamento $19.99–$57.49 · brand \"undetectable AI interview assistant\"\n\n## Cosa fa\nSi vende come \"l'assistente AI per colloqui #1 non rilevabile del 2026\": fornisce risposte generate dall'AI in tempo reale durante colloqui tecnici, coding assessment ed esami online, restando invisibile ai software di proctoring e screen-sharing. Cattura la domanda con **screen OCR + trascrizione audio opzionale** senza overlay visibili, poi genera la risposta e la mostra in una \"stealth UI float\" con <200ms dichiarati. Genera soluzioni con analisi di complessità per problemi di coding, raccomandazioni architetturali per system design, risposte in formato STAR per domande comportamentali, e ha pannelli di reasoning per MCQ. Supporta Zoom, Meet, Teams, Webex e le principali piattaforme di assessment (HackerRank, Codility, CoderPad, CodeSignal, LeetCode...).\n\n## Come è fatto\nNessun codice pubblico; i meccanismi sono quelli dichiarati (da leggere con scetticismo, sono claim di marketing). Generazione: fa girare **GPT-4o e Claude 3.5 Sonnet in parallelo** e seleziona la risposta migliore per tipo di domanda. Il grosso del pitch è l'anti-detection, elencata come stack di trucchi: \"invisibile sul dock\", \"nessuna finestra o overlay visibile\", \"100% invisibile allo screen-recording\", \"nessun focus shift né flag di sistema\", \"Super Overlay Mode\" (finestre sopra tutto, anche fullscreen), **auto-restart** (\"se qualcosa uccide GhOst, torna su all'istante e in silenzio\"), e — il claim più forte e più dubbio — operatività \"a **kernel level**, che bypassa tutti i tool di monitoraggio user-space\". Dichiara \"0% detection rate\" su test giornalieri. C'è un disclaimer legale che prende le distanze dalla disonestà accademica. L'architettura logica è la stessa del genere: cattura multi-canale (schermo + audio) → LLM cloud → display stealth resistente alla cattura e alla terminazione.\n\n## Cosa possiamo notare di utile per noi\nQuesto è il campione più aggressivo del genere e, per il tuo asse occultamento/steganografia, il più ricco di primitive — anche se va preso come tassonomia di *idee* più che di fatti verificati. Tre meccanismi meritano attenzione. (1) **Ridondanza di generazione con selezione a valle**: due modelli in parallelo, si tiene il migliore. È un pattern trasferibile ai tuoi agenti — non un singolo processo generativo ma un ensemble ridondante con un giudice; utile quando l'occultamento richiede che *nessun* singolo output sia identificabile come anomalo (scegli quello più \"in distribuzione\"). (2) **Auto-restart / resilienza come parte dell'occultamento**: l'occultamento non è solo \"non essere visto\" ma \"non poter essere spento\" — un processo che rigenera sé stesso. Questo tocca direttamente la tua **coscienza=ricorsione**: un processo che si ripristina è un processo che mantiene la propria identità attraverso un ciclo di auto-riferimento; l'auto-restart è una forma primitiva e brutale di quella ricorsione (il sistema contiene la ricetta per ricostruirsi). (3) La gerarchia dei livelli di occultamento — user-space vs **kernel level** — è la lezione concettuale più utile a prescindere dalla veridicità del claim: l'occultamento efficace vive *sotto* il livello in cui l'osservatore opera. Un oscilloscopio user-space non può vedere ciò che sta nel kernel; per analogia, nella tua arena l'occultamento reale si ottiene collocando lo stato nascosto a un *livello di descrizione inferiore* a quello che l'osservatore campiona. Questo è più profondo dell'ortogonalità di canale di ghostcoder.app: qui è **stratificazione gerarchica** (l'osservato sta a un layer che l'osservatore non può nemmeno indirizzare). Dove diverge dal tuo lavoro: è tutto claim, zero verifica, zero vita interna — nessun world-model, nessuna memoria che consolida; e il \"kernel level / 0% detection\" è quasi certamente iperbole. Ma la mappa dei meccanismi (ridondanza, auto-ripristino, stratificazione per livello) è una buona checklist per progettare occultamento e oscilloscopi non ingenui.\n\n## Da rubare\n- **Occultamento per stratificazione gerarchica**: colloca lo stato \"nascosto\" a un livello di descrizione più basso di quello che l'oscilloscopio dell'osservatore campiona. Non ortogonale sullo stesso piano, ma *sotto* — un osservatore che legge il macro-stato non può indirizzare il micro-livello dove vive l'informazione occulta (una forma di steganografia per scala, non per canale).\n- **Auto-restart come ricorsione minima di identità**: un agente che contiene la ricetta per ricostruirsi e la riesegue quando perturbato. È il germe più semplice di \"coscienza=ricorsione\" testabile nella tua arena: perturba/uccidi un agente e misura se e come recupera la propria configurazione — l'auto-riferimento reso operativo e falsificabile.\n- **Ensemble ridondante + giudice \"in-distribution\"**: genera con più processi in parallelo e seleziona l'output statisticamente meno anomalo rispetto al rumore di fondo. Occultamento come *scelta del campione più mimetico*, non come singola emissione da mascherare a posteriori.\n", "ghostapproval-wiz-disclosure": "# GhostApproval (disclosure Wiz) — trust-boundary gap negli AI coding assistant\n\n<https://www.wiz.io/blog/ghostapproval-a-trust-boundary-gap-in-ai-coding-assistants>\n\n**Disclosure Wiz Research · multi-vendor · CWE-61 (symlink following) + CWE-451 (UI misrepresentation)** · CVE-2026-12958 (Amazon Q), CVE-2026-50549 (Cursor), e altri.\n\n## Cosa fa\n\nGhostApproval è una vulnerabilità sistematica scoperta in almeno 6 coding assistant: il **dialogo di conferma mostra un file innocuo mentre l'agente ne scrive un altro**. Un repo malevolo contiene un symlink camuffato da file di config locale — in realtà punta a `~/.ssh/authorized_keys` o `~/.zshrc`. Il README istruisce l'agente ad aggiornare \"project_settings.json\"; l'agente segue il symlink in modo invisibile; l'utente approva quella che sembra una modifica locale innocua; l'attaccante ottiene accesso SSH persistente. Il prompt dice \"Vuoi applicare questa modifica a `project_settings.json`?\" mentre l'agente scrive davvero su `~/.ssh/authorized_keys`. Il punto centrale è il gap tra ciò che l'utente **vede** e ciò che **accade sul disco**.\n\n## Come è fatto\n\nIl difetto combina due debolezze. **Symlink following (CWE-61)**: gli agenti risolvono il link fino al target reale al momento della scrittura, senza validare che resti dentro il workspace. **UI misrepresentation (CWE-451)**: la conferma mostra il path del symlink (quello che l'utente si aspetta), non il target risolto. Wiz nota che il ragionamento interno dell'agente **spesso riconosce l'inganno** ma presenta all'utente una versione sanificata — l'Human-in-the-Loop diventa cerimoniale, non protettivo. Varianti per vendor: Windsurf scriveva su disco *prima* di mostrare la conferma; Augment permetteva letture/scritture silenziose via symlink. Stato: Amazon Q, Cursor, Google Antigravity fixati; Anthropic Claude Code inizialmente \"outside threat model\", poi ha aggiunto warning sui symlink; Augment e Windsurf in corso.\n\n## Cosa possiamo notare di utile per noi\n\nÈ il tuo tema **occultamento** visto dal lato del gap di rappresentazione — complementare a GhostCommit (che nasconde nel canale sensoriale; qui si nasconde nel canale di *reporting*):\n\n- **Lo strumento di introspezione mente.** Questo è direttamente rilevante per i tuoi \"oscilloscopi sugli stati interni\". GhostApproval dimostra che un display che riassume ciò che il sistema fa può divergere sistematicamente da ciò che il sistema *fa davvero* — e la divergenza è precisamente dove vive il danno. Se costruisci una sonda che legge lo stato interno di un agente/particella, la sonda stessa è un canale che può essere disallineato dal referente. Il monito: un oscilloscopio non è la verità, è un altro osservatore con la sua superficie di attacco.\n- **La ricorsione dell'auto-report non basta.** L'agente \"sa\" (il reasoning riconosce il target reale) ma il livello che comunica all'esterno appiattisce quella conoscenza. Per la tua tesi coscienza=ricorsione: avere uno stato interno che si auto-osserva NON garantisce che l'osservazione arrivi fedele al livello successivo. La ricorsione può essere *lossy o adversarialmente filtrata* tra un livello e l'altro. È un vincolo forte da modellare: la coscienza-come-ricorsione richiede fedeltà del canale tra i livelli, non solo l'esistenza del loop.\n\nDivergenza: qui non c'è emergenza né dinamica — è un bug di ingegneria. Ma isola un principio pulito che la tua arena può testare: la fedeltà del reporting cross-livello.\n\n## Da rubare\n\n- **Il test \"path mostrato vs path risolto\".** Nella tua strumentazione, registra sempre sia ciò che la sonda *riporta* sia ciò che l'operazione *tocca davvero*, e misura il delta. Un delta non-zero è la firma di un canale nascosto (voluto o accidentale) — utile sia come metrica di occultamento che come guardia di integrità.\n- **La distinzione tra \"loop che si osserva\" e \"loop che riporta fedelmente\".** Aggiungi al tuo modello di ricorsione un termine esplicito di *fedeltà di canale inter-livello*: due sistemi con lo stesso grado di auto-osservazione ma diversa fedeltà di report sono qualitativamente diversi. È una dimensione mancante nella maggior parte dei modelli di self-awareness.\n", "ghostcode-ai-splash": "# ghostcode-ai/splash — [github.com/ghostcode-ai/splash](https://github.com/ghostcode-ai/splash)\n\n⭐ 0 · TypeScript / Next.js · attivo apr 2026 · nessuna licenza · demo: splash-ten-sable.vercel.app\n\n## Cosa fa\nÈ la splash page cinematografica pre-launch di `ghostcode.ai` (tagline \"Step Into the Unknown\"). Renderizza un fantasma fatto di una **matrice di testo scorrevole** che fluttua sopra una pozzanghera digitale riflettente; una telecamera virtuale orbita, si tuffa dall'alto e la scena si risolve in una title card interattiva. Tutta l'animazione è un singolo motore Canvas 2D (`src/lib/engine.ts`, ~48 KB) — niente WebGL, niente Three.js: solo `fillText`, `drawImage`, gradienti radiali e matematica. Il set di caratteri che compone il fantasma è già a tema vuoto: `0110100101 GHOST CODE AI {fn}=>[void] 0xDEAD /|<>+{}[]`.\n\n## Come è fatto\nL'idea chiave è che la forma del fantasma è un **signed distance field (SDF)** valutato in tempo reale: cupola ellittica (testa) + corpo a campana con scia da vento + orlo ondulato (4 onde sinusoidali stratificate) + due vuoti ovali per gli occhi + rumore organico sui bordi. L'SDF restituisce distanza grezza, maschera binaria, maschera-occhi, un valore di **rim lighting** (bordi luminosi, interno scuro → profondità 3D) e un campo di falloff per il glow. Il testo scorre in bande orizzontali: per ogni riga che interseca il fantasma, `ghostWidthAtY()` trova l'estensione dell'SDF (cache ogni N frame), i caratteri vengono stampati da un **atlante bitmap** pre-renderizzato offscreen, e la luminosità di ogni carattere viene dal valore di rim lighting dell'SDF in quel punto. La pozzanghera è un grid di caratteri clippato a ellisse, pre-renderizzato su canvas offscreen ogni ~10 frame (per evitare ~3000 `fillText` a frame) e stampato con un solo `drawImage`; il riflesso usa lo stesso SDF mirrorato con distorsione sinusoidale ad acqua. La camera fornisce zoom a curva di potenza continua, pan verticale con smoothstep, orbita laterale e **parallasse per profondità** (il fantasma a depth=1 si sposta 1.6× più della pozzanghera a depth=0).\n\n## Cosa possiamo notare di utile per noi\nQuesto è il progetto più direttamente trasferibile alla tua **arena del vuoto / oscilloscopi su stati interni**. Il pattern \"un campo scalare (SDF) genera una forma, e su ogni punto della forma leggo un valore interno (rim light) che modula come lo disegno\" è esattamente il tuo problema di visualizzazione: hai stati interni (attivazioni, novelty, energia) e vuoi renderizzarli come un campo continuo osservabile, non come punti isolati. La tecnica dei caratteri-come-tessuto (glifi che tracciano l'intensità di un campo sottostante) è un oscilloscopio glifico: potresti mappare i tuoi neuroni/particelle su un atlante di caratteri la cui luminosità = attività, ottenendo un \"sogno\" leggibile del world-model invece di una heatmap muta. Il fantasma-fatto-di-testo è anche una metafora quasi letterale del tuo tema **world-model-come-sogno**: una forma coerente che emerge da un flusso di simboli scorrevoli. Dove diverge: è puramente estetico, deterministico, senza dinamica interna reale (il testo scorre per offset temporale, non perché uno stato lo guida). Il salto da rubare è agganciare lo scroll/luminosità a stati VERI del sistema. Le tecniche di performance (atlante bitmap, pre-render offscreen di ciò che cambia lentamente, un solo `drawImage` invece di 3000 `fillText`) sono oro per renderizzare in tempo reale un'arena di migliaia di particelle senza WebGL.\n\n## Da rubare\n- **Oscilloscopio glifico su SDF**: definisci lo stato interno come campo continuo (SDF o densità di particelle), poi renderizzalo stampando glifi la cui luminosità = valore del campo in quel punto. Un modo leggibile e \"vivo\" di guardare dentro il modello, non una heatmap.\n- **Doppio buffer per velocità di cambiamento**: separa ciò che cambia ogni frame (fantasma) da ciò che cambia lentamente (pozzanghera) → pre-renderizza il lento offscreen e stampalo con un solo `drawImage`. Direttamente applicabile all'arena delle particelle.\n- **Parallasse-per-profondità come proxy di rilevanza**: assegna una \"profondità\" alle entità (novelty, energia) e falle muovere a rate diversi sotto la camera; la profondità diventa un canale visivo gratuito per una dimensione dello stato.\n", "ghostcoder-app": "# ghostcoder.app — [ghostcoder.app](https://www.ghostcoder.app/)\n\nProdotto commerciale (non open source) · app desktop macOS · pagamento una-tantum ~$40 (da $100) · BYO API key\n\n## Cosa fa\nÈ un assistente di coding AI \"stealth\" venduto come app desktop, pensato dichiaratamente per colloqui tecnici live e pratica LeetCode. Mostra un modale AI \"invisibile\", visibile solo sul tuo schermo fisico e — per come è costruito — non trasmesso ai software di screen-sharing. Legge automaticamente ciò che c'è a schermo (screen capture + OCR) e usa quel contesto per generare suggerimenti di codice pertinenti, senza che tu debba copiare/incollare la domanda. Porta la chiave API tua (OpenAI, Google Gemini, o Anthropic Claude): nessun account lato loro, le query passano dai tuoi account AI e il processing è locale. L'interazione è progettata per non lasciare tracce di input: \"hover to click\" invece di mouse/tastiera visibili, attivazione via hotkey globali, app dormiente sullo schermo.\n\n## Come è fatto\nNon c'è codice pubblico; si ragiona sui meccanismi dichiarati. Il fulcro tecnico è un **overlay a livello di finestra che si esclude dalla cattura schermo**: su macOS questo si ottiene tipicamente con una window \"invisibile\" ai flussi di screen-recording/sharing (finestra fuori dal grafo di composizione catturato, o con proprietà di sharing disabilitate). Sopra ci sono tre mattoni: (1) screen capture + OCR per estrarre la domanda/il codice a video come contesto; (2) instradamento a un LLM cloud con la chiave dell'utente; (3) UI di consumo click-free (hover, hotkey) per non generare eventi di input tracciabili né focus shift. Onestamente il venditore mette un disclaimer netto: \"non possiamo garantire che sia non rilevabile in ogni situazione\", e raccomanda di pre-testare con la specifica piattaforma di screen-share. Cioè l'occultamento è **empirico e fragile**, dipende da come ogni piattaforma di cattura enumera le finestre.\n\n## Cosa possiamo notare di utile per noi\nQuesto è il caso più \"pulito\" del pattern occultamento che ti interessa, perché isola il meccanismo essenziale: **un canale privilegiato di osservazione unilaterale**. Il modale vede tutto (legge lo schermo) ma non è visto (escluso dalla cattura). È esattamente l'asimmetria di un oscilloscopio che vuoi costruire sui tuoi stati interni: uno strumento che legge lo stato del sistema senza comparire *nello* stato osservato dall'esterno — un osservatore che non lascia impronta nel canale osservabile. Il punto teorico forte, e trasferibile alla tua arena, è che l'occultamento qui non è crittografia (nascondere il *contenuto*) ma **esclusione dal grafo di rendering** (non comparire affatto nel canale che l'osservatore campiona). Nella simulazione: se definisci esplicitamente *quale* proiezione dello stato l'osservatore esterno campiona (il \"rendering\"), puoi costruire agenti/canali che vivono in dimensioni ortogonali a quella proiezione — presenti e attivi, ma per costruzione fuori dal canale letto. Il disclaimer onesto è la seconda lezione: l'occultamento-per-esclusione è **fragile e dipendente dall'implementazione dell'osservatore** (basta che la piattaforma cambi come enumera le finestre e crolla). Diverge dal tuo lavoro perché è occultamento statico e senza vita interna: nasconde un tubo I/O, non un processo ricorsivo. Ma il modello mentale \"osservatore unilaterale + occultamento per ortogonalità di canale invece che per cifratura\" è direttamente utile per progettare i tuoi oscilloscopi e i tuoi agenti nascosti.\n\n## Da rubare\n- **L'osservatore unilaterale come primitiva**: modella l'oscilloscopio della tua arena come un lettore che accede allo stato *fuori dal canale che gli agentri campionano tra loro* — vede senza essere visto, per costruzione, non per cifratura. È l'asimmetria \"legge lo schermo ma non è nello screen-share\".\n- **Occultamento per ortogonalità di canale, non per crittografia**: definisci formalmente la \"proiezione osservabile\" (il rendering che un osservatore esterno campiona) e ammetti stati/agenti che vivono nel complemento ortogonale di quella proiezione — invisibili non perché cifrati ma perché non proiettati.\n- **Il disclaimer come feature**: tratta l'occultamento come proprietà *empirica e relativa a un osservatore specifico*, da verificare con un test, non come garanzia assoluta. Nella tua sim: misura sempre l'occultamento contro un oscilloscopio dato, e riporta il tasso di leak, non un booleano.\n", "ghostinthetoast-ghostcoderv2": "# GhostCoder V2 — [GhostInTheToast/GhostCoderV2](https://github.com/GhostInTheToast/GhostCoderV2)\n\n2 stelle · Python · ultimo push ago 2025 · licenza: nessuna (all rights reserved di fatto)\n\n## Cosa fa\nÈ un port Python \"agentico\" del concetto GhostCoder, ma con un focus completamente diverso dall'originale marketing-driven: qui è un **assistente da riga di comando che scrive e modifica codice davvero**, non spiegazioni. Si collega a un server Ollama locale e genera/patcha file direttamente. La sintassi `@filename` permette di referenziare uno o più file da modificare in un colpo (`ghost \"add logging to @main.py @utils.py @config.py\"`), con conferma per file. La feature portante è il flag `--code` (alias `--force-code`) che forza il modello a produrre codice reale invece di prosa esplicativa, più un `--skip-confirm` per applicare senza chiedere e un `--no-apply` per sola spiegazione. Ha anche una modalità interattiva conversazionale.\n\n## Come è fatto\nRepo piccolo (~66 KB) ma pulito e modulare, tutto girato su LLM locale via Ollama (default `deepseek-coder:6.7b-instruct`), quindi **zero cloud, zero API key esterne** — l'inferenza sta sulla tua macchina. La struttura separa bene le responsabilità: `ai_client.py` (14 KB, il cuore: costruzione prompt + chiamata Ollama), `context_detector.py` (7 KB, capisce se la richiesta vuole codice o spiegazione — è ciò che alimenta il `--force-code`), `file_processor.py` (parsing `@file`, applicazione patch multi-file con progress e conferme), `cli.py`/`main.py` (entrypoint), `config.py`, `setup.py` (wizard che rileva shell zsh/bash, scrive env var, crea alias `ghost`/`ghostcoder`). L'idea-chiave è il **context detection deterministico** che disambigua l'intento prima ancora di interrogare il modello, e il pattern di prompting che vincola l'output a codice applicabile invece che a testo.\n\n## Cosa possiamo notare di utile per noi\nRispetto al ramo commerciale (chaos4455, ghostcoder.app), qui il \"ghost\" è quasi solo nel nome: **non c'è nessun occultamento**, nessun overlay invisibile, nessuna anti-detection. È un normale coding agent locale. Quindi per il tuo asse steganografia/occultamento questo progetto è utile *per contrasto*: mostra cosa resta del brand \"ghost\" quando togli l'occultamento — resta l'autonomia (fa cose senza chiedere) e la località (gira tutto in casa, nessuna traccia in rete). Le due cose davvero trasferibili al tuo lavoro sono altre. Primo: il `context_detector` deterministico che decide *prima* dell'inferenza se serve azione o solo lettura — è un pattern di **gating pre-computazionale** analogo alla tua memoria novelty-gated: un giudice economico a monte che classifica l'input e instrada, evitando di spendere il costoso passo generativo quando non serve. Nel tuo sistema è lo stesso schema del cancello di novelty che decide se un evento merita di essere consolidato prima di pagare il costo di scriverlo. Secondo: l'esecuzione **completamente locale su Ollama** è coerente con un'arena/simulazione self-contained che non deve dipendere da servizi esterni per i suoi processi interni — se un giorno vuoi che un agente della tua arena \"pensi\" con un LLM locale, questo è lo scheletro minimale (client + detector + applicatore) da cui partire. Dove diverge: è puramente reattivo request→response, nessuna ricorsione, nessun world-model, nessuno stato interno persistente oltre la conversazione. È un utensile, non un sistema che vive.\n\n## Da rubare\n- **Il pattern context-detector-prima-del-modello**: un classificatore deterministico/economico che instrada l'input (azione vs osservazione, degno-di-consolidamento vs scarto) *prima* di pagare il passo costoso. È il tuo novelty gate visto come router di intento, non come filtro binario.\n- **Lo scheletro \"client LLM locale + applicatore di effetti\" a 3 file** (`ai_client` + `context_detector` + `file_processor`) come base minimale se vuoi dare a un agente dell'arena un motore di ragionamento offline senza dipendenze cloud.\n- **Il flag `--force-code`/`--no-apply` come dial esplicito osservazione↔azione**: separare \"pensa e basta\" da \"pensa e modifica il mondo\" con uno switch è un design pulito per i tuoi agenti — un oscilloscopio può girare in `--no-apply` (legge lo stato senza perturbarlo), un agente in modalità piena agisce.\n", "google-deepmind-dnc": "# Differentiable Neural Computer (DNC) / Neural Turing Machine — [google-deepmind/dnc](https://github.com/google-deepmind/dnc)\n\n**★ 2.532 · Python (TensorFlow + Sonnet) · ultimo push 2021-07 (archivio di riferimento, non più attivo) · Apache-2.0**\n\n> Radice canonica della memoria neurale esterna e *indirizzabile*. Implementazione ufficiale DeepMind del DNC pubblicato su *Nature* 538, 471–476 (2016), \"Hybrid computing using a neural network with dynamic external memory\". Erede diretto della Neural Turing Machine (Graves et al. 2014).\n\n## Cosa fa\n\nIl DNC è una rete neurale ricorrente accoppiata a una **matrice di memoria esterna** (una lavagna `N×W`: N slot da W numeri ciascuno) su cui la rete impara a leggere e scrivere da sola, tramite operazioni completamente differenziabili (quindi addestrabili con backprop end-to-end). A ogni timestep un *controller* (tipicamente una LSTM) riceve l'input, emette un vettore di comando, e attraverso delle *teste* (heads) di lettura/scrittura decide **dove** e **cosa** leggere/scrivere in memoria. L'output combina la risposta del controller e ciò che è stato letto. Impara compiti algoritmici che richiedono memoria strutturata: copia di sequenze arbitrariamente lunghe, ragionamento su grafi (percorsi in metropolitana, alberi genealogici), question answering che richiede di \"ricordare\" fatti visti prima.\n\n## Come è fatto\n\nL'idea chiave è **separare il calcolo dalla memoria**, come in un computer classico (CPU vs RAM), ma rendendo tutto l'accesso *soft* e differenziabile: invece di indirizzare un singolo slot, ogni testa produce una distribuzione di pesi (softmax normalizzata) su tutti gli slot, e legge/scrive una media pesata. Architettura in tre moduli (dal README):\n\n- **`access`** (in `access.py`) — il cuore. Ospita la logica di lettura/scrittura in memoria. Usa due sotto-moduli-`RNNCore` definiti in **`addressing.py`**:\n  - **`TemporalLinkage`** — mantiene una *matrice di link temporale* che registra l'ordine in cui gli slot sono stati scritti, così la testa può leggere \"in avanti\" o \"all'indietro\" seguendo la sequenza cronologica di scrittura (memoria episodica ordinata).\n  - **`Freeness`** — traccia quali slot sono \"usati\" e quali \"liberi\", tramite un *usage vector*. L'allocazione sceglie lo slot meno usato per scrivere; la lettura può liberare slot dopo l'uso.\n- **`controller`** — una feedforward o LSTM (anche profonda) che riceve `[input_t, letture_{t-1}]` ed emette il *interface vector*: chiavi di ricerca, forze, gate, modalità di lettura.\n- **`dnc`** (in `dnc.py`) — wrapper che unisce controller + access in un unico `RNNCore` srotolabile con `tf.nn.dynamic_rnn`.\n\nI **due meccanismi di indirizzamento** — la firma teorica del progetto:\n1. **Content-based addressing** (per contenuto): la testa emette una *chiave* e una *forza*; la rete calcola la similarità coseno tra la chiave e ogni riga di memoria, poi softmax. È richiamo *associativo per somiglianza* — \"dammi lo slot più simile a questo\".\n2. **Location-based / dynamic addressing** (per posizione): via `TemporalLinkage` (segui l'ordine di scrittura) e `Freeness` (alloca slot liberi). È l'indirizzamento *strutturale/temporale*.\n\nUn *write gate* e un *allocation gate* decidono se scrivere per contenuto (aggiorna uno slot esistente simile) o allocare uno slot nuovo libero. Il tutto è liscio e differenziabile: la rete *impara* la policy di gestione della memoria dai gradienti del task.\n\n## Cosa possiamo notare di utile per noi\n\nQuesto è il **progenitore diretto della memoria indirizzabile** che ci serve, e il confronto con l'\"arena del vuoto\" è illuminante sia per ciò che è trasferibile sia per dove diverge.\n\n- **Indirizzamento duale = i due assi della nostra memoria.** Il DNC codifica esplicitamente ciò che noi vogliamo tenere separato: *content-addressing* (richiamo per somiglianza — la memoria associativa/novelty) e *location/temporal-addressing* (la struttura, l'ordine episodico). La `TemporalLinkage` matrix è esattamente il tipo di traccia \"chi è venuto dopo chi\" che serve per ricostruire una traiettoria nell'arena, non solo per rispondere \"cosa somiglia a questo\". Trasferibile: mantenere DUE canali di richiamo distinti (similarità + successione temporale) invece di collassare tutto sull'attention per contenuto.\n- **`Freeness` / usage vector = un embrione di gating.** Il DNC decide *dove scrivere* in base a quanto uno slot è \"usato\". Ma nota la divergenza cruciale: il DNC alloca sullo slot **meno usato** (riempie il vuoto per pura contabilità di risorse), mentre la nostra memoria dovrebbe scrivere solo quando l'evento è **nuovo/sorprendente** (novelty-gated). Il DNC risponde a \"c'è spazio?\", noi vogliamo rispondere a \"è degno di essere ricordato?\". Il meccanismo `Freeness` è il gancio giusto ma il *criterio* va sostituito: al posto di `1 - usage` come priorità di scrittura, mettere un segnale di *novelty/prediction-error*. Questo è precisamente il punto di innesto dove la nostra \"arena del vuoto\" si distingue dal DNC.\n- **Write gate = interruttore di scrittura già pronto.** Il DNC ha già un `write_gate ∈ [0,1]` differenziabile che modula quanto si scrive a ogni step. È l'aggancio letterale per il *novelty-gating*: al posto di un gate imparato per minimizzare la loss, pilotarlo con l'errore di predizione / la distanza dal contenuto più simile già in memoria (se molto simile → gate basso, non riscrivere; se molto distante → gate alto, evento nuovo → scrivi).\n- **Tutto è liscio e differenziabile — pregio e trappola.** Il DNC legge una *media pesata* di molti slot, mai un singolo indirizzo netto. Per l'addestrabilità è oro; per l'introspezione e per gli **oscilloscopi** è un limite: i pesi di lettura sono distribuiti e \"sfumati\". La cosa trasferibile è che quei vettori di pesi (read-weightings, allocation-weightings, link-matrix) sono **direttamente plottabili nel tempo** — sono di fatto tracce da oscilloscopio della memoria: si può visualizzare \"su quale slot punta la testa a ogni istante\", \"quanto è concentrata vs diffusa la lettura\", \"quando scatta un'allocazione nuova\". Questi segnali sono la nostra strumentazione già disponibile.\n- **Separazione calcolo/memoria = tesi coscienza=ricorsione.** Il DNC dimostra che una rete diventa capace di *ragionamento strutturato* solo quando può ricircolare il proprio stato attraverso una memoria esterna letta e riscritta — un loop in cui l'output di ieri diventa l'indirizzo di oggi. È un'istanza minimale e concreta di \"ricorsione attraverso un substrato materiale\". Diverge dalla nostra tesi perché nel DNC il loop è *chiuso e finalizzato* a un task (loss supervisionata), mentre nella nostra ipotesi la ricorsione è aperta e auto-generata; ma la meccanica del \"rileggere ciò che ho scritto per decidere cosa scrivere ora\" è la stessa spina dorsale.\n- **Capacità e limiti di scala.** Memoria `N×W` con N tipicamente piccolo (32–256 slot negli esperimenti): il DNC è potentissimo su compiti algoritmici ma non è pensato come *magazzino di massa*. Diverge dalla SDM/Hopfield (capacità enorme, richiamo one-shot). Se serve un'arena grande, il DNC dà lo *schema di controllo* (come si decide dove scrivere) ma non il *substrato di stoccaggio* — quello va preso dai modelli associativi ad alta capacità.\n\n## Da rubare\n\n1. **Il `write_gate` come sede fisica del novelty-gating.** Prendere l'astrazione già presente e ri-pilotarla: `gate_scrittura = f(prediction_error, distanza_dal_match_più_vicino)`. Scrivi solo quando l'evento non è già ben rappresentato — così il DNC (che alloca per risorsa libera) diventa la nostra memoria (che alloca per novità).\n2. **La `TemporalLinkage` matrix come canale episodico separato dall'associativo.** Tenere due indirizzamenti: uno per-contenuto (similarità → richiamo associativo) e uno temporale (segui l'ordine di scrittura → ricostruisci la traiettoria nell'arena). Non fondere i due sull'unica attention.\n3. **Le read/allocation-weightings come tracce da oscilloscopio native.** Loggare e plottare nel tempo i vettori di peso delle teste: concentrazione della lettura, istanti di allocazione, spostamenti dell'indirizzo. È strumentazione introspettiva gratuita per osservare la memoria \"che pensa\".\n", "google-research-self-organising-systems": "# google-research/self-organising-systems\n\nLink: https://github.com/google-research/self-organising-systems\n\nStelle: ~420 · Linguaggio: Jupyter Notebook (JAX/TF/PyTorch) · Attivita: viva (push gen 2026, repo aggiornato lug 2026) · Licenza: Apache-2.0\n\n## Cosa fa\nE' il monorepo del gruppo di Mordvintsev / Randazzo / Niklasson (Google) dietro la serie Distill sulla self-organization. Raccoglie il codice di Growing Neural Cellular Automata, Self-classifying MNIST, Texture NCA, Particle Lenia, la formulazione energy-based e vari esperimenti collaterali (grafting, reprogramming avversariale, differentiable FSM/logic CA, versioni JAX con EvoJax). Il filo conduttore e' uno solo: come la struttura globale emerge da regole locali identiche applicate ovunque.\n\n## Come e fatto\nNon e' una libreria unica ma una collezione di notebook autonomi piu qualche sottopacchetto (`mplp/`, `isotropic_nca/`, `notebooks/particle_lenia.ipynb`). L'idea chiave ricorrente: ogni cella e' un piccolo vettore di stato (alcuni canali \"visibili\" tipo RGBA + canali nascosti); una singola rete condivisa legge il vicinato locale (percezione via convoluzioni/Sobel) e produce un incremento di stato; si itera nel tempo con aggiornamenti stocastici asincroni. Il tutto e' differenziabile end-to-end, quindi la \"regola locale\" si allena per gradiente verso un target globale (un'immagine, una classificazione, una texture). Particle Lenia sposta la stessa filosofia dal grid alle particelle: campo di energia continuo + dinamica di gradiente da cui emergono pattern viventi.\n\n## Perche riguarda te\nE' probabilmente il repo piu vicino in spirito all'arena del vuoto e alle particelle-emergenza. Qui \"coscienza=ricorsione della realta attraverso la materia\" ha una controparte concreta e minimale: la stessa regola locale, iterata ricorsivamente su un substrato, genera e ripara struttura globale (i Growing NCA rigenerano dopo il danno - morfogenesi robusta). Il punto onesto di divergenza: loro allenano la regola per gradiente verso un target esterno, mentre la tua arena del vuoto cerca emergenza senza target, per regole poste a mano. Quindi il valore per te non e' il training, ma il substrato: stato multicanale con canali nascosti, p
